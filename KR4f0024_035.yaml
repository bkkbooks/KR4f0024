body:
  text: 松桂堂全集卷三十五吏部侍郎彭孫遹撰進兩朝國史表伏以聖治開天凝萬年之駿命皇圖卜世樹百代之鴻猷契心傳於虞夏商周言成典誥昭法守於子孫臣庶道備觀型式瞻垂裕之模益慶靈長之祚欽惟太宗文皇帝功崇耆定德洽好生義問宣昭振聲靈之赫濯仁恩洋溢合遐邇以柔能十七載締造之勤敷陳莫罄億萬祀創垂之統謨訓常存易簡可從藴天地彌綸之量質文互用留帝王渾噩之風欽惟世祖章皇帝英敏夙成重華允協永清四海聰明克亶於生知表正萬邦勇智特優於天錫啓升平之泰運貽宇內以親賢樂利之庥布體要之嘉謨納天下以正直蕩平之矩訏謨布告大哉之紀之綱渙號矞皇展矣如絲如綍執競與緝熙並美見兩朝之作述兼隆耿光因大烈彌彰知二后之燕詒獨厚顯承無斁於當年纘緒適符於今日欽惟皇帝陛下紹庭念切繼序思殷以覲以揚在在有羮牆之見寖昌寖熾時時存堂構之心謂率祖以繩武為先而尊親以顯名為大煌煌訓典爛如星日之垂秩秩經程寶若球圖之重佑後人以罔缺規畫精詳監成憲而無愆儀型茂著綸音沛發史局同開特命臣等檢金匱之藏函搜玉縑之祕牘詳加綴輯彚入編摩析類分條禮樂兵農之悉備發凡起例源流本末之咸該寒暑再更甫竟汗青之業琳琅什襲長騰竹素之輝臣等襪線才微巾箱學淺測蠡窺管徒仰企於髙深載筆記言但勉遵於指授伏願乾行協健巽志懋修方策流光永作千年之鑒奎章煥采恆留乙夜之觀炳炳麟麟懸象魏以誕敷庶政繩繩蟄蟄衍雲仍而式固丕基嵗終講義表丙寅十二月竊惟健以法天聿著日新之德睿以作聖必資時敏之修故帝王有典學之功而經史多逢源之獲自苞符肇啓謨誥相仍化始雎麟所以陶情淑性治先官禮所以訓俗型方尼山筆削之書綱常攸賴紫陽褒貶之牘法戒斯存凡兹訓典之垂並屬理平之要指歸中正義類閎深襲以瑤縑寶若球圖之重陳之丹扆倬為雲漢之昭欽惟皇上軒德徇齊堯文煥煜學山峻極就將不輟於生知道岸誕登廣大悉全於體藴受圖書之緑簡握河洛之𤣥珠建極宫庭玉琢金追之度凝休寰海山車澤馬之風總四德以體元而大猷允秩集萬年之正統而率土咸寧乃猶策府𢎞開講帷勤御韋編竟業旋誦法於典墳魯壁窮經即涵濡於風雅折衷諸傳上探闕里之心采獲羣儒大闡曲臺之緒微言晰矣大義昭焉以至涑水之編摹考亭之綱目網羅詳備籖帙繁多靡不綜洽於淵衷留連於宸覽千三百年之治績悉融貫其源流五十九卷之篇章並發揮其理趣萬幾稍暇便啓藝緘五夜將周猶搜竹檢研尋罔間晦明寒暑之辰紬繹加勤出入起居之頃吞八瀛於學海九派朝宗聚七曜於奎垣衆星拱向共仰髙深之詣寧需涓􅙟之禆臣等徒習誦絃未嫻經典窺素王之精意但舉文辭讀朱子之遺編豈諳義例巾箱淺見祗慙經術之疏珥筆虛叨彌愧史才之陋謹呈緗帙恭進彤筵伏願益進無疆慎修有永吹詩協律常流九叙之歌稽憲飭儀懋建三雍之禮叙人倫而明天道家修周孔之言崇正學而闡𢎞文人佩洛閩之教則立仁立義三才位儀象之中卜世卜年千載頌勛華之盛矣又竊惟天德日新允協乾行之健聖功時敏丕彰文治之隆故綏猷必賴於君師而典學亦資夫經史自苞符既啓圖範攸垂六詩為風雅之源三禮為倫常之準春秋之義明王道以正人心綱目之書寓勸懲而昭法戒並皆言成典要理藴閎深掌以蘭臺緗笈韞琳琅之祕陳之楓陛丹霄發奎璧之光欽惟皇上敦敏夙成中和茂建聰明睿智德契生安文武聖神道符廣運宵衣旰食每清問以勤民日就月將更敏求而好古推崇先聖天章偕二曜昭回褒顯前賢宸翰共五雲暉麗固已勳華覃披聲教誕敷矣乃猶時御經帷日親講幄典謨誦法旋觀象而玩占理數參稽即歌風而肄雅探聖心之筆削四傳旁搜考天秩之節文羣言博綜既五經之融洽復全史之淹該涑水編年考亭書法前編續紀咸貫徹其初終大義微言悉折衷其得失萬幾之暇必游心於典籍文章四序之中不輟業於晦明寒暑宸修淵邃首出百王睿詣精純獨超千聖乾坤並其廣大海嶽讓其髙深臣等未習誦絃詎嫻經典學莫窺於五始才不逮於三長濫厠儒林徒執鉛槧之業叨陪法從曾無塵露之禆伏願化洽八紘光敷四表垂裳致治常當解阜之風輯玉展儀永播惇庸之化體元凝命裕千百世之𢎞模履泰膺符垂億萬年之正統則祥迎軒策綿厯祚於無疆福衍箕疇錫臣民於有極矣進御覽通鑑綱目表題為御覽通鑑綱目俱竣恭請聖論宣示史館昭垂萬祀事禮科抄出日講官起居注翰林院編修支從六品俸臣某題前事奉㫖某朝夕侍從勤勞可嘉這所奏事情著禮部翰林院㑹同議奏欽此該臣等議得翰林院編修某疏稱臣恭侍皇上㸃閲綱目大全三十九卷綱目全編一百一十一卷告成所有記注聖論伏望頒付史館宣示來兹等因前來臣等竊惟綜百王之道法莫備於經紀歷代之治功莫詳於史義多參互固采獲於前人理有要歸必折衷於上聖欽惟皇上生資天亶遜敏日新啓䇿府以旁搜陟學山而閎覽揚經榷傳恢張衆說之精訂異參同吐納羣言之液乃復網羅史冊考鏡源流發涑水之遺編探紫陽之精意三才始建上追羲昊之年五德相乘下訖宋元之代靡不躬親翻閲手綴鉛黃正亥豕之誤書輯蛃魚之缺簡篇章浩衍而一覽無遺幾務殷繁而三餘罔間於六十餘旬之內周百五十卷之書而又洞徹初終廣加評斷因心創解恆度越於羣賢觸類引伸悉權衡於至道指歸中正大義則炳若丹青藴蓄𢎞深微言則邈如河漢聨篇纍牘盡是謨猷隻語單辭皆成典誥誠帝王之大訓宇宙之𢎞文也所有記注聖論相應如詞臣某所奏恭請皇上頒示史館編録成書以折衆義之不同以補先儒之不及則千秋金鑑並懸日月之光什襲琅函永煥星雲之彩矣賜御書太極圖說唐詩謝表代臣聞帝王之治莫大於右文臣子之榮必先於稽古况乎奎章肆映仙藻紛披賚豫有加恩華並重求之往牒至今猶以為美談臣獨何人一旦遂膺兹異數伏念臣本由素士叨玷清班祗以孤忠受特達之知遂以二品濫列卿之職每荷絲綸之見假與華衮而同褒曽分翰墨之餘光比天球而等貴省躬循分溢量踰涯數載於兹寸心滋愧乃者復䝉聖諭賜臣以御書太極圖說唐詩各一卷自天題處猶然香浥芝泥當暑出之頓覺春生蓬室既驚且悚竊抃以欣拜命之餘罔知所措兹蓋伏遇皇帝陛下至仁𢎞奬大德曲成録占畢之微勞推匪頒之渥賞若夫姿神瓌逸體格精研安穆則鵠跱鸞停飛動則龍翔鳯舞波折則垂針懸露㸃畫則切玊錐刀在古人每患其難兼而御筆則無之不備藏之什襲煥乎珠璧之輝捧之上衡倬彼雲霞之彩洵乎曠古之竒珍真是微臣之殊遇又臣居禁闥日侍經帷伏睹我皇上聖因天縱而又多能質本生知而猶好學即此涉獵藝文之頃不忘探求性道之源至於六義雜陳尤屬萬幾餘事恭承渙汗特沛玉音朂以成就之言寓以責難之意擴如天之睿度仰見主德所以彌隆對若谷之淵衷夫豈臣愚所堪上副敢不益勵恪共勉思稱塞兾毫釐之有補畢生竭報國之誠庶咫尺其不違奕世作傳家之寶嵗終進易經講義表竊惟睿以作聖時敏之學為先健以法天日新之德為盛理多聞而有獲就將不廢於生知道下濟而益光廣大獨全于體蘊欽惟皇上聰明克亶敦敏夙成契千聖之心傳綜六經之指趣講筵勤御採納彌𢎞天語敷揚精微悉徹一出入起居而罔間厯晦明寒暑而加勤德已極於崇隆功猶深於懋迪謂修已治人之要莫切於尚書而盡性致命之功無先於大易五十八篇之內道法咸該六十四卦之中天人悉備甫畢業於典謨訓誥之文即研幾於達化窮神之學鏡源測委發羲文周孔之微言彰往察來抉辭象變占之精義仰見宸𠂻謙受聖學敏勤近述逺稽無之非帝王之道仰觀俯察有以見天地之心似此廣運之難名夫豈臣工所易測臣等鮮通訓詁幸侍經帷録鉛槧之微勞屢拜尚方之賜荷絲綸之寵錫濫叨晉秩之榮涓埃無補於髙深俯仰有慙夫恩造兹當嵗終之期伏念易經日講解義現在校正發刻而逐日進御講章例停彚寫再進為此合應題明仰干天聽伏願乾行不息益進無疆慎修思永裕百世以垂謨仁義中正兼三才而立極則大猷聿臻夫景爍而至治永底於文明矣明史立道學忠義二傳奏竊惟歷代之史凡儒學諸臣皆載儒林列傳獨宋史於儒林傳之前復立道學列傳一篇專以大儒程皓程頥朱熹為主其及門弟子悉為編載蓋以道學之統自堯舜至於孔孟代相授受孔孟沒後千有餘年而得程子朱子發明六經之藴逺契列聖之心其學至醇其功至巨故特立此傳以衍孔孟之真傳明正學於天下誠非無見也明時名儒輩出其於程朱之學或異或同各有所見然䆒其所自皆以孔子為宗伏念孔子之教下學而上達致知而力行程朱循而守之道統賴以不墜若必遺下學而希上達舍力行而言致知此在諸儒領悟精微原未嘗無實得於已而使學者務求廣逺深恐不可垂教於人恭遇皇上睿聖聰明崇儒好學道法治法之統亶備於一身作君作師之功訓行於萬國此千載一時正學昌隆之㑹也自今纂修明史合無照宋史例將明儒學術醇正與程朱吻合者編為道學傳其他有功傳注及學未大醇者仍入之儒林傳中則大道不致混淆而聖謨獨髙於今古矣臣愚未敢輒便為此奏明請㫖伏祈宸鑒施行竊今纂修明史應立忠義列傳一篇凡明時死節之臣例得編入考之前史莫不皆然伏查明末諸臣當王師平定江浙閩廣之時盡節不屈者所在多有其人彼既事非其主不識去就之機自取殺身何容深惜而揆其本心實非叛逆之比忠於所事似可矜原况值我皇上扶植綱常主持倫教凡布之綸音編諸訓典者無一不依於忠孝㑭務有功於勸懲似此明末忠義諸臣合無詳核其事蹟載入傳中以成一代不刋之書以立萬世人臣之凖又查元修宋史時有宋臣張世傑陸秀夫等明修元史時有元臣布延巴哈丁好禮等皆先以力戰不屈而死編在忠義傳中與今事例實有同符為此題明請㫖伏祈睿鍳施行方略告成序欽帷我皇上聖德誕敷神謨廣運削平羣逆敉定疆隅永底治安長銷金革鴻勳駿業振古莫京臣等伏覩八年之內兵間進止悉奉宸規凡水陸攻守之宜竒正疾徐之用諸將祗遵成命則所向有功稍一愆稽輒多僨績應如合契昭若發䝉臣等職斯載筆惟據事直書不敢片言之飾雖至愚且陋末由仰測髙深而管窺所及竊有可得而揚榷者焉蓋三逆素蓄狡謀多行不軌背恩反叛厥罪惟均而倡亂煽禍吳三桂實為戎首當三桂之初反也恃其險逺竊踞一隅變雖作於滇黔毒未流於鄰境皇上一聞黨古里上變即料三桂老賊多詐必覘我未備逼我楚南窺我巴蜀故既命順承郡王勒爾錦統師南討又敕前鋒統領碩岱都鄂鼐馳赴荆州襄陽提督桑格往守沅州常德都統巴爾布朱滿進據長沙嶽州以遏其東軼將軍瓦爾喀赫業赴蜀拒守以遮其北侵是其為計甚豫而警備甚嚴密也設是時守土諸臣盡力干掫各保四方之內桑格等並勒所部電發飈馳塞清浪之關扼洞庭之險瓦爾喀等乘蜀土初擾防禦未堅既拔陽平朝天二關抵保寧即疾攻力戰以搗成都則三桂之兵勢不能䦨出境外倔彊洱海盤江之間有困而踣耳諸將顧不亟為之所頓兵左次轉餉愆期彼此逡巡坐乖事㑹以致逆賊跨蜀道犯秦隴踰沅常陷長嶽而諸方震動如滋蔓之難圖皇上深悉地利灼見軍情謂彼時滅賊之機係乎長嶽特命貝勒尚善取嶽州安親王嶽樂取長沙乃尚善等託故不前宿留嵗月絫奉詔嚴趣猶却顧如初因復遣大臣督造戰艦調集師徒授䇿於貝勒察尼令其占據江湖斷賊餽運於是三桂知勢不能支憂怖以死而嶽州之賊食盡力疲棄城竄遁長沙常德諸郡以次收復羣寇之在川粵間者亦靡不悚讋喪氣湖南既平皇上遂命諸路大兵乘機進勦時秦中諸將帥狃於成見交章入奏皆言未可進兵賴宸謨獨斷痛斥其非令大將軍圖海等克取漢興規收巴蜀隨趣大將軍章泰一軍由貴州大將軍賚塔一軍由廣西進定雲南而令將軍紀哈里趙良棟等以兵由四川往㑹諸將凛遵指示分道並進直薄滇池雲集霧㑹環攻其城郭世璠授首黨類咸俘斬無遺由是六詔􅔄寧晏然無風塵之警焉耿精忠乘滇中之亂竊踞八閩侵其鄰封肆其凶虐浙東江右咸騷然其不寧康親王傑淑奉辭薄伐總領戎行以貔虎之軍威擊狂騃之逆竪固宜親提枹鼓疾走霞關摧朽折枯易於反掌而猥以溫台諸郡殘寇未平駐節金華久淹日月欲俟伏莽盡清然後揚戈南指名雖持重意實遷延皇上長籌逺見以為先剪逆渠則小醜自當潰散且建昌之賊無故自却精忠已有內變機在可乘亟趣王等親赴衢州示以成畫令分兵斷賊大溪灘餉道遂大敗其衆逐北追奔直壓閩境巖關不守所至投戈精忠束身乞降已䝉聖恩曲貸而猶潜通海寇謀據閩疆旋為部人所發徴詣京師磔之都市亂萌銷遏南徼所以無虞也尚之信負恩干紀脅父稱兵與三桂交通敢為大逆㑹閩中蕩定我武方揚皇上命將軍􅀈哈達以兵赴潮陽莽吉圖以兵臨韶郡兩路夾擊用蹙廣州之信忷懼無措始具疏服罪夫何歸順之後怙終好亂罔有悛心屢奉明綸趣其親率官兵赴軍前立效而不遵詔㫖百計沮違瞰王師已入粵西廣州無滿兵彈壓隂勒部伍狡焉思逞皇上早燭其奸知狼子野心終無回革既以張永祥等首告遣侍即宜昌阿即訊又慮廣城或有意外因馬承䕃叛諭將軍賚塔以師鎮潮以隂為之備逮之信甫就拘縶賚塔之兵已星馳抵粵故其部下雖擐甲執兵尅期舉事悉為我軍所擒戮之信亦以逆謀得實伏誅而五嶺以南安如磐石矣由是觀之剪除三逆無一不本於皇猷即其餘叛冦弄兵如王輔臣劉進忠楊來嘉之徒次第殄平均資廟略夫豈行間諸臣所能仰贊於萬一者至於訓將帥飭紀律廣招徠禁侵暴褒死事宥脅從惠愛蒸黎撫恤士卒遣兵則遞相遷代而行者不勞籌餉則就近轉輸而居者不困聖謀淵邃睿算周詳尤非內外諸臣所能見及者也蓋皇上之洞賾燭微萬里畢照至明也决機發策羣議莫撓至斷也開誠布信賞罰無私至公也鏡往察來綜畫有素至豫也而一本於聖心之至仁不忍生民之久罹塗炭而汲汲焉拯其阽危登之袵席所以軍師樂愷黎庶悅服七德宣昭萬方恬謐巍巍乎蕩蕩乎永清大定之勳億萬年無疆之業也若夫平滇之後德音疊布薦上徽稱祗謁山陵遍行望秩告成功而不有却尊號而弗居典禮茂隆功德愈盛他如召還禁旅分設鎮防安插投誠將辨以消隱慝分别逆屬人口以免株連酌戍士之裁留核將領之臧否自王貝勒貝子將軍都統副都統以下皆令功罪相抵輕重適平政令精明規模宏逺因事在武功既成之後又非用兵方略所繫故不復編次云松桂堂全集卷三十五
