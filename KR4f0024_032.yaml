body:
  text: 松桂堂全集卷三十二才情别集吏部侍郎彭孫遹撰銀河吹笙倣西崑體銀河吹徹玉笙遲清怨迢迢欲曙時巫女雲歸俱是夢鮫人淚織盡成絲霜衾抱月羞孤影露葉驚秋别故枝此際離愁更何限哀絃凄管斷腸詞五日閨詞不插花枝别樣妍內家粧束愛天然只餘一種嬌憨態繡虎斜懸薄鬢邉小盞芳醪泛緑蒲紅潮隱映玊肌膚醉眠乍起嬌無力墜却叉頭艾虎符採藥人歸古隴頭碧叢紅萼滿庭幽忘憂只解憐萱草多子先應佩石榴幽閨岑寂度年芳韻事消磨夏日長起視花隂才晌午五絲雙綰繡香囊妙製紗羅好餽遺及時花繡一枝枝愛他心事能幽慧不獨針神鬭巧思五日葵榴掩映紅人間佳節是天中疏簾忽下迎梅雨小院先飄醉竹風百索爭傳舊俗來艾絲管角帶雙䋿情知腰細無多食強把纖纖解粽開蘭花蘭葉競芬芳採摘旋教試午湯好是晚來新浴罷微風吹送體中香空閨無事曉粧遲粧竟剛逢日午時間把金針穿綵線嬌兒衣領綴長絲春歸無處不關情幽夢時時暗裏驚桃葉綰成雙結子教儂長得辟邪名綺疏綺疏交映碧雲紗生小風流道韞家朱鳥未醒忩裏夢青衣先試午前茶腕因代枕留紅印手為添眉染黛花今日天涯回首處衰楊斷岸月痕斜幽輝宋玉小牆東姿容絶世工愁眉低淺緑羞頰映微紅愛潔宜餐露含嬌欲避風幽輝如有意留伴綺帷空小忩小忩燒燭炬清漏轉銅蠡月送窺簾影花垂倚砌枝含情羞自吐私語畏人知相見猶難説爭憐不見時深院深院無人到清歡盡日宜爐煙朝瀹茗燭淚夜敲棋促坐非佻達關心在别離不須燒鵲腦應是苦相思殘燈坐見殘燈滅卧聽疏漏遲也知愁不寐欲待夢來時華月皎皎華月光穿帷動顔色憑誰憐影好自顧生歎息乘舟何處乘舟好問津臨風忽見倚闌人朝霞著靣光初射石黛凝蛾淺未勻趙女可能終守禮宋鄰真已欲窺臣只愁咫尺巫山路那得朝雲暮雨頻長新店中有維揚女子題壁詩甚悽惋可誦為占一律維揚麗色多才調彤管凄涼寄所思似向人間傷薄命却來壁上寫新詩空江孤雁流哀夜寒嶺清猿迸淚時我向此中腸欲斷天涯淪落盡堪悲彰義門外見一女子墜馬詩以詠之禁門花栁放小騎試春風色是傾城艷粧還墜馬工含啼眉欲蹙竟體汗方融鴉鬢金叉落蓮鈎玉鐙空聞呼聲喘細見整髻鬟鬆隱隱羞蛾緑微微媚臉紅願將憐惜意宛轉一相通江月明三首和金陵女子卞元文月上江波瀲灔明此時相對不勝情遙憐白下多情女靡麗猶傳故苑聲江月江潮相向明秋風忽起故園情何人吹入參差調盡作江城腸斷聲年年皓月照人明慘淡江流萬古情欲向緱山尋羽客月明相和鳯凰聲桂殿桂殿鎖嬋娟清輝擁獨眠素粧嫌粉涴多病得人憐秀靨天然媚愁眉分外妍傾城寧足惜一顧悵無緣車中見香車逐隊轆轤聲結束鮮妍别有情交倚宫鞾芳褥穩平分頂髻寶叉橫隔幃乍悅傾城色卷幔還疑出塞行蟬鬢弓鞋何所事吳姬浪得可憐名溫柔溫柔不羡白雲鄉脂粉終輸淺淡粧曽拊肉肌猶帶膩自嘗口液尚含香窺人宋玉應難許作賦陳思轉自傷銷化情緣何處去三生石畔記行藏别緒别緒臨行總未知夜闌燈燼憶成癡要知入骨相思處多在低頭不語時倒暈眉心展未成無端女伴強隨行芳心知向誰邉落幾度人前錯應聲賣香婦自是閨中秀其婦顧姓光輝照道傍荀郎疑入坐趙女妬生香市粉應耽病投梭不礙狂何緣逢賈午攜手贈東牆繡衾錦被朝雲暖熏爐夜炷清願持同夢侣長得合歡名春信輕痕漬香肌祕氣生定知郎意重到此慣多情繡枕粲粲雙鴛枕春眠掩帳鈎膩香鬟影亂粉印淚光留繡鳥憐交頸粘花學並頭許多相泥處回憶却成羞繡鞋絲履繡鴛鴦文珠綴鳳凰端妍誇女伴窄小泥檀郎踐草原無迹生花似有香水晶簾下見幾度斷人腸繡襪綺羅裁作襪窄窄稱腰身菽發含嬌態酥香著意親玉肌長護暖粉乳暗藏春結束憐私小唯應解帶頻題畫來是神光去是雲人間天上總無分護持下體窮襠袴穩稱纖腰細襇裙好整香車迎七夕空裁玊葉寄雙文分明眼底難相近只似當年李少君誰寫巫山一片雲甘泉圖畫杳難分身輕時似驚鴻態腰細難勝簇蝶裙何處更尋香蔽膝當年空羡錦回文陳王賦裏分明是欲向清宵惱細君春閨雜咏日午紗忩睡起時問儂何事斂愁眉非關不向傍人説試自捫心也不知夭桃開靨栁舒顰小院東風入暮春折得花枝無限色不知妬殺倚闌人敲得三更又四更空床聽徹戍樓聲何緣日日淹淹睡偏到春宵睡不成曉起慵粧不整冠傳聞别院罷朝餐日長人靜間無事手展烏絲學畫蘭合歡詩為元景姪新婚賦流雲卷盡見明河隱隱雙星傍晚過曉月已從天外落秋忩猶問夜如何新開小院傍梧桐青瑣朱闌一道通夜雨自飛雕檻外秋寒不到綺幃中西軒華月白如霜南陌銀河夜漸長漫詫渡河逢織女會看中婦織流黃為張荃蘅擬催粧之句折綿朔氣暮雲殘飛雪中庭濕未乾盡説柔肌生粟冷玉人曉起不知寒帳掩雲屏次第開曉粧先拂夀陽梅南都石黛空盈篋却斂雙蛾待壻來雙蛾隱約月如鈎取次粧成喚下樓新臉含嬌紅不語怪人爭説壻風流題畫素影珊珊逈出塵未須鉛澤汚天真無端獨自窺簾坐不道嫦娥解笑人魯庵同年以七夕前一日納妾因為長歌城南夾道笙歌沸飄入朱家新甲第朱家豪氣亘髙雲不惜黃金買殊麗麗色清秋艷綺羅問君如此邂逅何偶出邯鄲能守禮少從協律最諳歌彩軿組帳香成霧此日光輝生道路和鳯先鳴緱氏笙洗車應借巫山雨明星獨處悵牽牛素月孤懸抱纖為是金墉玉女來不愁銀漢天孫妬入宫自古妬蛾眉鳴機罷織欲恨誰愁聽緩箭聲聲滴忍見長河夜夜垂河垂箭滴曉侵尋新故悲歡各自心已被棄捐紈扇賦故來決絶白頭吟白頭吟紈扇賦棄置區區安足云傾國傾城在一顧為人作催粧詩何當行樂及良時分隊鴛鴦合卺巵好理芳樽歡十日更添紅線續長絲時冬至綺樹雕忩隱隱通粧成宛轉向房櫳不須却扇窺顔色城北徐公是阿翁婦翁徐氏人間樂事正紛披不見清娛此更宜雲幕乍開三徑裏花風未過小春期其人姓蔣明珠約帳四簾垂簾外輕寒禁不吹何意為歡偏此夜玉壺漏下最長時銀河吹笙倣義山體銀漢聽吹笙迢迢腸斷聲雲消珠斗逈星轉絳河平幽怨無時息新歡有夢驚臨風嬌欲避見月想同行粲枕橫霜幌縈燈亂雨檠銅蠡朝漏靜金午香清家是東鄰住人非北里名私期防屬耳密坐畏多情覿靣蓬山起量愁海水傾兩懷餘繾綣往事憶分明永漏寒衾曙孤眠假寐輕鸞膠何處續鮫淚暗中盈别鶴傷心弄哀鴻繞指鳴遊仙非子晉結伴失雙成露篠凄空館秋蛩咽五更離憂憐此夜決絶任今生寄調二兄納妾十絶句照影粧成解自憐盈盈十五最嬋娟髙樓曉日東南映却笑羅敷不少年獻夀筵開正未央剛逢此日試羮湯三朝新婦猶羞澀催上堂前阿母觴轉眼風光繞錦屏芝蘭應滿謝家庭阿儂自愛宜男佩芳草階前空復青十里香塵擁道傍彩軿妙吹雜笙簧昭君村裏迎佳麗湓口磯頭喚玊郎粧閣清嚴絶點塵紅忩交映黑紗新畫眉掠鬢都宜稱出向堂前遍拜人臘月中旬日漸遲芳郊已見展青旗何來春色今年早催放梅花第一枝上陽春色落誰家折得仙枝勝麗華料得孤山林處士更無清興問梅花落粉沉煙滿鏡臺綺疏靣靣向東開侵晨時有春風入傍晚先迎好月來雁柱氷絃簇簇新流鶯宛轉語芳春懸知小婦能調曲莫喚檀郎作丈人十日新歌可自曽橫陳恣態尚難勝今年除夕西樓上憎殺蘭膏守嵗燈歌起遣信邀劉校書久不至口占相調細犢輕車白玊輪流蘇翠羽障芳塵瓣蓮巷口西頭路小疊紅箋喚伎人不見當年劉采春春花秋月總傷神金閶亭下千株栁鎮日長條折贈人北里佳人首自推芳心見説最憐才郎君底是曾相識萬喚千呼不肯來十隊傳呼信使忙行雲消息正茫茫等間一顧猶嫌惜那得回身向玊郎西郊相遇蒼水問訊次直答云訪妓回因走筆調之由來名士悅傾城况爾翩翩最勝情日暮茸城西畔路隱囊紗帽狹斜行素蘭能度石城聲桐月調絃最擅名油壁相逢何處路定須狂殺下帷生素蘭桐月雲間名妓小巷雙飛繫馬時垂楊芳草碧參差秦樓定有紅牙隊唱取君家白雪詞湖上煙波長暮潮栁絲低拂赤欄橋斷腸春色深如許不向青樓何處消贈珮江臯此一時青驄歸去日遲遲長鬚便了深相囑莫使閨中大婦知咫尺瑤京路不賒龍潭何似大隄花客情直是無聊甚與爾相期楚潤家白龍潭是雲間妓人居處調冕仲四絶冕仲設酌於若耶家中邀早往為竟日之歡因同䦘石昆玉仲髙玉大步出北門逺尋此約若耶最為冕仲所愛日夕在溫柔鄉中幾不知身之是客是日賓主皆極歡酒肴亦最豐潔終日始散妾住三江口郎乘雙槳船移船渡江去宛轉劇相憐䁔宿鴛鴦帳歡眠翡翠樓人生不作客那得許風流妾家北塘上潮汐有程期但看潮來候即是歡到時灼灼紅芙蓉花開艷如許歡是越中人但識若耶女無題和耦萬二首看花心事惜蹉跎紅雨飄零燕子窠人在髙樓迎鳯侣家居曲巷喚鸚哥欄邉纖月微生步屏上行雲緩駐歌不是無媒通徑路蕭娘庭院許輕過傾城一笑自嫣然豆䓻花開二月天拈得神針工夜繡行來羅襪鬭春妍家同碧玉何妨小體並昭陽幾欲仙遮莫相憐消瘦甚清齋長事佛幢前耦萬有買妾之興余因偕耦萬閲吳門數女子吳俗名曰相親有當意者再往細閲名曰覆相遂口占七絶以紀其事何事仙山採藥遊內家色藝亦風流使君五馬踟蹰立不向人間問蹇修整容扶出畫堂前十五羅敷最少年取次回身向前立羞蛾眉頰恣人憐宜稱粧梳事事佳輕盈宛轉步香階不妨更揭湘裙起驗取纖纖小鳯鞋工書欲逼衛夫人寫出鸞箋一幅新解説閨中無箇事琉璃硯匣日隨身翠羽叉頭百寶裝淡紅衫襯繡羅裳移時喚出重相見又換閨中别樣粧何處溫柔更有鄉相看直欲泥人狂可憐立地無多逺倣佛還聞口澤香催試新歌臉欲紅背人斜倚小屏風金槽玊管聲多歇人在瀟湘幾曲中王生上已合卺弄鳯仙人氷玉姿採蘭天氣祓除時清新獨擅臨川筆瓌艷爭傳曲水詩麗日和風鶯睍睆縈絃促柱雁參差才郎合是烏衣少定有催粧絶妙詞為張荆美催粧麗城雲日正澄鮮小暖輕寒九月天花照軒櫺偏婀娜月生羅綺轉清妍舊施步障千重錦新炷熏爐百藴煙為語東風好料揀瑣忩消息莫輕傳張卣臣編修新娶詩以調之秋林嫋嫋泛清光枕簟含漪捲碧湘最是一年風物好新涼天氣夜初長九疊屏山曉未開翔烏早已轉庭槐不須細認花甎影新向天家賜沐來甲煎氤氲一縷殘博山一任曉生寒麝煤只是尋常味别有人間竟體蘭秋河雨過碧無垠漏入三啇月一痕難得佳期當綺節好將私願乞天孫汪東川令子無亢新娶口占為贈從來蘭月是佳辰星渚虹橋好問津昨夜秋風入庭樹新涼枕簟最宜人天上佳期定有無人間風景未應殊香奩從此多新句始信冬郎果鳯雛松桂堂全集卷三十二
