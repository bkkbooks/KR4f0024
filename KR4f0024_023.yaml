body:
  text: 松桂堂全集卷二十三癸亥吏部侍郎彭孫遹撰元日和曉嶽萬方偃革賀升平喜見垂衣雅化成瑞節頒來皆樂國帝車運處是神京玉衡不動三階正仙樂新諧九奏清此日獸樽陳法醖何人揚觶得先傾仙琯吹來散曉寒即今青鳥紀春官天家首重三元禮聖壽還聯萬國歡委佩坐霑香篆濕直廬歸聽漏聲殘與君幸托同朝雅嵗嵗風光得共看正月三日曉過德勝門車中作城上春雲入望遙麗譙隱隱近仙杓四衢塵淨雕輪軟九陌沙融玉勒驕帝里偏饒新景色土風猶記小年朝竹簾梅墅停車處坐對滄溟看落潮立春前一日過慈仁寺小憩曉聞天外落驚飈朔氣橫空轉自驕但覺嚴寒過昨日不知殘臘盡今朝衣沾宿霧晴猶濕屐印春泥凍未消最喜城西佳憩在清隂不改舊松寮立春日強把枯毫就墨池清氷戛戛未流澌寒猶如此拖鉤後熱不因人擁褐時無雪每憂東作近有書偏恨北來遲濁醪賴爾深相勸妙理惟應逹者知人日偕魏蒼石郝揚嘉宴郝中美進士宅和蒼石韻韋杜城南曲風光接近郊髙衢攢棨戟别墅起林坳佳樹深相亞寒波靜不淆招尋還命侣坐久更移庖杯引三重酎樽容五石匏華鐙施粉繪雅樂屏哇咬楚橘留霜實湘筠斸露梢比來因偃革諸路競歌鐃方物爭輸送珍邉有漬炮賜酺蒙聖澤飣座得仙肴是夕人為日當春草漸苞繒雲拖匹練弦月上雙弰窈窕山皆玊虛明室是鮫禮捐忘主客興洽雜吟嘲公子森瑤幹嘉賔屹鳯巢柔縑披雪繭健筆截青蛟賦就無加綴詩成許借抄口哦飛玊屑手把藉瓊茅分直今彤闥驚才舊紫胞調孤猶郢奏簮盍已羲爻李孔仍師友雷陳本漆膠願同車與笠耻作斗將筲席為談經設門因問字敲莫令嵇叔夜千載詡神交和石樓人日同悔庵鳯岡集訒菴寓齋即事佳句流傳遍玉堂幽尋真似白雲莊詞臣浣沐多時暇酒客招要特地忙剪勝競修天上節撫時空感鬢中霜為君把諷當清夜自撥寒缸鳳脛長和石樓立春後一日集愚山侍讀齋且搘髙枕夢槐安誰與論心晤嵗寒不遇公榮休共飲若逢仁祖為加餐君多雅抱情相似我見新詩和却難好把狂言藏弆在悠悠俗眼莫教看送張晴峰視學浙中題柱頻年望不輕乘軺此日獨南行逡巡自謝清卿秩恬淡偏留拙宦名峰色兩髙寒峭蒨波光十里翠縈盈蘇公舊詠今寥落好去湖山作主盟二月韶光即次深流連風物助髙吟手披芳草芊綿色坐對春山窈窕隂留處但餐三折水去來惟挈一囊琴亦知不久趨朝右無奈臨岐送逺心十二日伏枕聞户外詬租聲甚厲時豫將移寓矣獻嵗於今又浹旬羇愁猶是苦嚬呻清晨卧犬能譍客白晝飢鼯不避人五石空傳能療疾一枝何地可棲身王陽那得黃金術檢點衣囊自笑貧送徐果亭先生歸崑山自解朝簮著縠巾玊山深處卧間身宦情淡似三江水歸興濃於二月春少日心期同白首頻年筆札奉清塵朝來怯見紅蘭露縱不銷魂亦愴神送周星公使安南交州風土古來傳萬里炎荒近濮沿自有越人輸白雉無勞漢使置朱鳶畫函授節看誰捧華省多才讓汝賢從此相思須極目雙星遙在日南邉芳草王孫萬里長津亭行色栁初黃即看翠羽來荒徼漫説龍編是瘴鄉海月孤明珠母現山田再熟稻花香使臣本自清郎出不羡當年寶劒裝送孫豫立使安南萬里天南道路長由來比景是炎鄉車書已自圖王會郡縣何須𨽻職方鮫革嵗登天府貢雀符春遣使臣裝星軺此去無淹久歸日還歌四牡章再送星公曽聞交趾郡南與象林連劗髮仍吳俗乘潮種雒田日中惟踐景嵗晚詎知年昔畏飛鳶墮今看捧雉前璽書將國命瑞節授時賢候吏迎朱轂騶人抗綵旃壯遊能不羡别思苦相牽况是同門友那堪祖道筵春寒悽雨露地逈眇山川霧竹恆多暑雲波或際天所期慎行役四牡早來旋渭清以二萊玉見貽却謝東萊洞壑接青旻石髓泓然不受塵小斫空蒼寒霧窟平移峭蒨碧山春祇應比玊思君子可有兼金報美人自把朱絲雙繫罷未容被褐笑吾貧送李闕菴之任粵西芙蓉闕下退朝時冠佩從容鎮自隨乍可分來蘭有臭那堪折去栁如絲越山秋雁回峰逺灕水春波下嶺遲千里相思怊悵極何由一摘桂林枝三月三日䀛䀛佳期次第催風光濃似潑新醅競看水際紉蘭去無復橋邉曝藥來爐篆暗消清晝永瓶花輕冒曉寒開端憂盡日憐春晚舊壘漂搖燕未回春盡日院中曉直鈴索聲中曉漏催玉堂深處鄉晨來攤書永晝長無事騎馬終朝獨自回日轉槐隂當午直風吹花蕾殿春開階前紅藥依然好只少驚人謝朓才春晚書懷次石樓韻老更疏狂與世違一㕓終日掩雙扉香埋小徑花初謝塵委空梁燕未歸殘夢回時皆往迹危欄倚罷又斜暉故山風物勞相憶桑柘隂濃筍蕨肥搶榆只合置身卑為鸒為蜩我自知素槧相依聊意適朱門欲往已神疲食移祇笑吳朝請牛責真慚陸浚儀坐惜流光不相待暮雲斜日四天垂早朝即事皎皎長河夜色盈緑槐影裏有秋聲新涼一點清人骨知在蓬山頂上行題倚江畫火城初散曙光催早向鸞坡視草回一道蓮燈歸院去吏人驚是乘輿來載筆朝朝侍玉鋪承恩最與外人殊若為喚起閻中令重寫春池曉泛圖寄雲客兄吳下即用來韻舊吳東出是䱐門千里相思有懿昆曾附雲霄上閶闔共題名字在慈恩懸車深巷名逾重編牒精廬道益尊何日披襟坐寥廓一泓秋水滌塵根送閻梓勤入晉好向龍門去問津逢迎到處拂清塵始知縫掖從來貴逺勝當時食雁人柬武承草堂永日有琴尊隱几蕭然坐晏溫林樾清微帶㕓郭墟煙明滅見山村寒花亞石斜開徑秋水通池曲抱門卜宅便須相就住一檠燈火共晨昏壽杜母朱太夫人兼呈肇余少宰先生挽鹿當年事清風式里門人問通德重林下素心存蔥蒨貽晨佩蘭芳獻夕飱菜惟先婉娩衣必問寒溫五采聞容臭三繅見手盆朱絃偕自好彤管具堪論孝水寧無本神芝定有根生材皆杞梓産玉盡瑶琨孕氣鍾元宰含和美至坤時流歸吐納天序待銓掄萊服承家慶菱箋表國恩七襄巾笥麗八座起居尊芍藥分中饌葡萄出上樽仙珈棲紫鳳夏篆集文鷷良月開觴宴冬曦入曣㬈陽回初應律雪小未留痕織席重重暖瓊煙細細噴春先試梅萼嵗閏長桐孫祝嘏情彌永行籌數可捫理徴仁者夀俗化薄夫敦綸閣回宸顧喉唇管帝閽潘輿徐眷戀韋幔失趨奔陟屺抽新咏循陔想舊村白雲長睇望阿母在西崑送方渭仁典試蜀中聞道岷嶓接紫冥西來銅竹幾人經人間盡怯卭崍坂天上應無益部星通幰秋凌秦棧碧鎖廳寒擁蜀山青採風恰在投戈後重與留題劒閣銘送吳萬懷舍人假歸何事南歸不可留抽簮南去鳯池頭頻年寓省吟秋興此日還家羡晝遊坐對山中叢桂樹行移湖上木蘭舟憑將出處輕相較絶勝元規有一邱讀顓士悼亡詩有賦不平心事類彈棋苦恨邯鄲帶下醫往事三年猶厯厯檀奴又詠悼亡詩織縑織素互爭妍手爪相如絶可憐一駕玉箱天上去明河相望自年年來是神光去是雲香奩書字想餘熏詩成别自多哀豔無復留題贈月君送黃蕺山還舊吳秋來風物正清嘉吳客思蓴乍到家十畝漸荒餘鼠壤一㕓初築占鷗沙寒山影裏吟楓葉柔櫓聲中卧荻花可憶京華朋好在一枝重為折疏麻送展成南還即用後歸興韻六首滄浪亭上主人歸僮僕歡迎共解扉舉世誰能全晚節辭榮今得遂初衣江鄉秋淨蓴鱸美村舍霜清稻蟹肥喜及故山風物好鸞觴鶴斚莫停飛供張東都送客歸雲山從此悵多違定持靈藥貽𢎞景别剪柔縑寫敬微桂樹叢叢花未晚蘆漪渺渺露初晞何當小築䱐門側荷蓧相隨得所依比年同舍客如歸廨宇東頭訪陸機徙宅已愁清覿減還山轉覺素心稀披裘有意尋嚴瀨釣玊何心笑渭磯俗眼悠悠渾未識晝遊只羡錦為衣寒山深處憺忘歸樵徑蒼茫夕照微稍與堯峰蹤迹近鈍翁未應彭澤往還稀雲客吳楓初隕千林葉胥竹新添一尺圍心境此時清獨絶元規塵汙一時揮蒲車徴入賜金歸出處從容兩不違宦興從教長落落離情那不重依依稿梧影裏支楸枕獨樹溪邊偃竹扉誰識山中棲遁者詞臣曽此侍仙闈送君三宿别君歸雲散風流事事非每遇論文思栁辨若逢談理憶張譏同遊輦上心知少一笑人間肉食肥回首五年前事在對床燈火尚依稀題方南先生小像風漪空捲碧琅玕八月長安暑未殘想到廬山幽絶處石梁秋瀑濺人寒邱壑偏餘物外情衣冠不著廢將迎偶來林下聞清籟不似人間比竹聲移居狹室如囷小全家寄泊時才堪容枕簟稍為葺茅茨有樹知秋早無樓得月遲羈禽棲又起竟夕繞南枝壽髙陽夫子兩朝光輔太平年主聖臣賢豈偶然謨誥文章堪並駕旗常事業更誰先身兼師保成君德手整乾坤翊化權漫説功髙能補袞曽將五色補媧天早持玊鉉奠金甌草六年來德業優念切安盂知後樂功成偃羽見前籌神嵩育瑞申初降仙琯調元甲未周再享升平三十載此時方作赤松遊德星聚處泰階平三壽朋中五福全擇菜風髙鴻案上握蘭人並鯉庭前日因介景頻添線月為懸弧未下弦緑綟青綦元鬢髮鄴侯家世本神仙玊琯陽回萬象融還看壽域八方同公卿半在諸生列寰海全歸再造功竊玷門牆惟小草難酬深厚是髙穹從今嵗上升恆頌長在雲天覆露中奉和杜少宰先生九日宴勝力宅和吳曉嶽舍人韻之作敢希嵇阮舍明公麈尾吟箋到處同弭蓋恰當休沐日含毫長詠太平風清樽欲㵼流雲液黃菊初開浥露叢共把茱萸遲朱季直廬逺在日華東時錫鬯以寓直不至早秋集石林齋次渭清韻秋陰弄餘照嫋嫋向人遲微雨生林樾清暉泛酒巵夜闌殘月上燈暝一花垂邂逅今何夕軒車得暫隨幽尋無宿約散局有間身寂寞猶氷子浮湛作槧人疏花留暝薄深樹得涼新倍覺凄清甚新詩與辟塵佛手柑依然仙掌露華含珍果離離自嶺南肉食多將清苦訝不知道味本來甘橄欖兩頭青出玊纖纖一析朝酲意自忺苦口何如甘滑好輸他風味太清嚴寄退庵兄心怯繁憂祇自焚怕提舊事感離羣七年不踏斜街路才到斜街便憶君申陽人去太匆匆灑淚緘書寫未終可惜俱當衰老日終年只在别離中汝水悠悠入信陽汝南風土頗清良寓公未是羇孤客何必潼川是故鄉松桂堂全集卷二十三
