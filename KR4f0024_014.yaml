body:
  text: 松桂堂全集卷十四吏部侍郎彭孫遹撰南湖送郭臯旭遊京師清明三月雨初晴倚棹南湖獨送行春草多情將逺思林鶯求友作新聲青雲並載誰元禮白社相逢定子荆我亦薄遊向京洛雞栖十載愧無成露筋祠古祠垂栁下寂寂枕湖濵黃絹誰題字清波自照人斜陽虛幌肅芳樹舊柯春過客空捐珮雲衣不可親清江客店為阮亭題畫夜來霜信入吳楓幾㸃寒山望欲空獨倚江亭對秋水詩情多在葉聲中論詩官閣盡深杯一别江天首重回更理清吟坐殘夜小窗風雨落燈煤宿遷客舍作繫馬長堤草似煙黃爐重問濁河邊孤城自枕桃花水遲日難消榖雨天逆旅光隂為客老多情酒盞向人妍不知避席緣何事湖海逃名已十年蒙隂道中十日馳驅道上塵山城聊此脫征輪春隂難遣惟髙枕越燕相看是故人垂栁當風青旖旎晚山無際碧嶙峋明朝更發齊東境待入徂徠訪隱淪戲作人名詩二首夕陽城下亂春流繫艇槐隂識舊遊山郭解擕成逺别雲林回首見孤舟當風弱栁渾如睡落月空江總是愁往事王孫休更問采蕭何日不三秋陽城郭解隂識林回栁渾孫休江總蕭何風景春來不自持春江萬里寄相思秦溪潄石堪同隱茂苑論心又幾時蕙幌空張蒼蘚合松雲將暝碧天垂繁英一謝重門閉腸斷垂楊綰别離景春石堪江萬里苑論張蒼謝重雲將楊綰漫河客舍一從南浦聽驪歌芳草王孫客路多腸斷漫河楊栁色緑隂冉冉似春波白溝河白溝楊栁緑毿毿草長沙堤水滿潭正是客情難遣處暄萋風日似江南次阮亭壁間韻茂陵詞客倦遊人幾度留題迹尚新莫向春風重惆悵落花飛絮是前塵琉璃河十載風塵愧滯淫琉璃河畔復相尋東山心事蹉跎久捉鼻空為洛下吟送王子側登第歸覲何意辭京國東歸不計程定知晨省切非慕晝遊榮雲嶺飛偏白蘭陔採更清莫耽林壑臥捧檄古人情過迎鑾鎮與亡友吳爾世别處折栁城隂暮迎鑾事逺征故人今宿草此地舊班荆薄暮青山合微風緑漲平斜陽芳樹外怊悵亂啼鶯午日承恩寺樓飲已作江南客仍為逆旅身試沽白下酒一浣素衣塵雨色朝生暝鐘聲寒近人愁中思千里此去有芳蓴承恩寺樓同蘧非雨宿薊北初歸已倦遊長千風雨惜淹留對床共話年來事愁絶承恩古寺樓旭曙枉札訂新安之遊賦答南湖迢遞眇愁豫一摘瑶華感索居庭樹自傷生意盡山郵長愧故人踈紫芝白嶽堪行樂秋水清溪好釣魚五兩芒鞋三尺艇不妨同此結精廬咏美人蕉子數珠晨昏十萬禮金仙淨土誰知在緑天洗盡紅衣珠自現修來白社果初圓轉時已悟空花障拈出重思入定年持此定當持慧業不須柏子問因緣秋夜偶吟長河斜曵晚雲收候入清商玊露浮駐景何能成大藥憂時空自望西疇吟懷衰退猶餘暑宦興蕭涼不待秋獨有報恩心未冷芒鞋因滯沃洲遊秋來猶覺困炎蒸暑散空堂氣未澄夜色星河流大火露華仙掌湛髙層殘碁一劫堪成笑敝帚千金可自矜早晚粗酬婚嫁畢便擕瓢笠訪南能宿南湖客樓以疾不及訪旭曙悵然作湖上風吹緑滿林憑欄商氣入蕭森高樓雨過延秋暝逺水帆回卸晚隂多病自驚吟骨瘦澆愁不厭酒杯深故人近在城西舍乘興行當更一尋南湖秋興新寒八月透荷裳蘭杜參差悴不芳少伯湖隂秋渺渺冷仙祠樹曉蒼蒼山河隔世情如昨風雨懷人夢亦涼便合棲心遊物外此生何處白雲鄉放舟南湖同墨樵朗倩夜發舟中隱几坐蕭條賴有賔朋慰寂寥吹律清商聲自應乘時白帝氣初驕寒林逺帶裴休宅秋水平添陸贄橋欲上南樓同待月西風何處送歸橈中秋夜出中庭玩月作梧子垂簾葉半黃翏翏夕吹滿山堂殘河曵練秋如水涼月生衣露有光寒汐自通空外響木犀不隔靜中香嚴更莫問如何夜欲發清吟境已忘八月十六日病中作高臥西窗疾未平不因沉頓困朝酲幽蘭入佩秋香冷小簟生涼午夢清蝸角漫思無妄福鼠肝真覺有涯生觀濤舊約成孤負海月今宵只自明久將姓氏謝山公抱瑟終年計未工萬事浮雲高枕外數聲長笛倚樓中觀心已識形多幻遣病深知靜有功欲掇瑶英寄天末衡湘南去有征鴻送徐仲璘使畢赴靜江任兼寄飛雍使車南返越江潯唱罷驪歌思不禁雁過衡陽多斷影花開桂嶺早成林故山千里雲為夢薄宦三年水是心若到昭潭深致訊懷人孤抱入秋深張明府舟中題贈蒹葭蒼蒼楓葉紫緑蘋千頃波如綺公餘愛此秋泛美越水吳山生眼底木蘭一擊明鏡開灑然人在氷壺裏榜師津吏寂無聲白鷺沙鷗眠不起于兹高詠謝籌牒時復褰簾坐隱几博山香細繞鳴琴寒玊枰清聞落子扣舷四顧塵慮屏一卷南華對秋水不須更賦石門泉爭識使君心似此贈王允諧太守含香清譽滿持節主恩新地是秦封古官如漢吏循山川供坐嘯梅栁照行春料得心如水衙齊不厭貧湖光生臥閣城闕已秋風花發褰帷外香清畫㦸中鞭蒲人自理岐麥嵗初豐吏治當今切深知潁渤功晚泊弄珠樓下乘月放舟入泖口長虹樓閣俯清川㶑灔中分片月姸孤蚌寒光含澤媚九龍深夜抱珠眠行依魚火星生罶泊近蘆花雪滿船不遠三江風物美鱸魚初熟早霜天桂花天氣木蘭舟物外招尋夜色幽往事空餘陵谷恨寒波不斷古今流碧雲無際川如練白露當空月滿樓欲採明珠弄秋水直疑身作洛川遊當湖道中八月蓼風和湖光淨綺羅同遊雲散盡舊迹陸沈多秋水人何處寒潮夕自波滄洲待明發鼓枻問漁簔夕眺高樓上林暉竟日清獨山秋戍冷三泖暮潮生漁火中流見鷗波永夜明蘭橈須小住烟月正多情秋夜有感秋色渺無際新凉上縠巾可憐今夜月曾照去年人冷露流清桂微風靜白蘋生憎蛩語切偏向枕邊頻飲范文九池亭偶此幽期愜重尋物外遊林光清入座池水淡宜秋苔竹多深秀壺觴有勸酬相從堪作達何必喚三騶秋來池館上林水淡參差竹帙含清氣梧琴弄晚颸侯鯖饒俊味觴政占庾辭莫問如何夜留髠送客時贈錢尋千髙齊清閴對斜陽伏枕攤書撿藥方未得忘機同海鳥可能繕性似梁鴦一聞渌水愁難和三摘瑶英喜欲狂老矣無能相賞重人間合有蔡中郎馬又輝以扇并詩見寄依韻奉答十年風雨對床眠一曲雲波萬里天欲泛白沙馳桂楫定欹烏帽醉璚筵相思一寄齊紈扇好句堪題蜀錦箋莫怪南金遲未報郢中春雪幾人傳秋夜宴集涉園即席次張顒侯韻春雪初聞絶妙詞紅牙響遏碧雲遲芳蘭緑芷思公子淡月輕風倚少兒北海開樽多勝侣西園飛蓋有新詩明朝擬赴東籬約看試黃花第一枝題胥川草堂西臯美池沼杖策一相逐林水清且深澗草萋以緑良辰共嵇阮高言屏絲竹荷樽進晚涼蘭衣襲餘馥薄暮憺忘歸當暑靜無燠解帶數來過庶以慰幽獨梅里晚泊不盡清秋色移舟奈晚何早霜初著樹暮雨欲增波酒薄思吳酎吟深入楚歌風前懷舊友揮淚隔山河水鄉當十月景物已蕭辰有嵗風堪樂無官俗更淳墟烟寒近寺林火夜歸人近作移家訃端宜此卜鄰曉霧入豐溪雨收猶未霽林氣入沾衣霧重津難辨舟輕鳥自飛楓邊詩思艷霜外葉聲微隔水聞人語豐溪路不違半邏十里寒塘水漫流蕭蕭蘆葉響空洲濃隂宿霧連朝雨柔櫓輕帆半邏舟心事蹉跎王谷隱故人零落鄠田秋吟成猶倚危橋立慚愧沙頭雙白鷗宿外氏山樓感舊有作三十年來百感生西樓重此聽殘更樽前故舊垂埀老夢裏勳名栩栩輕海雁衝霜寒有信林鴉踏葉夜無聲頽容早已驚蒲桞慙愧當時玊潤名紙窗風雨逼殘冬小閣重尋舊日蹤人事已同碁局換交情偏似酒杯濃荒雞唱墮寒林月清夢驚回曉寺鐘却怪未除湖海氣上床端合笑元龍池安橋下漲初平十五年前曉泛情青雀瀠回歌管合朱顔憔悴鬢絲生蓀橈蘭槳皆陳迹宿鷺閒鷗是夙盟珍重故人雞黍意何妨信宿未成行曉登弄珠樓曉作東湖憩茫茫入倚樓吳楓千葉雨江雁數行秋陵谷悽前事風煙愴昔遊歸舟移枕簟後夜夢滄洲水中雁字十二絶寒影低空萬里回暮江蕭瑟正流哀洛川賦筆多清綺知向驚鴻隊裏來南鴻縹眇北書遲欲寫離愁寄所思有影無聲何處覔蘆花清淺月明時秋盡江南落木初烟波極目眇愁豫上林書札慿誰寄欲倩迢迢雙鯉魚欲下還飛過遠川如斜忽整態娟妍不須重扣湘潭菊芳信新從雁足傳楚天數㸃映沙洲尺素無慿水自流欲向湘江寫哀怨回風影裏一行秋露冷沙寒又一時數羣相逐向天涯滄波深處冥冥影錦字裁成好寄誰渺渺江津夜有霜忽驚清影落寒塘斷鴻箋裏相思字緘得綃人淚幾行清輝掩映楚江潯水碧沙明不可尋似向湘靈題好句十三絃上寫秋心秋懷寥濶影參差寒雨空江欲暝時汾水舊遊長寂寞年年題遍斷腸詩洞庭秋色憶經過㸃㸃平沙入望多一去玉關消息斷回文空自託連波寒響初聞夕景收澄江如練白雲秋素書文翼渾無據别作流波一假愁拂水撩雲夜自呼影隨殘月照菰蘆曉來南浦衝寒過搨得臨川筆陳圖和友人弄珠樓眺望之作東湖烟景媚新晴把酒登臨亦勝情窅窕川原清景入坦迤林澤曠懷生蘋風度水涼俱集璧月隨潮晚自盈知有探驪狂客在九龍波上夜珠明書扇贈義山薊邱昔遇君結契在傾蓋不謂同里人定交千里外揮手一杯酒中更六七載契濶豈不深寸心較然在乃知交有道淡成甘以壞心跡論親踈所見無乃隘今來禾水上班草更相㑹爽氣挹高秋清言發仙籟情話不知煩蕭然復𤣥對坐久又成别念往重增慨一見幾十年佳期恐難再哲昆善詩筆灑落邁時輩因君一寄語努力好自愛春日喜凝祉見過信宿山堂依韻有答乙卯落葉飛蓬雨共零歸來江海嘆伶仃求羊徑草春常合羅雀門扉晝自扄避俗不妨除阿堵鍾情猶自惜寧馨枉帆愧爾深相慰相對樽前眼倍青十載初衣賦可尋仲容曾此共投林邱園老去甘頭責藜藋今來喜足音萬仞扶搖堪接翼一官嶺海羡抽簪趨庭為語長相憶池草江鴻入夢深小隱栖遲物外蹤秦溪深處最高峰蝸廬獨臥烟霞冷蛛網長將卷帙封錦字頻年裁欲盡青雲千載悵無從多君何事偏情賞恐有人間說好龍故人幾見著鞭先一臥江潭十五年小草身名悲偃仰南園風雨憶周旋當春細泛鵝黃酒倚醉留題水碧箋回首滄浪亭下路妍花芳草夢中烟春藻堂宴集山堂永晝暢清歡小雨吹塵楚製寒谷鳥聲晴低囀樹海榴花暝照憑欄綵毫得句才皆健白紵徵歌夜未殘他日風流追憶在相思千里託明玕飲董榕庵席上有作客裡招尋坐晚筵輕雲薄雨嫩涼天品題白黑棊中正放浪杯鐺酒聖賢暝色漸生歸鳥外春衣初換落花前夜䦨莫惜淳于醉屈指前遊已十年斜塘舟次緑隂深靚日初長梅子風輕白葛涼歇浦西來潮正落輕舟一葉過斜塘風送輕帆雨乍飄插秧天氣嫩寒消沙頭轉處潮㾗淺知是前村減水橋東湖舟次黃梅時節插秧天草暖平沙宿鷺眠煙際人家朝問渡雨中城郭晚停船緑隂如羃濃于染碧水無波淨可憐最喜歸囊無俗物釣筒茶具併吟箋宿顧孝持齊中城南風物恣幽妍虛館張燈掃榻眠一别十年俱老大重來三徑故依然戍笳夜雨凝寒吹獵火春茸破暝煙相對中宵清不寐荒雞聲動泬寥天共說羊腸世路難十年高枕夢邯鄲煙波歇浦漁簔冷風雨千山劔氣寒求友黃鶯初睍睆媚人紅藥未䦨珊析酲更有盤中蔗拚醉如泥興未殘望中峯影有無間薄暮投林鳥自間不遠故山偏入夢頻移佳節未知還身經雲雨諳交態容入風塵損壯顔千頃烟波三尺艇可能揮手弄潺湲張持遠席上再浮三泖宅十載尚垂綸撫劔無知已開樽有故人谷鶯清送響雨篠晚沾巾努力前期在天涯戰伐新憶昔操觚日龍門得暫遊受經曾北面揮淚又西州桐引清依夕松踈夏似秋停杯話疇昔珠玊喜紛投松桂堂全集卷十四
