body:
  text: 松桂堂全集巻三十八吏部侍郎彭孫遹撰延露詞一小令十六字令聽蛩蟲切切哀吟不肯休愁人處多在五更頭南歌子揚州青雀芙蓉舫紅䦨楊栁橋聽徹玉人簫一場花月夢可憐宵荷葉盃問病花落木樨庭院重見骨細不勝衣支離憔悴總因伊知麽知知麽知曲廊今夜霜風凄𦂳陣陣行到曲廊邊暗中扶遍小欄干寒麽寒寒麽寒搗練子送春啼鳥歇小庭空幾陣亷纖幾陣風獨倚危䦨閑極目子城一帶綠隂中望江南即事山郭静春色正紛披楊栁風柔吹絮粉海棠雨膩濕胭脂憔悴惜芳時山郭静樓閣迥連雲歌管邀迴桃葉楫舞茵催試石榴裙可惜日將曛山郭静亭榭最清幽琪樹花殘猶旖旎靈和栁悴亦風流往事憶成愁南鄉子採桑花草暄妍江南三月浴蠶天陌上羅敷紛採摘提籠立柔桑影裏遲遲日憶王孫寒食梨雲婀娜栁雲斜閑倚髙樓數亂鴉惆悵王孫天一涯不歸家風雨年年𦵏落花如夢令惜别昨夜桂堂深處風剪燈花如絮玉漏一聲殘苦死催教人去無語無語淚眼頻偷覷春晝玉礎朝来生潤滿地落紅成陣微步下香堦泥涴雙鴛小印春盡春盡吹到荼䕷花信長相思閨恨約歸期盼歸期畢竟歸来是幾時賺人書疏兒長相思短相思盡日相思君未知懨懨痩不支目成啟圍屏下重旌解意銀缸故不明今宵好目成夜香清墜釵横燈下頻頻相喚聲教人待怎生河滿子逰仙獻罷金蔬玉菜吹殘鳳竹龍琴好趂天風尋舊侣逍遥碧嶠青岑歸自安期海上懐中一寸仙椹秦皇遣徐福入海求一寸椹寄語忙裏彈棋擊矟閑時酌酒鳴筝竒服居然人不識髙冠短後長纓寄語里中兒子何妨謂我狂生生查子旅夜薄醉不成鄉轉覺春寒重枕席有誰同夜夜和愁共夢好恰如真事徃翻如夢起立悄無言殘月生西弄去歲去嵗寄寒衣細熨襟前皺春服又重縫何日歸来候青鳥去傳言只説人依舊腰帶沈郎寛禁得添消痩昨夜昨夜夢無憑强起窺粧鏡錦字授行人殘麝光猶凝此去見檀郎情事應詳省生怕不思儂但説懨懨病病起小礎綠隂粘片榻黄梅涴迸水簟文流人藉青苔卧鄉字幾時来旅病纔輕可徃事莫思量想着如何過醉公子訊使前月行人去屈指来何暮叩户料應来鄉音傳尺素尺素幾行餘不見故人書難道不相憶沈吟雙鯉魚㸃絳唇送春日與袁重其花下小飲草煖鶯飛行人多上全吳館月洲亭畔重把春衣換新綠南園已覺參差遍花如霰君今不醉負却提壺勸浣溪沙病况却月横雲悄未舒看花踏草興全疎屏山寂寞夜如何燭炧香焦猶未寢幾回偷看寄来書感他珍惜怕他虚春逰花栁暄萋不自堪柔鶯歴歴燕喃喃斷腸春色在江南麥隴摧風輕委浪蘋波蹙雨浄拖藍旗亭歸去酒㣲酣客中小寒食作客裏佳辰祇自憐白榆初改漢宫煙覆堤栁色正三眠芳樹乍聞花氣息小樓幾見月團圎教人無奈暮春天踏青翠浪生紋漲曲池春深閨閣弄粧遲弓鞋羅襪踏青時鴉髩輕分金縷縷燕釵低颭玉差差杏花香雨細如絲一幅帆飛十里流白蘋芳渚放輕舟洞天何處最深幽紅杏枝頭寒食雨碧桃花外夕陽樓千條弱栁綰春愁豔情睡鴨凄清夜未眠銀荷低炤象牀邊七襄錦被八蠺綿臯厭細拖紈簟上諾龍私貯繡襟前玉郎長得玉人憐臯厭見水經注閨思蟬翼裁成稱體衣妍和風日燕交飛逺山泓黛一行低雨滴櫻桃隨淚落心緘荳蔲怯人知殘鶯新絮斷腸時美人春睡粧閣深深鎖碧苔春眠嬌倚避風臺海棠着雨未全開金蝶暗寛文綺帶玉鈎微卸錦綦鞋檀郎莫自䛏人来鑾江舟中集劉隨州句寄孫無言古木寒蟬滿四鄰蕭條環堵絶風塵何年家住此江濵漢水楚雲千萬里不堪秋草更愁人臨岐南望一沾巾初夏小閣氷簾軸畫义水沉煙重暈輕紗鵲罏分火潑新茶綠竹傳將歡子粉紅蕉憐殺美人花一池春雨閙鳴蛙伊川令為阮亭題余氏女子繡洛神圖采珠拾翠紛来徃羅襪輕盈様何處通辭波上腸斷東阿才子一賦千秋悲愴鍼神原是魏宫人重拈出洛靈小像卜算子賦艷又報玉梅開笑泥青娥飲去嵗留心直到今醉裏如何禁身作合歡牀臂作逰仙枕打起黄鶯不放啼一晌留郎寝夏至日纔過困人天又把黄梅做試捲疎簾一倚欄小雨吹紅醋草草百年身悔殺從前錯来日還如去日長沒箇安排處有懐簟影滑生雲蓮襪清過水好月㣲風入夜分記起當初事鈿盒悵空存愁病看如此仔細從前暗忖量值箇相思死醜奴兒令雨忩讀悔菴弔琵琶樂府從頭細數傷心事幽怨琵琶哀拍胡笳一代紅顔萬里沙沉吟掩巻愁無限風閙牕紗雨滴簷牙蛺蝶多情苦殉花臨别畫橈約在春初發暗數流光羞整新粧不到臨時已斷腸繡幃今夜人清悄雨滴空堂花落空缸數盡更兒嬾上牀減字木蘭花重過鴛水客樓鴛央湖畔曾醉嬌歌聽翠管湖雨湖煙不見于今又幾年重来颿影蘭葉蘋花秋色浄題句空留行裏塵生水面樓菩薩蠻京口遣信南歸因題書尾繡衾孤擁春寒峭窗前小玉迎人笑報道逺人囘郎君有信来循環都讀遍腹内車輪轉何日却歸家懨懨痩損花中秋月落催蘭棹清明寒食逡巡到青鳥縱傳書不歸仍是虚舊歡真似夢畢竟功名重含淚待歸期從頭細問伊去年除夕蘭缸下熏香被酒更深罷鳴指又嘉平迢遥薊北行門庭清似水淚滴鴛鴦被夜夜捧心眠何人著意憐斷紅小頬芙蓉淺檀痕新漬香襟煖雁字下平蕪還勝雁也無情知歸未得不是輕抛擲寄語好加餐春来風雨寒除夕阮亭廣陵署中守嵗節序驚心殘臘盡同雲襞雨寒猶𦂳小煖逼爐煙江春入舊年芳柑傳綺席好事過除夕香雪動園梅春迴人未迴閨情畫檠朱燼花如雨當牕手弄春鶯語半面最宜人屏山一線痕十重緗綺被赤翡交青翠生小怯孤眠郎衣手自牽春愁平蕪南浦萋萋碧殷勤别淚紅巾濕花信半摧殘髙樓簫管閑金猊空自爇不解鴛鴦結何物似相思相思無盡時夢起秦篝小炷銷宫餅繡衾一疊文鴛冷儂已不成眠知伊更可憐晨光生牖裏曉幙長孤起春夢太分眀關人半日情春寒夜寒酒薄眠初覺一鈎殘月懸樓角小篆冷香筒香煤半粟紅垂簾還渉想髣髴金釵響數盡短長更東方不肯明暮秋閨思層波不轉眉山蹙有人倚遍䦨干曲雲洗碧天空殘陽雁背紅寒林煙㝠㝠不見歸帆影望斷又今朝離魂脈脈銷樓眺一抹煙鬟青不了遥天幾㸃寒鴉小落日挂簾鈎捲簾人倚樓雲帆何處度目盡江南路窈窕月華生斷腸今夜明題青溪遺事畫冊和阮亭韻乍遇南園粉絮漫天起玉䦨干外花隂裏初試薄羅衣金蟬顫欲飛無端郎驀見剗襪輕風扇驚起宿鴛鴦裙拖繡一雙又夜飲春檠雙吐緋羅燭文犀酒泛葡萄綠裊裊洞簫聲牙娘按字清投瓊聊作戲莫賺蕭郎醉今夜好秋光月明衾枕涼又私語棠梨落盡花如雪雙雙照影昏黄月泓黛秀聨娟雲鬟亞玉肩凭䦨羅襪倦坐損春衫茜小語怯聽聞嬌波横覷人又圍棋湘蘭九畹垂垂吐雕籠巧喚紅鸚鵡長日試敲碁嬌慵落子遲儂家誇好手賭勝朱櫻口却歛細蛾兒含羞欲悔時又迷藏海棠開遍清和近輕蟬低掠雙文鬢玉體藉花藏花深珠露涼青衣能暗邏莫使窺人躱人影墮髙枝玲瓏月一絲又彈琴梧桐深院鳴秋葉狄香小炷氤氲爇玉指弄哀彈琴心雲水寒園絲珠作串字字含清怨清怨寄三湘眉峰九曲長又竊聽朱絲宛轉垂銀蒜今宵底事抛針線怪殺太風流頻頻撼玉鈎千般輕薄個可也羞燈火漸覺麝蘭微畫屏人欲迷又讀書小牕鮮碧凝修竹窗前試展珠函讀日永静無人風来散帙頻新粧嬌半面莫使悲團扇纎月挂簷頭牙籖索罷休又潛窺元霜搗罷明于雪褰帷人似嬋娟月何必怨羈雌有人簾外窺嬌羞生不慣驚避檀郎看香汗玉膚潮無聲落鳳翹又葉子竹牕晝永清無事南朝舊譜翻新思竒正巧能兼犀籌手自拈郎休嗔葉子葉葉郎相似盡日掌中擎歡情一紙輕又情外花梢荳蔲含春色風狂雨驟相狼籍懊惱錦屏空胭脂滿地紅諸姨偷覷看調笑多輕薄一曲後庭花前身張麗華又秘戲枕函膩臉明雙玉纖蛾接黛攅新綠歡淚粉香垂為郎忍片時金鋪横屈戌皓腕頻頻覷覷向蠟鐙中臂粧深淺紅巫山一段雲雨牕與程村夜語嵗月閑中老容華暗裏消清槐好為繫征舠濃綠染長橋聽雨僧廬静尋詩竹院遥燭花落盡又頻挑不寢費蘭膏南譙道上暮火投山郭朝寒過馹橋江雲一色秣陵潮抹斷蒋山腰秋色低鴻雁清霜急皂鵰汀蘆沙葦冷蕭蕭風雨入南譙為侯大年賦催籹侯第珠為帳金閨鈿作車水沉香炷博山爐今夜極歡娛顧影雙龍鏡更衣百寳𥜗畫眉深淺入時無笑指月生初栁含煙本意水驛下戍樓前寒食清明過也淡烟疎雨落花天恨綿綿風起灞橋如雪短葉長條堪折一春只覺别離多奈愁何謁金門春夢春愁積一片角聲清急天上佳期無信息行雲何處覔静掩流蘇帳額還似見伊顔色夢破五更風瑟瑟紙牕涼月白好事近落葉一葉為誰飄染就十分秋色欲借江郎青管賦閨中新什小鬟石畔掬清泉捧硯洗殘墨好向斷紅紋裏認玉人書跡金蕉葉新月新蟾恰恰轉花梢照人半霎誰將明鏡彈破纖纎小指甲又似人兒痩怯染輕雲犀梳倒插朝来鉛粉洗浄蛾黄露一搯清平樂吳中柬寄百旃少年情緒分付東流去水上浮漚花上露一霎蜉蝣旦暮故人休問彈冠心隨雲水同寒覔得新来活計筆牀茶竈蒲團憶秦娥黄薔薇清明近好風初占薔薇信薔薇信脂輕粉薄天然檀暈夜来已覺春寒困曉粧約畧黄兒褪黄兒褪幽香一滴露珠新揾憶少年憶逺閑来極目朦朧不辨江天雲樹懐中數行淚向何人彈與日日潮迴烏角渡赶不上蕭郎行處仙裙且休繫仗東風吹去更漏子五日展羅衣寛寳纈團就一窩香雪珠箔下畫屏中重施繡抹胸梅雨濺荷風扇釵上翠符頻顫多少事費沉吟日長倦不禁毛熙震詞繡羅紅嫩抺酥胸午飲額粧輕眉影細髪際瑩瑩光膩收寳鏡炷沉煙低頭急繡纒菖蒲碧榴房赤午酒中人無力羅𬒮薄晩風涼幽蘭被體香荆州亭晩眺小閣愁来獨倚四合彤雲垂地若要不思鄉夜夜除非沉醉酒後寒生半臂著處牽縈人意珍重舊羅巾曽揾美人香淚甘草子今夕春恨耽過年時今夕消除盡花月也羞眀兩兩生嬌暈階下綠茵青穏合眼處蘭縑初褪一齧文犀為伊忍狂殺人風韻阮郎歸旅思院門花影鎖重重行雲天外峯夢魂吹去杳無蹤此時愁殺儂風剪剪月朧朧春霜壓被濃萬千心事霎時中狸兒撼曉鐘春曉靈扉誰為捲仙旌霞光透月􅎉幾回欲去又消停朝寒不自勝明鏡啟曉篝輕宫香分外清依微花氣滿雲屏春禽無數聲歸思玉河官酒送行時輕黄遍栁絲仙橋認取再来期花驄驕欲飛人事換歲華非江雲望眼迷年年風雪滿征衣思歸又怕歸眉峰碧春閨漫把重簾約已覺朝寒畧春色原来一夜深看桃李參差發紅淚垂銀蠟烟縷青于髮午幙人聲悄不聞隔花細雨流鶯滑眼兒媚秋思空階夜雨滴心頭涼雁過西樓一行秋色十分歸思萬㸃離愁自被浮名羈絆後長似斷蓬流凄凄雙杵朦朦殘月渺渺孤舟錦堂春柬既庭塗轍正妨我輩溪山合老狂夫為報故人休復爾鐘鼔駭爰居心已絮泥灰木身拚月媵花奴須知富貴非吾願遮莫執金吾桃源憶故人社日平臯翠縠濃于染一幅晴蕪青蒨舊社酒徒零亂添得紅襟燕枌榆往事還重見竊炙歸来春宴人在櫻桃庭院今夜停針線攤破浣溪沙讀髙季迪缶鳴集何處登臨憶侍郎無邊草樹路微茫依舊青邱湖下水接東江舊宅已隨烟裏沒遺編曽向箧中藏歎息當時同輩少壓徐楊武陵春和潄玉詞同阮亭作栁軃鶯嬌蜂蝶閙春色滿枝頭暮雨朝雲不肯休遮莫太風流花滿湘江波正綠莫上木蘭舟若向湘江共􅋈舟又添得一般愁末句多一字照原本將逰吳門先寄家兄雲客三月韶光應已暮花事委行塵畫帆擬泛石湖濵修禊及佳辰寄語流杯亭下客沽酒莫辭貧風吹船玉皺紅鱗一嘔木蘭春太常春留别脆紅嬌白媵殘春香夢細于塵畫閣又斜曛空羡殺烏龍錦茵無邊風浪無憑書札從此隔重闉一掬小江津浣不去相思淚痕栁梢青感事何事沉吟小牕斜日立遍春隂翠䄂天寒青衫人老一様傷心十年舊事重尋回首處山髙水深兩㸃眉峯半分腰帶憔悴而今月中行别意越絲新襞小裙腰翠帶逐風飄水葱仙席索春饒脈脈暗肌銷銀筝玉管無心弄人静後幾㸃清譙相憐端的只今宵不睡也難消滿宫花南園試青鞋褰翠䄂春色南園堆繡白頭猶説廣陵王能使行人回首錦衣城今在否見説當時宫囿陌上誰歌緩緩歸只有花開如舊南園在姑蘇子城西南廣陵王錢元璙帥吳時所剏衣錦城在臨安吳越王素所居營也松桂堂全集巻三十八
