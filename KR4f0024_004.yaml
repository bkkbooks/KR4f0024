body:
  text: 松桂堂全集巻四甲午乙未丙申吏部侍郎彭孫遹撰元日曙色髙城萬户開窮陰空谷一時回春來雪後遲歸雁人去山中早見梅秦逕曉雲浮睥睨横塘初日上樓臺閒居景物堪幽賞更遣流光入酒杯春遊春遊猶未愜風信入清明沙暖遲驅馬林深緩坐鶯溪雲無去住野照半陰晴日暮滄江上悠然萬里情野眺滄波不可極千里暮雲間晩色村孤樹寒烟雨滿山春隨流水去人趂夕陽還歸路東城晩柴門獨叩闗春日兵憲王青芝年伯海上簡閲有作兼呈毛明府海國烽烟久震驚坐開幕府耀戎行旌摇日羽千峰隠陣立雲垣百雉平帷帳折衝參廟算山河表裏壯軍聲樓船取次收閩越遥倚東南萬里城滄波縹緲雨初晴看㵼天河為洗兵日湧扶桑明兕甲風迴楊栁拂鳶旌午潮聲入千軍静春汛烽傳百谷鳴海内名流争入幕祇應短褐愧諸生松下遣懐秋意日寥廓暝色散㣲雨髙風天外來吹我孤松樹翻然落空翠淡與雲陰互杳㝠寒濤生㣲聞滴香露幽人巖石間抱此物外慕庶幾嵗寒心聊以保遲暮臨平道中聞蟬作秋盡山家落木輕寒衣處處剪刀聲不知九月臨平路猶有寒蟬隔樹鳴送查王望赴東莞余時亦有計偕之役送别炎洲路君非百里才暫教娯鶴髪詎足展龍媒海雨桄榔暗山晴瘴癘開故人從此去南北兩徘徊元旦秦郵早發霜角催晨發炊煙罷客厨僕夫驕短騎遊子畏長途野店江春静侘鄉土俗殊空壚寒未汲車馬立躊蹰贈周生同是風塵客相逢各黯然鄉心歸雁後故國夕陽邊康伯猶居洛荆卿未去燕倚閭千里意慰爾思懸懸將出都門留别吕夢軒錢長孺兩同年同遊宛洛慰晨昏分手天涯憶弟昆歌郢客能工白雪吹竽吾欲老朱門宫鶯近借宜春樹野鶴空歸細雨村見説江南芳草緑不因橋栁總消魂黄河風阻鄉闗千里目岐路此時情野燒河俱㫁寒雲水與平風檣衝絶險雨堞失孤城坐見芳洲上青青草又生鄉愁楊栁津頭送客回暮雲千里正徘徊人歸春後酴醿盡風暖閨中芍藥開芳草不離河畔緑孤舟偏向日邊來鄉愁已似東流水況復啼鵑夜夜催過韓侯釣臺淮水東流去荒臺此地存江雲侵樹色碑雨没苔痕已抱千秋恨誰銜一飯恩相逢盡岐路空復説王孫落第後寄上侯筠庵老師四首三月長安春色閒離人折栁此中還來㩦燕市壚頭酒歸卧秦溪海上山古巷烏衣空寂寞上林黄鳥正間闗自傷湖海飄零久絳帳風流不可攀上苑殘鶯囀未停傷心越客不堪聽迴風忽送千檣影落照空過萬里亭地坼河流春浩浩雲連海嶠晩冥冥應知闗上前繻日正望天邊在角星鬱鬱晨風返故林萋萋芳草獨相尋春江㫁岸天垂盡野廟無雲晝自陰漸入窮途生痛哭不因多病起呉吟知希從此須歸隠援瑟空為淥水音路入呉江漸逶遲風吹長水碧參差斜陽逺出由拳樹夕漲遥分裴令祠行役久慙逢世拙窮愁應與著書宜買山未敢從支許曽受公門國士知自天津抵家得絶句十首千里鄉園正𣺌茫山陽南去路修長天津橋上頻回首不見山陽見夕陽厯下城邊栁絮飛行人對此暗沾衣春來久滯南中信江上征鴻歸未歸孤舟未繋日初斜極目黄河走白沙遥見人煙起村落殘陽影裏兩三家寄得家書不敢開數行猶向榜前來不知遊子多飄泊却望泥金次第裁客路蕭條江上舟茫茫雲水入鄉愁獨留一片蕪城月更逐孤帆下潤州漫漫飛絮滿長空細雨荒村黯淡中行盡江南江北路不知何處有春風憶别江干雨雪時今來殘緑已參差㫁腸春色歸何處説與行人總未知久客漸忘身是客故鄉回首即天涯入門故舊歡相問蕩子原來自有家見説長安罷禮闈故人拭淚下鳴機自言逺道長相憶只願行人安穏歸窈糾春愁知為誰臨風鎮日數歸期深閨望㫁王孫草君去長安是㡬時過呉門别明逺停橈薄暮起離歌尊酒重來此地過茂苑花殘紅躑躅寒山雲鎻碧嵯峨波澄晩色空中逺天散晴霞盡處多知爾不須怨淪落滄洲吾欲返漁艖初入里門有述夏雲縈灌木零雨歇鳴蛙憶作天涯客寒梅未著花近得閨中信春檠照夢熊酕醄心欲醉湯餅宴初終候門嬌女小學步未全工不見解相憶見時生臉紅風塵嗟落魄不忍説長安有客深相訊惟言行路難登永祚寺閣物役塵中擾招提世外幽虛堂僧入定暇日客消憂雷雨平窓度虹霓拂檻流自能通帝座直欲小神州雨後望秦溪諸山積陰生霽色一望隔塵寰谷水煙中樹秦溪雨後山參差青靄裏隠見白雲間待約㩦笻往捫蘿此更攀舟行滯雨片帆載秋色人意空闌珊河水清無極照見芷與蘭愁烟漠漠生驟雨翻狂瀾故林𣺌天際秋思鬱雲端孤篷上下濕陡覺生暮寒平生事田廬戚戚憂旱暵但識耕田苦安如行路難雜詩種桂石池陰金英動素商所嗟雨露稀地僻無秋陽我行南山下草露沾衣裳朝暾照葵麥相與生輝光七夕南湖感懐南湖烟月清如織良辰夢逐南樓側今年水落吸淺沙大火髙雯秋燒直我來重泛鴛鴦渚日暮西風起蘋芷百端對此忽茫茫蓼花蓮蒂依稀紫縱飲孤斟問舊遊山河月出天地秋何處相逢烏鵲渡何人獨上木蘭舟人間天上同幽怨促促佳期空未展恰見殘陽髙樹歸又看銀漢流雲巻為歡不足奈愁何老向雲邊一醉過終令此夕成疇昔落月摇空隠薜蘿西湖感懐西陵士女踏青殘日落明湖㵼碧湍暝色漸看千嶂合春陰不㪚兩峰寒嚴城鼔角傳空堞故國山河入倚闌惆悵錢塘佳麗地楊花飛雪路漫漫南朝宫寢半凋零萬騎樵蘓破杳㝠莫向空山聽杜宇不知何處哭冬青古苔漠漠碑隂閇芳草芊芊輦路停日莫春城歸獵火夜深風雨見精靈新霽山寺寥寥静殘陽對掩扉池陰濃靉靆樹影濕霏㣲觀化知魚樂忘機羡鳥飛東臯堪避地徒使寸心違夜雨天意收殘暑髙風動早凉砌蟲陰後咽階雨静中長小閣遊饑䑕空檠跳野螂懐人成不寐落葉嚮空堂秋夜秋色閒庭扃不開風林葉落鎻寒苔如何一夜芭蕉雨盡向愁人枕上來送漢蜚北遊上林賦客近應稀此去長卿侍紫㣲斜日逺窺津樹合征帆曉逐岸花飛江南春色遲行袂薊北鄉心見落暉白草黄河千萬里翻因送别望君歸登郡樓眺望晩出嚴城道步至東郭門髙樓一長眺秋色滿郊原地帶江湖阻山連海嶠昏天低雲影逼日夕秋陰繁束髪倦行役車馬怠且煩途窮起痛哭慷慨慿誰言解劍謝知己荷鋤歸邱園意氣忽已盡功名安足論雨泛歸出庭中望月暮雨泛輕橈落日收逺嶠如何齋中樹明月重相照夕天散暮陰澄霽舒秋眺孤懐展轉深風雨生幽峭為勸惜芳辰撫景悲同調待留金波光共遲白日耀秋霽殘暑雨聲中暝際開山霧返照界空清片雲不得渡太陽依然明㣲凉生髙樹棲禽動逺林驚蟲振濕羽獨有草堂人窮愁不成趣荷衣落淺沙菊蔓牽荒圃卉木既蒼凉秋草成行路入山苦未深大隠今非故歎息望㝠鴻弋者夫何慕晩泊楓橋逢徐六琯朗三秋不見徐公美幾度來過呉市中獨客河橋正惆悵相逢流水任西東山巾閣雨添衣濕日脚生潮到櫂紅夜泊孤舟霜月裏愁聽江上落青楓朱買臣墓古寺孤城外當時太守墳疎松傳夕籟髙栁掛斜曛石篆披榛出樵歌隔水聞千秋重知己誰使致青雲病起夜坐因憶徐公肅昆弟柴門深掩栁隂中小剪蓬蒿一徑通病起正看梅漲綠春歸又見楝花紅海潮晩急聲疑雨城柝宵嚴響趂風欲訪故人煙水隔茫茫兩地思無窮上張蓼匪老師十二韵少年遺俗尚萬里欲横行不遇空羣顧徒為伏櫪鳴慚余稱國士猶自旅儒生錦瑟朱絃響瑶琴渌水聲求工良有意投契惜無成長隠從兹去孤懐未易平身還思附驥心轉佇遷鶯建節開蓮府分曹拜月卿文章推巨筆風度屬宸情左相封侯日司空博物名登朝無異貴稽古有餘榮試遣彭宣到㣲窺絳帳明七夕立秋獨眠空簟思茫茫每到佳辰只自傷天意似猶憐此夕轉教閶闔送新凉飄殘桐葉下清波吹入商颷向晩多深坐忽驚凉氣滿不知行雨過秋河雨後見月聞鄰歌晩來秋雨歇池館弄輕隂古木縈雲濕虛簷受月深長明生静悟短夢費幽尋㑹惜繁華盡空兹物外心重遊小閣桂花下玉律隨時届金商應序臨跡偏荒墅外樹古小山隂清籟盈睂宇髙踪邈足音凉颷猶隠隠碧落己沉沉月傍嬋娟老秋生天地深同遊空感悼往事復幽尋思舊休看竹懐人欲碎琴祗應招隠去為爾寄遐心孤山我尋林處士不見鶴歸來唯有空亭上寒梅相向開浪迹浪迹湖山久作緣寒江楓落思綿綿鄉心己是濃如酒秋夜那堪杳似年斗帳霜嚴傳漏箭衣篝香冷徙爐烟空閨見月應相憶為問清光㡬度圓偶憶蚤見金風度木樨又看黄菊晩凄凄愁人己到傷心處况復霜天烏夜啼江干清江流不盡從此控金隄地脈分呉越山形赴㑹稽凉風黄葉下秋水夕陽低岐路吾何適驅車東復西梵村荒村人不識仙梵兩三聲山路行窮見江天望極平此間蔵浄土何地著浮生卜築它年事菟裘未可營洗心亭百折寒山路空亭出翠㣲雲深蔵小逕水静受斜暉己識今生是還知昨者非悠然㑹心處魚鳥覺相依雲栖山寺招提人外境未到巳成迷半偈僧能白一間雲共栖秋聲千樹落夕氣萬峰齊待覔寒山句重來此處題夜宿客寮因登寺後諸山古刹知何處巖扉深萬重客寮成信宿僧臘盡從容虛室延山月哀猿下嶺松欲投峰頂路恐有白雲封禮蓮池大師塔維摩示寂後此意更誰知塔院空秋色山僧老鬂絲皈心蓮社切禮戒定香遲試看階前樹依然説法時去來非有意滅度更何因入定通禪悦來遊見化人晒衣碑記古磨鏡法燈真但得稱居士寧須問後身晩出雲栖山經虎跑泉用東坡壁間韻曽聞古院木樨香再宿招提襆被凉人静忽驚天籟落身閒始悔世情長松間山鼠窺行脚午後齋鐘出上方莫訝客來題句少蕭條物外更誰嘗寓居湖上精舍欲仙同門見示新什因以詩荅晩市人烟喧古渡寒山楓葉下流澌思君盡日盈如水況是清風明月時蒼茫岐路竟何之客裏西風鬢欲絲我更窮愁工未得重㩦殘火讀君詩立秋日與旭曙南屏晩眺巖谷歇炎歊招尋出上方驅雲徂溽暑布氣薄清商地𣺌江湖外臺懸霄漢傍肅風先發籟髙樹稍生凉曲徑荷香轉曽厓夕景長鳴蟬辭露葉䕃木落虹梁潮汐心逾寂山川色更蒼吾將營此老君勿問行藏春暮喜飛雝見宿故人投轄喜相通葵藿新栽酒未空掃徑松花清入琖開軒桂樹碧成叢斜塘鴉噪寒雲裏古巷烏啼曉月中良夜何當多感慨知君應為惜飄蓬武林逢鳴大不見真成别相逢轉自親回思分手處猶是異鄉人松磬空堂暝霜梅古墅新憑君娯歲暮天地總風塵望秦山返照髙城外悠然見逺山目隨飛鳥盡心共浴鷗閒徐市歸何處沙邱去不還只今望蓬島依舊白雲間飲木芍藥花下山城三月春風暮消盡殘春花下雨名花未發香滿庭桃李紛紜何足數主人酌酒數撃鮮取鼔鼓我聲淵淵漁陽三撾撾未絶悲歌忽放野老前人生行樂須㡬時嚮隅空負好花枝燕襟紅泥雕梁冷鶯眼青窺小徑遲持花釃酒為若歌花間三日醒猶多君不見沉香往事行雲散空有花枝照酒波咏地燈千門萬户照熒熒吐蕊生輝暁未停野燒似留春草碧夜漁疑見逺燈青遥通天漢先流火倒㵼銀河有墜星郤就長明吟未穏秋隂黯黯月𡨕㝠獨坐獨坐觀羣卉新篁倍長成妙香空際落止水静中明幽草無風偃寒濤欲雨生無為感沉寂深得爾時情雨中簡友人我意耽幽寂山僧對雨愁天光凝逺岫樹影散中流大澤魚龍動空城麋鹿遊西窗裁燭處得句向誰投未央宫瓦歌並序叔大父蔵有古瓦乃故漢未央宫遺製也曽王父遊秦時得之於廢址下以貽大父大父博古好竒毎出示客鳳咮己㫁龍文尚存制作樸雅想見劉季當年因作未央宫瓦歌碭山布衣赤帝子手挽赤霄死子羽戰功疾力五閲年搤吭闗中定疆宇闗中宫闕消炎炬重發謫吏開池籞天子東平馬邑還丞相初營龜食處太倉武庫次第開塗堊割蜃萬斛灰藻廉八寸縁柱下螭吻千尋噴雨來宫成前殿暮置酒擁篲上皇玉巵壽酒酌坐起慨以慷留侯酇侯齊稽首髙闕依然布千武宫車長樂杳無主新豐猶習大風歌舊宫不見楚歌舞柏梁己火太液空辭漢金人泣如雨當年髙讌拜蕭曹此日荒基傷牧䜿博古主人大父行問竒佳客日到堂春陰滌茗忘酧對片瓦寶惜如圭璋豈無首陽洛水鼎不與古甃相頡頏樸雅精瑩堪作供雕鏤刻畫何珍重籕書㫁續不可尋隠隠鴛鴦沒苔縫蒼苔黄土封郊野來自秦中壊道下猶是阿房三月泥燒作未央千尺瓦壯麗經營二千載無限荆榛蝕鳳喙晉陽舊殿跡己湮何況漢宫無草萊不煩磨洗認前朝龍紋半面全未消詞客多情空感慨帝子荒山己寂寥君不見須臾失勢如春水磨刀帶劍上吾陵長陵至今遲又久一坏封土樵採登空餘古瓦對浩歎使我慨然陽里帝子之廢興除夜感事平野長風晩益驕空庭積霰未全消不知人事多遷換但覺年華轉寂寥花信正淹三徑雨春寒初上五更潮天涯行役還相憶雪滿䢴溝路更遥煮茶空堦風雨近殘年寒擁枯爐當品泉狂興未須千日酒野情自燒一溪煙遥遥澗水來天外謖謖松風到枕邉短褐不煩遊客訪山人新著毁茶篇登城晩眺晩色雨餘生登城一望平寒煙秦輦沒斜日越山明鳥雀歸髙樹牛羊下古城坐看行路者阡陌正縱横冬夜集字長隠東山日開尊北海時無人堪共醉有客坐敲棋地迥江流㫁天髙月落遲空林霜露下烏鵲在南枝野田行荒城日落生愁霧白骨青燐亂無數山河興廢多戰場宿草凄凉生狐兎悲風瑟瑟起白楊牛羊成羣上古墓人生諒無百嵗壽焉知生樂與死苦朱門華屋未解憂請君試出野田路促促曲促促復促促為歡苦不足嫁作估客妻空床長獨宿采葛不盈筐思君九㫁腸自憐妾命輕于葉不道君情薄似霜冬夜有感朔雲侵暁暗山城一夕偏傷萬古情凍瓦嚴霜連夜白空梁寒月向西傾春前香炷熏猶濕雨後燈花黯不明總為百憂容易老鄰雞又報兩三聲偶吟石硏氷猶合霜毫凍未融恠來詩思澁知在㶚橋中冬夜宴湄棫宅賦别諸同社十年車笠共徘徊珍重青尊一夕開自有新歌金谷艷何嫌狂客玉山頺浮名我己慙芳杜逺别君應折早梅此去江闗千萬里愁看征雁向南來春暮得李欲仙同門書因寄回使憶昔髙寒入夜分清歌燕市更逢君西山共踏千尋雪北雁空停萬里雲芳草多情成卧病春風是處惜離羣斜塘人去頻凝望日盡遥天見夕曛中秋疎星掩映夜將闌露葉空林滴未乾欲泛秋河看明月玉樓髙處不勝寒九日同諸兄弟醵飲時霜降前一日也九日開樽興未闌登樓莫復悵盤桓己看黄葉驚秋老漸覺繁霜逼歳寒王粲悲歌愁愈劇楊慿得句夜先殘唐楊慿兄弟三人皆能文或同賦一篇共坐庭石霜積襟袖課成而巳獨憐遲暮逢摇落空對黄花擁籜冠月夜舟中宿天上明月光水底孤帆影激射成虛空舟在空中騁青蘋冷然起散作波千頃對之不成眠白鳥喧夜永煙波空浩浩煩襟滌未静為念垂綸人披裘江上冷舟行晩晴横塘雨急散㣲風不繋扁舟逐㫁蓬日脚晩垂烟樹裏虹鬐晴見水雲中暮山相對凝寒碧歸鳥争飛沒逺空𣺌𣺌滄洲何處是忽聴漁唱起孤篷訪衲山上人不遇為愛忘機侣來尋方外遊山禽扄户下石竹遶庭幽避世期支遁裁詩擬恵休此中塵不染何地更淹留寄壽呉鼎濤年伯六秩兼呈凖平年兄蘓公推敏達裴叔擅風神蓮幕曽司理南朝舊秉鈞先㡬甘蹈分初服得全真情豈耽軒冕心還託隠淪東呉傳世徳甪里老遺民重著潛夫論寧慚處士身徑松吹籟静門栁拂煙新宅卜無塵雜川觀有釣綸髙踪仍自逺樂事更相親見説年週甲方當嶽降申仙璈乗羽至子舍撃鮮頻廣讌朱成實芳郊緑布茵碾茶逢榖雨修禊向河濱弧借三分月天留五日春為君祈大斗燕喜況嘉辰踏月踏月髙城下翛然興寄遥草蟲空自語木葉巳先飄秋老梧桐樹霜濃石板橋何因歌吹起摇落感今宵三月晦日作忽聞流鶯聲似訴春歸去極目㫁長天不見春歸處煙水白茫茫飛盡空中絮春留苦無計春去知何據㣲雨小庭寒花落殘鶯語題畫素影珊珊逈出塵未須鉛澤汚天真無端獨自窺簾坐不道嫦娥解笑人松桂堂全集巻四
