body:
  text: 松桂堂全集卷二十二壬戌吏部侍郎彭孫遹撰冬晚徙倚髙舂下天低暮景沈殘鴉過逺水黃葉滿空林遠志蹉跎久衰年感慨深心知來日短那不惜分隂初度日隱約終年屈壯圖此生真自愧桑弧枯荄氣淺黃鐘近細栁光微白日徂牾世非關多酒失負人不獨有詩逋天涯嵗晚風霜切苦憶江東雪色鱸遣信空庭餘暝色霜氣正凌兢斜日寒逾駛愁雲暮欲凝長飢憐婦子薄祿愧親朋目送南飛雁迢迢思不勝冬夜留木文介文豹文小飲衰慵久與世相忘佳客猶能過草堂坐擁枯爐消永夕起看初月耿寒光人非肉食餘真意味有魚飱似故鄉懷抱為君傾倒盡三文也合扺三康肯披藜藿欵柴荆脫略形骸簡送迎相見惟聞作吳語少留重與試南烹官間儘看西山爽酒薄差憐易水清但醉不妨歸榻卧紙􅙘燈火夜深明院中曉直霜籠朝旭氣嶙峋早向東華踏軟塵南陸行看圭景度北扉來聽漏聲頻老槐葉盡龍初蟄古柏巢低鳥自馴最是太平多暇日直廬一到又經旬殘漏稍聞殘漏緊虛館欲三更風定寒威減霜嚴夜氣清吟愁梧砌冷約夢葦簾輕重起披書卷終年愧短檠奉柬院長陳説巖先生遼濶清塵半載餘祇憑尺素問離居也知賔客逢迎苦不訝交遊禮數疏直院秋隂分草後鎖廳春雨落花初追尋兩地情如昨特擁寒檠夢玉除夜坐孤月綴林杪橫參挂屋稜棲烏驚未定寒漏聽無憑憔悴清吟減蒼茫暮齒增憂來不成寐虛幌掩殘燈感事兀兀窮愁伏枕初頻搔短髮獨欷歔十年骨肉摧殘盡七尺形骸涕淚餘自癸丑至今十年之中喪兩姊兩兒一女一庶婦人非金石那能堪此也觸事傷心都併集撫今追昔更何如死生大矣誰能一為起蒙莊試問渠風塵濩落鬢毛皤萬感填膺恨未磨老淚總因兒女盡衰門忍見死喪多人生卒卒真難料天道茫茫定有訛倚柱不堪惆悵絶短垣斜日下槐柯病中雲日荒涼晚自隂天寒廬舍靜愔愔喜聞賔客操吳語愁對妻孥作越吟小雪花枝凄亂菊新霜籬落咽羈禽獨憐孤雁知南嚮煙水茫茫未可尋假日簾外酸風觸欲僵隙中斜日淡無光寒煁不爨熒熒碧病葉如人冉冉黃老去漫云吳髮短愁來且放楚歌長連朝急假蒙恩便起就南忩檢藥方斜街宅一徙斜街宅三移斗柄春門扉臨劇道煙火接比鄰竟日聞騶殿何時罷徼巡小人宜近市未敢厭囂塵即事屑屑苦人事悠悠屏俗喧鄰雞時上屋籬雀日窺門散帙凝塵積熏衣宿火溫疏鐘空外落愁絶又黃昏喜訪濂至小草孤生苦殘年萬慮灰蒼黃逐野馬搖落感庭槐藋徑披還合柴門欵或開跫然猶自喜況值故人來和悔庵歸興六首所期白首得同歸惆悵還令此願違栩栩未醒殘蝶夢冥冥却羡逺鴻飛孤棲我自甘牛皂初服君方返芰衣從此省中吟芍藥更無人似謝玄暉兩朝深眷物情歸再世承恩入紫微頻到直廬修內制時看子舍浣中衣官清右掖陪晨仗地勝仙瀛玩夕霏底事便應移疾卧旁求盛意正如飢我亦怦怦苦憶歸久從柱下悟知希浮湛聊復酬賔戲潦倒真難答客譏萬事輸君心自愧一官垂老計全非何當便逐清塵去去學壺邱杜德機夜鶴晨猿遲客歸氷絃雪麈待君揮幽棲時復延三益健筆還能綴七依家有吳畬供賦稅室無趙女倚屏幃水哉亭上翛然逺咫尺煙霄矯欲飛何限巖廊老未歸懸車不待歎知機官間豈似雙鳬集身退偏如六鷁飛遊處多應緣笠澤生涯只合問漁磯沈公肯效何公出留取髙名揭禁闈朝衫一擲浩然歸人事焉論是與非綺甪衣冠原自偉夔龍邱壑故應稀行吟物外貧何病謝客山中遁亦肥惟有東鄰彭澤老時時來往啓荆扉彭澤老謂家兄雲客先生也直史館回馬上作藝館朝來赴史官短驢蹩躠入東安霜凄偃瓦氷初壯風射熏爐火亦寒青簡濫持三寸管白頭差戴兩梁冠敝廬舊與滄洲近此去惟應把釣竿冬夜與庭表遜來㽔宫話舊感賦二十年前與計偕一時英俊盡同儕姓名半向金閨謫邱隴多將玉樹埋往事豈期紅藥省舊遊重到緑槐街風光報答真無計垂老空憐志願乖將移寓柬愚山悔庵蘧廬非我有一宿偶容身去住無常主淹留為故人間時移步屧遊處接車茵可惜離羣去臨風獨愴神庭表巢薇遜來㽔宫過飲小齋有作午睡初回聽欵門故人肯為過髙軒鷓鴣斑淺茶翻匙琥珀光濃酒滿樽斫鱠休嫌邾莒小殺雞如見范張存夜闌更作蟬聯語白首心期好細論嵗云盡矣四顧蕭然因援筆成䪨謝客間居靜掩帷疏狂總未與人宜非無倒屣相迎日亦有移床自逺時帶為忘腰惟取適巾雖飾首亦頻欹悠悠嵗晚無人事間詠新詩一解頤遜來見過吳客當年返故林荷衣葛帶幾相尋招要共醉天中節憔悴仍為澤畔吟渺渺山河如隔世悠悠霜雪更論心八同休道狂言語自是交情分外深余與遜來生同庚甲午領鄉薦己亥舉禮闈辛丑削籍乙卯蒙恩湔洗授官中書舍人丙辰授主事丁巳分校鄉試靡不相同故戲為八同語古琴為張晴峯營部賦雅樂既不作哇咬遂盈耳非無幼眇音一往詎可止此琴閲千載久抱爨下耻神物無終湮乃遇張夫子金徽半漫漶玊軫抱塵滓古色轉深黝不與凡器似絃以山柘絲七條何纚纚一彈再三鼓邈然遊太始器習手亦調心賞方在此俗好自云殊紛紛竟誰是嵗除前三日過愚山齋中飲與君比舍相依久倣佛清漳夾宅時折簡頻呼傾緑糈到門不用控青絲天寒易暝張燈早夜永將闌抱燋遲共話玉堂清絶景風光未許外人知歌魚不怨蒯緱長説餅還憐玊屑香酒熱真能露肝膽官間且自飽氷霜太平再見民風樂殘臘將除嵗事忙應少間人如我輩坐聽寒漏滴空堂除夕和悔庵坐看嵗月幾乘除野馬黃埃共起居地逈忽傳遷客訊是日得退庵信陽來訊篋開重見故人書檢巾笥得南陽先生手書數紙為之泫然穨唐宦興摧眉後冷落吟情擁鼻餘日暮空堂聞鼠嘯蕭然真已類逃虛白髮何當痛掃除青縑長擁一牀書風霜凄結寒支枕氷雪闌干夜剪蔬得句儘堪資嘯詠銜杯聊得對軒渠憑將光景間消遣萬事人間總不如元旦賜宴太和門和悔庵玊琯陽回屆嵗元天顔有喜藹春溫兩宫箋賀知重慶萬嵗山呼識至尊羣吏方來初輯瑞小臣旅食獨沾恩賜餘更許歸相餉手挈筠籠出禁門松桂堂全集卷二十二
