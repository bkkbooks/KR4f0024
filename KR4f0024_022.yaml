body:
  text: 松桂堂全集巻二十二壬戌吏部侍郎彭孫遹撰冬晩徙倚髙舂下天低暮景沈殘鴉過逺水黄葉滿空林遠志蹉跎乆衰年感慨深心知來日短那不惜分隂初度日隠約終年屈壯圖此生真自愧桑弧枯荄氣淺黄鐘近細栁光微白日徂牾世非關多酒失負人不獨有詩逋天涯嵗晩風霜切苦憶江東雪色鱸遣信空庭餘暝色霜氣正凌兢斜日寒逾駛愁雲暮欲凝長飢憐婦子薄禄媿親朋目送南飛雁迢迢思不勝冬夜留木文介文豹文小飲衰慵乆與世相㤀佳客猶能過草堂坐擁枯爐消永夕起㸔初月耿寒光人非肉食餘真意味有魚飱似故鄉懷抱為君傾倒盡三文也合扺三康肯披藜藿欵柴荆脱畧形骸簡送迎相見惟聞作呉語少留重與試南烹官閒儘㸔西山爽酒薄差憐易水清但醉不妨歸榻卧紙􅙘燈火夜深明院中曉直霜籠朝旭氣嶙峋早向東華踏軟塵南陸行㸔圭景度北扉來聽漏聲頻老槐葉盡龍初蟄古栢巢低鳥自馴最是太平多暇日直廬一到又經旬殘漏稍聞殘漏𦂳虚館欲三更風定寒威減霜嚴夜氣清吟愁梧砌冷約夢葦簾輕重起披書巻終年媿短檠奉柬院長陳説巖先生遼濶清塵半載餘祇憑尺素問離居也知賔客逢迎苦不訝交遊禮數疎直院秋隂分草後鎻㕔春雨落花初追尋兩地情如昨特擁寒檠夢玉除夜坐孤月綴林杪横參挂屋稜棲烏驚未定寒漏聽無憑憔悴清吟減蒼茫暮齒増憂來不成寐虚幌掩殘燈感事兀兀窮愁伏枕初頻搔短髪獨欷歔十年骨肉摧殘盡七尺形骸涕涙餘自癸丑至今十年之中喪兩姊兩兒一女一庶婦人非金石那能堪此也觸事傷心都併集撫今追昔更何如死生大矣誰能一為起䝉莊試問渠風塵濩落鬢毛皤萬感填膺恨未磨老涙總因兒女盡衰門忍見死喪多人生卒卒真難料天道茫茫定有訛倚柱不堪惆悵絶短垣斜日下槐柯病中雲日荒涼晩自隂天寒廬舎静愔愔喜聞賔客操呉語愁對妻孥作越吟小雪花枝凄亂菊新霜籬落咽羈禽獨憐孤雁知南嚮烟水茫茫未可尋假日簾外酸風觸欲僵隙中斜日澹無光寒煁不爨熒熒碧病葉如人冉冉黄老去漫云呉髪短愁來且放楚歌長連朝急假蒙恩便起就南忩檢藥方斜街宅一徙斜街宅三移斗柄春門扉臨劇道烟火接比鄰竟日聞騶殿何時罷徼巡小人宜近市未敢厭囂塵即事屑屑苦人事悠悠屏俗喧隣雞時上屋籬雀日窺門散帙凝塵積熏衣宿火温疎鐘空外落愁絶又黄昏喜訪濂至小草孤生苦殘年萬慮灰蒼黄逐野馬摇落感庭槐藋逕披還合柴門欵或開跫然猶自喜況值故人來和悔庵歸興六首所期白首得同歸惆悵還令此願違栩栩未醒殘蝶夢冥冥却羨逺鴻飛孤棲我自甘牛皁初服君方返芰衣從此省中吟芍藥更無人似謝𤣥暉兩朝深眷物情歸再世承恩入紫微頻到直廬修内制時㸔子舎浣中衣官清右掖陪晨仗地勝仙瀛翫夕霏㡳事便應移疾卧旁求盛意正如饑我亦怦怦苦憶歸乆從柱下悟知希浮湛聊復詶賔戲潦倒真難答客譏萬事輸君心自媿一官垂老計全非何當便逐清塵去去學壺邱杜徳機夜鶴晨猿遲客歸氷絃雪麈待君揮幽棲時復延三益健筆還能綴七依家有呉畬供賦税室無趙女倚屏幃水哉亭上翛然逺咫尺烟霄矯欲飛何限巖廊老未歸懸車不待歎知機官閒豈似雙鳬集身退偏如六鷁飛遊處多應縁笠澤生涯只合問漁磯沈公肯效何公出留取髙名揭禁闈朝衫一擲浩然歸人事焉論是與非綺甪衣冠原自偉䕫龍邱壑故應稀行吟物外貧何病謝客山中遯亦肥惟有東隣彭澤老時時來徃啓荆扉彭澤老謂家兄雲客先生也直史館囘馬上作芸館朝來赴史官短驢蹩躠入東安霜凄偃瓦氷初壯風射熏爐火亦寒青簡濫持三寸管白頭差戴兩梁冠敝廬舊與滄洲近此去惟應把釣竿冬夜與庭表遜來㽔宫話舊感賦二十年前與計偕一時英俊盡同儕姓名半向金閨謫邱隴多將玉樹埋徃事豈期紅藥省舊遊重到綠槐街風光報答真無計垂老空憐志願乖將移寓柬愚山悔庵蘧廬非我有一宿偶容身去住無常主淹留為故人閒時移步屧遊處接車茵可惜離羣去臨風獨愴神庭表巢薇遜來㽔宫過飲小齋有作午睡初囘聽欵門故人肯為過髙軒鷓鴣斑淺茶翻匙琥珀光濃酒滿樽斫鱠休嫌邾莒小殺雞如見范張存夜闌更作蟬聯語白首心期好細論嵗云盡矣四顧蕭然因援筆成䪨謝客閒居静掩帷疎狂總未與人宜非無倒屣相迎日亦有移床自逺時帶為忘腰惟取適巾雖飾首亦頻欹悠悠嵗晩無人事閒詠新詩一解頤遜來見過呉客當年返故林荷衣葛帶㡬相尋招要共醉天中節憔悴仍為澤畔吟渺渺山河如隔世悠悠霜雪更論心八同休道狂言語自是交情分外深余與遜來生同庚甲午領鄉薦己亥舉禮闈辛丑削籍乙夘䝉恩湔洗授官中書舎人丙辰授主事丁巳分校鄉試靡不相同故戲為八同語古琴為張晴峯營部賦雅樂既不作哇咬遂盈耳非無幼眇音一徃詎可止此琴閲千載乆抱爨下耻神物無終湮乃遇張夫子金徽半漫漶玊軫抱塵滓古色轉深黝不與凡器似絃以山柘絲七條何纚纚一彈再三鼔邈然遊太始器習手亦調心賞方在此俗好自云殊紛紛竟誰是嵗除前三日過愚山齋中飲與君比舎相依乆彷彿清漳夾宅時折簡頻呼傾綠糈到門不用控青絲天寒易暝張燈早夜永將闌抱燋遲共話玉堂清絶景風光未許外人知歌魚不怨蒯緱長説餅還憐玊屑香酒熱真能露肝膽官閒且自飽氷霜太平再見民風樂殘臘將除嵗事忙應少閒人如我輩坐聽寒漏滴空堂除夕和悔庵坐㸔嵗月㡬乘除野馬黄埃共起居地逈忽傳遷客訊是日得退庵信陽來訊篋開重見故人書檢巾笥得南陽先生手書數紙為之泫然穨唐宦興摧眉後冷落吟情擁鼻餘日暮空堂聞鼠嘯蕭然真已類逃虚白髮何當痛掃除青縑長擁一牀書風霜凄結寒支枕氷雪䦨干夜剪蔬得句儘堪資嘯詠銜盃聊得對軒渠憑將光景閒消遣萬事人間總不如元旦賜宴太和門和悔庵玊琯陽囘届嵗元天顔有喜藹春温兩宫箋賀知重慶萬嵗山呼識至尊羣吏方來初輯瑞小臣旅食獨沾恩賜餘更許歸相餉手挈筠籠出禁門松桂堂全集巻二十二
