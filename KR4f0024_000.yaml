body:
  text: 松桂堂全集原序康熙己未詔舉博學鴻詞是時國家治化翔洽文教覃敷海宇人文彬彬日盛老宿名士雲集輦轂月給司農錢以膳凡試入髙等者授為翰林及期御試體仁閣下西清給札光禄傳餐恩遇隆渥實唐宋制科所未有也扵是海鹽羡門彭先生褎然首舉命下之日自王公九列及庠序諸生思先睹試帖以為快流播鈔謄長安為之紙貴聖祖仁皇帝孝養重闈豫順之氣洋溢海内兵革既休獄訟衰息勅詞臣釐定樂章象功昭徳先生夙有撰著繕録進呈屢邀奬賞嗣是眷注日隆洊歴少宰又數年移疾歸里時陳羣方髫齔粗觧四聲隨先王父詣先生因得親先生議論風㫖請學為詩則曰讀萬巻書行萬里路下筆便有竒氣盖先生自道閲歴也與先生同舉諸公其年陳君有檢討集次耕潘君有遂初堂集大可毛君有西河全集鈍翁汪君有堯峯集悔菴尤君有西堂全集竹垞先生有曝書亭集他如施愚山龎雪厓王華亭湯睢州諸君子以專集行世者無慮數十家亦既飈馳天下幾幾乎人懐盈尺矣獨先生手訂松桂堂全集授令子承祚承祚胚胎前徽能讀父書思鋟木以垂久逺居無何家日益貧方拾橡㸐松以自給厥後出宰三晉擬儲俸錢謀付剞劂忽遘師門波累流離瑣尾幾瀕於危承祚處之夷然去官日家事一切不問獨抱遺集詣京師已而事白擢任别駕屢有遷轉皆在畿輔所至以清白稱陳羣與承祚本中表兄弟生同里長同仕又先後同事畿輔者六年承祚刻先生遺集既竣索陳羣弁言昔東坡生平以不得見范文正公為憾及與其季子徳孺同僚因序其集况陳羣得見先生於里第請業請益在少時已切嚮徃者乎先生學問該洽於書無不讀所著詩賦荘雅典麗又復舂容流宕而於館閣諸體尤為瓌瑋絶特一時奉為圭臬在唐則如張燕公蘓許公在宋則如晏元獻周必大樓攻媿諸公先生没後垂五十年而是集始出嚮使承祚於顚狽中稍弛寳䕶則吉光懸黎方湮沒於荒煙白草世又烏睹所為珍貴者耶新城王尚書於有明諸詩人獨愛徐昌榖髙蘇門二家曽為評次手定而傳之後之君子讀先生之集者或亦有斯趣焉乾隆八年五月既望同里後學錢陳羣拜撰欽定四庫全書集部七松桂堂全集目録别集類六國朝巻一賦樂章古今詩巻二古今詩巻三古今詩巻四古今詩巻五古今詩巻六古今詩巻七古今詩巻八古今詩巻九古今詩巻十古今詩巻十一古今詩巻十二古今詩巻十三古今詩巻十四古今詩巻十五古今詩巻十六古今詩巻十七古今詩巻十八古今詩巻十九古今詩巻二十古今詩巻二十一古今詩巻二十二古今詩巻二十三古今詩巻二十四古今詩巻二十五古今詩巻二十六古今詩巻二十七古今詩巻二十八古今詩巻二十九古今詩巻三十古今詩巻三十一古今詩巻三十二古今詩巻三十三古今詩巻三十四古今詩巻三十五表奏頌巻三十六頌巻三十七序巻三十八延露詞一巻三十九延露詞二巻四十延露詞三巻四十一南􅐹集一巻四十二南􅐹集二巻四十三南􅐹集三臣等謹案松桂堂全集三十七巻延露詞三巻南􅐹集三巻國朝彭孫遹撰孫遹字駿孫海鹽人順治己亥進士官内閣中書康熙己未舉博學鴻詞召試擢第一改編修歴官吏部侍郎兼翰林學士所著南􅐹集香奩唱和集金粟詞延露詞俱先有刻本是編乃乾隆癸亥其子景曽所刋前有錢陳羣序稱與孫遹同舉者如陳維崧潘耒毛竒齡汪琬朱彜尊尤侗龎塏王頊齡湯斌均各有專集行世惟孫遹手訂松桂堂集閱五十年未刋至景曽始得授梓又稱其館閣諸體尤為瓌瑋絶特盖孫遹博雅之才際國家文治鼎新和聲以鳴太平之盛要亦無愧於詞科矣其延露詞與南􅐹集舊有刋本别行此本又載之則景曽並附於後以為全集云乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
