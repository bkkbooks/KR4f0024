body:
  text: 松桂堂全集巻二十八戊辰以後吏部侍郎彭孫遹撰戊辰元夕次汪東川韻芸廬儤直㪚縚繩黯淡春衣縷八升皛皛金波飄素練沉沉珠漏咽寒氷清齋不飽長鎗米白首相依短檠燈與爾分曹嗟未得同題詩句碧山層送周雅楫視學浙江便道歸毘陵省覲之作曾登呉觀發呉吟恰擁仙軺越水潯瓊苑名髙丹詔麗玉堂人坐絳帷深當官乆切春暉戀過里曽無晝錦心漫説南陔蘭可採新栽桃李已成陰大行太皇太后輓詞六首和健菴總憲韻仙禁宵嚴後東朝曉仗齊桂軿虚紫罽椒殿閟丹泥舊宅橋山外新攢潞水西敷天均一慟隠隠緑槐隄容車初展駕祖餞出雕檣林葉晞春露城烏咽曉霜蘭茵紛委地栁翣儼成行萬口齊哀挽人誰八米即徽稱隆禮備玉食大庖豐釦器皆民力繒衣惜婦功惠風流禁掖慈㴻溢圻同令問終無歇彤毫在六宫大孝終身慕因心豈為名鏡奩猶髣髴茗粣自生平總未成三偯何嘗御六清攀車親步送斷靷見宸情羽衛停綃幕廬宫却組帷氷霜悽結響雲物迥含悲長樂添新注南陵赴夙期皇心愴風樹涙灑萬年枝升禋鴻號永卜兆鮒隅同即事心何恝終天恨不窮倚廬瞻聖徳載筆罄愚衷介福承王母登歌薦寢宫題周廣菴漁隠圖江鄉風物自清娯莫向長安憶舊呉若使季鷹當盛世秋來未必念蓴鱸初夏同真定梁相國遊豐臺觀芍藥率爾有作四月郊原卉物新麥黄雨細浥芳塵調元正際昇平日選勝方當澣沐辰花蕾半開偏嫵媚鶯簧初熟倍輕匀省中别有翻階藥披拂東風萬斛春翠樾清泉一徑分到來已自隔塵氛謝公山墅饒春色荀令香燼貯夕熏風際槐隂深峭蒨雨餘花氣濕氤氲興酣未覺歸途晩沙路依㣲見落曛夏日宛平王相國園亭讌集即事成詠山墅從遊愜勝情髙槐疎栁翠縈盈偶依深樾能忘暑忽有鮮飈為析酲淥水聲中清籟合明鐙影裏素蟾生何妨陶冩憑絲竹黄閣謀謨正太平蘭有鮮香玊有温新凉一㸃湛芳樽初拈白紵排么鳳更撥朱絃試舞鵾閣雨天猶能解意遏雲人那不銷魂祗憐醉後多疎放待拂車茵認酒痕真定相國以詩見寄依韻奉答偶移步屧㸃蒼苔早有提壺栁外催心跡乆同神虎幘身名且付季鷹杯青蘋風細泠泠至紅藥香濃嫋嫋來莫道韶光不相待名花好是殿春開藉草何須命藻筵右安門外是花田栁隂十里堆香絮杏火千家潑翠烟物態最憐新雨後人情偏愛晩晴天重遊凖擬明年在更與春風訂後縁晩秋雜感三徑荒蕪碧樹殘故山迢遞莫凭闌秋心併入呉吟苦霜色平侵楚製寒砌菊叢叢攢露蕋庭槐隠隠落風湍直廬晩出惟髙枕衰白還應媿素餐落葉空階摵摵聲秋來惆悵不勝情官如遼豕頭皆白身似河魴尾欲頳殘帙未妨耽寂寞索居偏喜罷將迎夕陽有意娯幽獨故就西忩弄晩晴題沈客子春山絲竹圖春女如花春物妍東山風調故依然一絲一竹渾間事曽誤蒼生四十年移寓米市喜與阮亭比鄰即用阮亭來韻薄遊十載同羇旅懶慢心情似暮雲已遣移牀逺賓客故教徙宅傍夫君停車每每披藜藿步屧時時破蘚文趂取涼秋理殘檠夜忩燈火得相分三月十九日髙梁橋眺望淺碧輕紅劇可憐風光娓娓浴蘭天一春最是銷魂日寒食方過穀雨前三月晦日小忩斜日捲簾時百感蒼茫髩欲絲惆悵一年春又盡花風剛到海棠枝題祝矜刪南村獨酌圖呉客春來有夢思鮮香膩粉一枝枝不知東郭行吟日可似南村獨酌時題王清逺桐陰試茶圖幽人偶此坐林樾滄滄竹樹清且寒一匙綠雪灑蘭吹邈然髙詠青琅玕松桂堂全集巻二十八
