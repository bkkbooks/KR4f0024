body:
  text: 松桂堂全集巻六己亥庚子吏部侍郎彭孫遹撰夏日過孫大山梅溪精舍題壁灌木蕭森敞夕隂禪闗下枕碧溪深徵君廬阜新歸社髙士蘓門獨鼓琴疎磬晩通風竹響清蜩晨抱露桐吟頻年湖海嗟行役何處相期岀世心九日限重陽登髙四韵同顧菴子存貽上賦日暮望鄉國山深雲萬重宫鴉横霽色陵樹浄霜容心逐南中雁書來海上𤇺倦游空向夕吟㫁鳳城鐘共有招㩦興驅車向夕陽白衣何處酒青女九秋霜作客驚蕭候逢人盡異鄉落英如可採我意在三湘地逈猶千里臺髙試一登客吟深越舄鄉字減呉綾鵰急清燕塞鴻歸度灞陵故山相望處目盡白雲層秋氣何寥濶蒼然四望髙深杯驅折絮險韵鬬題餻林柿風鳴葉汀蘆雪㸃濤覊懐坐摇落應逐酒人豪走馬斜街見菊花黯淡秋隂白日斜又看黄菊傲霜華客情最是難消遣擣素聲中唱賣花清霜落後雁初迴不見南中一字來此日東籬秋色滿黄花終日為誰開秦筝歌送顧翊文之鄜州同貽上作君不聞秦筝聲最苦孤雁流哀生極浦擘絃促柱一再彈隴首征夫淚如雨闗山迢遞三川道古畤荒凉秦樹老萬里行人聽暮笳五原賓從空秋草故人擁傳向秦城杜甫山堂月正明曉參漸落筝聲歇不見秦城見明月望西山太行千里脉叠嶂擁闗門一雁分秋色雙鵰落曉痕迴峰沉日影飛瀑洗雲根望望空歸去幽竒好細論登毘盧閣晩眺為愛秋光入化宫梵王樓閣倚虛空千門烟火參差合四塞山河逺近中下界人聲塵漠漠上方雲氣夕濛濛坐聽鐘梵松間出頓使浮生歎轉蓬振衣獨上化人臺飛閣流丹此地開閶闔逺浮銅狄影闗門斜抱玉泉迴欲排鳥道凌空去不盡秋隂入檻來誰向登髙工作賦抽毫深媿大夫才九日同子存貽上賦木落天空野照開慿欄千里朔風來山連榆塞髙無極水繞桑乾去不迴歌㡌客投黄葉寺望鄉心醉紫萸杯烽烟日夕勞回首蕭瑟江南庾信哀勞人向夕起相思籬菊開殘最後枝客裡授衣愁令節尊前啼鴃惜芳時西山葉盡寒鴟見大陸雲愁去雁遲沙梗坐飛秋日暮苦吟低拂玉鞭垂迢遞闗山鎻濁河登臨翻遣客愁多佳人東國流黄暗公子西郊獵騎過易水風寒聞變徵薊邱霜老罷鳴珂唐中太液當年事白露啇飈冷芰荷與存岩約遊西山不果擬向烟霞曵短笻不禁清夢繞諸峰秋風玉水潭前樹落日香山寺裡鐘逋客漫搴青薜荔遥天空掛碧芙蓉遂初他日能偕隠蠟屐芒鞵到處從問西樵齒疾王郎少宦情齒冷還成厄何當掛冠去一潄西山石過竹林寺古刹何時建經年客到稀喚晴雙鳥下汲雪一僧歸廢址無栽竹枯藤有化衣王猷空命駕幽興悵多違送旭曙南還製得荷衣返舊林十年操瑟少知音家貧易有窮途淚地逈難為送别心白苧雲山孤夢逺青溪烟雨一篙深君歸且卜南湖宅莫向清時歎陸沉雪中訪邱二虎牙不遇客舍臨斜陌重扉掩朔風主人何處去雪滿鳳城中北闕金莖濕西山翠靄空㶚橋曽有約清興與誰同月夜同存巖過涵谷宅因留飲至醉良夜招尋逺自從空庭竹柏影重重寒光逼曙浮仙掌清漢横波轉禁鐘坐久漸知秋氣肅談深偏覺酒杯濃承天往事君能憶清興還追舊日蹤飲西樵邸中與耿十三承哲夜話苜蓿衙齋冷似年開樽不惜酒如泉㣲官且喜同傳舍一醉還能減俸錢清夢夜懸長白樹朱門寒鎖薊邱烟相從莫更辭頻數萍合天涯亦偶然傳舍顔師古作平聲讀與禮吉索香奩詩偶疊香箋寫麗人詎堪持作鏡湖春歸囊莫帶陳思賦恐向中宵誦洛神贈鹺使余岱輿侍御南顧勞明主西臺遣近臣昔聞題柱客今見避驄人霜斾臨吳甸星軺指越津諸曹争負弩大吏此埋輪民力艱濡沫商䑸苦算緡帆檣千里色井灶萬家春國計頻年絀軍需不日陳岩疆紛雨露漲海净風塵早晩歸鵷列中朝待秉鈞長安紀事臨軒三策漢諸儒水碧山𤣥繞帝樞九陛紛陳全鹵簿千官拱聽大句臚龍文鑄幣頒王府茗酪傳桮出御㕑自幸遭逢明盛日濫隨鵷鷺上天衢詞臣筆札侍宸居左掖宣呼自選除鳯綍初傳天上詔琅圅重啟帳中書大官賜食龍樓曉内史抽毫秘殿虛漢帝好文應浪語却教楊意薦相如金焦鉦鼓向南來千里餘皇水面開楊子旌旗吹蜃暗海門波浪斬鯨迴雖懸漢室通侯爵不賜炎洲續命杯廟算自然深九地捷書欣看入瀛臺商風蕭䬃動秋隂列校星羅獵上林殪兕西山蒼霧合射蛟南海暮雲深驚塵上駟周王騎屬玉離宫漢主臨㑹向承平修武備非闗蒐狩樂從禽豫遊清蹕駐皇畿往代山邱悵巳非特發水衡新廟貌更行園令肅旌旂茂陵刀劍横青草昭寢熊羆冷翠㣲聖主一朝修盛典千秋史冊有光輝客有談西山之勝者因賦一律見説西山勝秋深紫翠重髙寒生絶頂夕秀吐羣峰古寺馴珠鴿飛泉掛玉龍不知禽向侣岩下㡬人逢為鍾玉行賦悼亡之句鳳池歸去雁書遲腸㫁紅蘭委露時湘浦霜寒凋玉羽瑶臺月冷折瓊枝牛衣却憶同貧賤驪曲翻成永别離莫怪安仁頭早白空床長簟不勝悲南海謝子茅枉問不值見投新什賦答萍蓬蹤跡近燕臺旅舍秋隂黯不開門外軒車詞客過壁間鳳字故人來魂摇鄉國孤烽㫁心逐闗河一雁迴見説平臺方授簡幾人得似恵連才月夜宿貽上邸中聫句飄泊天涯侣同驚嵗月闌貽上禁鐘清露濕邊月白榆寒駿孫湖海逢人少風塵説劍難貽上廣陵相憶處好寄碧琅玕駿孫時貽上將就官廣陵又次貽上西窓寒不寐明月下窺人嵗晩憐為客途窮厭此身官梅仙吏隠叢桂小山隣惆悵驪歌近聮床且自親附貽上詩此夜長安月清光對故人迢遥千里别落拓百年身舉世無知巳名山好卜鄰平生邱壑志禽向自相親贈王東臯吏部南曹仙吏冠諸郎鄴下名流綴鷺行啟事一時推品藻選人千載頌公方闗河歲晩綈袍冷閶闔雲髙禁路長記得清酣風月夜座中三日握蘭香起草歸來玉署清髙軒晨夕過柴荆泥塗久巳安卑賤湖海猶勞問姓名臺裡青山銅雀舘尊前寒月薊邱城他年薄宦風塵下回首雲霄萬里情感事十年零落舞衣塵繡像名經了净因豈有白龍纒素頸空將碧血灑羅巾貞魂己拔人天界幻影何分去住身應是香軀成解脱九泉哀怨不須論送雲客兄還呉兄弟天涯興不孤㩦笻日醉酒人壚故園春色遥相待一夕歸心滿石湖不惜間闗千里行夢中春樹闔閭城扁舟他日來相過共向山窓聽雨聲送别闗河雨雪深應知此際悵登臨歸時若遇呉門卒為致明時勸駕心聞砧獨客空亭暮凭欄聽搗砧和蛩飄夕籟隔葉散秋林空際流餘響停時寄逺心可憐今夜月孤夢杳難尋送謝子茅歸南海傾盖天涯意自親鳳城吟拂玉鞭塵烏衣貴客今無恙白雪新詞舊絶倫賦裡秋光清海月夢中草色嶺頭春若為歸去梅花發折取南枝寄逺人送姚經三歸桐城客舍驪歌日暮聞歸帆遥帶皖江雲不堪同作天涯侣黄葉青山獨送君長至日古寺蕭條白日西一枝聊得寄卑栖地隣黍谷寒偏早律轉葭灰氣未齊山閣寥寥清磬夕江天黯黯碧雲仾終朝走馬趨公府畫省無人聽鳥啼初度日摇落風前勸濁醪不堪雙髩日蕭騷巳知壯齒輸荀羡猶媿㣲名比伏滔寒律㡬時迴玉琯窮途真自戀綈袍雲天咫尺空搔首閶闔崔巍禁路髙適有所感故有綈袍句喜家報至逺客燕山久未歸西風摇落信來稀闗河嵗晏多烽火目㫁江南一雁飛簡㸃來時是㡬時不知此後更何如燈殘酒醒清無寐重展天涯尺素書金魚池池畔延幽矚凄凉水一涯寒波摇螮蝀秋雨没蒹葭林木清隂逈樓臺倒景斜提壺何處問隔岸有人家夜就貽上宿逢劉公㦷比部潘進也國博有贈㩦縑日就王郎宿丹鳳城西暮色開片月光浮招隠樹孤琹聲繞辟寒杯劉琨夜舞仍豪舉潘岳秋興見賦才千古風流應未墜清樽猶得暫徘徊夜歸山寺浮萍泛素波千里相沿泝孤蓬振朔風飄摇隨所遇人生作逺遊蹤跡傷流寓但逢萍水人無復飛蓬顧疲驂過我友斗酒日相聚晩歸漏四鳴角聲生古戍空巷絶行人寒濠戰沙鷺參旗縱復横鷄桀驚還住斜月影未沉掛在扶疎樹杖箠一叩門僮僕久方寤佛火烱餘明晨鐘起清悟歎息不成眠凄然感嵗暮報國寺古松歌帝城景物誰第一靈竒首數報國松清隂磅礴數十樹鬰葱輪囷氣獨鍾中有數枝最綽約蒼龍怒爪紛相攫下䕃瓊田五色芝上巢緱嶺千年鶴其餘往往含異姿虬形黛色各自竒一朝澄霽振林籟晨鐘夕梵叅差吹忽然風雨相交併洪濤不返聲長騁惡鯨吼浪白日晦山鬼幽鳴捉人影當日驅車泰岱側秦封直上天門逼徂徠山翠萬仞髙不與此中争氣色可憐古院老龍鱗嵗寒孤抱誰相隣時有百貨來填溢長安車馬喧紅塵精神寂寞曠不接愧爾悠悠朝市人偶成斜日西風欲暮天故鄉歸去又經年壚頭賸有荆卿酒洛下元無季子田聖世漫須勞小草時名應自讓諸賢天涯兄弟成相憶不為鱸魚亦惘然夜過斜街宅别西樵禮吉貽上朔風集冬杪白日忽巳沉策馬過南陌取酒聊共斟少年慕儔侣結契兄弟深一朝分道去化作啇與參出門握手語霜露浩以滛朧朧殘月影颯颯枯樹林予返呉山曲子歸岱畎隂悠悠千里别此㑹良難尋聞歌秦筝不㫁訴離愁河影參差碧月流雁柱促聲翻樂府鵾絃催滚入凉州當時淚落蕭闗戍此夜悲添楚客秋一夕呉吟生白髪長安信美亦難留秋夜與存岩話舊秋漢迢遥禁漏長追思往事意茫茫空江夜雨鳴揚子小舸春風汎吕梁囊裡孤琴凄苦調匣中雙劍隠寒光一時飄泊憐同病又逐東風入帝鄉出都留别方菴升存岩雍來涵谷諸子驪駒分手處雨雪薊門行易得思鄉淚難為去國情寒雲千里合秋暁萬山平惆悵城南路陽闗第一聲渡易水峻坂崚嶒枕濁河相傳此地送荆軻河邊日暮悲風起還似當年變徵歌白溝渡渡頭沙草白離離過客停驂日暮時古戍烟荒吹野火寒鴉風急戰枯枝河流逺合滹沱水驛路中分督亢陂欲問霸圖銷歇盡朔雲千里不勝悲任邱道上古道斜陽一片明桂巖岞崿俯層城虞邱臺上寒榛合碣石宫前蔓草平山雪兼旬飛鳥絶河氷千里見人行朔風凌厲愁雲重向夕慿軒萬古情草橋草橋南去接風烟極目平沙萬里天籟谷寒聲千樹動棗林疎影一巢懸紛飛鳥雀喧山驛相逐牛羊下墓田指㸃舊游蹤跡在驚心歳月巳三年道經新城即古燕督亢地嬴秦方虎視蚕食及四鄰利此百里地㡬䘮萬乗身絶袖洵天幸繋組亦轉輪荆卿伏劍去性命輕一塵蕭蕭易水風至今含酸辛南轅經此地古道多荆榛但見樵與牧不知燕共秦悠悠行路者躑躅咸傷神生理盡可悟徒悲千載人望塔古塔勢玲瓏方外標靈境風沙日夕髙天半懸孤影交河道中一鞭迢遞日初斜屈指三齊路不賖郭外人烟交繡壤道傍游騎逐輕車百年古碣埋蟲字千里寒雲接雁沙莫向城頭聽朔管應憐蹤跡滯天涯望岱東嶽岧嶤峙古今鬱葱氣勢肅人心徂徠翠減秦松色岱麓雲低漢碣隂似有神光開逺岫依然風雨滿中林何當徙倚天門上匹練呉閶影細尋玉簡金泥隠秘文至今佳氣積氤氲中天盤礴崇朝雨千里輪囷大澤雲欲叩山靈探漢策遥披香霧禮元君時清㑹有云亭典封禪遺篇若個聞融結河山見化工遥遥削出紫巃嵸峰懸一片長安日地界千年大國風鳥道孤危愁徑度神房飄緲礙虚空琅玕道逺慿誰寄矯首青天碧霧中極目蒼茫逈自愁洞天何處敞清幽斜陽競吐千峰秀殘雪争鳴萬壑流離合隂陽環二氣區分齊魯帶諸州亦知訪嶽慚禽向咫尺雲山作卧遊曉行曉行負殘月寒影相追赴古渡絶行人繁霜白無露稍逺天始明澄霞生朝昫黄沙接白雲中有㕘差樹寥濶萬里餘縱目與之遇哀風丙夜起窮隂四無隙驅馬向南行不辨阡與陌鴟梟木杪號鬼火空林碧既憚道路艱復苦氷霜迫寒威裂手指誰能任鞭策行久識前途仰見東方白客舍題壁朔吹驚沙向晩天栖遲車馬倦遊年暮山層叠凝寒碧古道蒼茫起夕烟歸客且㩦燕市酒故人争著祖生鞭不堪憔悴風塵裡回首長安落照前涿州道中短衣疲馬日相從迢遞闗山㡬萬重大陸雲愁趨涿鹿斜陽影盡見盧龍鄉心正繞青谿宅客夢猶懸紫禁鐘却憶故園春酒熟一時應念逺遊蹤途中雜詠一身如㫁梗隨地託行踪計日經殘臈歸心戒暮冬葦簾凌朔氣菰米響髙舂夜半驚鄉夢招提何處鐘晨興慰僮僕勞苦及兹時行止身難定饑寒理亦宜曉霜驢背重殘雪鳥巢危共指前邨去雲林一帶移南征經十日迢遞是前程山路髙低出溪橋上下行朝寒飲魯酒晩食廢呉秔信宿聊相傍栖栖逆旅情渡溪水一水環山麓浮梁逐處成淪漣流不盡日夜有溪聲白日迴波影清泉澹物情勞勞車馬客聊此濯塵纓䝉隂道上征途斜繞大河東山邑荒凉一道通殘雪依然明馬耳孤城長自枕龜蒙樵歌牧笛聲相引草樹雲山路不窮明日青陽新節候更隨短騎逐春風過羊叔子故里千里淄青一望間數家烟火隔人寰空村店繞青溪出廢隴人驅白豕還羊祜宅荒橋枕水曹參城逺日沉山此中碑記皆零落峴首蒼苔色未斑沽酒峭急風威壓髩華停鞍又見日西斜沿門一犬迎人吠逺趂青帘問酒家沂州道中見流民作道左流民轉壑時停車一問陸沉悲田夫久廢龜隂耒室女長停岱畎絲豈有九年勞旰食惟言五日待𤓰期何人近作監門令不繪鳩形獻玉墀大風噫氣出谽谺萬竅怒相逼天地慘不交蒼黄同一色林木既傾頽飛鳥争投匿榆枋聊自安敢冀扶摇翼渡齊河路入齊河村居人汲清冷云是濟水流起伏成千頃倒景貯峰巒陽烏明藻荇寒渡無羣喧淪漣舞人影崇岡崇岡九折深白日一時墜西山黯無光東山生紫翠江北謡種樹莫種棗多寔亦多刺果熟市得錢刺多作藩蔽二枯樹採蚕絲日織盈丈許賣向江南人傲殺江南女三乗驢涉淺水莫向無人處新婦無丈夫驅驢不得去立春前一日郯城道中當時郯子邑風土見清淳里賽祈年社城迎隔嵗春菰蒲秋税減饘粥夜厨貧父老閒相語忻看節序新秦郵節物勾芒後行程甓社前晩舂供露粟春事試風鳶淮鼓喧神曲河魚溢税錢明朝江上去重買廣陵船山行山行不覺長但覺窮隂促暝色窈然深月影紛相續秦郵河上北風河上急寒影落溪莎白漲翻魚笱黄雲冷雉羅年華悲逝水客興老滄波沙鳥閒相傍虞人柰爾何徳州道中金湯十二逈相連四塞居然此地偏境外山川標海岱河西風壤接幽燕千檣競轉東南粟萬馬閒馳賜予田欲訪修靡當日事廣川宫闕盡寒烟景州城上風髙白颭沙行人徙倚聽悲笳北連紫塞三千里南接青齊十萬家暝色一行迷去騎寒天數㸃没殘鴉年來隨計燕山道幾度經過感歲華富莊驛富莊驛路阜城東雪盡平林四望空野曠天低無極處人家多在夕陽中平原道中呈次貞朝發廣川道晩次平原鄉久饑不得飽所苦道里長賴有同車侣欵語聊相將下車各一顧神氣阻不揚開顔向我友且復共舉觴人生慕逺游誰能憚風霜勞苦慎相習努力事四方渡黄河濁流逺挾百川飛凍合帆檣入望稀貝闕秋濤降海若淇園春色走支祈榜人狎浪鳴榔待津吏敲氷擊汰歸世㑹幸逢如帶日且須還問釣魚磯泱漭中央白日昏倚舷長望曠無垠迴瀾縱壑吞淮瀆急浪歸墟下海門曽鼓狂波沉瓠子誰從絶域訪崑崙何人更作河渠志九曲源流與細論黄河崖瀰瀰黄河崖漫漫濁水流城郭鬰相望原濕阻且修雖經千里道曽無一瞬留坐使日月促轉覺身世浮河上流澌南下急河上片帆稀沙鷺依氷立溪禽貼水飛波平茭草合風静浪花㣲遥見斜陽合行人喚渡歸除夜泊䢴闗越客晩停橈凄凉廿四橋江聲懸夜枕漁火亂春潮歳月流波駛烟塵漲海遥竹西亭畔路風物入蕭條除夜入春陽䢴溝接𣺌茫五年逢此夕三度在他鄉星漢浮漁浦風烟冷戰場㣲名真自累客淚滿河梁除夜酌酒與次貞千里䢴闗接暮烟一尊相對各凄然孤舟明發寒江上追憶今宵是隔年贈杜振門司農軍須民力困輸供海内名卿有杜悰通秩近兼周少保度支仍領漢司農文成鹿幣時何補山採銅溝事豈逢悵望城南天尺五誰能取次賦登龍漢廷卿相盡名賢九列登朝髪尚𤣥太史漫書平凖法大農兼給水衡錢中條山下饒清境姑射峯頭有謫仙休沐他年應卜築風流不數舊樊川夏日張黄門園亭陪上官僉事讌飲黄門高甲第綠野擅林泉結搆饒天巧郊原得地偏縁崖鳴暗澗架嶺掛修椽秀石含雲潤文榱擢露鮮虹霓埀下飲燕雀邈孤鶱栁媚懐靈殿篁深想渭川碧梧仙掖樹叢桂小山篇爽籟吟凉木薫風振早蟬松筠深窈窕巾几净嬋姢峭閣延幽矚清暉被逺阡四維低鳥道一線起人烟溪静波如掌沙晴鷺似拳不須窮逺目已是挾飛仙海色虚無裡山光縹緲前霞明秦帝嶺帆隠越人船春氣凝蛟蜃秋輪湧朓弦乾坤青未了日月璧相連邑里形交錯江湖思𣺌然比因休沐暇快覩㤗階平跡向東山寄心猶魏闕懸朱明逢勝景清讌秩初筵細雨凉初襲華燈炤欲燃嘉賔星使貴地主夕郎賢畫㦸森雕户霓旌燦彩旃憂時談慷慨卜夜坐流連仙醑金莖瀣矦鯖雪色鯿蔗漿㽞舊賜梅鼎待新煎家果張梨熟盤珍夏橘圓徵歌珠纍纍按舞鼓淵淵聲有停雲奏杯因激水傳披襟通欵洽薄質荷陶甄迂拙情能恕繁苛禮盡捐西園陪羽盖北海御髙軿詩酒追文舉才華乏仲宣觥籌交宴咲樽爼奉周旋良㑹知難屢蒼生念巳牽明農須有日此地足忘年不厭頻還往時來枕石眠庚子除夕寂寞閒居嵗月移不堪風雨益凄其家人且自安饘粥世事多愁問繭絲爐火細燃將盡篆瓶梅猶孕最先枝辟寒賴有屠蘓酒醉話䢴溝夜泊時松桂堂全集卷六
