body:
  text: 松桂堂全集卷十二吏部侍郎彭孫遹撰元日曙色熹微壓絳膏朝寒隱約上綈袍簾前花柳迎春晚海上風雲入望髙逺寄不教慙謝奉尺書端合讓山濤探梅擬赴吳中約練瀆新波泛小舠小年朝詞十首濃氛薄霧一時消花影曈曨上綺寮淡日微風好天氣小年朝勝大年朝偏髻慵開寶鏡前像生花朵辟寒鈿宿酲未解屠蘇醉昨夜原來是小年繡帖雙雙榜戶來挂門紅爛錦雲堆春城無限花燈市趂取今朝穀旦開小除時節大寒天長臘分明及嵗前七里山城三日霧安排花雪待豐年三朝閨閣換新粧綵勝金花紫鳯凰粉白蛾黃爭致語人前一一道勝常綵燕絨枝事事新競隨年例拜尊親香軿今日從何處第一先教趂喜神宿舂三日罷晨炊漠漠厨煙傍午吹霧擁連朝打霜色好歌飯甕譜風詩小梅破臘一枝新紅入雲鬟亞照人從此巾褠有餘艷春朝日日是花辰畫閣朝寒擁蕙爐新蟾恰對錦流蘇修毫欲倩纎纎影寫作春山苐一圖曉起依然倦不勝晚來猶自睡瞢騰待沽十日平原酒醉到春朝看試燈元夕雨中燈市冉冉流光節序新上元燈火賜酺辰星橋逺瀉銀河水雲幕髙燒玊燭春行雨樓臺寒不暝卷綃宫闕濕無塵踏歌興減諸年少自理清啇對碧筠孝山守雄十年不遷詩以慰之一聞越客起吳吟十載風塵惜滯淫久任自知明主意孤飛無奈白雲心春回山驛梅花發雨過江亭柳色深知爾嘯歌原不廢由來傲吏極登臨早春過子于園亭觀梅留醉清溪一葉興堪乘十日春晴乍解凌餐玊仙人肌是雪種梅處士迹如僧花前且喜人無恙病後方知酒不勝明夕更留無限憶水邊林下月初升送沈融谷遊嶺南巾山窈窕筆山尖長圃斜階水半淹石墨分明如淺黛歸時好為致香奩增城到日夏初長丹實盈柯水滿塘更譜新詞付珠女新聲直壓荔枝香人日獻節初開未滿旬相傳此日是佳辰叉頭燕重原非社勝裏花明不是春黯淡爐隂氷作筯低昻舞袖雪成茵南樓目送飛鴻過欲摘瓊華報故人花朝殘雪緣甍霽色新曉寒清峭不知春幽蘭欲茁思公子瑤草徒芳怨美人寥落素書歸雁後消磨綺思賞花辰玊缸試倒如澠酒醉舞前溪白紵巾上已日落英細草滿沙汀三月春殘柳未青裙屐久埋驚蟄雨園林初展護花鈴袚除故事傳京洛觴詠風流見典型今昔興懷多愴恨不堪重問蕺山亭送張螺浮給諫赴荆南觀察任四首郢城髙據楚江隈南紀山川萬里回地自湖湘分節鎮人從省掖見風裁諌書久抗鷹鸇志幕府新收杞梓材旦夕聖明親總政定虛前席上中台一鶚雲霄聳禁林回天捧日見臣心暫辭瑣闥名逾重遙領旌麾眷自深楚塞西連巫峽曉渚宫南鎖洞庭隂曲江樓上籌邊日文采風流並古今春城芳草送離珂千里荆門擁傳過樓雉逺臨吳會壯風煙半入蜀山多藩方委寄紆籌䇿江漢勳名播詠歌暇日登臨堪坐嘯清樽皓月水微波疊鼓凝笳使節新星槎四月溯江津雙流映帶回仙棹三石參差捧畫輪風起蘭臺無暍暑歌傳郢曲有陽春湘中自昔多遺逸好為熙時網鳯麟送朱素安隨外舅張副使之荆南離亭芳草路春水木蘭舟氷玉堪相照瀟湘此共遊煙波愁北渚風物美南樓知爾才能賦登臨及好秋清秋臨楚塞景物正紛紜峽雨千尋合江晴二水分啇歌酬郢客蘭枻待湘君鄉路勞回首吳天半白雲過煙雨廢樓次仲兄韻南湖春水碧無邊暝色垂垂落逺川何處樓臺收暮雨欲將興廢問寒煙斜陽白苧依微見宿鷺晴沙自在眠忽憶留題今十載緑波芳草故依然當湖馮生四十無子命吳興沈紹繪百子圖屬豫題句其上天上麒麟兆有無人間玊樹幾根株但教馮伉多嘉耦莫羡啇瞿五丈夫度索千春猶晚實鵷鸞九采豈凡雛纍棊採燭他年事重寫諸王作劇圖鴛湖春泛畫帆三尺挂春風十里鴛鴦水拍空煙鎖由拳寒漠漠雨過南浦翠濛濛樓臺滅沒鷗波外人事興亡燕語中想像鴟夷千載上扁舟一葉五湖東集扇頭字成句清興不知止偶然成一遊煙峯日送碧花澗夕生秋秋夜秋夜靜且永夕漏方愔愔明月照虛牖清風來樹林羅幬颯秋意哀螿厲寒音居諸逝將改霜露行見侵感此不能寐憂來攪我心欲起一展卷蘭膏坐銷沉徘徊待申旦抽思生微吟南軒曉起曉起坐南戶寒氣忽已遒渚風厯髙樹入耳清飀飀山桂花向謝石菊蕊始稠萬物各有時吾生亦何求南軒前桂始著花灼灼池中艷叢叢岩下枝荷枯桂始花榮落迭相為採此芳酷烈可以媚酒巵今我一不樂達者將見嗤張丈友松以六月十五戊子日生今年初度適逢是日屬淨因上人索詩因有此作長日懸弧近好秋翛然杖笠亦風流絳人甲子重元朔楚客庚寅又孟陬灼灼池花初照眼盈盈璧月已當頭懸知野老忘機事聊得相從惠逺遊暮秋過淨因上人寮縠巾不御風秋氣曰棖觸朝來稍稍暄步出城南曲黃菊紛始花雲林淡相屬淨公庭宇幽靜外無塵俗髙槐有餘音相將布棊局亭午不知歸欣然煮瓶粟隨遇心自安得食意已足行歌自此去相送出寒緑大雪四首淅􅅹空階竟夕聲微聞凍雀起深更梢移寒玊𫾣窗重穗冷冬缸隔幌明盈尺已知占有嵗封條還得快時晴溪山屈指梅將發擬向春前鼓棹行短褐蕭踈可自勝不因風急壯河氷四維空濶圓儀合萬象冥濛灝氣升冷逼星機霜皎皎寒生鴛甃玊稜稜懷人欲折瑶華贈手澀龜紋坼剡藤飛霙散漫集山家縞夜爭明萬樹花帳裏玊顔傷嵗暮懷中瑶草惜天涯南來雁影頭先白老去詞人鬢有華一曲幽蘭清不寐竹爐間煮碧雲茶朔風千里氣矜兢巫子長牆沒上層吾意不妨玄尚白人間幾見谷為陵夢回紙帳情如水吟斷霜鐘思欲氷徐理啇歌酬郢雪一床踈影讀書燈丁未除夕次仲兄韻雪壓梅魂凍不興寒搖吟思劇揚凌嵗時聊復書荆楚風雪何當問灞陵海氣欲生花市雨春隂未解墨池氷坐看兒戲成吾老殘夜空明懶婦燈年來賦筆罷朝雲賸有新詩餉月君曉幕當風花有信春山凝雪玉為羣已無金印堪垂肘詎有璚筌與易筯拚倒芳樽千日醉柳絲梅頰正繽紛再次前韻中夕悲歌寢欲興紙窗風雨颯霜凌美人憔悴傷空谷詞客凄涼惜茂陵復志賦成甘飲水釋時論好不嫌氷十年一覺青雲夢殘雪山寮黯夜燈曉閣初晴散碧雲春流何處遲夫君山栖近擬依宗測田事今將問孔羣效職波臣馳桂蠧登歌郊祀頌蘭筋不才虛老升平世花落花開思欲紛松桂堂全集卷十二
