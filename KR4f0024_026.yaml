body:
  text: 松桂堂全集卷二十六丙寅吏部侍郎彭孫遹撰和淡人新嵗退食仍用前韻金門吹管氣初還清切仙廬晝下關寒玊生漪天上漏春雲灑案禁中山素絲不改委蛇度髙詠聊乘洗沐間正好從容翊天步肯將鞭弭䇿駑頑謝客經旬罷欵門嘉辰賜沐是三元發揮雅操琴雙璅陶寫吟情酒一樽韋逞幔前頻授義虞潭堂上獨承恩間忩坐愛春暉好曉日蒼蒼入晏溫人日五尺茅簷半畝㕓晴忩猶是氣凄然緼袍隔嵗寒無力湯餅禁風熱有權儉腹搜竒間𨽻事枯毫忍凍細題箋綵幡花勝分明在無復心情似少年和曉嶽人日韻笑把金花勝裏人依依點綴嵗華新從今不厄黃楊閏與爾相娛白髮春桑匕可招休患盜栁車未遣莫憂貧解貂拚作經旬醉直過元宵放假辰立春日獵獵風簾遞響頻空階積雪漫成塵臘先中氣長宜嵗吳中舊俗以臘長為有嵗之兆閏入新年晚得春沉水質堅香篆永衍波紋膩墨䀶勻新詩自占娛幽獨頗喜吟懷未後人元夕早梅已探上番風撩亂羇心竟夕中萬事後人藍尾酒一官如客白頭翁月寒有暈光初減夜靜無更漏易終間撥爐灰話愁寂冥冥香霧壓薰籠花朝東風無賴醷春寒憔悴清吟鮮昔歡綺思初銷才并盡佳辰未展興先闌殘霙糝徑門雙鍵暝色窺忩日半竿芳草差池花事晚暗驚年鬢入衰殘和巢薇移寓四首薄遊仍嵗月卜宅此移居但得心怡曠何辭手拮據王陽才一槖董季已三餘盡日娛文史悠然下直廬旅舍年年換韶華嵗嵗同縑衾留薊北錦帶紀湘東逺迹同氷氏忘機類海翁臨臯懷舊隱心事託郵筒春隂清窈窕芳樹兩三枝徙倚舒懷久行吟得句遲開軒迎燕社掃徑命花師最喜寬休沐幽忩事事宜莫道衣囊薄休嗟即次難友聲鶯睍睆家慶竹平安天上恩光近春來雨露寬好攜雙管筆獻納五雲端和巢薇初度日同人移樽見過草堂之作八尺文縑九疊屏春來芳草滿階庭須知東省郎官宿即是西豪太史星杯引湘醽鄉味美坐深蘄竹簟紋青稽留不惜淳于醉夜漏何須問挈瓶為毛大可賦悼姬人曼殊之句優鉢從來不染塵無端號作斷腸春憑誰地下三彈指喚起迦文座畔人天上人間盡可疑無情有想更誰知試將往事從頭記怪殺橫陳嚼蠟時送翁心齋之開封郡丞任招尋久欲愜幽期舊俗登髙正此時惆悵遽成千里别樽前愁對菊花枝西山木葉晚來稠九月新霜滿薊邱鴻雁來時君又去那教楚客不悲秋題查夏重把膝圖落落千秋自有真悠悠出處那堪論不逢魚水君臣契多少隆中抱膝人二德惟應老鑿壞眼前石孟總輿臺憑將雛鳯輕相比只是治中别駕才夀楊以齋少司馬澄景開芳序昌期誕巨公䇿勳萬里外曵履五雲中管握西銓重階資北斗崇氷霜心皎潔川嶽氣昭融九鋝才鋒健千秋藻翰雄還將文武憲委佩翊天工淡人學士於立秋後一日夢中得伏雨炎風正夏闌之句醒後足成之為絶句十首依韻奉和伏雨炎風正夏闌銀塘秋漲水瀰漫夜來夢到桐江曲萬疊雲屏一釣竿伏雨炎風正夏闌液池千頃漾清湍蘭橈不解青絲纜楸埓初回白玊鞍伏雨炎風正夏闌曉窗染翰襞湘紈詞臣夙有頭綱賜吟案清翻小鳯團伏雨炎風正夏闌風漪雲藻碧相攢瀛洲一片清虛境身在蓬山頂上看伏雨炎風正夏闌新涼天氣未成寒雲翹舞後秋初到珍簟歌時暑未殘伏雨炎風夏正闌新詩字字琢明玕不知誰是羊何侣郢曲從來屬和難伏雨炎風正夏闌吟毫展處墨花乾玉堂從此添嘉話留與人間鄭重看伏雨炎風正夏闌紅雲曉案立仙官碧山影裏排閶闔緑樹叢中度井幹伏雨炎風正夏闌衍波初賦曉來寒儒臣最是承恩渥玊瀣先分露掌盤伏雨炎風正夏闌白雲新令紀秋官好攜三寸𢎞農管更賦儲胥與露寒送喬石林歸寶應玊樹蒹葭各一身因緣偏得託清塵蘭臺圖籍同搜訂藝閣文章互討論晚出掖門恆上鎖曉趨朝列每連茵别離不分今時有無賴驪駒忽在門草堂聞在甓湖潯疏快真堪寄逺心饒有林艿供結搆雅多朋好足招尋紅衣簾幕清無暑碧玉樓臺憺有隂直為竹深荷淨處也應及早卸朝簪石林新搆草堂錫鬯為題曰竹深荷淨之堂夀湯潛菴先生六十台揆調元重宫端諭教先二官皆要職三善在名賢秋實資儒席春卿領胄筵新猷銘魏闕舊澤灑吳天園綺衣冠偉臯夔德業全還將稽古力舉世入陶甄初度日宿火寒篝曉更然偶乘休沐得髙眠老來光景桐枝露少日心情蕙草煙葭管初回長至節藝窗最喜晏溫天吟成自笑沾沾態一字差堪扺一年時初七日冬至馬齒五十六年矣冬夜夢石林口占却寄故人蹤迹滯齊東八口漂搖類轉蓬名士每因流寓重新詩翻為罷官工蕭蕭羇思停雲外栩栩吟魂落月中強囑雙魚緘尺素萬端心事一郵筒嵗暮寄懷石林風射寒楞月墮枝斜街宅裏夜闌時情知此後相思切悔殺樽前易别離綵勝青幡又一時春來惆悵失佳期停杯陡覺心如搗不是衰年好酒悲小除夜色動寒杓人事凄清思寂寥却憶故人詩句好爐紅忩白了殘宵千里平原迤邐中桃花新水栁花風蒲臺繫馬看春色且自開襟作寄公寄公見儀禮除夕朔吹凌兢晚更驕早春寒色倍今宵盆梅萼小烘初綻山麝煙濃篆未消白髮新痕愁種種翠屏舊隱思迢迢故鄉儔侣他鄉節竟夕蟬聯話寂寥絳蠟花深不剪煤素虯水急夜頻催一年已過黃楊厄三舍難邀白日回青管迎陽將暖至明瓊送喜得梟來樽前自愧衰遲甚酌取屠蘇最後杯松桂堂全集卷二十六
