body:
  text: 松桂堂全集巻九吏部侍郎彭孫遹撰題畫好山每如畫好畫復如真此解本難轉誰為明眼人素箑一以開宛然巖壑趣不假買山資何須濟勝具和訒庵春日遊支硎山之作十里方塘放畫舟筍輿蠟屐更追遊花前欲洒楊朱淚海内誰憐越石囚照水綺羅明落日遏雲絲管亂春愁玊堂學士風流甚一酌金樽散百憂上洋農嗟哉上洋農耕田一何苦種秔十畆餘經夏不得雨陂池變為田禾苖化成土粒食不須言官稅何從補里胥雜遝來追呼怒如虎抱耒入市㕓聊用質子錢子錢苦無多僅可供酒筵此日行已過後日還復然地著難永日流亡轉可憐穮蓘雖云勤不如逢嵗年蠲租下明詔不若長吏賢雨中舟行平川一帯碧潺湲青浦城西刺客船如有如無宜麦雨不寒不暖簇蠶天坐侵衣袂憐新緑行近人家起暮烟欲寄相思傷逺道東風芳草自芊綿客中漫興葑溪迴帯古招提樹影波光入望迷種竹新畦梅雨歇䕶花小院藥欄低金雞天上傳消息銅馬山東罷鼔鼙暇日不妨頻載酒東林深處聴黃鸝幽居有客近經過相訊長安事若何謫吏競廻𤣥莬塞䧏王新渡葉榆河中原已見銷金甲初服何妨老芰荷此去五湖應不逺烟波隨地一漁蓑芍藥花開入夏初青雲回首故人踈半年憔悴天涯客兩字平安海上書小墅桑麻鳴戴勝髙臺麋鹿下姑胥霸圖銷歇韶光改一枕春風午夢虚繁花春盡尚嫣然七里方塘緑水邊細雨踈簾書帙潤斜陽孤店酒旗懸山中求友多黃鳥客裡催歸有杜鵑覊旅情懐消未得道公塔院學逃禪雲間送董蒼水之繁昌今我来茸城徃還君最熟忽然取别客樓中髙駕風帆向姑孰姑孰山川何秀麗千巖萬壑相虧蔽荻港雲繁鎖驛亭赭圻日落摇江裔此地登臨足快哉此行經月却須回到日正逢梅雨過歸時應見藕花開我家秦駐小山傍經年不歸𣺌相望因君更唱驪駒曲使我低回欲斷腸雲間送友人歸海上相逢故鄉人却在他鄉處還向他鄉折桞條送君仍到故鄉去去路沿洄直向西峭帆髙挂夕陽低曉行泖口潮如掌暮宿當湖水拍堤君到家園能計日慿君一為傳消息頽顔已自困風塵酒態詩狂消未得客樓晩起小閣朝寒客思慵潤生衾簟雨餘濃薄遊已自經三度清興猶然背九峰澄碧當窻官舍樹踈聲落枕上方鐘高樓極望江湖濶一夜風雷起臥龍五日風雨與家兄渭臣對飲林木朝隮欝未開微凉颯颯集樓臺弟兄客舍聯床影風雨山城五日杯墟里孤烟沉白苧江湖新漲走黃梅鄉心逺逐南流水柴辟亭前去不回層隂漠漠接平蕪急雨初收暑欲無五月輕寒侵白袷三江旅食冷青菰蒯緱欲問齊公子香草空憐楚大夫酒後慿陵千載思悲風吹入角聲孤臥病臥病成吾懶知交迹亦踈坐聴高閣雨愁絶故園書芸火侵緗帙梅隂潤玉除江南卑濕地五月尚樓居病起病起當清暑髙樓雨過初林傳天籟入窻引夕隂虚越燕移巢去呉吟伏枕餘江城淹歲月不為待鱸魚病中聞蒼水歸自繁昌以詩代訊澱湖五月片帆飛徂暑還家換客衣客裏送君行作客還從客裏見君歸五茸城下記相逢姑孰亭邉問去踪却笑長卿游未遂依然抱病客臨卭空館無人臥起遲撲簾梅雨益凄其楚天北望思君日正是宣城見憶時天馬歌寄畹九君不見天馬来西極俶儻權竒人未識奮身忽上閶闔門化若鬼神之不測又不見怒鵬橫絶漢翻然直起垂天翰凌空一籋九萬里毛羽紛紛何足筭君今二十正盛年才華傑出流軰間龍媒絶影非難事羊角培風亦等閒人生貴在抒懐抱一躍雲津猶小小百年事業何其多丈夫立身須及早爾復髙堂有老親十年于汝責成人紅顔白髮不相待恒恐花開非我春畹九復畹九為君思之乆年華駛若隙中駒少壯應須努力否乃知古人捧檄有深意富貴浮雲亦何有送宋尚木之任潮州一麾出守見風流碧海蒼梧復勝遊去路江雲驅溽暑到時嶺樹入清秋金城逺跨湖山盛玉簡深探洞壑幽仙吏自然無俗韻褰帷還得近瀛洲晨起成一詩客有登樓思經年尚薄遊城烏猶晩集林葉已先秋託興鱸魚鱠懐人桂樹舟江潮通谷水空逐故鄉流秋夜絶句颯颯西風入旅愁江天迢遞獨登樓故園此夜堪腸斷露冷山堂桂樹秋戲賦鵞頭金沙呉東昇善為星學寓於雲間雲間人以鵞頭目之呉語謂人不慧者曰鵞頭也葉炳霞路湘舞皆與東昇狎為賦鵞頭詩十二韻索予和因戲應之是物宜馴玩依人飽粃糠品形生自卵辨族羽如霜波渚駕同泛池濠鴨並藏桞嬌黃尚嫩笙暖韻輕揚素練溪堪濯銀肪玉可當清波紅掌映白毳綠蘋香地擅曇村勝湖臨講院長葅珍齊入饌芍藥細為糖陽羨籠偏小於陵客漫嘗片腴悲鄧叟一臠傲劉郎庖割寧知命肥甘實起殃寄聲同侶者戒慎在壺觴答孔厓秋徙倚高樓吹朔風川原秋盡葉初紅天涯歲晏誰相問曲裏陽春爾自工雁陣衝雲寒影斷江聲挾雨夜潮通凭欄忽有歸與嘆客路凄涼霜露中送王喜賡還常熟元禮龍門許暫窺十年生死見交期青箱世業傳今日黃綺衣冠憶往時蕭寺談𤣥松茗熟南窻散帙竹風披征帆一發虞山道浦雁江雲寄所思湖上蘭橈去住頻寒流無際欲傷神經年岐路無知已幾度他鄉别故人白雁分飛帆影疾丹楓摇落客愁新歸舟載得鱸如雪莫厭江城旅食貧七夕飲徐振子園亭作歌示歌起七月七日暑未平清籟不至秋陽明園居謝客深閉戸千樹萬樹皆蟬鳴晩来愛此池上酌林水清隂紛漠漠參差月出影漸髙露濕闌干梧子落主人好客不好酒杯杓不勝長在手容止風流絶可觀談諧雅令誰堪偶繆生狂態最不羣持盃吐氣如烟雲䲭夷滑稽轉不竭一石五斗總未醺大聲疾呼出門去袖懷餅餌遺細君酒闌客散塊無侶淡淡銀河粲牛女還把㫖酒問靈辰吾豈匏𤓰長獨處沈侯席上醉歌沈侯意氣何孤逈儒雅風流復誰並結客常傾六郡豪弃官新買三江艇我客江鄉四序轉與君相愛時相見文酒猶能恣唱酬登臨每自陪遊宴秋来摇落動離魂繾綣綈袍古道存邀騎帳下黃驄馬醉倒花前白玊罇花枝入手酒光濕秦筝促柱氷絲急微呈玊齒聲易哀怒拔青萍髮上立感君意氣為君歌當筵更盡金叵羅黃花已老朱顔酡丹楓欲落江水波歲云暮矣君奈何和訒庵乞鶴歌兼呈貽上玊堂學士謫仙人視草先朝墨尚新長安一夕秋風起忽憶江東紫帯蓴窈窕玊峯天際落此中高卧何寥廓換酒常抛佩下魚歸装但載揚州鶴王郎本具凌霄姿郡齋無事閒賦詩竹亭鶴柴清如水為政風流自一時何以贈我九臯禽何以報之白雪吟二子風神堪掩映千秋寄託獨遥深知君好鶴兼好山山堂謝客長閉關予亦無心市朝者終年抱耒心自閒岩居倘許尋前約白石清泉共往還青浦舟次揚鈴擊汰曉相催百里青溪半日迴江浦秋深蓴菜老汀洲水落蓼花開地通三泖潮争上節近重陽雨易来莫向天南更回首暮雲鄉樹不勝哀白龍潭泛舟摇落蒹葭玉露濃座中賔客半萍踪何来畫舫餘青雀無復澄潭起白龍秋水孤芳搴杜若遥山九㸃削芙蓉可憐紅葉秦谿道歸棹經年悵莫從送邵冕仲歸餘姚營葬東還正值暮冬寒故里松楸掩淚㸔客子風塵驚短褐美人情緒託明玕歌殘魚鋏霜侵舍唱罷驪駒雪滿鞍同作呉吟君最苦越江歸路更漫漫壬寅除夕呉客歸時歲漸分庭梅已自吐氤氲寒燈欲盡經年話好夢難邀隔岫雲入誦新詩憐驥子聞舂清怨譜桐君中宵更撥枯爐坐柏葉香殘試再熏松桂堂全集巻九
