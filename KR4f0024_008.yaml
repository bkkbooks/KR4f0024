body:
  text: 松桂堂全集卷八壬寅吏部侍郎彭孫遹撰元日就貽上飲曉郭萬人煙春江孤客船星河回曙色雲物吐朝妍北闕龍飛日東皇鳳紀年漢廷方上計越客此歸田風景紛如昨流波淨可憐鐘殘隋苑裏花發蜀岡前勝事今何在征途境屢遷故交情似水開宴酒如泉送别留詩句將遺損俸錢夜歸城北路醉咏竹西篇空響潮鳴枕髙寒露滿天回思東閣興清夢正飛懸戲答貽上賦得香奩最有聲偶然託興寫傾城道心近日清如水不落人間薄幸名𨝍溝曉發朝日棹歌鳴還為江上行寒蕪猶碧色小鳥作春聲煙岫層層出風帆面面生不須窮逺目吟眺有餘情瓜步懷貽上風日依清曉空波匹練明相尋瓜步渡已失廣陵城江岸舟初放春潮候已平還思何水部官閣眺新晴渡江天寒江氣深雙槳淩空碧三山指顧間青蒼非一色洲渚既平逺川原亦鬱積中流駕巨浪髙踏黿鼉宅孤峯入懷抱清暉照沙石翏翏風益駛愔愔日將夕言尋郭景純更問神仙迹泊江岸寄貽上廣陵晚潮未上早潮收一艇乘風下潤州恰向江南望江北水雲無際不勝愁揚州懷古惆悵繁華事已非寒波縹眇夕陽微雷塘雨過山花碧瓜步雲開木葉稀自昔參軍多感慨重來水部惜芳菲離宫别館今何處坐見孤蓬日日飛草生城闕鬱崔巍陳迹千年弔落暉南國綺羅悲帝子東都花栁葬靈妃雲山一去秦淮海歌吹空傳杜紫微悵望煙波情不極春潮如雪送將歸過新豐鎮新豐古道幾舟行日落輕帆片片明雜樹初青難辨種亂山空碧不知名江流曲折生春水霞氣依微媚晚晴獨上河梁一長眺川原煙景正凄清丹陽道中寄貽上百折丹陽水扁舟曉渡難平疇初放碧春雨薄生寒錦瑟人將老青雲興欲闌練湖行漸近新緑滿漁竿平川縈百曲寒雨壓層波淺碧千畦潤殷紅一寺過暮雲依樹盡逺水入煙多此地生香草懷人奈逺何晨光生牖隙煙水淡溶溶卧聽春朝雨遙聞曉寺鐘平蕪隨地緑歸思近鄉濃到日梅花發南山好曵笻沙鳥集船頭寒塘清淺流人家煙四合水氣日浮孤暮有停雲思春生去國愁征帆何處落風雨一歸舟丹陽觀十字碑讓國髙蹤不可追蘇臺麋鹿久堪悲榛蕪豐碣今何限千古清風十字碑練塘一葉練塘舟揚帆復順流西風如有意相送過常州吕城雨泊古市平橋跨水津欲尋舊壘已荆榛十年萍迹長如此千載吳蒙解笑人隴麥因風吹浪細林梅冒雨作花新南來景物多惆悵且泛壚頭酒味春舟中夜雪夜雪壓舟重風清落枕長覺來人語靜一犬吠寒塘歷歷聞殘雁遙遙度曉霜江南今夜泊客意似瀟湘橫林舟次此地倪元鎮揮毫舊有聲數家臨水曲幾樹著雲平竹木參差秀林巒淡宕清今朝登眺處身在畫中行梁溪舟次望九龍山梁溪一帶抱孤岑水盡溪回洞壑深三讓城荒空草木九龍山逺悵登臨懸崖急雨石泉落翠竹蒼藤鶴澗隂約略前遊經四載依然春色滿平林弔周孝侯祠旦射猛虎南山頭暮隨雲間二俊遊一朝致命死疆場竹書血食還千秋腐儒局促事鄉里白首章句空一邱人日泊虎邱山下先遣奴子陳德東歸問訊人日晴暉敞太虛石湖煙水放舟初春風不送雙蘭槳錦里空傳尺素書小塢梅寒微雨歇長堤栁暖夕陽疏道衡欲賦經年别雁後花前思有餘山塘山塘風日好雲木互層隂不盡平林秀如藏萬壑深蘋波通小楫花嶼下鳴禽坐久生清思泠泠起梵音泊濰亭婁江此去路重經凄切吳歈不可聽咫尺家園歸未得參橫月落大濰亭舟中望崑山崑山一片石時與白雲侵領此巖阿秀知豫邱壑心天低孤塔影人住數峯隂定有煙霞客相依共結林一岫俯川陸天晴翠欲流不嫌城郭近轉覺石林幽白日樓臺暝清暉島嶼浮春山濃似畫黛色撲行舟道院曉起欲買小舟往沙上看梅以雨阻悵然有作欲向清溪問勝遊春隂初合水邊樓已虛沙口看花約空買江南聽雨舟竹塢雲深天易暝石壇鳥下晝長幽上清玉笛凄涼弄吹落梅花滿院愁春雨江城經日雨無復踏歌聲鄉淚隨花盡春愁似草生煙中齋磬發雲裏午雞鳴便擬遊方外移家傍玉清一望輕陰合蕭條獨倚闌忽聞風雨集轉使别離難草色侵行迹花枝怯晚寒所思愁不見竹露滴空壇松竹生寒吹凄清戛石幢空齋聞夜雨春色滿婁江垂栁拋金線飛花點玉缸他時同剪燭相憶在西窗暝色同雲盡間庭碧草深春泉鳴澗户山鼠下松陰衝雨過殘雁驚寒響暮禽坐看芳樹晚飛雪滿園林和二兄除夕見懷之作淮陰南下片帆收晚泊𨝍溝古渡頭逺道弟兄懸夜夢隔年風雨入春愁空江木落頻回首小院花開定倚樓若問關山千里客天涯涕淚滿征裘南還至婁東得兄仲謀寄懷詩次答客子辭家嵗月遙安仁已覺鬢初凋空憐芳草生凄碧忽有新詩破泬寥海雁回寒殘影盡園梅經雨暗香消婁江西望迢迢水思繞聞琴舊板橋舟經外江鎮一艇沿溪轉清流曲曲迷橋通丁字水籬唱午時雞分隴花田潤成行竹樹齊江村春氣早草色已萋萋新栁春風春雨正冥冥垂栁垂楊色漸青京兆眉勻猶淺淡楚宫腰細最娉婷輕寒尚困三眠態小碧虛籠十里亭他日灞橋腸斷處驪歌凄切不堪聽白鶴江落日依輕舫空明水上窗人家多竹篠仙宇擁燈幢塔影青龍寺濤聲白鶴江九峯橫秀色天際見雙雙結交行贈陳確修結交實難白首如新一朝邂逅便託契知君本是湖海人去年作客華亭縣叩門載酒來相見朔風臘雨雪作花欲使愁人忘歲晏今年著屐九峯頭縞帶重來問舊遊袖中㩦有氷雪卷置我嵯峨百尺樓可憐羈客無顔色感爾交情三歎息世事多揚弱水塵人生莫羡扶搖翼鶯花照眼栁拂巾東風淡蕩吹芳塵與君揮手自此去一問桃源洞口春寄家兄仲謀吾家仲氏老巖阿隱几沉冥近若何燕子簾櫳遲日靜木蘭庭院落花多秋枰晝冷聞黃鳥蠟屐春間長緑蘿為問玄亭常寂寞誰人載酒數經過寄家兄子服客樓擁被集秋聲兄弟天涯急難情落葉一辭吳苑樹離鴻逺度廣川城停雲此日愁南望聽雨何時話北征為報庭前紅芍藥一樽花下待同傾寄幼瑜弟遊絲午幕日初長曽索微吟賦海棠客子正悲芳樹晚名花還發去年香澱湖水緑舟容與秦嶠雲迷路渺茫小謝風流頻入夢應憐春草遍池塘寄漢飛名園永日暢登臨念爾棲遲物外心花榭細翻紅藥影草堂頻換緑蘿隂風前惜艷金鈴小月下徴歌玉􅕌深早晚羣賢修褉事清泉白石定相尋寄徐六琯朗兼訊家姊起居西風八月送行蹤霜雪關河即次濃豈謂生還猶有日空勞死友逺相從夢回小閣重陽雨愁聽寒山半夜鐘别後已看春律轉寒灰不照孰為容客裏思君一倚樓鶯花開日小窗幽牙籖朗潤無塵雜彤管清華有唱酬題畫新篇稱絶調吹笙麗句最生愁却慚謝遏才將盡林下風神憶未休家姊有銀河吹笙及和豫題畫詩最工次韻答蒼水僦得客樓如囷大開門風雨供髙卧茸城春酒萬斛傾壘塊鬱然不可破君家兄弟天下才二俊當年未得過開樽洗酌留我醉春衣多被酒痕涴何須絲竹與管絃粲花往往生咳唾髙堂爽塏清絶塵圖書萬卷竹千箇空階雨急燈燼寒虛幌風懸帽簷墮呼盧辦作袁彥道狂吟直壓陳驚坐玄中往復兩相忘不知誰主誰賓佐夜分客去君亦醉峩峩玉山崩一座詰朝贈我瑶華篇寫遍鶯花嬌阿那人生但得儔侣佳窮達何必悲轗軻援毫酬爾郢人詞更索君家長公和長公謂閬石題曹雅推石鏬校書圖草堂一夜雨緑遍前溪樹幽人獨往來日涉還成趣春山萬疊深春水千頃碧借問隱居人何如輞川宅次蒼水扇頭韻客中二月換春衣一問三江舊釣磯幾日西風潮正滿縠文深處見魚飛寄懷百旃弱冠追隨舊社前中更風雨兩茫然延津劍氣今還合流水琴心爾自憐别後幾看江上月春來又見草如煙亦知不淺文情在長事爰絲二十年吳門得百旃見懷詩次韻答寄髙天木葉下孤舟憔悴還為薊北遊從古銷魂惟惜别可堪送逺及悲秋燕雲淚滿鴻千里板渚花殘水一溝今日吳江烹素鯉尺書端為故人留葑溪訪珠來看園中鶯粟花還就雲客兄飲作歌金閶亭畔送春歸雜花落盡鶯亂飛客子倦遊不得意朝來又換纎絺衣出門偶向東城陌一訪東城灌園客園中開遍鶯粟花五采繽紛非一色此時洗酌向花飲花明酒冽深相映近前折花當酒籌花枝裊裊過人頭風光若此君不醉人生擾擾何所求富貴本浮雲文章亦敝帚我今歸小山栽花還釀酒栽花宜多不宜少荒畦十畝應環繞釀酒須教樽不空酡顔常比花色紅日傾此酒對此花世上真有浮丘公次韻答客羲此地吹塤客髙風孰與同避人逃姓字學佛得神通茂苑春將老清和日漸融坐看庭際樹青桂已成叢愛爾栖禪地全勝安樂窩自能忘歲月不厭數經過白社塵心盡青衫客淚多言尋方外約隨意卜岩阿重過梅花樓今朝風日好初地再相尋轉覺紅樓逈新添緑樹隂定鐘人外發山翠晚來深歸路經林水清暉照客襟重登虎邱山包山之外千萬峯此一片石堪共語巖扉日暮少人行雲木清隂淡如雨杜曲老人隱者流挈我重登最上頭擾擾浮生無住著不知能更幾回遊舟中見燕子作越燕初來社事稀聮翩爭傍小舟飛低空忽墮紅襟片入座徐褰翠羽衣遊絲遲遲白日靜平波一望成千頃水面無風徹底清分明照見差池影下拂清流上掠天依人應更得人憐萬轉千回還未息忽然墜地如無力山城幾日雨兼風鶯花零落飄殘紅細啄香泥過林去飛入誰家簾幕中上曹村相國三十二韻聖主垂裳日元公補衮辰五雲紛氣象萬類荷陶鈞帝用鹽梅寄人瞻桃李新台星環紫極館閣敞平津一作斯文主羣登上席珍荒莊寧有意投筆本無因玉筍皆時棟龍門盡國賓四維咸被澤六詔未稱臣馬援馳蠻徼唐蒙擁使輪廟堂資算略帷幄叶經綸遂有旄牛貢何論越雉馴雍容三府歷調劑八風均伊吕垂前烈蕭曹謝後塵量𢎞羣自納清極豈嫌貧宅少成樓地家無曵帛人入誰知禁樹出不問車茵骨鯁還推重文章孰等倫勳庸由學術忠孝見深淳倚毗匡時切巖阿託興真懸車當獻嵗賜沭有全身絲竹東山趣林泉緑野鄰春風吳嶠滿淥水石湖濱往往攜笻出時時泛艇頻芳樽張月夕雅咏集花晨賓從多英妙芝蘭更鬱峋鯫生甘寂寞先業墜艱辛壯志千秋在沉寃九地湮裴徊轅下足憔悴轍中鱗已分尋黃綺誰為徹紫宸通門慚孔李再世念荀陳禮遇山齊重恩光物自親寒灰如可照願得借陽春贈潘仙客太守夫子間氣英鬱鬱瑚璉器一擢夏官郎再典秋闈試帷帳窮天淵網羅皆雲驥兼此文武才永為廊廟寄驅車向渤海神京三輔地刀劍猶紛紛斯民未知義易俗多苦心報政洵優異是時先皇帝注意循良吏蔀屋騰歌謡御屏留姓字方期歲九遷忽訝言三至蕭然解組歸形神逺無纍父老既留行兒童亦揮淚左遷何足憂榮名在百世伊余執鞭情十年深寤寐今見紫芝人願託青雲士季路信一言劉𢎞重片刺冀回黍谷寒得奮天池翅明誼結中心千秋義無二施有一席上聽歌作立夏前一日也灑遍江河淚萬行那堪春盡尚他鄉鵾絃雁柱多悽惻不待聞歌已斷腸絮飛花盡雨冥冥人在金閶古驛亭莫唱春歸腸斷曲此聲凄切不堪聽山堂風雨正凄凄一曲新詞聽欲迷滿座賓朋靜無語春雲冉冉向人低何處聲傳子夜歌髙雲不散玉嵯峨雪兒解道風流句不及君家問字多問字有一歌僮名頗有面首四月初三日作間居適新夏百卉皆榮腓青陽謝成令朱明麗朝暉松竹含貞萋林巒吐清輝鳴鳥下茂柯向人如相依流覽有妙理新故靡停機我亦無心者隨時御葛衣髙堂列黼帳雜然進齊優簫管吹參差妙舞兼清謳境去態仍在器往聲還留涉想每多妄冥心亦愈流此中有實義本與靜者謀不假思惟得豈從聞見求大羹本無味大音本無聲至樂既忘言極哀徒愴情乃知天下理非由言象呈名者非其至至者無能名所以維摩詰默然義已明越人善泅水吳娃工走馬盤旋風電中出沒波濤下當其呈技時意思何瀟灑與物既相忘我形亦自捨豈惟無我心并無無我者贈顧蒨來吏部草三韻閶闔中天啓鵷鸞禁寺翔紫泥初入捧佳樹已成行畫粉神仙署薰衣侍史香俊同裴叔則清是顧長康當日新更始諸曹舉大綱品題澄水鏡故事罷山郎銓局推通簡時賢少頡頏在公仍夙夜賜沐有輝光江左風流舊龍門雅譽當瞻星文粲粲挹海量汪汪身作儒林冠胸將武庫藏人皆尊哲匠君豈問荒莊北闕存深眷東山久屬望雲霾看立化日月亦何傷下士泥塗賤窮居海嶠傍白鷗成伴侣赤鷃自榆枋忽有三言虎能飛六月霜沉寃埋土壤髙誼薄穹蒼宛轉加垂手殷勤見熱腸片辭喬嶽重萬里潤河長欲使寒灰起還令百草芳羽毛端自惜毫髮竟奚償千載存明信於公義不忘喜客羲過談候入清和嵗月侵草堂快爾更相尋茶煙未斷爐中火竹樹初移午後隂誰向河頭來賣水却從絃上去聽琴坐深鳥語花頻落何處堪徵不住心問家兄仲謀肺疾即用來韻却寄茂苑開君病裏書遙知謝客斷行車湖山極目春遊懶風雨懷人午夢疏舊社酒徒今寂寞故園花事近何如杜陵最有憂時疾髙枕南窗四月初海天千里浩煙波緑水平堤覆軟莎蜃氣春深浮島嶼雁行雲斷隔關河鶯花三月風光暮絲竹中年感慨多惆悵不須徵往事佳辰冉冉客中過柴門深巷晝長關草載逃名鬢漸斑芳草久埋張仲宅幽蘭空佩楚人環殘春伏枕甘蕉下薄暮投林倦鳥還料得疏狂時縱酒竹林清興未闌珊欲慿雙鯉去雲安經嵗離情問訊難偕隱髙堂華髮健織縑小婦錦機寒新篁墜粉含清露紅藥翻風下曲欄兄弟相思不相見故鄉迢遞海雲端寄問家兄子服卧病吳天南望一傷神伏枕髙樓送暮春牘鼻漫憐司馬渴牛衣不厭仲卿貧病中櫻笋輕酬節雨後松梧緑蔭人我亦江湖牢落久楝花吹遍客衣塵初夏遊東禪寺夏日媚新霽山水多清音間雲偶然出步至東禪林寂歷鐘梵響蕭疏水樹隂流泉下石澗戛然如鳴琴草花一一開上有間關禽老僧不相識宛若夙相尋真賞方在茲髙懷匪自今坐對默無語各有物外心勝因了可悟妙義良所欽答客羲迷離撲朔辨雌雄玉麈繩床話苦空不覺春歸今又夏吹來池面盡薰風狂來對客吟詩句老去荷鋤種秫田醉語二豪聊爾爾卿須歸去我還眠易易難難何處分昔惟龎老近惟君看來只是河東豕拈出還空冀北羣大地從來無一字小儒空復費三餘從君乞取傳薪火燒盡從前萬卷書又作四賓主句答客羲金屋銀屏絶代人夢回關塞未分明停針日日腰如削不信牽纒是有情吳山越水遍浮家浪把無涯逐有涯今日山中間獨往鳥鳴蟬噪靜無譁夜來山雨過前溪新緑深深上衲衣語言文字都忘却間讀南華注馬蹄延津寶劍是雙龍一躍還生八面風擊破太虛無一事左㩦玉女右青童松桂堂全集卷八
