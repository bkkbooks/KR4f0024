body:
  text: 松桂堂全集卷三十七吏部侍郎彭孫遹撰徐擅青和無題詩序夫美人香草初傳要眇之音落葉秋風始發清微之響離憂欲寫綺語斯標以至平子同聲秦嘉贈婦子建閨情之什安仁內顧之篇靡不掩抑深情纒綿古意擲芙蓉以憐子餉芍藥而將離司馬東鄰層波相屬修靡南户媚體橫陳下及溫李之儔彌極哀淫之思春蠺蠟炬相如形似之工彩鳯靈犀明逺遙深之致言情之製亦為優矣徐子擅青人稱比玉才勒兼金士秀之藻筆精華獨妍宫體偉長之麗心文質寧愧詩人屬和無題一時絶調湘毫未染已有雲煙鳯紙將舒先聞薌澤貌逺山之隱約翠黛紛流狀新月之纎妍芳塵欲動擬人固帝天之列摛詞亦春雪之班非無紫褎吹簫不少紅綃持拂蕙櫋蘅薄地已異乎庚宗絳樹靑琴曲彌髙乎子夜洵乎雙心一意形影合而不離萬代千齡情塵銷而不滅可以下驅北里上駕西崑屈宋含毫和韓掩藻者也逝者集序禮朋友之喪墓有宿草則不哭説者謂宿草者嵗月一周猶兄弟之服期也蓋古人之於朋友其重也若是自伐木廢朋友缺以至於今莫有能善是者也讀趙子逝者一集庶幾猶見古人之義雖江淹思友之賦沈約感舊之作未或過之如僅以組織為工情文為勝則天下能工之士多矣當必有賞之者錢仲扶文稿序往在壬辰之嵗與錢子幼日仲扶定交于時同研席者二十有餘人幼日視余五年以長而仲扶與余同甲年甫弱冠也余兄事幼日弟畜仲扶以道德相琢磨以文章相砥礪二十年殆猶一日蓋三人之交如昆弟歡也如是仲扶髙才絶學十倍於余當講道論文之會僶仰不逮恆心畏之意謂鼓行以張吾黨之色必仲扶也先者甲午之秋余與曺子飛雍同舉於鄉簸揚在前對仲扶每有愧色自後十餘年來仲扶學益邃而文日益有名焚舟而濟者數矣余與飛雍先後舉南宫而仲扶猶浮湛諸生中豐才而約遇夙知而暮成是誠大可異也仲扶當三北之餘意不自得而余獨深信之以為才如仲扶豈有長貧賤者每當三載賔興棘事垂竣輒為同里諸子言吾之鄉有歌鹿鳴而登天網者非他人必我仲扶也如是者以為常而言往往不驗余終不以言不見售而遂自飲其言仲扶亦因余言益自信也今仲扶何如哉聯登禮闈名滿京國其所著作吐金含玉邈後凌前懸國門而走海內詎不稱一時極盛然以仲扶之才而積纍遲久以至於今遇雖盛而亦稍晚矣仲扶雖晚遇乎自為諸生試髙第聲譽隆起垂二十年天下雖廣操觚之士雖衆容有不知仲扶者是無待於今日即今日之文具在有心目者皆能欣賞而誦法之也又奚待於余言雖然仲扶之文天下之人則既知而信之人無間言矣若夫知之深而信之久且彌篤者此則無論天下疇昔筆硯之伍二十餘人之中要未有過於余者也故於其稿之成為敘述其大致如此以見文章聲價有在且以見吾兩人生平也陸未菴先生詩集序詠歌之道與著述並垂不朽古今作者或憑弔以興懷或贈答以相樂靡不往復纒綿一唱三嘆然其境趣各殊風流逈别妍媸之奏觸境而生聲凄緩之音緣情而發響是猶吹萬於山林殆有不可得而強者也曩嵗與未菴先生同隨計京師即其容如挹千頃之陂聆其言如入芝蘭之室已心儀其為有道君子今春復得盡讀其詩髙雅朴茂足以追美風騷凌轢中晚蓋先生常官宣府宣府為秦時上谷地左顧居庸之險右臨雲中之固赤城之塞故壘風埃金蓮之川平波霞綺軺車所至慷慨留連往往含吐英華發抒壯采故其所為詩雄渾恢竒卓然足以垂世燕公江山之助庶幾似之昔司馬子長謂虞卿非窮愁不能著書昌黎之論子厚亦謂非竄逐湘南必不能自力於文以必傳於後今先生以董朝之才當右文之世長公褰帷於嶺外次公視草於禁庭一門之內盡是琳琅賔從之間無非珠玉以境遇之盛如彼而詩詞之工如此將古人之言有不盡驗於今者耶不然則天才超絶固非操觚授簡之家所得而倣佛其萬一也余既獲交於長君孝山而先生之壻沈子融谷與余同學少長相狎知先生為深是烏可無一言以為之序雖然余固不可以無言言亦何足為先生重譬之運斤於般郢之門執轡於造良之側斯亦顔之孔厚矣西堂雜組三集序嘗讀史至漢建元元光之際始興起文教招選茂異詳延特起之士待以不次之位唐至開元中始置麗正書院聚文學之士發揮典籍於時漢唐之興近者六七十載逺者幾及百年雖賁然文明之飾日不暇給焉夫以武帝之廣延豪俊號稱右文當時儒雅文章之臣吾邱以格五進枚臯以俳優畜董生以病免長卿以園令終子長官乎卜祝之間耳唐二張公位遇既隆文章尤盛而文貞未極諷諭之才曲江未窮著述之體千古之下不免遺憾然則才之難兼而遭逢之不易易蓋已久也當今天下治平烽火寢息天子嚮意文學登進儒臣與之講論五經六藝之書茂明先聖之緒數年之間治蒸蒸日進於古士幸生其時皆濡毫舐墨思以文章自顯而吳門尤悔菴先生者褎然出其間先生著作滿家向以文章名海內所撰西堂雜組馳驟於藝林洋溢於人口已非一日其初集少時之作世祖皇帝讀而善之者也二集罷官間居之所為作也比年以來身隱而文采愈彰年老而藻思愈壯好事者因搜而輯之為西堂雜組三集嗚呼以先生之才兼著述諷諭之長又受知明主列官禁近排金鋪而直玉戺讀先生之文考先生之遇撫今追昔其與諸賢相去何如也方且絢思道德掞藻天庭巨麗之思雲流泉湧山龍黼黻之觀粲然備矣雜組云乎哉趙子䇿稿序天子御極之七載允禮臣議復八股之制海內懷鉛握槧之士請趙子之文以為矜式者百舍重趼而未有止也閲兩月梓既成余讀其文而重有慨焉曰嗟乎窮達之數豈不以文章為憑哉文者心聲也其昌明博大和平肆好者聲之正者也其雄放離竒汪洋自恣者聲之變者也得聲之正者為大吕黃鐘為金宣玉節若是者宜明堂宜清廟得聲之變者為山林畏佳為臯壤搖落若是者宜藪澤宜江湖聲異也而人之遇合即因之豈非根於心而發於言者固有不期然而然者耶往豫學為縱橫排宕之文雲譎波興詭蕩而無紀當其時竊沾沾自喜以為足以成一家之言而十年以來放棄林澤行吟憔悴詎非噍殺激楚之聲有先為之兆歟今趙子之文純而和閎而肆有大醇而無小疵上之瑞世華國豐年之球琳下之救靡起衰儉嵗之粱稷其為盛世之音也審矣為吉人之言也亮矣于以鼓吹休明鋪張鴻駿固不待視玉堂之日而始信也抑又有説焉趙子之舉于鄉也以帖括其舉于禮部也以對策對策一變先巳不脛而馳四方矣今之問世者皆其賔興之先資雨檠雪案之所得也夫古今文章之事異曲競工兼之者鮮兵事積貯之謀班馬所不能為典引封禪之篇朝賈所不能作以趙子經濟之優長如彼而經術之湛深又如此是古人之所難者無非趙子之所擅也將世之讀其文者即以覘其異時之功業又豈獨髙文典册足以潤色太平而巳哉汪柯仙五十夀序古之祝夀考者始于祝蝦之詞燕饗之樂儷之以山阜岡陵申之以受福錫祚雖期以千萬年不為侈大率出于臣子之歸美其君上不下逮也南山蓼蕭之詩上之所以期其下而其詩曰遐不黃耉萬夀無疆與天保既醉諸篇初無異指蓋古者君臣賔友之間所以贈答而頌禱者皆以夀為首稱矣箕疇之五福其一曰夀先儒之説以為五福者自天子以至于庶人皆可使之慕而嚮夀為人之所尤好故以先四福焉則知年之貴于天下也尚矣自古以迄今自貴以逮賤莫不有同然者也世衰俗易禮樂之意寖微今人遂以生辰為夀浹十旬必祝其禮似遠乎古然其稱觴燕喜升歌介祉則猶有祝嘏燕饗之遺意存焉未可盡廢也新安汪子柯仙生五十矣以清和之榖旦為覽揆之辰其宗黨親姻咸欲徴一言以為侑爵之詞而謬授牘于余余惟頌禱之詞徴其所可信不徴其所不可信噓吸吐納餐英咀華侶洪崖而揖浮邱此説之不可信者也居隆平之世聚順蹈和康寧而好德敦善行而不怠此理之可信者也則試以夙昔所習聞篤而可信者以為汪子祝可乎昔北海徐偉長之言夀也有三焉有王澤之夀有聲聞之夀有行仁之夀當今天子寬仁庶政釐舉薄海之內投戈寢羽風雨以時燠暘咸若人生其間者熙熙而逰燕燕而息有和親康樂之風而無疵癘夭札之氣柯仙又生山水清淑之鄉承世業之餘蔭履豐席豫乘堅而䇿肥其才力可以致通顯躋華膴而沖和恬粹上之無圭組之纍以梏其形下之無困衡之事以攖其慮可以彌性優遊坐臻大耋此所謂王澤之夀也素封之君類皆廢著以鬻財會計纎嗇交不越境內名不出里閭柯仙有士君子之行又性好交遊所至必與其賢豪長者相結户外之屨恆滿贈縞獻紵殆無虛日一時名卿賢大夫聞柯仙名者靡不倒屣候門納交恐後負元龍湖海之才而屏君卿任俠之習無卑行焉無汚名焉斯不亦聲聞之夀乎新安之汪素稱甲族朱輪華組照耀宇內而柯仙謙約自牧不以門地自驕善事二人篤於友愛與人忠執事敬內外宗族待以舉火者恆數千人咸能分衣推食終始無吝即有一介之士緩急造門雖非其平日雅遊亦必傾筐倒庋以任恤其有無往往折劵不責報如是者數十年無德色無倦容仁者必夀斯又其灼然可據者也持是道也以往雖籛老之齡喬松之夀不加于此矣又何必博徴逺引晞朝陽而潤靈瀣然後可以享大年邀遐福哉或曰子之言則既然矣五十而夀禮與曰記不云乎五十養于鄉六十養于國七十養于學五十異粻六十宿肉七十二膳八十常珍夫古人引年之典惇史乞言緝御授几祝饐在前祝鯁在後如是其隆也而必自五十始則今兹之祝諄哉其有得于禮也自是而十年而二十年而三四十年年日益進德日益劭神明日益茂將有頌之不勝頌者子且執管以待之矣衍波集序昔楊用修先生有云詩聖如子美而集內填詞無聞秦少遊辛稼軒詞極工矣而詩殊不強人意疑填詞一道便為獨藝其説是矣以觀于阮亭則容有未然者阮亭天才超絶下筆驚人詩歌膾炙天下為當世宗匠時于鉢吟燭唱之餘發為長短調靡不含英咀華引商刻羽豈非同工兼美度越今古者耶然世但知阮亭詩詞能同工兼美如此而不知單行阮亭之詞又未嘗不吐納諸家具有衆美也試讀其衍波一集體備唐宋珍逾琳琅美非一族目不給賞如春去秋來二闋以及射生歸晚雪暗繡盤雕屈子離騷史公貨殖等語非稼軒之託興乎揚子江上之風髙雁斷蜀岡眺望之亂栁棲鴉非坡公之弔古乎詠鏡之一泓春水碧如煙贈雁之水碧沙明參橫月落逺向瀟江去非梅溪白石之賦物乎楚簟涼生孤睡何曾著借錦水桃花箋色合鮫淚和入隃麋小字重封非清真淮海之言情乎約而言之其工緻而綺靡者花間之致語也其婉孌而流動者草堂之麗字也洵乎排秦軼黃凌周駕栁盡態窮姿色飛魂蕩矣僕嘗戲語阮亭古人學槊學畫恥居第二君今詩文歌詞一切悉踞峯頂使我輩從何生活此雖雅言更為實録恐世之流覽是集者都未免黯然氣盡也新安孫氏族譜序豫友孫子無言髙明之士也一日出其族譜屬豫序將修輯而增訂焉蓋自唐咸通間其始祖金吾公徙居新安至于今殆千嵗矣由金吾至無言為世凡二十有七而其世系之先後生卒之年月墳墓之處所皆歷歷可考云余嘗怪今之稱望族者不計道里不問源流千世百世之上有人焉則推而逺之曰某某某之始祖幾世祖也千里百里之外有人焉則引而近之曰某某某之叔伯兄弟行也求其歷千嵗而遙其子孫猶能道其祖宗之行事與夫廬墓之所在支姓之所分如孫氏者百不得一二焉余生雖晚猶及見前輩有生同里仕同籍而單寒華膴迥不相援者夫何二三十年之中而風俗澆薄遂至于此嘻可嘆也今無言守其清白之門風不援聲勢以為髙汲汲乎以睦族為念既又慮其族大而難周先自本支彥達公以下修訂成編以次及于通族其世系生卒墳墓必書必悉視昔為詳若體負隱德躬操獨行者則人各為小傳附于譜後嗚呼其用心亦良厚矣詩曰維桑與梓必恭敬止又曰敦彼行葦牛羊勿踐履夫桑梓猶致其恭行葦勿忍其踐而况乎一本之親同體之戚乎以此知仁人君子之居心如是其深厚也世之覽孫氏族譜者仁孝之思亦可以油然而生矣吳維申䇿稿序士之所以致用者存乎言所以立言者存乎志志夸者其言必誕斐然若雕繢之工而靡切于體要之實爛然若春華之鮮而罔禆于當世之務斯二者君子病之若夫忠誠之念溢于中利害之形熟于外則雖處疏賤之列際太平無事之時而其發之為言恆慨切著明而無所絺飾于漢之孝文治稱極盛賈誼以洛陽少年上書陳事至欲為痛哭流涕若不可以須臾少安者彼豈好為危言激論以聳人主之聽哉忠君愛國之心內結于中而誠有所不可解也進士吳甫及少時即以天下為己任平居讀書無日不討當世之務而講求之故其所為擬奏二十篇大而非夸文而非誕切切乎如藥石之必可以去疾鑿鑿乎如菽粟之必可以療飢竊觀當今天下治安無事殆二十餘年矣聖明在上百度具舉所未就理者不過一二損益之端因革之故耳草茅新進之臣宜若可以無事于言者而甫及方且慷慨論列區區之誠必欲獻之闕廷而後巳假使居得言之地值當言之時有不引裾折檻犯顔無諱者乎則其志誠有大過乎人者而修辭之善固其餘事也昔蘇洵眉山一布衣所著權書衡論幾䇿諸篇歐陽修嘗奏之仁宗下詔褒徴令所在為之勸駕今朝廷受言納誨百倍于至和嘉祐之時公卿大臣賢如歐陽者比肩而立甫及又巳釋褐補吏非明允之比行且有以此書進次第見之施行犁然有合于當世之故斷乎其可知也不然有其言而不得達達矣而不克見諸行天下將必有任其責者于甫及又奚病哉重修海鹽學宫序吏兹土者將以為政也為政而不得其要則雖戴星出入日不遑食而鮮克以奏理教化者為政之要也教立化行則人咸知修倫而崇讓敦詩而説禮其君子文而有檢矜名節而砥亷隅其小人願而有禮爭慕義而重犯法古之君子所以致美于簡册者蓋誠從事于此而不事乎錐刀繭絲之紛紛也鹽之俗于三吳號為最朴比年以來淳風漸散凌長上扞文網者嵗且屢告此無他教不立于上化不行于下故也欲興起教化莫若崇建學校自國家定鼎二十餘年之間宰吾邑者軍興旁午退食不暇槩有志焉而率皆未逮璜璧之宫日就圮廢車服禮器疏陳于榛穢之區博士生徒講肄于風雨之室弦誦輟而弗聞像主頽而莫整吁是可慨也我明府湯公之來以經術飾吏治親人而好士弛法而心行下車期月即與學諭張公謀所以庀材程功焉者撰辰修繕斥俸辦具僚友輸將以赴公庶民子來而趨義斯役也克舉公其知為政之要者歟余不敏竊念自祖父以來由鄉校以賔興于國者于今蓋三世矣其沐浴于學校之澤者不可謂不深且厚矣故不辭弇鄙而樂為之序吳母胡孺人節夀序忠孝節義之于人如山嶽之趨髙如江河之就下如寒暑風雨之序如布帛菽粟之不可離此事之至恆而分之所當然者也顧執簡之士往往表為獨行以傳之無窮者倘亦有世道人心之慮乎新安吳太孺人余友爾世母也年十七事天明先生二十三而寡今年六十有三矣當天明先生捐館舍爾世猶在娠兩尊人在堂內無期功強近之親外無應門五尺之僮孺人能事舅姑以孝育遺孤以慈持門户以儉勤睦里俗以恩恤嗚呼亦賢矣哉士君子有心世道讀書見千百世之上有慷慨慕義之事輒咨嗟頌述想慕其為人當吾世而庶幾一遇焉雖埋芳窮僻之鄉匿采蓬茅之下亦汲汲焉表章之不少置今豫與爾世稱昆弟歡握手結言登堂拜母其于孺人之懿行不啻習聞之而習覩之矣而不一為咏歌以介其北堂夀母之觴豈心之所安哉余竊怪世之夀孺人者每泛引守節存孤之概以粉飾其文而其四十餘年之苦心多缺略而未及詳夫以吳氏數百年詩書禮樂之澤寄之一婦人女子之身既奪其所天又投之艱大有如徇同穴之義則不能存藐孤矣而若斷若絶之際又不知幾經拊畜以至于今甚且流離兵燹之餘拮據凋殘之業室中之甘旨户外之經營族閭鄉黨之任恤靡不是責而是備則此四十餘年之中有一日非生民之至艱荼苦之極哀者乎古之所稱列女或以從一為心或以立孤為志一節所至咸足以垂美來兹從未有難苦備嘗盡禮合節如孺人者則孺人之宜稱觴而燕喜無疑也余八齡失恃十五又喪父鮮民之痛內戚于心觀孺人之所以教爾世與爾世之所以夀其親者既為爾世慶又不禁黯然自悲巳盤城遊草序盤城遊草者先姊孌如之所為作也往日海宇承平門祚方盛先夫人之教諸姊女紅纂繡之餘并及文翰姊年未笄即能拈韻逮歸龍孫理內教治生産操作之暇時手一編不少釋賦咏之事有間矣乙丙之嵗偕龍孫之官遼西衙齋無事復修弄墨燃脂之業南還後出以示余余覽而心異之以為我姊之行乘輜車擁騶從鳴琴在堂鼓瑟在室其觸境發聲宜多愈樂抑何音之衰以怨也既反覆尋之乃始得其意之所存當龍孫之就官也太夫人春秋髙不能涉關塞就祿養姊雖逺在萬里採蘭之念心未嘗一日忘今吾姊往矣而詩卷具存一篇之中必三致焉夫賦詩以觀志也姊之志可以感風人而被彤管豈僅僅一二秀句流徽巾幗哉宜龍孫讀之而悲悲而不忍沒其志也然豫竊有以為龍孫慰者子家自侍御公以風流被服兄弟姑姊妹若而人才質皆不後于人而賦命率多蹇薄玉碎于前芝焚于後傷心之事比比也姊生有倡隨之樂子女之歡履境多亨委順非夭視諸兄弟姊妹之中所得為己厚矣龍孫雖重傷其志乎空床長簟之悲固可以不作也夀槐眉毛明府詩序頓網八紘綰符百里氣吞八九盤紆雲夢之鄉水擊三千排宕滄溟之色儷日則三冬回暖侔風則百卉紛披雖河陽縣裏競載潘令之花蠡邱館中勿剪李公之樹以今况之曽何遼落葑菲下材泥塗賤士片言之重埒梓漆于勞薪一顧之榮加駑駘于騄耳昔王仲寶之朂丹霄張安昌之開絳帳未易方兹嘉遇邁此徽音者也序當陽月時際揆辰添日線以初長懸月弧而將滿迎階厯草猶含一葉之滋吟閣官梅先破小春之萼賡樂只之咏不羡南山稱酌彼之觥何慚北海樂成三闋仙人鳴碧玉之璈頌獻九如上客躡文珠之履矧邀榮于國士敢後祝于封人敬泐微誠用宣短韻凡一百二十言其辭如左悔齋制藝序今之以古文詩歌知名于世者衆矣求其無愧於古人而行之逺者亦往往不乏其人也獨至於制藝則勦説雷同可傳之文蓋寡豈束於有司之令有才而不克自見歟將成敗得失之故擾其中而使然歟將有其人有其文而吾未之知歟汪子舟次今之能為古文詩歌者也其所著悔齋制藝若干首藏之箱篋久而未出近始得而卒讀之理醇而旨逺粹然一家之言然後知汪子邃於經學才之無所不宜如此也嗚呼余固知汪子者而得其一幾失其一焉則今兹讀其文而亟賞之庸遂謂才之巳盡於是乎夫才之為用無窮而耳目之及有限則余之知汪子也亦僅矣汪舟次經義序聖人之道莫備於經士苟志於道抱遺經而誦説肄習之將以得於心措於身豈瑣瑣焉文之為哉然而生千載之下不得聖人親炙而私淑之又不克究其遺緒討論其指歸則聖人之意終無以大白於天下後世蓋文之不可巳也如是今之談經者勦説以為髙夸詞以立異外強中枵偭於矩矱若是者須以射䇿決科可也非以載道也汪子舟次以文學舉首入官翰林文名蔚然溢於輦下同時館閣之士圜視措聽咸以為才比出其經義百篇相示理邃而純詞閎而肆然後知汪子湛深於經學久以志乎道者也楊子不云乎書不經非書也言不經非言也率是以往因聖人之言以求聖人之心於以幾於道也何有毋徒使人謂子才人也則愈矣何􅉼齋吟懷集序屯部何􅉼齋先生善為詩顧不屑以詩自名每含毫得句輒藏弆篋不輕出以示人余與之定交垂二十年卒未嘗知其為詩人也兩年來同官於京師朝夕過從始得其篋中所藏吟懷集一卷發而誦之斐然風人之作是何旨深而言簡也夫唐之詩人自錢起吉中孚崔洞著名字於大厯間號為才子而今考藝文志所録僅各有詩一卷詩之傳不傳其不繫乎多與少也如是於先生是集奚憾乎若其體性鎔裁則施愚山先生常讀而亟稱之曰情深法老油然餘響五言恬淡尤擅長城嗚呼是亦知言矣哉湖廣通志序代郡國之有圖志蓋史官之流也古者九邱之書與墳典並重故禹别九州隨山濬川任土以作貢又使益臚山海之所有疏而記之以作經而周官職方氏掌天下之圖辨其人民財用九榖六畜之數周知其利害土訓道之以詔地事辨地物原其生以詔地求小史外史掌邦國四方之志誦訓道之以詔觀事是其義也蓋以天下之大土地風氣異宜苟不得其寒暖燥濕之制剛柔輕重遲速之齊雖使聖人為治無能潔聲教而使之一而六官之典亦終至於扞格而不可用甚哉志之不可以巳也我國家總攬六合彌天紘而四維之濮鉛祝栗之區罔不率俾邇者詔下郡國徴其圖志以考文軌之同而楚之守臣綴輯見聞彚為湖廣通志八十卷以上夫楚地跨梁洋躡宛葉襟佩東吳枕輢百粵肘加庸蜀而牙互於且蘭句町之鄉幅員數千里南方諸州無與比大自五帝三王之世入𨽻疆索風會勿殊焉熊湘軒轅氏之所登也朱陵紫蓋之墟堯舜之所以輯玉而勤后也蒼梧之野禹下車泣罪處也荆湯之王業所自始也江漢之間文武之化所首被焉者也楚之為楚濡染於聖人之德其既久且逺也如是今又有聖天子在上煦嫗覆育仁漸而義摩之則其山水之雄深風俗之醇茂人文物産效靈而貢珍蔚然甲於天下固其所也説者顧謂周太史之所掌十五國之風細不遺於曹檜而楚獨無風春秋衣裳之會大不列於諸侯以是為楚病疑不得與齊魯埒豈篤論哉至於楚之有志則自古昔以來代有撰述如盛𢎞之之於荆州吳從政之於襄沔湘中山水之記武昌風俗之編皆流聲藝文可資典實然未有合全楚為一者而是書博採廣搜折衷至當於以參掌故而補史氏之缺遺洵非特刑法之一家地理之一類也臣以楚人備官畿近獲睹是書之成因綴詞簡末以奉揚大同之庶幾莊生所謂邱里之言云爾陸舒成稿序自鄉以升於禮部自禮部以升於天子之庭三閲嵗得百五十人與是選者殆所稱能言之士也然是百五十人者操舍不同趣仕於朝內外簡劇所業滋殊求夫先資之言一一相讐者十不得二三焉是何名實舛謬言行之不相符歟夫言之淺深逺近詳約不必同要之於道而巳故一日言之終身復之而不厭否則外澤而中枵猶虛車然莫可行也陸子舒成弱冠登上第褎然以文章名海內其所撰述閎而深醇而肆縱橫變化而不淈於聖賢之法天下能言之士衆矣審若是得不謂之道矣乎今舒成方為吏有仁民愛物之責推是道也以往用之一邑一邑猶是也用之天下天下猶是也獻身成信之實有大異乎朋儕萬萬者以其言知之也嗚呼修辭六藝之末耳而藝之成也因其末可以得其本其措而及於物也若執左契然然則世之不能言者務先慎其所之而其號為能言者亦勉思所以自踐巳則不之踐而以不知言之名諉諸良有司也將可乎哉楊自西四十夀序世之以蕃祉夀考相祝頌者殆必有説焉將以美種德之報永長國之謀非第為一人之身之計而巳也夫匹夫之子側身勵行自旦至暮孳孳為善任恤不能出里閈施豫不能潤千里若是而夀則深山之木石大澤之龍蛇皆久於世其於二者何如也名公巨卿立乎廟堂之上身出而為卿景言發而為霖雨天下之人銘仁而誦義山陬海澨謳吟以頌禱者億萬而未有紀極咸願其有松喬之年昌大之澤豈非其致之者有道而頌之者不為無據乎自西楊公以名進士為循吏擢諫垣抗直敢言為當世第一年甫四十榮躋卿二吾所謂種德而長國者楊公殆其人歟方公之令於粵也清賦稅之科恤丁役之弊芟除煩苛務敦寬大政未期月報最為治行首及入為諫臣凡粵之蟊賊不便於民者悉條上封事次第蠲除嶺徼之間沭浴爼豆十餘年如一日則是公之大有造於粵也吾浙風俗澆薄胥吏掾屬往往憑陵為姦舞文扞網恣行不法一二不逞之民稍有睚眥羅織姓名投匭上言譸張為幻莫可窮詰浙西漕白二糧甲於江南號稱最重邇年以來部議改折折價視民間之值恆相倍差而一切饋運耗贈之費例不入于公帑者併徴入之民不勝其困公之在諫垣也上書痛言其害刁偽之風由是少戢困箕斂者獲蘇息焉則是公之惠我維桑也當世祖章皇帝留意巨鹿之時屬玉長楊時親較閲公上書極言其不可同列皆為之心悸而章皇帝心知其忠寵遇因此加渥今上御極之四年言事者欲遣大臣巡方廷臣咸知其擾莫敢論止公獨斥言其不便事乃報罷他如獄赦之駁奏八議之平反彈劾之不避權貴苞苴之不入私室皆公之直聲亮節表在一時著於天下者也吾觀古來名公碩相功德深而仁和溥者天必錫之以大齡覃之以純嘏俾其榮懷邦國保又黎民蓋非以夀私之也今公之忠直若此而其德業又如彼與古史策所稱不適有符合者乎由是而艾而耆而老而卿二而台司而揆輔將以其見之於言者益施之於行於以經邦𢎞化長我王國固可操券而待無疑也蒸民之詩曰剛亦不吐柔亦不茹不侮矜寡不畏強禦又曰衮職有闕惟仲山甫補之公其備樊侯之德者歟嵩髙之詩曰吉甫作頌其詩孔碩其風肆好以贈申伯余其慕吉甫之志者歟誠得斯意也以為公祝則雖侈陳蕃祉夀考之辭不為無據矣是為序崑山徐太夫人夀詩序皇帝御極之十四載崑山徐太夫人年登周甲吳中士大夫交歡於健菴彥和立齋三先生者咸思所以夀太夫人因遍徴海內能文之士著為詩歌以介萬年之觴遹聞之古之所以為夀者或以令名或以好德或以繁祉往往形諸篇章垂之來祀今也不然繁稱曲引誕而無實為諛而巳謂之古志也可乎遹於太夫人誼猶子也因得隨諸士大夫之後旅升於堂奉觴上食則進而祝曰願太夫人聰明聖智康強而悅懌益自好行其德振九族潤千里俾逺邇長沐仁夀之祉以靡有終窮又祝曰願三先生益昌大其所學厝其藴積光贊訏謨惠濟宇內以答天子寵渥至意以無負太夫人之慈訓又祝曰願公姓公族被太夫人之風教溫仁篤厚益光大於而家以克永世於是太夫人欣然受觴未可知也若夫詡科名之盛事陳纓紱之顯榮引西池笙鶴之文述南山松柏之頌則太夫人方避盈思損推挹而不居其不欲聞此也審矣既祝而退乃各獻其賦詩若干首夫賤以先貴重以後輕古之志也某賤且不敏故敬述其事以為諸咏歌者先焉周大將軍年譜序來安周公以甲第起家宦於江廣咸有當官之譽當甲寅乙卯間逆臣干命嶺北諸州亂者四起大者殘郡縣小者掠鄉聚公時將兵于虔倡率三軍激厲忠義轉鬬疾力次第削平幕府列上其狀首公之多遂佩牙璋綰金印鎮撫秦晉實為今天子干城禦侮之佐余籍全椒與來安為鄰邑既已習公之名字及在史館時時從士大夫推論武功益以公為賢惜乎其未獲從公遊豐功偉績僅得諸梗概而莫之能詳也今年八月始獲交公之嗣君次叔先生於京師因得讀公之年譜蓋公年方五十有八凡門閥資履戰功兵法罔不具載於譜中至詳且核異日者天子修凌煙故事嘉公之功將法其形貌旌其勳伐以傳示無極是譜也可以綜掌故備實録余不敏尚能執管而詮次之袁太夫人八十夀序從來史册所載婦人女子貞專婉嫕之行多矣如張禮修桓少君李穆薑之倫皆能被服禮義卓然自異於流俗故當時稱之後世述之身不越梱閾之中而令名洋溢至於今不衰當今之世內德鮮聞求其無愧於古人者千百之中罕得一二焉蓋女師之教不明於天下久矣每一流覽簡册輒憮然嘆之比年以來官亰師竊見士大夫之顯其親者必博徴詩歌以頌述所生之美彤管之書嵗無虛日則又悄然以思以為一操一藝之微古人必採録之以勸於後猶且代不數人人不具美而今也若是是何內德之茂也夫閨門之行大之可以爭光於竹帛其實不過酒漿絲枲之常質言之而可信無取乎辭之費也使必矜情飾貌繁引曲陳千聲雷同如出一口無乃實不足而襲之以文乎殆亦夸而不可信矣東明袁太夫人同年霽軒之母也霽軒才名蓋海內而德器淵邃粹然本於儒者一時同館之士與霽軒逰者心折而意消咸知其疇昔之日紹衣於河汭先生之教至深且厚而太夫人之秉禮蹈道不愆於素所以玉霽軒於成則鮮有知之而能言之者某與霽軒交若昆弟歡於太夫人之行事不啻習聞之而習覩之蓋其專心正色執勤持久之道實足以型當世而風來葉非直無愧於古人已也當太夫人以名家子明習詩禮之訓嬪於河汭先生逮事舅姑榛栗必虔盥潄有恆節先後間無幾微憾女順彰矣河汭先生故積學以太夫人內政理得益肆力於古蔚為儒宗其宰於夏於洪洞於夀光皆有政績可紀太夫人實贊成之有羔羊退食之節而無北門大夫之憂隂德成矣洎河汭先生即世太夫人以一身綜內外則視張太孺人湯藥唯謹分宅以處姒氏終其身又能禦患捍災恩勤鬻閔以教霽軒兄弟迄於有成壼職修而坤儀備矣且女德之所重者三爾婦道也妻道也母道也古今所傳列女類皆一行之至焉有能兼於兹者乎則以禮修少君穆薑視太夫人彼且有慙色矣嗚呼是誠可頌而歌也今嘉平之月值太夫人設帨之辰霽軒方備官禁近為天子文學侍從之臣懿昆歐少先生扶持里門曲承色笑出者有祿養之榮處者有白華之潔人倫之盛於斯為極而霽軒之志則兢兢焉以終身弗辱為孝不務為華言相勝齪齪如世俗之所為是雖太夫人之徽音嘉則有無待於言而自見者要其謙抑沖和亦太夫人之志也昔宣文君年八十視聽無闕今太夫人亦八十聰明康健殆又過之某幸居猶子之末不獲就里第受業備生員百二十人之列竊有深憾是用以質言為侑爵之詞夫亦言其可信者而已廣陵劉子闕選戎昱詩序詩以唐人為宗固也然初盛人詩如化人之塔七寶莊嚴乃至無階級可尋至大厯以後則漸有神韻可以領會溪徑可以尋求清芬逸藻往往在文字之外超然獨秀令人一唱三嘆流連而不能自已近人未有晚唐片字輒妄欲貶格錢劉規隨李杜此無異於見西子之容者不能學其天然之美而僅僅比擬於折腰齲齒之間見者有不以為鬼物幾希矣戎昱詩在中唐亦矯矯拔俗好去春風之句見知於上官漢家青史之什嘆賞於明主他如桂州臘夜雲夢秋望題招提寺韋氏莊諸篇靡不深情逺致清綺芊眠方駕隨州平睨補闕廣陵劉子博雅之士也將彚刻中唐諸家因先以此集行世豫謂今人尚志於聲韻之學不必窮深極髙即以此集手披口哦朝夕肆其力而不厭於以升堂入室吾知其必有合也若必以為中唐也者而卑之不道則事殊于刻鵠情等于效顰非豫之所能知也已髙立夫悼亡詩序嘗讀潘令悼亡詩長簟空牀枯荄落葉之句未嘗不惻然傷之至其終篇寄愧於東門豁哀於蒙叟又未嘗不歎其以禮止情節而不過庶幾其得乎風雅之遺意也荀奉倩東京名士至取冷中庭以身為殉卒為千古盛德之纍自荀以下又奚譏焉髙子立夫天才濬發思若涌泉凡所結撰多言情之作所賦後招魂及悼亡諸詩聲繁調促凄然似秋余嘗一再誦之輒不覺其感人之至此極也然由其詞以尋其大旨之所存則哀而不至於傷怨而不及於亂纒綿曲折而卒要於正庶幾其近乎古者且得由是以想見其平時有靜好之樂而無燕僻之私有和敬之美而無淫放之失抑又可知也騷之源始於屈原後人祖之凡聲之哀厲而噍殺者咸系之乎楚然往往譎詭慌惚求其有合乎古者吾未之多見也立夫諸作雖楚聲乎君子蓋謂其有古志矣曠庵詞序歷觀古今諸詞其以景語勝者必芊綿而溫麗者也其以情語勝者必淫艷而佻巧者也情景合則婉約而不失之淫情景離則儇淺而或流於蕩如溫韋二李少遊美成諸家率皆以穠至之景寫哀怨之情稱美一時流聲千載黃九栁七一涉儇薄猶未免於淳朴變澆風之譏他尚何論哉曠庵與僕交十年矣晦明風雨蹤迹雖疏而窮愁略似僕自難後鬱伊無聊時浮沈於八十四調之中淫思綺語不免為秀禪師所訶遣曠庵年來濩落不偶亦復有香草美人之感其所作長短調及和潄玉詞若有所寄託而云然者僕覽而心善之以為妍雅綿麗頗與晚唐北宋諸家風致相似夢窗後村白石以下雕繢過之終無以尚其天然之美也或謂語涉言情不嫌刻畫審爾則色飛魂艷之句將不得擅美於詞場耶不知填詞之道以雅正為宗不以冶淫為誨譬猶聲之有雅正色之有尹邢雅俗頓殊天人自别政非徒於閨襜巾幗之餘一味儇俏無賴遂竊竊光草闌苓之目也昔揚子雲嘗有言矣曰詩人之賦麗以則僕於曠庵之詞亦云紅豆詞序詩之有和韻非古也古者歌必有和所以繼聲也籜兮之詩倡豫和汝郢中之曲和者數千人是也至取一韻相仍往復十數長慶松陵實為之濫觴焉然屬和愈工而詩格愈降矣於詞亦然北宋以前作者林立而未有次韻蘇黃兩公間一為之猶不免小作狡獪稼軒後村乃始逞竒鬬博短篇長闋靡所不有雖其才氣使然非詞之正也趙子澄江早負才名詩歌下筆妙天下新著紅豆詞一卷率取古人佳咏依韻和之此猶絶塵之騎不走長楸大堤而馳驟於巉嵓深岨意若欲以俊自見者然其逸思風生妙意天屬片言隻字與古人爭長於毫髮之間固其勝場也假使辛劉復起與澄江擘箋分賦刻燭聫題正未知頷下驪珠定屬誰手又使澄江巧心創獲不為和韻所拘吐珠玉於行間標風雲於字裏不知驚心動魄更當若何也僕年來幽憂道學柔情頓盡於金荃蘭畹諸製味如嚼蠟世之頑鈍未有如僕者也縱使取紅豆一編歡喜讃嘆等諸舞草按歌遊魚聽樂耳烏足增長紅牙聲價哉送王貽上赴官廣陵序夫三吳巨麗雲稠崑軸之前六代繁華綺合江都之內梅舒東閣如待何郎夢入青樓疑逢小杜莫不人稱仙吏地美神臯而運會既殊風流頓改平山宛在曾無攬勝之晨吳榜紛來不盡觀濤之客鶴籥旦開則趨陪于公府星槎夕泊則躑躅于車傍餘子固所甘心我輩能無短氣王子貽上夙耽雅尚殊少宦情筮仕此方知非素志顧俗人不察以逆耳絮陳以為煮海採山擅沃饒之號蕙心紈質標藻縟之名此猶援雉絃以解獨居之苦操吳吟以慰懷土之情詎足釋彼煩寃適以增其輾仄者也然而南馳漲海相望孤烽北走青齊居然四奧安知非假此盤根供兹遊刃加以心操不染則酌水皆清道本中孚則潛鱗可格昔人往轍信有明徴况貽上之天性默成無勞緣飾者乎僕濩落風塵栖遲羈旅才不逮王交深知豫倘以樂郊為頌則是燕雀之賀連雲即以孔道為憂亦似桃人之訾土偶聊慰藉於生平益自傷其卑賤一尊祖道併系以詩房公名宦録序三原房公於明崇禎間以進士髙第知安邱縣亷靜不苛能以德化其民在職四年政為三齊表公既沒其遺愛在人久益見思於是安邱之民蒲伏奔走守官廷為請祀公於學宫而輯其治狀為房公名宦録所以答前勞勸來美也竊嘗稽之往牒凡吏於一方有益於民者所在輒為之立祠嵗時致醊桐之鄉安陽之亭皆是也沿及後世則浸假而遂失其真由是有回絢之失有湮沒之虞名實交喪比比則然今公之去安邱四十餘年于兹矣其繼公之後來宰是邑者蓋不知其凡幾而邑之父老暨其子弟無論公與不公咸惟公之思夫其為時也久則評議必公久而不能忘則功德之及於人必深且厚與夫世之竊竊爼豆間者誠大不侔也公既以治最徙官兵部主事里居之日值李自成陷秦抗志不屈絶食而死大節炳然不專以吏治顯覽是録庶有以得其槩焉松桂堂全集卷三十七
