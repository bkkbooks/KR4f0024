body:
  text: 松桂堂全集巻三十一吏部侍郎彭孫遹撰金粟閨詞一百首一洗人間粉黛空蛾眉淡掃競言工鉛華芳澤都無色宋玊陳思兩賦中針線文書次第收夜香還透合歡裯檀即何事相呼切忘却燈前去缷頭清明寒食踏青游生小嬌憐未解愁買得揚州花線䯻時新樣子鬬梳頭睡眼朝來倦未揚傳呼洗靣進蘭湯瑩瑩清徹仍無垢水内新添玉粉香綺䟽花影日髙懸倦起猶然擁被眠怪殺夜來輕薄甚春趺寛盡繡行纒經年蕩子不歸家粉悴香銷泣嵗華一自長干消息斷秋忩夜夜罵燈花妍雅何須刺繡文砑光綾子白如雲畫將七十二般色閨閣新興十幅裙粉墨鮮明細自敷裙拖湘水入時無不描花鳥描人物幅幅皆成士女圖曲檻低垂湘竹簾分明窺見月纖纖叢頭鞋子紅三寸金線編成小鳳尖入道粧梳自不凡春衣裁出手摻摻却嫌紫翠多塵俗内裏齊穿水墨衫納凉晩坐小庭隅寒玊清氷暑漸蘇換得羅衣青翠色怕他霧縠見肌膚翠羽明璫百寳圅年來魚鑰幾曽探欲將雅淡存真色不插金簮插玊簮少年情景費尋思容易消魂只此時月下定情花下語羅衣欲解故矜持叢桂中秋始作花一忩香霧浸氷紗不嫌風露中庭冷坐向三更㸔月華七夕筵開㸔渡河紛紛瓜菓襍相和并刀剪粉都成字鬭取誰家筆畫多如珠秋露下庭柯顧兔光生㶑灔波手劃闌干心自語夜深私禱向嫦娥何事男兒少慧根閨人偏解事空門却將指爪輕輕合無價香中禮世尊琳宫曽許六銖香繡得名幡七尺長趂取今朝風日好上幡歸去踏春陽梅花不數夀陽嬌獺髓輕紅一任消昨夜西風寒起粟額粧明日戴新貂名香炷罷小爐平縹帙開時心自評深夜讀書寒未寢明朝應試女諸生娥娥紅粉阿誰家挿栁歸時日已斜雙槳乘風爭欲渡船頭齊揷碧桃花西樓九日賞登臨斜照西風下逺林却訝今年時序晩黄花猶自不勝簮金吾不禁上元游火樹星橋入眼稠試問輜軿何處去望呉門外㸔燈毬楝花風過已春殘四月清和即次㸔小院初陳櫻笋㑹内家爭愛越梅酸安石榴開照眼明方中日色上軒楹菖蒲一滴沾唇酒已覺紅潮隠隠生載陽送暖惠風清女伴相邀出郭行明日粧梳誰更早掠成鴉髩待天明剪刀聲隔小忩紗朱火熒熒一㸃斜買到街頭通脱草新年准備上頭花早覺微凉下井梧淡雲新月半糢糊金針綵線頻頻引何似桑中九曲珠裊裊風吹翠帶頻留仙裙下繡囊新囊中别貯玫瑰味裙外幽香逺襲人香肌如雪自無塵寳袜深藏一段春收束紅羅如禁裏人前仍似女兒身鰲山十座奏清謳妙選姬人北曲頭二十年來紅粉盡觀春猶凭最髙樓嬌小盈盈步最工行來羅帶颺春風膝衣繡作芙蓉瓣兩朶蓮花覆玊弓罏中栢子漾餘烟獻罷椒花只待眠燈下穿珠安鳯咮大年朝去拜新年天然一色繡羅裳姊妹齊肩並蒂芳共脱紅鞋更換著湘鈎㸔取是誰長線結荷花片片分玉肩雙扣襯烏雲願為衣領承蘭澤膏沐餘香仔細聞形影從來共一身怪他相䛏太頻頻玊容未便施丹的今夜羅幃欲避人春服依然舊内粧對襟衫子薄羅裳愛他窄袖偏時樣趙女何須舞袖長年年除夕上椒觴獸炭圍爐煖畫堂將進屠蘇分嵗酒先雕朱菓獻姑嫜紅忩日日喚金衣百囀催人曉夢稀故把銅丸枝上打妬他花裏慣雙飛海棠經雨一枝鮮薄髩輕籠態逾妍有色無香元自好教人妬處得人憐名花氣息最清寒馥馥侵人繞畫欄香自個儂身上出髻中今日帶珠蘭海濤八月播狂颸畫艇油車出㸔時雪柱銀山三十丈臨塘羨殺弄潮兒紅襟小語畫梁聞麗日初生百草薰撲蝶西園花樹下粉痕粘手印螺紋小庭雨過碧萋萋採襭羣芳各自㩦鬭草歸來香徑裏裙花深處涴芹泥慈雲名號暗宣稱阿姊私窺笑不勝莫向幢前頻致禱明年此日是蘭徴獸鑰時時扃玉闗怪來春思太疎頑蘭橈桂楫紛容與挈伴同遊兩浦山雅戲花間日幾囘辛夷開後牡丹開南朝葉子姑蘇譜各脱金鐶賭勝來粧裹繁華各鬭新垂垂偏髻最宜人花簮不論年時價十粒明珠十萬緡促坐方當夜未央蘭燈髙照九微光賭將骰子玲瓏色擲得梟時作玉即作音佐夜色凄清入望空尋芳踏月小橋東天街墜却金釵股可惜釵頭靺鞨紅秦珠百琲解頭簮茉莉花藏髻子心琥珀枕寒侵粉印芙蓉帳煖缷香衾猩血文茵色未磨牙牌如玉手摩娑不知喜卜因何事偏覺今朝色樣多薛女拈針倚玊鋪嬌慵漸欲倩人扶生綃何處尋周昉冩出閨中倦繡圖三冬日色上簾鈎晝漏移時下午籌行向碧紗忩下過忩中聽得喚梳頭昨夜羅幬更不眠無端懊惱鏡臺前禁持小玊縁何事值得郎君宛轉憐染得薫爐百和香雙纒一束可憐粧呉興紬色如脂白新月何須羨杳娘深閨盡道不宜春瘦減腰肢一捻身留得佳辰天赦日玉環飛燕細評論美人不在各天涯畫閣朱樓謝女家笑向卿卿私致語紅蕉摘得是伊花春朝乍起合歡床朱鳥忩前竟暁粧誰把小名偷喚取不將青眼覷檀郎午忩眠醒髩雲斜活水徐烹金縷芽蠏眼松風聲欲盡緑瓷杯裏鬬新茶月波初上曲欄頭促坐春宵送酒籌記得桂堂東畔事蠟燈影裏見藏鈎輕隂欲上綺欄遲早起猶然倦不支清盥未施粧未整下階獨立灌花時搖落名花祇自㸔春隂晼晩若為歡斜陽獨倚蕭蕭竹轉覺佳人翠袖寒九月清霜欲授衣北風江外雁初飛花箋細疊相思字寄語蕭郎及早歸曲廊盡日掩雙闗小婦鳴機不肯閒㸔弄玉梭當户織天孫何意謫人間氷花六出合樓臺猶見同雲黯未開此日閨中多勝事陶家風味謝家才十三嬌女好風神憨態時時作劇新細搗階前金鳯草鮮紅染出玊鱗鱗何來庭館遍芳馨不見爐烟裊裊青薇露一匙清似水宫香細煮小銀瓶伏桃經春病不支藥爐丹竈鎮相隨𤣥霜玊杵無人管青鳥花間好䕶持雨過疎簾草色微游絲細細罥晴暉朱欄倚遍渾無事閒把心經教雪衣乍起還眠小簟中懨懨不損玊肌豐朝來只覺呑酸喜空剪𤣥都五色葱宣和舊麝墨痕香洪度新箋錦水凉素手輕拈湘玊管臨忩搨得十三行李因妙筆絶無塵鴛水呉娘亦入神閨閣只今多粉本内家不學管夫人十斛温泉洗凝脂雙鬟小婢䕶門時懷中空有黄金餅玉體何由得暫窺新結閨中姊妹行金環寳飾各相將春晴更約重相見練行菴中拜十王移燈初缷藕絲裳重換湘鈎趣上床好把秦篝收拾起水沉不扺睡鞋香桂棟蘭楣玳瑁梁雙雙花底宿鴛鴦自矜夫壻風流甚頻注嬌波溜粉郎博山初盡迭迷香一㸃銀荷四照光鳯髻卸除蟬髩急夜來别作帳中粧潘岳秋來髩欲凋舊游彷彿廣陵橋梅花一奏凄凉調腸㫁誰家紫玉簫東君有意作佳辰細蕋繁枝二月春最喜花朝天氣好少微旛下酹花神作音佐麝匣犀鈿次第施小樓纔啓繡奩時逺山已是青於黛不待張郎更畫眉漢苑春風畫不成欲將妙筆倩仇英誰知百幅鵞溪絹刻骨銷魂無限情桃葉桃花各自鮮胡天胡帝有餘妍小姑換寳香輿内阿母添粧繡閣前女郎十五妙彈詞近覺琵琶未入時絃索一聲良夜静行雲猶自為人遲風流婉約本傾城却為情多太瘦生羅袖分明檀㸃在向人猶道不闗情長日無人靜不譁深深院落是兒家麝煤小炷添金鴨蠅拂紅絲戲雪猧玊骨猶然困鬱蒸小紅喚處巧相應坐深楚竹清凉簟銷夏先敲玉井氷玉女投壺注矢平齊姬六箸巧相爭璧臺何必耽詩句佻達風流别樣情洗手羮湯自作餐鹽梅芍藥一般般鹽當無處難為悦梅若多時易得酸得度𤣥都女子徴道名授記好相稱桃花百斛如珠米金粟山中供聖僧蕭即底事惱人頻清涙瑩瑩素領巾萬轉千㢠廻全不語前身莫是息夫人組繡還須出後宫人間羅綺早成叢新來服飾多妖麗八尺裩襠茜子紅無風亦自覺芬芳非霧非烟費忖量却憶蓮經名義好鼻端聞得女人香儂家咫尺伯牙臺雲水新翻雅操來玉軫金徽爭拂拭一時先學泣顔囘今嵗花如去嵗穠粉香脂艶好姿容不知何事牽人意只覺春衫領扣鬆風流無處不相宜却羨雙雙坐隠時玉井金屏都㸔遍木蘭花下試滇碁小出風前碧繶鞋姍姍微步下芳階人來花下驚相避不覺㢠廻身墜鳯釵素袂飄颺態不勝摩雲碍日勢崚嶒纖腰漸覺慵難舉怯上浮圖最上層裁得輕綃恰稱身薰風吹過曲池濱齊紈小扇明如玊上有陳王賦裏人薄寒初薦錦氍毺朔氣空中逼坐隅不惜褭蹄金一餅鴛鴦湖畔鑄張爐無題同貽上作犀押重簾玉作扉芳蹤髣髴夢來稀金爐夜燼猶偎枕繡被朝寒未解衣幄裏餘香空旖旎幢前私願好皈依蟾宫月姊應相笑留取幽輝伴綺幃銀箭遲遲正未央紫鴛兩兩已成行懷人獨坐嫌宵永待夢頻來欲夜長斜月窺忩屏半掩行雲何處幙虚凉征鴻迢遞文鱗絶减盡深閨窈窕粧春深朱户映芳滋彷彿江臯解珮時蜂稚故殘含蕋色鶯嬌偏宿斷腸枝夜吟初試青花管午睡閒抛煖玉碁願得相㸔成白首風情長遣兩心知囘首墉宫路㡬千黄爐終不罷相憐玉臺靧靣濡薇露羅帳更衣徙桂烟未續蘭心償夢裏欲抽蕉緒避人前紅箋手署卿卿字記得芳名是麗娟玉壺滴罷夜眠遲華簟初氷擁被時霜色漸侵金鑿落月隂乍轉碧罘罳重簾不啓鈎雙約小篆將殘幔四垂何事秋來長作客紅蘭白露減芳㽔憶得星軿下碧城鳯簫凄楚獸烟清心香小誓甘同死眉嫵良縁結再生花頰露濃真解語栁腰風細不勝情曲江莫是銷魂處腸斷銀河玉女笙玉女湘妃愛獨居芳時冉冉孰華予中宵鍥臂酬私誓小字簮花作報書蕙帳獨憐人去後桂輪又見月生初金屏却憶當年夢為雨為雲總未如柔腸婉轉若為通縹緲神仙小院東曉嶂乍添眉暈緑夜裯新減臂粧紅難傳密約烏絲裏好譜相思鳯紙中何日與卿同舉案呉儂廡下老梁鴻璧月金鋪轉蓐收九微仙帳掩青牛盧家錦瑟初調曲石氏香塵不印鈎自整芳衾迎好夢空施小簟待新秋呉江越水知無際何得同來枕畔流生翠文鴛不暫離參差鳯管好同吹燈懸珠蚌新垂熖衣剪氷蠶舊絡絲折盡南塘紅菡蓞粧成北地紫胭脂武皇未解當時意却遣蓬萊太乙祠西風雙槳帝城遊憔悴苕華杜若洲幽夢細尋行雨路新眉長結晩山愁珠娘寂寞鮫人涙簫侣凄凉鳯女樓小煖輕寒深院裏懊儂情思是三秋夢㢠廻芳草碧迢迢星渚依稀舊鵲橋堤外垂楊眠未起花間睡蝶粉初消重來畫閣聽春雨相送蘭舟逐暮潮兩地朱顔憔悴老徐娘顔色沈郎腰松桂堂全集巻三十一
