body:
  text: 松桂堂全集卷十九吏部侍郎彭孫遹撰上已日禁城寒食近三月採蘭辰宫栁新分火林梅淺著春流波生翠縠輕吹散青蘋百囀鶯何巧翩然出谷頻送丁雁水之贑州豫章南上是虔州旄節從來擁上遊百丈戍邉通兩粵十州城外滙雙流石蘭水竹參差長嵐氣波光日夕浮此去登臨逢宋玉一臺二妙喜同遊作家信畢寄懷徐姊一律南鴻好為報平安三載相思欲見難栁絮篇章才漸減槐隂車馬夢將闌可憐駑馬戀棧豆不抵鮎魚上竹竿早晚抽簮向林下同修淨業老蒲團春日憶山中故居栁葉梅叢感嵗華薄遊何事滯天涯三年不到香陘舍芳樹無人自作花秦徑山光翠黛愁永安湖上白蘋秋也應山水長無恙只恐歸來人白頭松吹蘿煙細細披靜君閣子晚偏宜春來風月無常主撩亂清光知為誰曲榭才通小院西海棠三月已開齊落花滿地無人掃春雨春風糝作泥竹秋天氣晚風和膩粉鮮香日漸多十畝清隂萬條玊半成鼠壤半蟲窩樾館春來緑萬叢三年前此種梧桐新隂定向牆頭過亂灑桐花隔院中岫幌髙褰最上頭雲林雪海望悠悠逺山依舊青如髻向夕何人更倚樓石蘭羅砌幾叢開魚鑰雙扉網碧苔獨有暗香闌不住時時度出短牆來紅葉娟娟絶可憐木蘭一樹玊如煙生憎草木無情思今嵗花開勝往年風物清恬又一時回廊春靜日遲遲小山不擬重招隱最好淹留桂樹枝悼亡詩為王顓士賦吳客新為楚些吟縈絃哀栁罷瑤琴寒蘿秋槿知無限惻惻偏傷作賦心菊悴蘭枯又一時屏帷倣佛為誰施秋來一片空梁月頻遣休文帶孔移翡翠簾空綴網絲人亡物換不勝悲劉郎莫自窺遺澤腸斷嬌兒丐沐時纓佩棽離二十年鳴雞往事重凄然金叉繡襖都傾庋銷得營齋百萬錢健松齋為方渭仁賦石英山外玊璘珣三戟朱門十畫輪丞相平泉餘草木徴君栗里舊松筠數行奪得徂徠色千載留將偃蓋身風起時時停鳳吹雨來往往掣龍鱗氷霜歷落心期古嵗月侵尋手澤新一自江干戈未息幾從澗底斫為薪摧藏兵燹仍無恙護惜柯條若有神月榭雲房猶駐賞珠函金檢未成塵寒姿不改因疏夏華色長妍轉茂春但使貞萋終自保與君嵗晏結比鄰得姊氏三月十三日書有吳門夜泊即送豫婦北行詩二首讀之數過使暮年姊弟别離久逺之懷凄然倍昔因依韻成章信還輒以相寄不更作家問矣新詩百字百珠明讀罷能無感慨生愧汝女公為送婦令豫姊弟倍關情駸駸可歎年將暮踽踽應憐我獨行曉起吟成惆悵絶紙忩秋雨急盆傾珠苞玊幹照春晴朗潤雖殊一樣清崔郾弟兄皆俊士劉班月旦並賢聲當年預卜髙門慶衆木能支大厦傾會見聯翩起雕鶚練裳韋笥也怡情靜含有初夏過香陘山舍見懷詩依韻答之憶汝攤書日掩扉竹林别室送春暉文章有價時人賤珠玉無容識者稀視馬從來失之瘦相人今盡舉其肥丈夫三九猶雌伏坐看蓬蒿斥鷃飛利涉還須捩柂神羡魚不若具絲綸但令匹錦才華在一任籯金世態新木必豐尋稱國器玉因待價作儒珍汝今味道方腴美酪出醍醐豉下蓴山忩秋色最清幽風雨當年得勝流阮氏道南都講席徐公城北讀書樓不求溫飽明微尚莫羡堅肥詫壯遊齊易魯詩卿相業區區博士肯輕酬南龍山海鬱蒼蒼通德鳴珂舊此鄉喬木自然垂蔭逺洪源那不濬流長圭璋爾豈須承藉粳粃余方愧簸揚更語庭階羣玊樹盛年努力占春芳臣揚有閶門夜泊見懷詩四首依韻答之我如馬客老幽燕汝向吳江獨泛船一别暗驚青鬢影三春又改白榆煙身同車鐸郎當甚心比簾旌上下懸一一情懷難盡説魚書雁帛也空傳落英飛絮暮紛紛芳信江南到十分正好送春傷逺日能無别客愴離羣難撈水底唯明月易散天邉是彩雲付與達人長作達栁吟花卧酒微醺汝未成名我未歸相思豈必久相違良駒歷國終千里大鳥沖天祗一飛孺子身名長隱約中丞門祚久衰微明年佇爾充廉孝來向京華解褐衣秋士由來最易悲索居況是攪離思子歌我和遙相答露白風凄又一時向夕有人連布被逮氷不逺綴紅絲從今且作開顔笑領取樽前百嵗期又依韻答臣揚宦興何如歸興濃近來朝謁亦多慵春花秋月長相憶越水吳山不可從燥吻苦無黃柏酒饞涎想殺紫駝峰唯應日日支頥坐飽看西山翠萬重中元後三日送寓庸南還食之本無味棄之猶可惜一官亦何似誠哉似雞肋客有為余言君胡不自力丞相東閣開將軍有揖客願君少降階定當借顔色我聞因大笑笑已重歎息感客意良厚敢不吐胸臆僕本疏脫人習懶乃成癖背癢倩人爬髮垢不知櫛黃金隨手盡銖兩曽不識幸有婦差健米鹽耐纖悉不憂凍與餒唯仗耕且織去年應制科尚需給紙筆孤賤孰為容自分必見斥天子親品題賜我名第一官我以翰林信史倚編輯始知天下事不可預期必事乃誠在天營營復何益一從拜官後懶更逾疇昔一月半請假十朝九不入朝參尚如此況乃交遊迹南橘解化枳素絲能染黑我亦怪我愚不移誠下質以兹與世競髙資并顯秩非直魚上竿詎止蝸緣壁除是馬角生否則烏頭白所慮主恩深無以仰報國逡巡不敢去圖一稍稱塞今年因作計移家到薊北其當有深意客殆未之測五十止一兒兒年一十七阿母太嬌憐將無荒學殖失學猶自可恐墮綺紈習前月方到此旅愁陡然釋一喜不足云百憂遽來集全家三十口男女紛絡繹局身一鳥籠張口如蠺食仰屋始竊悔此計洵當失吾姪逺相攜千里頗勞劇暫留甫五旬别我向鄉邑官貧無解贈使我愧無極道路戒風波眠餐慎朝夕相贈惟片言以當千金值一語更叮嚀望蜀由隴得薄田仰饘粥敝廬亦先澤努力了官租追呼頗促迫耕穫貴及時僮僕頻戒敕舍西數間屋舊吾所容膝海棠木芍藥蘭桂松竹柏我昔在家時一一皆手植時須一灌溉蕪穢必芟滌汝今佐大州需次尚有日及此未銓除家居儘安適汝才良已優汝婦我自出內政故修辦可以相我室轉盼二三年汗青當已畢報主倘有時故山行可即室廬已整潔田園復開闢生平重微子羣從邀難及況我生來歸殊勝謝僕射於時樂不支縱飲恣歡噱我將老邱園汝應執羈靮送汝事四方三刀協初吉和悔菴柯亭劉井韻白石清泉萬古寒誰留勝迹在長安謬司藝帙頻趨院追想風流一憑欄水出仙瀛真自冽源通天漢幾曽乾銀床素綆如相引霖雨無憂潤物難貞柯幾歷嵗寒來上有虛楹靣靣開不少才賢登館閣獨留姓氏冠亭臺百年代起風雲會寸木慚非把梓材歎息西涯遺句在重尋往迹一低徊懶朝和悔菴朝謁今來迹漸稀性情真與世相違久耽物外煙霞疾苦憶山中薜荔衣君自名髙應晚達我因才拙合先歸日髙睡起鐘時飯人世焉知是與非閏中秋羲轡迂遲素節涼斗車又見運中央天心也愛清秋節故與人間駐景光北扉晚直桐隂密南苑秋臨桂路香莫按霓裳舊時曲翰林子墨在長楊送辛齋南還用專木韻怪底魂銷又骨驚故人别我去燕京十年以長曽兄事千里相依仗友生文集初成囊底重詔書不就體中輕紫微山下吾廬在短轂長鑱晚計成羈栖無那客愁何憭栗西風墜葉多坐見桑田長變眩笑看銅狄幾摩挲支硎山逈堪調鶴曇􅙓村深可鬬鵝最好江南風物在青鞋應得數經過又反前意為辛齋留行即用留别四絶句韻悠悠俗眼謾相驚白社無人識董京石竹一床詩一卷九州何地著狂生何事蘭成恨未平江南哀怨若為輕如今只有河難塞大藥黃金亦易成吟成五字壓隂何調絶何須和者多片石西山差可語不妨一日十摩挲欲訪天台奈逺何明河百尺見金鵝與君宿有名山約振䇿他年共一過和院長葉夫子題翰林院璧用東坡清虛堂韻東漸文教西流沙紫宸立仗開正衙猶然勤政討典籍宫燈燒盡金蓮花先生稽古被深眷公爾國爾忘私家曉趨仙禁露方湛晚出往往棲昏鴉賦詩觀志志彌下採此秋實捐春葩諸生繼之我獨後如澄沙礫須剔爬可憐遲暮意自失不知為茗將為茶巴人妄擬刻羽奏布鼓豈識回帆撾庶將時雨化枯稿譬諸舞者聲呼嗟曠然發我矇與瞶濯以沆瀣晞朝霞重九後一日集訒葊新居分得偏字避世最宜官冗散移居仍喜地幽偏盡忘賓主交情好小具杯盤節物妍黃菊依然嬌昨日紫茱卜取健明年夜深更探驪龍窟遣與龍山事並傳前題和蛟門韻疏忩曲檻一重重不礙招尋膝可容交態只如叢菊淡秋光却似潑醅濃詩壇槃敦推先歃理窟金湯怯仰攻自笑年來才頓盡冶亭曽見郭𢎞農宫鴉和武承寒影紛紛曉映虹煙鳴霧噪出離宫一枝自幸棲蘭薄全樹誰當借桂叢跱似相風頻紫禁翔因近日必蒼穹連翩亦有搶榆侣託體髙低訝不同松桂堂全集卷十九
