body:
  text: 松桂堂全集卷一吏部侍郎彭孫遹撰璿璣玉衡賦并序臣聞善言天者必有驗於人善言人者必有合於天良以景曜宣明聿著清寧之烈泰符炳煜式昭貞觀之風乃上聖之休徵為至誠之嘉命然其理存幽賾數極深微自非假象以推占詎易求端於髙逺儀器之陳其來舊矣蓋古之言天者類有六家宣夜之術既失真傳周髀之書殊多舛謬姚信昕天之說略而未詳虞嘉安天之編疏而難核以及穹天之論尤為荒逺之談折衷五者之中斷以渾天為允故觀象之器至後世而彌精齊政之方自中天而已備夫以欽明之代濬哲之朝蓂莢紀辰復何勞於銀箭鳳凰司正亦無假於靈臺而賔日東嵎餞陽西谷黃鍾應律即稽金虎之祥清徵鳴筒還候蒼龍之宿立璿璣玉衡之製命羲和仲叔之官豈非敬天勤民之至撫辰熙績之大者乎我皇上昭受在躬靈承加毖五星㑹於營室六術起於甲寅猶乃儲思穆清宅心淵謐法唐堯之欽若敕虞舜之時幾爰詔微臣作為是賦敢攄牖見以當管窺若夫鴻濛肇闢象緯昭垂兩儀定位七曜同規循蜚疏仡之代觀雲紀鳥之師靡不懿文洽禮班法樹司辨物土於九域考星躔於四維然而制器尚象效崇法卑首重天事以授民時占斗綱以辨氣渾神策以迎曦有隸首之綜算有容成之測儀始甲子於大撓繼平秩於重黎立璿璣以仰則發玉衡而上窺垂古今之彝憲表貞恆之範圍於是祕器初呈疇人攸屬體本彈丸形惟轉轂飾以文珠管之橫玉珠四綴而長明玉在簫而旁燭內藏之以奧扄外運之以員軸任激水之推移抱運環之回復澄天鏡於雲閶絡地維於鰲足寓機緘之至精亮幽遐之可暴斂八柱於寸眸收七衡於一矚爾其積氣髙浮清陽上薦廓爾無名渾然難見不推靈曜之符詎識乾行之健日往而月來星回而斗建晃菱彩之朝飛皎桂輪之夕展耿木德之東輝晥離情之南燦金水則附日而旋填星則居中而轉道别疾徐度分近逺交㑹於辰歸餘以羡或主客之異形或宿贏之殊驗并陳寶籥之中俱入靈臺之撰乃觀懸象乃揆星精東西森列黃赤交縈晷齊景正極準端平察次舍運行之部頒作訛成易之經按分至啓閉之節析晦明寒暑之程候咸池之綺旭迓金樞之素靈窺隱現於列宿酌盈虛於五行其攝乎坤軸也十有九萬三千里而廣其括乎乾象也三百六十有五度而贏其紀乎日月也九道四遊而其行可迹其統乎星辰也三百二十而其官可名既宿離之不忒亦推步之有恆倬天章而文煥布軌道而衢亨窮精研於綿邈通幽贊於神明審聖人之制作逈度越於恆情彼夫協律紀祥司天辨叙七政有占三儀迭舉壽昌創智於良型平子覃精於渺緒并攄窺管之懷寧止挈瓶之數雖貽則於來今實晞風於曩古曠百世而同符端有候於聖主皇帝握璇極之天珍凝泰符之典瑞萃箕畢而類精薦圭璋而通氣好以月從敬因日致仁育義裁禮和智睿法令信於隂陽圖書炳於經緯五德用徵三光合契振采揚蕤連珠編貝猶復旦明乾惕陟降非遙夙夜昭事鑒觀不恌單心於宥密升貺於穹霄故乃神符翕赩景祉宣昭碩麟獲於靈囿慶雲䕃於南郊絳河明而如鏡甘露渥而如膏吐榮光以無際叶瓊琯以長調流永年之懿軌建奕䙫之芳標啓斯儀以遙度如寶歷之承堯末臣幸逢乎嘉運恍厠身於瞻雲就日星陳旦復之朝白鸚鵡賦惟皇朝之受命拱寶籙而凝正招女牀而鸞集巢阿閣而鳳鳴雀銜書而入户鵠聞樂而翔庭雖異物之非寶實嘉祥之有徵聖心推而勿有瑞應顯而自臻矧夫殊域懷仁遐方慕義貢賮獻琛臣人享贄九譯以通萬里自致來曠世之靈禽登軼倫之珍毳蔚上國之羽儀煥中天之符瑞非邀福於乾靈豈格遐於神契相彼鸚鵡産自山林往來叢薄栖跱髙深賦翩翾之微體稟聰明之慧心資善警而通解性能言而審音縱不離於飛鳥固迥異於凡禽至其含靈育異拔萃挺竒金精叶兌火德乘離丹咮煥發緗趾紛披練裳容裔縞袂參差亭亭素質皎皎清姿餐唯玉粒翔必琳枝朝搴芳於懸圃夕引吭於瑤池爾其山海窮荒區禺遼絶林箐幽遐岩阿嵽嵲巧舌如簧毳衣如雪顧影流妍徘徊自悅離塵氛而獨立天既假其羽毛凌皓氣而孤騫人誰信其髙潔乃有羅氏張襦虞人播弋置以雕籠假之文飾憑玉柱以無塵弄銀絛而一色雖難遂其幽棲幸未虧夫昭質辭僻陋之山陬遠翺翔於京國遂乃覲光曜儀遷喬去卑栖禁園之瓊樹侍君王之玉墀嘯侣則白鷴妬影命儔則皓鶴增輝瑤階月豔珠綴霜飛素娥韜彩青女斂霏長流連於宸盼永供奉於仙闈亮隴坻之罕遘洵羽族之殊希若乃太液閎深上林邃窅物競呈祥天寧愛寶白麟獲於郊園皓鹿遊於池沼不黔自黑鶴鶴者三趾而紛來莫赤匪狐濯濯者九尾而相擾皆鱗萃而星駢亦雲臻而霧繞繄斯禽之入貢同效瑞於聖皇詎無因而自集知有感而必彰按緯文之曩迹合圖諜於前王隆大孝於尊養浹至仁於八荒故淳耀之符上格於皓穹之靈貺而精瑩之氣下通於物類之微茫於是璣明衡正乾寧坤定一畫啓羲九苞儀舜洊至天休彌申景命非徒耳目之娛何止一人之慶詔九州而通節逖矣越裳之翬臨七萃而觀兵陋彼穆天之駿天駟賦於鑠皇家憲天作則景曜宣昭休光翔溢獲碩麟於南郊貢白澤於西域育萬物而效靈總八埏而稟式器車在御而結旌澤馬充庭而伏軾攬符瑞之自天卜榮懷之在國是以乾畜孕精房星降正功先於地用健叶於天行資風雲之駕馭壯警蹕之登閎承靈貺於太乙騁王路於由庚觀其星緯獻祥河祗耀德校人是司圉師是職冬獻夏頒執駒攻特為龍為騋齊足齊力十有二間各分種色或皎皎兮虹攄或爛爛兮霞絢或鐡驪兮深黝或蒼騏兮翠蒨或一舉兮騰黃或將飛兮紫燕或蹀躞兮籋閶闔之雲或縹眇兮曳吳門之練當夫錦障乍解金鞭未揮鸞停層漢鵠跱仙闈翩驚鴻之始集矯靈虬之欲飛及夫寶埒初開長楸並進五組雲彯兩驂風迅絶瓊海於須臾登玉山於俄瞬况其骨應經文形符圖牒力既足稱德尤殊别去似遊龍回於縈雪疾不奔踶緩無銜橛行有磬控之安步中鍚鸞之節蓄雄姿於婉心寓馴良於英決彼夫穆駿踰輪宛駒汗血騋牝興咏於詩人駉牧登歌於往哲固未足以踰此威神義何容以較其優劣爾乃霜清紫塞氣肅金天駕言出狩肄彼師田屬車在後鑾輿在前千羣霧列萬騎星駢於時禮用三驅材呈六種逸足爭長竒毛矜寵珠勒無聲纎塵不動攢綺谷而花明開幔城而霞擁披棽離之繡文列繽紛之錦幪追羲馭於炎洲驂箕風於仙隴展帝容則噴玉噴沙昭王度則受球受共宸情有懌我武維揚儀成吉日斾返長楊慮東野之盡力念北土之留良雖吉光騕裊之名咸上登於天廄而驪黃牝牡之品或未盡夫遐荒豈無權竒俶黨超越騰驤駕短轅於虞阪服鹽車於太行局促絆羈之下悲鳴棧豆之傍徒擅能於千里奚受知於九方於是廣索沙邱旁搜幽碣命造父以程材詔涓人而市骨將見恆冀山陲渥窪水涯蘭筋挺異驥子呈竒雲螭月駟虎氣龍姿備六騶之翊衛竦九陛之威儀倘見賞其神駿長託乘於軒墀瀛臺賦有序瀛臺在大內之右西苑之中巨搆𢎞開規橅太紫嘉名肇錫髣佛蓬瀛維世祖章皇帝闢九仞之基惜十家之産程材庀宇就下因高木不雕鎪飾無藻繢雖茅茨儉朴不資人力之勞而山水縈環未减天工之勝萬幾清暇翠輦時臨聽政勤民於是乎在我皇上凝圖有永繼序無方粵歲斯丁諏辰重午泛舟仙沼弭節靈臺拂雲罕之棽離皆成湛露振芳蕤之的礫盡是天葩爰稽周令之文實在南訛之月可以升山陵遠眺望禮之宜也時為大矣夫探竒䇿府非無羣玉之峰選勝唐中亦有三神之境盤遊徒侈化理何裨豈若今兹有逾曩烈用竭管蠡之見敬陳頌述之情是愧蕪詞無當勝槩皇清之握象闡珍錫圖凝厯苞六合以為家總八紘而作極貞符曜明泰階寧謐天室威神宸居淵嶷歲當疆圉之期月中蕤賔之律乘輿夙駕瀛臺是即位臨西兌而聖澤彌宏義取東瀛而真人攸宅蓋自玉泉之水太液之池􅚈為廣澤散作文漪泓碧千頃莽蒼四垂日月吐納軒楹蔽虧雕梁界道錦甃交陂鳯標翥羽鯨石翔鱗控玉蝀以噴雨跨金鰲而籋雲霞波如綺蘋吹無塵景山之巖岫巃嵸瓊華之洞壑玲瓏磴道窈折澗户幽通屏障羅列環玦琤􅀈峰迎仙仗谷應曉鐘欲霽而林暉千狀其雨則嵐霏萬重乃有丹梯盤互曲廊懸度隰衍原平隄回川注激水鳴春藏舟紆浦葆翠霜濃麥黃雲聚粧臺則琳碧為釭蕉園則春浮名樹旃檀之馥迎風迷迭之煙成霧於是林巒迤邐川陸縱橫陟樂成之舊宇徑涵碧之虛亭纓岡帶阜繚白縈青樓觀􅍶崒殿閣峥嶸璇題璧磶繡供雕甍苕苕迥出翼翼孤擎跂飛鳥以斯厲佩長虹而若縈軼雲雨以下度排星河而上征可以仰餐皓氣俯揖羣靈擢樓松之千仞抗閬風之九成重以新荑璀璨芳幹紛蕤芝房三秀蘭畹九滋梧則萋菶生岡竹則檀欒映池桃李則不言成䕃栝柏則後凋挺姿般般之足翽翽之儀棷馴白澤囿擾黃支鳬雁翺翔於修渚孔翠翻騰於茂枝既乃品彚恬熙景物明淑睇萬里於纖毫攬九州而盈掬紫塞斜縈紅螺森矗聚燕風恬晾鷹霜肅隱現桑乾之河縹眇香山之麓金臺有駿骨之羣泰畤見神光之燭升高望遠四維一矚柏梁無以潔其觀神明不能方其躅狹制度於通天之稱埒壯麗於凌雲之築皇帝乃駕赤駵之駱樹朱鳥之旓祝融引節清徵鳴韶定晏隂以靜事散炎景而居高寄遠心於濠濮託逸想於松喬於時清暉擁榭翠漲平川龍鬐齊奮鳯喙爭騫凌雕文之畫舸曳湘縠之輕煙荷碧筒以猗靡榴絳實以鮮妍葵叢生而就日蒲九節而延年宸遊既豫睿藻仍宣灑翔鸞之仙翰染濯錦之瑤箋不數具茨之駕遑羡橫汾之篇若乃菡萏紛披綺粧明靚曾詔廷臣共承休問命桂楫以溯新波見蓀橈之擊明鏡頒蓬池之銀鱠泛鶴觴之珠醖朱陵之李澄鮮玉井之冰清潤甘雨滌煩凉颷解慍披九天之濊澤賡五弦之雅韻又若麗旭始升惠風初扇時鳥嚶鳴繁英葱蒨黛耜並陳紺轅將勸辨雲物於嘉辰播雨膏於芳甸暮春合射之儀元已流觴之宴殿中揚白獸之樽水面捧金人之劒逮夫清商乍奏爽宇方澄栁寒月皎桐疏露清挹仙莖之沆瀣聽天籟之竽笙省斂則弄田粳熟招隱則小山桂馨豈獨階堆連璐徑糝雕英歌黃竹而恤祈寒之困詠來思而軫遠戍之情是以抱獨一堂遊神八荒靡遠勿届何施不臧吹動植之機以廣仁慈之汜濩悟流峙之理以侔道德之精剛既書同而軌一亦化美而治光罷烽堠於寰海受共球之駿龎攄卿雲而復旦呈含譽以垂芒遂乃彌性游翺從容詠陶學山探奧筆海回濤緝熙懋建俊乂勤招履髙思下居逸念勞岐陽鐘鼓之盛卷阿車馬之饒登斯臺以同樂抗往哲而為昭小臣作頌用補風謠頌曰天垂呈象地敞皇州崇臺沙立敻乎建斿餐華日近吸英靈浮匪風則御亦雲與遊同規方丈比美瀛洲六龍蒞止視遠聽周聖心孔懌庶政載修維德峻極上與天侔百常允陟景福來酬瑞繁山委嘏集川流穆然並峙萬䙫千秋溫泉賦若夫乾維上運坤絡旁宣結為五嶽散作百川洛符禹範河瑞羲年靈長之美坎德斯全元氣盎溢溫泉出焉爾其山嶺岑崟岡巒層復衍脈髙原發源峻谷瑤竇濺珠瓊沙噴玉初似遊絲漸如飄縠乍瀠洄於溪澗終澶漫於陵陸既􅚈之而淵渟亦揚之而波屬遂噴薄於郊坰且蔽虧於林木彼其因寒為性就下而趨凡水皆一兹泉則殊苞五行而回幹乘一氣而盤紆通機緘於化軸開槖籥於靈樞含火德之溫煦納沃焦之委輸歷四時而皆暖經三冬而不渝審隂陽之為炭知天地之為罏攬之融泄挹之靜深夏無毒熱冬無沍隂飛霰不積繁霜詎侵何俟凌人之政無勞黍谷之音蟠燭龍於水底媚陽燧於波心浸咸池之若木浴蹕羽之陽禽澄之自定淆之彌净鋪縞練之纈文瑩玻璃之明鏡溯陽谷而可通登炎洲而若近潤能及物非由挹注之勞熱不因人詎改清冷之性况乃無終舊封北平勝槩明月之峽黃花之塞控盧龍而作咽喉翼神京而為襟帶拱北極而非遙瞻孝陵而斯在王氣如龍祥雲如蓋丹砂的礫而中藏醴泉絡繹而紛㑹信天産之靈區呈皇朝之上瑞至若焦溪見於酈經驪山表於唐世蜀都之井沈熒曲阿之潭揚沸詎有得於冲和徒相誇其神異豈若斯泉鬱為奧府磅礴太和絪縕終古如湛露之斯濃類薰風之自鼓凝之則如醴如膏泄之則為雲為雨可以滌煩釋躁悅志怡神寧人便體浴德澡身蕃滋卉物粒我生民念庶徵之時燠躋一世於陽春濊天波而勿幕廣聖澤於無垠近日月而不冰非如澠水現榮光而有耀長似河津天象賦若夫太極既形兩儀並建天始地生乾清坤宴相彼皇穹溥博周遍形則彈丸德惟行健理幽渺而難窺象昭明而可見於是曠觀峻極周覽太虛紫微之內上帝攸居環列宿之煥若握中樞而謐如擁槍棓而莖擢啓閶闔而雲攄備鈎陳之翊衛䕃華蓋之扶疏前星者儲二之體後宫者正妃之餘御宫典儀於椒寢柱史執簡於彤除文昌與上將齊列司祿與貴相同墟平獄訟於大理管㗋舌於尚書四輔煥而八風俱暢三台耀而一德相於泰階則長明玉燭斗魁則獨運帝車别有太微之垣天市之樞五行迭王四氣旁敷中施黼座外設直廬執法臨於廷尉謁者值於鴻臚九卿宣猷於省寺諸侯述職於疆隅依烏者郎官之位少微者博士之徒宗正之親疏有序虎賁之警蹕無虞造父扶輪而先路王良策馬而前驅咸備官於層漢同展采於亨衢南有清廟髙騫靈臺邐倚天闕崔巍端門宏邃張為厨以觴客栁為宰以和味翼為禮樂之官星為衣裳之笥長沙卜壽考之徵東井掌水衡之事積金積帛鬼者所以察奸左轄右轄軫者所以主騎五車燦而軌道平三光明而皇風被西有天街之上車舍之中九斿縈拂三柱玲瓏奎者武庫之備婁者苑牧之充參者偏禆之任亦為鈇鉞之雄胃為廩而司榖昴為耳而司聰畢為罕車有搜苖以肄戎事觜為軍候有葆旅以衛王宫雕弧靜而師中貞吉南極見而天下時雍北有爵祿之斗文章之璧危司陵寢虛司祭疈牽牛亘乎關梁離宫起於營室須婺則二女同居天孫則七襄終日羽林則壁壘清嚴匏瓜則魚鹽纖悉河鼓掌閫外之戎旃離珠典宫中之袐飾有雲雨之宿以沛其恩波有雷霆之星以威其淫慝東有房為外府心作明堂蒼龍超趠四馬騰驤箕好風而翕舌氐涸水而成梁亢則燕居斂福尾則螽斯凝祥後牽前襟市樓測其虛實左李右將大角控其中央攝提者甲乙之躔所以直斗杓而建月令析木者幽燕之次所以垂景曜而福帝鄉又有列象成文順天左循王填星於土德播粒食於生民水為辰而司智木為歲而司仁火為熒惑五事之所以用乂金為太白五味之所以作辛他若竹林建樹咸池漢津如覿豫賞于彼清旻器府縹眇鼓吹繽紛於奏廣樂于彼鴻鈞熊羆虎豹之類江河園苑之倫既繁錯而難舉亦瑣碎而不陳靡不規摹於太紫拱衛於北辰乃知中宫者至尊之位泰一者至貴之神可以覆育於萬物可以函蓋於九垠故有定位焉崇上卑下亘古不遷有懸象焉日升月恆貞明遞宣以言乎日純乾之用太陽之質扶桑以升細栁以入踆烏三足而能飛建木千尋而自植黃道赤道於以紀其經行髙舂下舂於以標其晷刻以言乎月隂教之修內德之協顧兔在腹方諸含液驗魚腦而光盈畫蘆灰而暈闕哉生旁魄辨候於玉斧之宫三珥重輪表瑞於金樞之穴日者離之精月者坎之靈五星天之緯四七天之經其去地也十有九萬七千里而逺其周天也三百六十有五度而嬴日月則有四遊九道之可測星辰則有三百二十之可名有運行次舍之度有遲速守犯之形璿璣垂其模範渾儀合其規程穹天昕天之說皆已闕其義周髀宣夜之術詎能得其情若夫直專動靜天之體也聖人則之以盡性剛健中正天之用也聖人法之以出政七曜於是乎貢其休徵九霄於是乎彰其瑞應煥乎連璧之符麗矣編珠之映甘露之味如膏絳河之光如鏡如星非星焱焱炎炎而吐輝如雲非雲郁郁紛紛而呈慶榮光之燭五老所以祝唐堯復旦之歌八伯所以頌虞舜况夫上聖垂旒至誠格幽剛柔協喜怒刑賞毗春秋天不愛其道神若惎之謀膺靈眷兮璇極集珍貺以介邱瑞穰穰兮山之委福浩浩兮川之流恍昭回而在上垂糾縵而凝休觀諸象而可悟揆以理而不浮信乎天人之感應為甚速夫何俟乎保章馮相之屬用推測以相求禹貢山水圖賦原夫禪通疏仡炎帝軒皇迭主五候區畫四方啓中天之景爍闢邃古之鴻荒濯文明於昏墊奏府事於懷襄德無間於夏后功尤髙於姒王按山川之故牒考禹貢之舊章熙鴻號於萬䙫耿徽音於不忘彼其千岩霧列萬壑星屯歸墟海若衍脈崑崙四瀆者百川之長五嶽者衆阜之尊逺近崇卑有道里之可考決排疏瀹有脈絡之可論合之則四載之績以著分之則九州之跡斯存若乃陶唐舊都冀州名境河為之川汾為之浸大陸為之藪恆霍為之鎮析城則苕苕百雉底柱則亭亭千仞王屋則訬若翬飛太行則邈然雲峻有吕梁孤岐壺口雷首之崚嶒有衡漳恆衛滱洚淶淇之縈映遼濡滹易夾碣石而南來孟津大伾歷覃懷而東定實三面以距河臨三州而標勝西為奧府是曰雍州擘金天之髙掌鑿黃河之迅流溯積石以經始歷龍門之阻修岍山者吳嶽之表終南者地肺之邱荆岐則兩山咸秩鳥鼠則二物同遊惇物則連綿列岫豬野則苞衍平疇亦有漆沮澶漫灃汭沈浮同濁涇之湜湜入清渭之悠悠內控隴右兮西傾朱圉外接朔方兮析支渠搜南則荆河厥惟豫域風雨所和隂陽所集滎由濟騰波從洛溢被以孟諸承之荷澤澗出澠池之南瀍出替亭之北熊耳孕於伊源陪尾枕於桐柏惟洛川之生冢嶺呈神貺於九疇兼外方之號嵩髙集靈符於二室東則兖區濟河所歷濟以沮分河以灉出伏見者三在汶上陶邱之界播疏為九有馬頰鬲津之跡鼓雷於澤所以無橫流之虞泛舟於漯所以有織文之入他若專以山稱者惟荆惟衡荆州是名專以水稱者惟淮惟海揚州是徵兼以山水稱者華陽黑水之梁海岱及淮之徐據海距岱之青青則淄出萊蕪濰出箕屋海濵廣斥琅琊曠邈汶水浮航萊山作牧賔日馭兮嵎夷聳天門兮岱麓徐則沂因艾谷淮自胎簪東原髙壤大野卑涔彩翬羽畎嘉榖䝉隂孤桐生兮嶧阪浮石産兮泗潯揚則三江為襟五湖為帶震澤扼婁松之吭彭蠡承岷嶓之􅚈羽毛齒革之所生篠簜瑤琨之所萃攬竹箭兮如林棲陽禽兮斯在荆則江沱潛漢大别內方東陵坦迤三澨微茫原名敷淺水號滄浪跨七澤兮雲夢括九江兮澧湘供菁茅兮上國納箘簵兮三邦梁則江漢上游濫觴之地為源為流乃道乃藝徑褒斜而桓是來旅蔡䝉而沫可治合黎流沙弱水之所循南海三危黑水之所至有銀璆磬錯之竒珍有熊羆狐狸之文罽觀底績於和人知成功之匪易於是曠觀九野溥覽八紘廣輪異數流峙並呈融者為川瀆結者為邱陵東西者其緯南北者其經有北境南境之别有北條南條之形北則河濟為之宗而伊洛淮渭為之次南則江漢居其重而沱潛漾沔居其輕靡不通委輸於巨海走筐篚於神京然後知聖人之功德有以補天地之危傾故其心非不順物土之性而灑沈淡災一代之治功斯備非不公天下之有而以下奉上萬古之分義攸明所以櫛沐而胼胝勞神而殫精以隨刋為疏導之窽㑹以封濬為賦式之權衡迄今規撫曩烈軌則前型披皇圖之式廓荷天衢之載亨察朝宗之大勢審㑹同之凡情見夫同規而積氣兮乾樞何以永平振維而舉絡兮坤軸何以永成厚生而利用兮歌頌何以洽於風聲則壤而弼服兮梯航何以逹於寰瀛益畇畇禹甸之疆理亦芒芒禹迹之方行探岣嶁之瓊字兮扶宛委之瑤扃緬塗山之玉帛兮覩河洛之澄清能無景企兮𤣥圭之聲教遐慕兮明德之登閎南郊賦昭昭璿極乃眷聖皇象緯輝煜圖書亮章軌乾度以順則運璿樞而履長賁天哲於四表覃聖孚於八荒金繩緑冊之祕龍圖雀簡之祥皆丁辰而逢吉咸滋大而寢昌自非寶籙洊申神符潛告介以純禧熙之鴻號奚亶錫於蒼穹用靈承於元造孰有感而不彰孰有祈而無報爾乃詔宗伯采儒臣肇吉禮修明禋暢月穀旦至日良辰玉杓北指金翼南踆藝芳叶候葭動迎新舉南郊之盛典答景况於高雯於時六宇澄鮮萬象峻潔緹帟肅除壇壝儼設警雞人而夜呼嚴巾車而道迾弭靈蚪以挾輪戢翔螭而擁轍彯翠羽之葳㽔飾紅葩之狎獵搴鳯蓋以騰文捎虹旌以奮鬛颯回文而沛艾旋披雲而嵽嵲絳幄青城彩旃綪筏噦噦鸞聲鏘鏘玉節百辟卿士鵠跱而趨班三事上公駿奔而陪列田燭密而曉星稀仙佩鳴而曙鐘徹乘輿奉引霈然爰發乃輯粹想存清衷薦蒼璧䖍元宫介圭杼首大裘卷龍升乎泰壇之上以即於圜丘之中抗雷鼓之節奏展雲門之舞容韻孤竹之妙管絙空桑之雅桐視雞彞兮黃目滌牲駒兮錦幪擷玉禾兮仙閬採黑秬兮神嵩泲明水兮茅三脊􅌊芳蕭兮烟九重逹幽馨兮郁以烈燭神光兮昭有融懿芬晃朗肹蠁豐隆配以聖祖躋以神宗顯謨偉烈峻德巍功恍對越而在上與峻極而侔崇既麟麟而炳炳亦肅肅而雍雍槱燎之事具舉禋祀之禮告終然後澄慮儲精淵渟嶽嶷元扈總章瑤題璇室三靈降釐百神受職感碩麟兮雙觡䕃卿雲兮五色甘露如珠兮自零朱草不根兮自植懸象著明正祥翕赫恍忽無端溟涬何極蓋昊天者至尊泰一者貴神其號為耀魄其居為紫宸分曜於日月布秩於星辰有司中司命風雨之代序有寒暑水旱四時之遞因所以權輿化育主宰洪鈞拓基錫統凝福呈珍雖冲漠之無朕實陟降之是親故醴醍非不旨也而元酒是儐雕幾非不麗也而素車是陳纂組非不美也而疏布是巾莞簟非不安也而蒲越是茵於以見大禮之不䙝至敬之無文惟寅清而敦朴兮乃可以交神明而上接於無垠若夫上辛祈榖四時迎氣大雩有禱大享有祀靈威赤熛之殊招矩叶光之異名見於緯書事傳於載紀非比秩於南郊豈同儀於上帝至若寓駒泰峙權火甘泉卜基委粟營宅洛川顯慶開元之世至道元豐之年亦有報本與反始非無玉帛與牲牷襲方士之訛說承禮家之鮮傳代有得而有失制有革而有沿有陟配獻享之謬有同牢共食之偏有曠數歲而一舉者有遣祠官而攝事焉豈如巨禮修明鴻儀詳正舉不曠時躬親致敬二郊之兆域燦然萬古之典章斯定可以孕育百王網羅千聖潤色舊章甄陶前政迓貞觀之休徵膺昭回之顯命鞏瑤厯於丕基啓瑞圖於景運於是考庸世室受策介邱頒朔象魏施惠神州定三統之建稽五德之疇明堂辟雍緝熙之化洽升中巡狩廢墜之典修馳驟於仁義之林藪浸潭於道德之源流含咀於藝文之精粹斟酌於儒雅之咨諏芳烈扇逺珍符闡幽祥風並翺和氣與遊被光華於四表垂厯服於千秋末臣揚扢於盛世用敢作頌以揚休永年厯法賦惟聖朝之受命麗璇穹而凝極援神契之矞皇握乾珍之翕赩三階平而如砥五候循而勿失覩貞觀之有符信靈承之是即顧乃宸慮逺凝宅心旦明遑然如未逮凛乎其勿勝協之以五紀驗之以庶徵寓機緘於儀器研象數於規程抉元微於罔象曙幽遐於至精詔馮相保章之氏窮周髀宣夜之情啓槖籥於銅渾兮振綱維於玉衡植土圭之崇表兮管星球之奧扃吹葭灰於緹室兮量黍米於陽城登靈臺以辨物兮仰峻極以揆形於是祕器成圓儀具巧思殫新推著微顯咸該洪纖畢舉則盈虛躔舍之常審嬴縮疾徐之度析分至啓閉之經次寒暑晦明之序勾股則以三角法為精詳交食則以十六求為參互推凌犯則無時差氣差之除按氣朔則無里差歲差之誤九道則黃赤回環四遊則東西分布辨中星於昏旦之交建月令於攝提之部所以永命而祈天取新而去故粲粲兮合璧而連珠班班兮金章而玉蔀錫嘉名以永年介純禧於皇祚若夫禆竈梓慎之術甘公石氏之傳景初承太和之舊鄧平校洛下之偏一行垂聲於大衍元嘉抗迹於承天王朴之欽天有凖守敬之授時不愆非有蠡管之合詎免舛謬之沿豈若斯厯蔚為典式推步有恆宿離不忒綜六術於甲寅㑹五星於營室闡氣母於炎帝顓皇運璿璣於堯天舜日探瓊策而鏡千秋兮可以卜世而卜年吹玉琯而調八風兮可以中呂而中律况夫睿聖臨朝珍符景昭􅚈瑞苞於穹宇升景貺於層霄卿雲爛兮北闕甘露降兮南郊吐榮光兮無際叶玉燭兮長調蓂莢迎辰兮無勞銀箭鳯凰司正兮如聽仙韶方履長於億萬斯年之厯數又何有於二千餘載之殷遙西山積雪賦攬西山之勝概見岡阜之岧嶤敞丹梯之逺色插蒼靄之崇標皎積雪之在望凝餘寒之未銷漾清暉之水木涵澄旭於林臯助景物之蕭曠增岩阿之泬寥昔之菡萏紛敷芙蓉競秀朝爽迎人夕霏展岫掩映兮如花參差兮如繡翠微仙庭香山化城澗戶幽回峯巒杳冥玲瓏兮瓊闥窈窕兮雲屛因髙就下嵌空封罅爛兮炫景粲兮照夜樹青葱兮玉泉竹檀欒兮潭柘舞銀海之虬龍展璚綃之圖畫吹雲兮繪粉流光兮弄影璧拱兮珠聨輝山兮媚川逺而望之如瑤臺月艷兮遊飛仙近而即之如藍田日暖兮生朝烟恍兮忽兮既似翠羽啁啾兮羅浮天髣兮佛兮又似夜光錯落兮西崑顛當其遙空作霽翔烏方吐晃朗晴嵐依微逺樹綴霜葉而增妍㸃林鴉而可數及其夕陽在山悄然人境殘虹散彩餘霞流映帶暝色而猶明耿寒光而不定戛仙籟兮無聲委金波兮有情風颼颼而愈冷月淡淡而彌清繞南枝兮孤鵲警空山兮獨鶴戢寒羽之差池感羇心之搖落鳥道兮谽谺燒㾗兮橫斜狐兔凄迷於曠野獵火閃爍於平沙樵徑兮斷絶墟烟兮明滅岩扉寂寂兮長扃蘿磬泠泠兮相答乃有曳履幽人行吟騷客藉草扶笻披榛振屐抽灞橋之祕思賡招隱之新什發逸響兮無窮託深情兮何極亦有連輝華省拄頰仙臺玉珂曉度粉署辰來和陽春之麗曲騁梁苑之清才寄逺心於邱壑鏘餘韻於低回豈如璇題金屋髙居逺目澄輝兮送迎絳霄兮縈屬撫軫兮幽蘭興歌兮黃竹揖神人兮藐姑探圖書兮羣玉流睿藻兮芳妍掞天葩兮鮮縟所以凝華積素疊嶂層巒嵯峨天半縹眇雲端挺千枝之琳碧擁萬仞之琅玕掇琪花而不落拾瑤草而長寒開皇州之麗矚峙寶甸之竒觀援柔毫而一寫恍置身於蓬萊方丈白銀宫闕之間殘菊賦有序長安邸中有秋菊十數本嫣黃姹紫粲粲可觀曽不幾旬凋殘殆盡夫菊貞草也可以敵霜霰制頽齡而且歲晏孰華流芳易謝猶如此矣况其他乎江潭搖落桓司馬見而傷心庭樹婆娑殷東陽對之歎息以今揆昔有由然也爰濡毫而賦之蕭辰送燠朔氣迎寒清霜夕厲濃露晨漙惜流光之欲莫見叢菊之初殘當其金蕊方披瓊苞未坼微颷薦凉鮮雲漾碧振緑葉之葳蕤綴緗跗之穠密林下兮山家重陽兮試花繽紛兮佳色璀璨兮仙葩濯錦鱗於秋山籠綺日於朝華一枝兩枝兮寒玉千縷萬縷兮明霞白雪兮乍飛征雁兮南歸峯回兮波屬離憂兮紛觸蘭之秀兮清微菊之芳兮幽獨懷佳人兮不忘寄相思兮空谷蓲蘛猗那為時幾何繁香萎蔓紫豔飄柯同湘人之憔悴怨令節之蹉跎夫其抱性貞萋託根高潔耿耿孤芳亭亭晚節猶且悴似飛蓬衰如墮葉委三徑之寒叢隨衆芳而銷歇况乎蒲栁之質桃李之姿修靡弱幹荏苒柔枝能盛年之長保無妍華之早衰當氷霜之推挫恐零落之無時對殘英而躑躅空愴悢於豫思梅花賦若夫披香之殿重璧之臺千花繞砌萬卉羅階爭春先發衝寒早開超羣拔萃獨有芳梅當其仙蕾方胎瓊苞未綻裊裊繁條亭亭修幹餐冰雪之凄清歷風霜之凌亂羌不改其貞心亦何傷於歲晏爾乃微陽韻竹弱管飛葭勾萌欲坼枯荄未芽權輿氣母絪縕物華東郊將駕南枝已花逺韻孤情冰膚玉質世外相期林中獨立深雪扃寒橫參耿碧孤夢清遐一枝幽寂倣佛聞香依稀辨色日餞雲迎時和景明風催淑氣鳥弄春聲倚樓笛暖擁帳香溫粧嫌粉涴舞愛身輕何樹非玉何花不瓊亦有緗跗翠蕚紫蕊紅英緑華仙品絳樹芳名凝脂鏤雪異色同榮靡不返魂香寢濯魄瑤京綺因清極艷自幽生若乃薄寒未融暝色欲斂林非霧而非烟天如霜而如霰初掩抑以生愁旋低徊而入怨倚修竹以無人對流波而自逺空山兮泬㵳四顧兮蕭條霏微兮夜色搖曳兮仙颷月昏黃而送影露淡淡以凝條緘素心兮有恨翳縞袂之無憀蓋其體含髙潔性本貞萋天然之質秀出之姿暖然兮似喜凄然兮自悲嫣然兮獨笑悄然兮相思占衆芳兮無衒色老空谷兮人莫知故乃即之愈淡挹之愈微淆之不濁涅之不淄可以含華咀秀揚芬吐蕤移根閬苑振采瑤池扇仙葩之芳烈效鼎實於明時豈與夫遲日園林深春樓閣柔木綺靡雜英纖弱乍菀兮乍枯自開兮自落藝畹兮幽蘭翻階兮芍藥穠李兮芳菲夭桃兮綽約逞絶代之容顔鬬傾城之鉛澤領上天之韶光競人間之標格猗嗟梅也首冠芳叢霓裁霧剪粉銷黛空雖自矜其國色能無待乎春工釀聯珠之甘雨披綴鈴之惠風非裁培之有意孰妍悅而為容願東皇之長護無致惜於飄蓬帝京元夕賦翼翼神州巍巍帝室邐倚丹霄規摹紫極萬瓦翬飛九衢星密民物恬熙謳歌洋溢覩率土之升平奉宸遊於兹夕兹夕何夕厥惟上元孟陬之吉春王之尊一歲之首四氣之原青陽肇令始和布恩綵鳩施惠白獸受言以届於是稱令節焉於是仙琯調風澄暉散旭天朗氣和春明景淑林雪盡而銷寒河水開而坼玉湛仙掌之金波飄御溝之文縠魚噞喁以泝流鶯翩􅗁而出谷梅弄色以初花栁垂條而始緑萬象交泰百昌競呈萃以樂豫兆以豐亨麗以皓月綴以華燈千枝吐艷萬炬攢星素蟾銀魄顧兔仙輪若乃宫觀鬱盤亭臺層搆青瑣丹墀雕楹藻鏤玉題交輝銅鋪錯繡銜照燭龍流光鴛甃花不落而長妍夜未央而如晝藹佳氣之葱芊羅瑞烟之粉糅祥光凝兮楸梓開仙響臻兮韶韺奏慶雲霏兮鳳輦過香霧濃兮鰲山秀以至五都洞逹三市喧闐星橋火樹寶騎香軿靚粧縟野袨服藻川歌落梅之婀娜鬬穠李之鮮妍弛金吾之夕禁誤銅籌之曉傳咸追歡於樂歲並選勝於韶年夫其閭井悅康寰瀛清晏人鮮怨咨家多盈羡士女熙熙宴遊衎衎兵氣銷而日月光頌聲作而星雲燦良辰並美景偕臨天寶與物華俱煥審何道以臻兹知皇仁之溥遍蓋惟𢎞基積纍醲化奫淪懿以文德洽以深仁天波如醴聖澤如春合天下為一家引六合為一身故天不愛道人不愛情萐脯在囿蓂莢充庭風皥皥而自古物欣欣而向榮月金甌以無缺燈玉燭而長明於是珍貺昭回太和絪緼因普天之同樂覘一人之有慶集五福之繁昌介萬年於長信賡燕喜於椒房流鴻禧於鶴禁以豫以遊伴奐優游紫霞陳􅀈翠駝獻羞却魚龍斥角抵罷楚腰屛齊謳頒大脯而露渥聆廣樂而雲流上有景福之賜下有南山之酬人間三五之夜天上十二之樓洵同民之為樂匪細娛之是求末臣頒揚乎盛世用紀美於千秋南苑賦有序南苑在都城之南舊名海子澶漫百里夙號沃瀛果蓏千區於焉滋植珍羣異羽充牣乎其中復道行宫紛縈乎其際左思所云邅藪為圃值林為苑也蓋其川原曠邈林澤逶迤秋水如空春波似縠烟霏夕羃霞綺晨飛雲淡淡而四垂天蒼蒼而一色鳬鷖唼葉依然太液之池魚鳥親人寧數濠梁之境至其繚垣廣邪馳道周邅接雉堞而非遙瞻龍樓其不逺雲臺九仞丹氣回環春樹萬家清暉映帶匪朴匪斫如跂如翬土不雕鎪木無緹錦有唐后茅茨之制同夏王卑約之風皇上聽覽餘閒時臨是地省耕觀穫常行補助之文表貉弊禽兼肄搜苖之典殺不盡物樂以同民一豫一遊皆成法度每至青陽之月白露之辰都人士女靡不延頸跂足以望屬車之塵焉昔周人之歌靈囿樂翔泳之沾恩漢臣之賦上林美陂池之弛禁况在聖明之代可無頌述之篇臣雖不敏敢獻斯賦賦曰天下為家宅中作縣握瑞凝珍貞符考憲錯繡壤於堯封廓黃圖於禹甸皇居拱於北辰靈囿開於南苑俯洲渚之憑隆對河山之曠逺地臨冀野水􅚈桑乾山從西夾海似東漸噴日薄月纓岡帶川亘廣輪者一百餘里通灌輸者七十二泉乃有嘉卉千畦瓊蔬萬彚緗葉紫莖紅蕤翠蒂羅元圃之綺葱植青津之琅菜朝含露於芳葵夕負霜於玉薤梨棗之沃榛栗之饒鮮苞蕡實珍液金翹青綺門前五色並呈瓜瓞赤瑛盤內三春首薦櫻桃又有瑞獸成羣仙禽接翼露犬紈牛黃支白澤翠羽之翰丹青彩翟之輝金碧沙融而並下鵁鶄波暖而飛來鸂鶒於是環以列衛繚以周墻離宫錯峙峭宇相望綺疏藻井月地雲忩金鋪煥彩璧題耀光可以挹秋爽可以延春陽可以肄搜狩可以閲耕桑皇帝翊七萃於鈎陳御六龍於雕軫指芳樂之平川接華林之勝景鳳蓋平飛霓旌斜引野曠城遙林長路迥層臺雲繞曲榭星懸波明仙仗風送繁絃寶扇抱月金爐挹烟馳道則五里十里廣殿則七筵九筵時省耕於東作每觀稼於西田於時麗日遲遲和風習習花動香來桐垂乳滴雪繭盈川紺轅在籍桑柔而鳩婦頻呼草淺而雉媒始出良耜盈郊懿筐在室灑靈雨於萬家濊湛恩於九陌徂暑維秋金天火流凉颷乍肅寒潦初收紅疏棗圃緑蔓瓜疇見銍艾之如雨喜汙邪之滿篝登神倉而歲有挹聖澤而雲浮若其露暖當空霜黃遍灑二日其同三時多暇九節歌貍六間調馬並驅甫草之中并試長楸之下巧心穿葉迅足騰光千乘競捷萬騎爭驤按鷹大野弋隼髙蒼發六豝之同穴貫雙雁於連行雖舉烽而行釂寧合圍而掩藏既乃布惠展儀儲精凝慮豳風在前虞針當御翺翔乎禮義之園游憩乎詩書之府德彌性以有常樂同民之是與况復樵蘇不拒雉兔斯求有陂池之樂利無禁籞之呵留丹水紫淵無勞於填塹蘭唐蕙圃不假於收罘制猶狹於文囿歌先傳於夏謳願奉翠華之幸長承清蹕之遊太極圖賦并序太極圖者宋儒周氏濓溪之所作也自易言太極至周氏演為圖以授程氏明道伊川闡河洛之微言接洙泗之遺緒千聖之統萬化之原於兹益明厥功甚巨按太極圖說無極而太極乃是道體之本然而由後天以合先天定之以中正仁義主靜立人極者其功全在於聖人此周氏作圖之本意也因推其義以為是賦焉原夫形象之始物則之初權輿化育函蘊苞符泯聲臭於帝載管槖籥於天樞惟太極之為體實衆理之所儲宰萬化而非有體至妙而非無首發明於大易繼闡繹於先儒固演之而為說亦揭之而為圖自非灼見夫道原者其孰能以與於此乎爾其一氣既分二儀初立乾直以專坤翕以闢運元轂以同規控方輿而奠極資始生以何窮位清寧而咸得孰主宰是而德合無疆孰綱維是而健行不息萬象森布列曜著明宣以四氣麗以五行氣隂陽而互宅質剛柔而並呈察廣輪之異數審流峙之殊形孰根柢是而往者不匱孰機緘是而來者常新或動或植分區别質誰為為之而生物不測或濁或清受氣含靈誰為為之而嬗化不停是惟太極立乎最先孕育氣母翕張道緘其體廓爾其理渾然靜以生動其通也不滯動以根靜其復也不遷恍兮忽兮非方所之可執冲兮漠兮詎端倪之可言氣乘機而日出體儲用而內涵即一物而各具㑹萬物以同原如一畫之開天在在皆易如萬川之落月處處皆圓此太極之為至妙而斯圖之所由傳也若乃無極之真二五之質磅礴絪縕妙凝保合其在於人獨靈於物既受性而秉彞亦形生而神發滙五德於靈淵分三才於天臬究睿思之若神知聖功之作哲雖一本而萬殊豈同途而異轍然而修悖各異順逆攸分性近習逺道疏物親孰修道以垂教孰明善以誠身理雖原於太極功尤待於聖人故乃􅑴流歸本披枝見根旨以說暢義以圖陳揭濂洛之性旨闡洙泗之道真啓聖朝之統緒資睿學之髙深於是流連披覽緝熙懋勤金追玉琢日引月伸乃體無而宰有乃執一而御紛藴之在躬兮仁義中正措之在世兮禮樂政刑化普汜兮無外德含𢎞兮好生播太和兮盎溢流元氣兮奫淪風渾噩兮彌古俗恬熙兮愈淳浩浩兮識至治之有象蕩蕩兮恍太極之無名攄管窺以仰則兮吾又何以測廣運之所存經筵賦有序皇上體備生知聖由天縱嫓軒皇之敦敏邁岐石之誕登勤政愛民親賢好學千聖百王之統悉滙於心傳五經六藝之文咸通於神解牙籖夜擁窮甲乙而忘疲彤幄晨開歷春秋而靡間歲當協洽月在夾鍾爰啓經筵再陳講義闡中和之性理探河洛之微言罔不敷揚用資啓沃雖蘊含髙厚非蠡測之能窺而運際文明實頌揚之莫罄末臣幸逢盛典載抃載欣敢竭疏庸敬獻賦賦曰猗聖皇之受命接道統於羲軒闡珍符而祕啓探寶策而苞宣紹唐虞之曩烈抉河洛之遺編道下濟而交泰德健行而協乾殫就將於夙夜勤學問於經筵於時麗景垂天青陽協律獻節初開仲春始吉命宗伯以諏儀咨靈臺而撰日立銅史以司聲候玉繩而辨色開閶闔於彤扉拱雲霄於紫極覩鳯蓋之晨飛見鑾輿之曉出乃有千行鹵簿三署嚴更翔鵷列陛振鷺充庭曳棽離之虹旄飄狎獵之霓旌􅓫如雲而五色扇似月而重輪建九斿之仙仗㑹千官之火城丹墀兮絳闥綺疏兮交錯瑞靄兮絪縕祥光兮景爍宫漏裊兮出花遲爐烟縈兮垂栁弱煥奎璧兮旭日光奏簫韶兮鈞天樂皇帝乃御保和之殿陳九擯之儀發琳琅之祕吐珠玉之輝上公執簡名卿侍幃微言析奧深心剖疑搜羲文之精蘊窮性道之淵微既海深而嶽峻亦天髙而聽卑雖鞀鐸之有採詎塵露之能裨冀芻蕘之可擇庶葑菲之不遺乃罄葵心乃攄竹素仰企淵衷昭兹王度披玉宇之祥風挹天章之調露矢一德以揚言瞻九重而披素抗古迹而為昭荷天衢而生慕若乃牙籖玉軸錦帙藝編交分循覽日昃流連掇仙葩之璀璨掞睿藻之芳妍灑十行之珠翰染七襄之寶箋洽文德於四國披風聲於八埏學既隆而加殖心善下而彌䖍豈與夫麗正邇英石渠白虎訂異參同蹈常襲故修誦說之虛儀飾師儒之文具相潔量以齊觀可同年而共語也於是儲精冲穆宅思優游考庸世室受策介邱定三統之建稽五德之疇明堂辟雍緝熙之化洽升中巡狩曠墜之典修翺翔於仁義之林藪浸潭於道德之源流含咀於藝文之英萃斟酌於儒雅之咨諏扇芳烈以届逺貺貞符而闡幽被光華於四表鞏歷服於千秋末臣揚扢乎盛世用敢作頌以宣休頌曰於鑠我皇德茂隆兮緝熙夙夜昭有融兮作君作師亶明聰兮允恭克讓心謙冲兮講幄時啓亮天工兮思以作睿懋聖功兮化被六合流醇風兮一人有慶萬方同兮上林春燕賦美上林之巨麗擅漢苑之芳菲萃九天之淑景蕩二月之晴暉草成茵而萋碧香生樹以霏微攬韶光之在望見彩燕之交飛爾其翠袖繽紛紅襟容裔紫綺裁裳元雲剪袂翔不千仞來逾萬里警霜露以言歸隨陽和而自致雙棲玳瑁之梁並集珊瑚之砌既乘候以知幾亦託身而得地乃若褉辰未届社日初臨緑楊簾幕紅杏園林泛崇蘭之曉吹釀微雨之春隂啄芹泥之清潤搴蕙幌之深沉拂差池之妍影弄呢喃之好音喜故人之無恙傍舊壘以重尋至於緑水銀塘游絲芳樹冉冉殘英依依落絮乍高兮乍低自來兮自去受風兮欲斜蹴花兮如語惜綺節之漸頽對流光之將暮似展轉以含情向斜陽而欲訴豈如借棲閬苑託質瑶宫芝田蕙圃藹日光風陪瓊林之游宴穿玉樹之青葱憩藻房之婉孌度珠綴之玲瓏掌上呈姿並矜舞態叉頭比玉低颭歌容彼夫列柏之烏槍榆之雀翠羽翩翾雪衣綽約雕籠閉而長間金彈飛而乍落雖飲啄之自娛何樊籠之足樂詎若烏衣艷色大厦重闉棲游畫棟翔集花茵風恬巢穩泥暖雛新祀髙禖而迎候秩元鳥而司分天假之以羽毛人貯之以連雲與遷鶯而並起長流玩於芳春朝㑹宴饗樂章太皇太后升座奏永平之章嘉樂聖母德容穆穆合撰坤元以涵以育鑾輅在陳玉衣有郁展哉皇儀禮明樂淑億萬斯年受兹介福朝賀奏丹陛樂彤庭𢎞邃曲禮攸崇六宫式序千官景從慈雲流䕃下帡上幪自南自北自西自東萬方來賀曷不肅雍昭哉聖孝其樂融融還宫奏壽平之章天佑皇家景命洊申宫闈重慶繁祉川臻詒我有穀用啓後人錫釐衍祚蟄蟄振振六合內外莫不尊親皇太后升座奏豫平之章有懿慈闈惟天下母厚德之符含𢎞九有式嗣徽音以昌厥後福祿來同如山如阜我龍受之遐不覃厚朝賀奏丹陛樂品物光亨兩儀清泰展禮有容式瞻嘉㑹金石相宣貫珠編貝思媚思齊德音四沛以介繁禧萬年保艾曰夀而臧曰昌而大還宫奏順平之章百禮既洽燦然有章瑞雲承蓋麗日舒長以天下養怡愈未央言旋彤幄鳴豫儲祥一人有慶萬壽無疆皇后升座奏淑平之章天清地寧儷尊宸極表是王風母儀萬國體順含章茂明內德福履永綏乃燕乃翼朝賀奏采章有蔚令典告䖍還規折矩鳴玉璆然恩流樛木澤被雲天威儀秩秩率履無愆修齊我后地道承乾還宫奏嘉平之章椒宫奕奕隂教修明褘衣有曜環珮和鳴禮容孔恪萬福來成關睢之化流美風聲皇太子升座奏昭平之章煌煌謨烈受天顯命啓佑元良萬邦以正日重其光星輝海潤寖熾寖昌無疆惟慶朝賀奏胄筵式闢雲物呈珍金相玉粹光輝日新濟濟多士用備宫臣有馮有翼大猷是遵履敬思孝媚兹一人還宫奏咸平之章青宫誕啓有秩其儀正體育德百祿是宜繼明以照景光淑熹垂緒萬年翼我丕基皇帝升座中和韶樂作奏隆平之章朝㑹赫矣天鑒眷求惟聖保佑我清既集有命假樂大君天位以正涖下有容鑒於萬方念兹崇功駿命孔常還宫奏顯平之章於昭三后誕降世德亹亹我皇克艱衮職治定功成中和建極龍飛在天鳯儀於庭式奏王夏垂億萬齡萬壽升座中和韶樂作奏乾平之章二儀清寧三辰順則維帝凝命函冒區域仁恩廣覃至於動植久道化成隆功駿德聖人多壽年世萬億還宫奏太平之章鑒觀惟德丕命惟皇肇兹夀域薄海要荒物性茂育民俗樂康冠帶之國望斗辨方曰惟萬年同於昊天元旦升座中和韶樂作奏元平之章於穆元后敬授人時四時和令三陽肇基鸞路蒼龍載青其旗迎氣布德百工允釐行慶施惠及我蒸黎還宫奏和平之章有奕元㑹天子穆穆蹡蹡羣公至自九服正朔所加海外臣僕率土惠懷萬民子育千齡億祀永綏茀祿冬至升座中和韶樂作奏遂平之章朝符在握道轉鴻鈞天心見復物始資元景長舜日紀協堯春玉琯應瑞寶厯肇新衆正在位輔翼一人還宫奏允平之章萬國在宥一陽斯溥淵默臨朝天職修舉君子道長駢圭聨組占日書雲産祥降嘏宜暘而暘宜雨而雨小宴升座丹陛大樂作奏協平之章聖皇涖止穆穆皇皇百爾卿士章服斯光吹笙鼓琴式燕嘉賔萬福既同歸美一人還宫奏興平之章湛湛露零維豐之芑猗歟在公思皇多士宴示慈惠以洽百禮敬慎威儀福祿來只郊祀導迎奏祐平之章皇天有命列聖承之我后配德文匡武綏海隅寧謐神靈宴娛於萬斯年流慶降釐廟祀道迎奏禧平之章於皇紹烈纍熙重光銷鑠羣慝我武奮揚肅肅清廟峩峩奉璋奠鬯斯馨祚命無疆諸王百官謝恩見朝丹陛大樂作奏慶平之章皇覆萬㝢品物咸亨九賔在列百譯輸誠濟濟卿士式造在廷帝仁如天帝明如日親賢任能愛民育物禮備樂成聲教四訖外藩謝恩見朝丹陛大樂作奏興平之章天盡所覆以畀我清我德配命涵濡羣生萬國蹈舞來享來庭俁俁蹲蹲視彼干戚天威式臨其儀不忒聖德詩有序臣孫遹稽首頓首上言伏惟皇帝陛下即位以來於今二十年敬天恤民敏學勤政夙夜孜孜圖求治理西殄關隴之寇南定甌閩百越之叛以除去民害今又討誅逆賊吳世璠盡收六詔之地布寬大之詔與天下更始東西朔南幅員萬里一乃心力莫不悅服作息之民跂行蠕動之物霑被皇仁咸得其所太平之符千載一日臣備員翰林出入闕廷之下親見皇上文武聖神功德甚大推校古今無與為二因伏自思念翰林之官執筆扎以事上詠歌頌述乃其職也輒不自揣度竊取古義恭撰聖德詩一篇上呈睿覽雖詞理淺陋而據切事實庶以宣明主德傳信於天下後世詩曰皇帝聖武天下畏懷赫斯一怒於滇之池惟彼滇池介於南陲逆臣三桂狡焉盜魁挾其驕黠徼亂自資臘人而噬為狼為豺毒則不翅矜寡有辭皇帝曰吁庸可貸是龔行天罰我不敢私爰命宗臣九罰是加中璋七寸鼗鼓熊旗兵以義起誠不在多日舍三十不棘不舒一舉湘楚再下牂牁降人載路鏃刃不試桂冥殛死身為灰糜凶孽世璠稔惡不回怙恃其險以抗於我惟官臣泰鼓行疾馳塔及育榮各以兵隨㑹於城下環其外陴夾弓潔矢衝車峩峩芻蕘不淫惟敵是求紬臂扼吭胸腹潰離羣醜搖心則內自猜還相告語齎咨涕洟釡魚檻獸其何能久天地之大獨外我儕胡不思服束身自歸生縛巨憝即刑有司璠見窘蹙勢益孤暌退自刎頸幾免刲劙十月戊申城門大開斬送其首皆縻以來有拲有桎厥囚纍纍號而丐命觳觫悲哀遂入其城撫而諭之殱渠宥脅毋怛而疑滇户十萬嘔呀歡喜農不釋耒市㕓不移脫去砧俎以敖以嬉昔在閩越國之藩維負國恩寵實相黨比如木之蘖如蔓之滋樛結牙互不可芟夷乃蹶其本乃伐其枝臨以一旅莫余距違罪人斯得戮於甸師隴蜀之阻塍埒峻巇大師之届若蹈平地既銘劔閣山川永底有逋者寇竄處海涯戈船所指翦為鯨鯢鱗介之族襲我裳衣滇之曠誅為日久矣今也戡定六合一家是惟皇帝與神合謀制勝於中發策决機豈無立慬音芹勇也列子以立慬聞熊羆虎貔進止倚伏一稟成規功烈甚大無與陟躋師武臣力莫之敢尸幕府告捷列上其事函首萬里至於京師與衆共棄揭諸九逵乃蠲吉日獻功報祠告於宗祖天神地示設大愷樂干戚幢麾牲牢玉帛燔燎瘞薶殷禮肇舉景光淑嘉㞕如有聞肸蠁况施乃御正殿頒下詔書大赦天下悉與滌除減免租稅已責去譏收養介特賑貧恤災策勳軍帥析組剖圭慰勞吏士優賚有差褒顯死事易名贈階推恩中外周遍廣該公卿大夫洎我士民踊躍抃舞幸際昌期願上功德升之介邱並集闕下進而致詞皇帝之德不殺而威惠此南國安民豐財以懲不恪􅋏然知畏永永率俾無有效尤皇帝之德仁育義裁并包兼覆細大不遺泰逺於東大䝉於西朔南攸暨膏澤滲漓皇帝之德合撰兩儀五緯順序暘雨曰時年以屢豐萬邦以綏動植之類罔不恬熙皇帝之德止於孝慈以天下養融融怡怡我翼我燕我裕我垂惇叙姻族澤及天胎皇帝之德敏而狥齊典學終始釋念在兹表賢簡能放黜邪詖主靜立極以位二才皇帝之德恭儉身持屏斥浮靡御此繒綈服用浣濯器不雕幾崇朴敦本四方以化末臣不敏業在頌歌再拜稽首作為此詩式示臣庶千億萬祀賜宴瀛臺紀恩詩有序皇帝踐祚之二十年秋七月二十有一日召滿漢諸臣五品以上及翰林科道官賜宴於瀛臺侑幣既頒上尊是錫溫綸叠沛慰藉有加禮成復有蓮實菱藕之賜羣臣咸醉飽而出捆載而歸感戴皇仁淪浹肌髓臣小臣也猥以備員史官與於旅食䝉被恩澤優渥踰涯罄竭涓埃髙深莫報敢循官司之掌竊申頌禱之情敬上七言詩一首凡千有四百字為一百韻具述聖天子所以勤勉臣下德意至深至厚庶宣美於今兹用揚休於來葉詩曰瀛臺仙衛展皇儀瑞靄絪緼曙色披方切怔營瞻紫極忽聞宣喚出彤墀濫竽執簡慙官守錫宴承筐荷主慈是日山河殊爽塏神州景物正恬熙飛葭玉琯鮮飈應聽竹金門素律移殘暑回凉晞湛露薄雲籠曉漏秋曦共欣下濟光明㑹並命來游陟覽時西極嵯峨銀作榜南冥漭沆璧為池麗城逈接朱霞表復道斜縈淥水湄太液中開波浩蕩繚垣遙屬路逶迤芳蓀橈傍圓沙駐彩鷁舟從曲岸艤歘爾乘槎翩欲逝斗然泛海愕還眙雙丸吐納隂陽剖萬象溟濛宇宙彌似有河源千里注更無地軸九垠垂稍窮津涘舒孤眺漸近川原辨四維輕櫂隨流沿復泝清暉入抱憺相怡白蘋嫋嫋瀟湘渚翠荇叢叢雁鶩陂百尺修緡搴玳瑁一奩明鏡拭琉璃練江不動纎蘿影珠浦長涵片月姿鼓枻重教緣菼薍疏渠為别貯瀾漪頗饒菱芡紛漂泳最好芙蕖靜旖旎嫮質雅堪香霧濯靚粧微向午風欹瑤翰競弄沈浮態瓊翼留棲婀娜枝戲葉喁喁騰錦鬛巢莖往往躍蒼龜舊傳閬苑應非幻親到鈞天却自疑便擬凌霄聽廣樂妄希刷羽漸高逵丹梯黛璧還相映紺宇紅亭恍在斯鉤盾田塍原綺錯建章宫觀恰星摛樓迎皓氣融金掌殿倚晴空敞繡楣緹幕徐褰翔鳯咮畫橋平偃宛虹鬐槐隂結蓋苕苕立蘭臭生襟細細吹佳卉芊綿青羃䍥層嵐縹眇碧厜㕒景移栝柏娛澄旭籟發松篁韻逺颸是處祥烟浮藻井數行緑樹隱罘罳當軒始爇回波篆遣仗初收拂霓旗文囿何妨來雉兔堯階仍未剪茅茨因無闕政封章少為有元音刻漏遲倚佩尚思求共理揮絃猶復致疇咨聖朝不隔堂簾義天語頻申慰勉詞鎔鑄由來歸大冶恪恭咸此賴洪施合樽旋召華裾集束帛驚看寵賚隨八繭新繅三就采七襄舊絍五總絲比聞王化追覃葛盡斥穠裝曳薄絁况遇至尊凝黈纊僅教致美在宗彞弋綈自御班朝服織貝偏充好用資彌覺皇仁被體重敢渝臣節上衡持席衣遂得䝉安燠旅食還當示等衰坐接孤卿交履舄人偕伯仲和塤箎蕙纕暫解何容裔艾綬爭懸倍陸離小藉柔苮羅席几半拈弱錫就盤匜宰夫飾具差鉶豆酒正程材薦醴􅋳炊出雕胡光可鑑溲來粔籹􅉸於飴饌行鵝炙薌薰品羮芼蓴菹草木滋糝入茱萸名正醬齊成芍藥作凝脂泄宣辛烈需椒桂雕鏤廉深視鼎鼒自是烹人調水火非關肉吏别澠淄再逢列籞供蕡實適值司罍授縹瓷㑹見繁昌徵物産并將恭儉訓官師赤心先餉重針棗雅操誰當訂座梨的爍珍苞噴秀液繽紛碩果浥寒澌分甘乍喜身多幸佐飲真令樂不支蒲阪冬醪含沆瀣􅌕湖春釀潑酴醿漫勞膳士酬加觶特遣親臣勸媵巵執法詎須憂豸史屬車寧必羡鴟夷滌煩頓療相如渴沈陸堪忘曼倩饑强對酒鎗成蜾裸劇憐茗碗瑩蛟螭龍團乳暖春盈握雀舌香濃雪滿匙酣洽可無吟蟋蟀低徊又見薄崦嵫侵尋執燭防情溢傴僂循牆競職思卜晝禮成皆醉飽自公辭退更將貽析酲薯蔗徒虛語消食檳榔亦謾辭荷本貞萋芬未沫薏尤清苦涅難緇咀餐菱藕能蘇肺凜冽氷霜直沁脾豈意枯腸嘗禁臠他年饑吻厭園葵樵蘇不爨應休璉鮭菜長貧庾杲之說餅曽聞思􅀈餌獻鮮空詫想腴鰭賔筵幸覩壬林盛俊味還探丙穴竒折俎也知恩獨厚加籩竊恐分非宜祗慚菅蒯孤生賤猥受圭璋特逹知歸院幾經花底度戴天私作管中窺德逾軒昊彌謙抑澤覆垓埏益滲漓勒岱銘嵩升懿烈覲文揚武際昌期兩宫尊養無疆慶二體元良有穀詒夙夜常存惟道岸暄寒不輟是經帷躬修渾器符乾曜手纂輿圖奠地祗巡幸只緣親稼穡搜苖端為肄熊羆象鞮早已輸琛賮卭筰俄看折箠笞歲植雞竿疏訟獄時懸豹簴採針規商霖每應桑林禱淇竹奚煩瓠子祠蠲賦恩稠還振廩賜酺詔下又行糜勤民喜見豐年屢招隱欣將好爵縻上相謀謨咸緝亮庶司擕僕各委蛇璇穹恍惚來儲祉宣室從容介受釐景况昭回神氣合宸居肅穆治無為升平嵗月多閒暇交泰君臣有燕私靈沼笙鏞同樂豈卷阿車馬儘間馳惠霑翔泳初何限潤及區萌詎有涯絶勝壺觴修洛褉陋他簫鼓祀汾脽嘉魚試叶崇邱詠鳴鹿重賡小雅詩願被六英揚盛事長歌萬壽鞏丕基盛矣麗矣使人茫乎望洋向若而歎然細尋之叙次周浹音節自然所謂人巧極天工錯者雖使揚馬復起猶當退三舍避之何况餘子尤悔菴評聖祚無疆詞有序欽惟皇帝陛下聖文神武睿算無遺親總六師三臨絶塞逆賊噶爾丹殲滅餘黨畏威慕義降者䴢至西北萬里荒逺之域咸𨽻我版圖既振旅京師告成於郊廟社稷名山大川加上徽稱沛恩天下又飾官方修內治勤求化理務撫綏休養其民自諸王暨大小羣臣生儒耆老凡數萬人稽首闕下固請崇上尊號皇帝謙德尊光推而勿有猗歟至矣功德之崇閎聲教之廣逺自書契以來推校帝王無與為並誠乃巍巍蕩蕩隆三羡五聖祚億萬年無疆之慶也臣叨佐銓衡兼官翰院恭撰五言詩十二章以獻冀得附於六義之末頌揚萬一焉睿策函三略威弧靜八荒武功成偃革文德洽垂裳雲日堯天敞時薰舜樂張微臣同虎拜聖祚永無疆玉鑾初幸處朔塞有飛霙細草搴逾秀寒泉挹更清陽和回雁磧春色繞龍旌果見欃槍掃吹鐃奏凱聲涓流還巨壑枯枿亦長林再駕勞當寧三驅誡失禽弛弓軍禮肅挾纊主恩深雨雪無淹久歡聞杕杜吟畫組開戎幕綏旌耀武車六飛三出塞四海一為家玉障今無外黃圖昔有加虞廷聲教逺祇是限流沙聖德如天覆無私萬物春呼嵩皆赤子欵塞亦王人地接雲霄近恩霑雨露新殊方成樂國從此息風塵四荒仍絶域疆索古難施虎旅揚旌日狼胥折箠時圖嫌王㑹狹功誚鬼方卑合檢東封玉明堂坐受釐共覩成功易方知慮始難頻年紆睿算萬里控宸鑾協策天人應還師袵席安皇心非逺略兵力未全殫遂返西征斾天間駕玉虬雕輿雙鳯㦸仙仗五雲斿佳氣河山迥榮光草木浮羽林無止䟆歌舞遍神州大愷聲容盛中朝典禮崇殷勤下明詔肸蠁答高穹偃武占文露疏勳趂景風何當窺寸管珥筆紀天功淳化彌三極清衷凜萬幾激揚先吏治隱恤在民依幽蔀漸膏澤光天麗景暉猶勤衢室問昃食更宵衣展矣膺鴻號皇哉與古符虛中則圖範謙受接唐虞紫渙溫相謝丹誠迫未輸無由名帝德擊壤共康衢七德光仍鬯三登頌屢聞皇風春浩蕩協氣日絪緼蓂厯無窮葉蒿宫有慶雲萬方同壽豈長戴聖明君松桂堂全集卷一
