body:
  text: 松桂堂全集卷十六吏部侍郎彭孫遹撰早春雜感春隂積未散日夕幽憂并臥聼鳥聲樂已知今日晴空堂謝客久砌草紛相縈梅林栖凍蕚氷雪猶縱橫幽蘭被山徑亦未抽新英含芳各未吐物意已向榮我獨苦離索何以慰此情二月六日小舟入村落書所見條風初布和河流爭解凍舟行村落間遠目聊一送草色緑䝉茸鳴鳥發新哢留連感節物時届春之仲東作行及期四野土膏動夫何氣蕭索生理太倥偬老農前致詞君其聼哀控去年憂旱暵十室九家空力耕盡征稅不留盎與甕嗟哉婦無褌機杼久停弄二麥猶在田未可充磨礱僅存溝壑餘方虞轉徙衆得食既艱難何以事菑種但願今嵗豐隂陽不驕縱雨暘各以時麥禾皆幪幪稍贏糊口資庶免剜肉痛身今七十强雖死亦無瞢我聞老農言惻惻心餘恫肉食愧荷鋤機心羞抱甕載詠伐檀篇詩人有深諷三月三日作今年春事太遲暮三月餘寒未銷却𤣥禽不至桃未華唯有殘梅花綽約兒童報我禊日到採蘭相與共娛樂病夫曵杖强欲出怪底東風苦作惡一編在手聊自遣有酒時復細斟酌海天今日弄新霽蛟蜃樓臺生廣漠越山一髮青嬋姢遠水𥻘𥻘繞城郭居人濵海習舊俗定有水戲間相作祛除疾病祓不祥盛事還如在東洛身雖老矣老更狂尚能一試鰦鰞躍食佛手芥春氣妍和雨破塊畦菜叢生抽軋快鼠壤餘蔬靡不有荼薺菘蒿葱韭薤行盤瞥見青䦨干風土尤珍佛手芥霜刀切玊色深緑芼以芳辛薑與桂沃醯瀹醬五味勻甘滑何曽費齦齘藜羮不糝日苦飢肌腸出火爐吹韝小人之腸易屬厭食鮭三九詫珍怪露寒槐葉徒區區美芹欲獻意亦隘要令田野洗此色蕃植嘉生澤汪濊請從老圃謝不如抱甕終身息機械食笋二十韻花時燕交飛二月美風景春雨過林梢行園劚新笋籜龍蟄土中屈蟠混蚯蚓驚雷脫鱗甲騰躍不可忍嶷嶷頭角殊一出遂脫頴持之付膳宰中厨佐烹飪性腴含土膏口苦存骨鯁菹魚詫鮮脆芼肉誇雋永江南春社後果蓏頗繁稔血色櫻桃顆白皮甘蔗挺肥黃茁韭芽嫩紫掇菌菌俊味此尤絶鮭菜皆下品庶幾千里蓴鹽豉相合併一生未得飽此亦云幸詎足傲大烹端宜染餘鼎又聞本草言能使關鬲冷我其內熱與稍以滌躁猛行當荷長鑱幽篁栽萬頃胸中貯渭川富與通侯等北客勿朵頥煮簀還生哂再食佛手芥菜又用前韻把酒狂吟傲大塊雖不得肉意亦快春蔬味好名亦佳壓倒園中百本薤羔豚魚羽論萬錢一飽之餘皆土芥何哉擊鐘列五鼎飯者珠璣薪者桂古來食肉盡弇鄙齒冷至今生齽齘如金在冶自踴躍不向洪鈞聽爐韝飲河偃鼠自云樂大鵬不慕齊諧怪擇菜何妨尼父窮采薇翻笑伯夷隘玊衡照耀三階明雨露無私春濊濊吾將抱耒歌太平長脫朝衫二負械清明日風雨入賁湖朝來風迅雨亦頻一百五日清明辰相將羣從上小艇㳂洄直到賁湖濵賁湖之水四十里寒漪清淺無纎塵先人邱壠此焉在林間石篆青嶙峋百年遺澤未合泯松檜皆已成龍身比來禍患不可測虞殯屢送期功親只今三月好時節桞枝桃蕚相鮮新東風妍暖吹百卉蘭摧蕙折何曾春我來丙舍三歎息舉酒欲酹含酸辛可憐纍纍冡中骨今日多于上冡人寒食雨中種海棠牆西數弓地不治久蕪穢偶此有餘閒呼童除草萊寒食故多雨兹焉適其㑹種時當及今可以省灌溉海棠方試花移根近牆內春日愔愔長妍華靜相對風吹婀娜枝低昂各有態顧之足清娛狂吟不可耐把盞弄韶光白髮其豫奈小閣前緋桃一本三月始花山桃二月花開時春已老倚閣兩三枝迎風弄晴昊春暘既多情使我顔色好春風莫漫吹零落不自保暮春雨中雜感端居偏自感流年三月芳春欲暮天樓外雲隂長閣雨竹間暝色暗籠烟催租吏至妨吟興種秫田荒費酒錢回首山陽成往事黃公壚畔一悽然西堂舊夢渺無涯物在人亡幾嵗華芳草三經寒食雨木蘭重發隔牆花白頭著述誰相問黃口凄涼事可嗟歎惜遺編零落盡漫將心事付侯芭題顧眉生畫蘭冊無復當年弄墨辰斷紈影裏認前塵青溪畫閣秋如水寫出芳蘭竟體人暮春雨中分韻春愁無奈强登臺漠漠輕隂向午開芳樹獨憐花易萎舊巢偏喜燕重來微風度砌梳苔髮小雨穿􅎉浥麝煤孤負一年櫻笋節急呼瓶杓潑新醅欲持底物遣佳辰花事蹉跎又一旬陳迹暗消蘅薄夢繁英不散麯車塵埀楊暝結萋萋色紅藥寒禁泥泥春稍喜身閒因謝客不妨今雨絶無人欹枕南樓午夢醒荆扉長似鎖岩扄風前鶯老孤簧澀雨後山寒一髻青攬物暗驚時晼晚棲心終愧古沉冥瘦笻手挈夫須笠重結蝸牛入翠屏石池新水纈紋生淡沱風光刺眼明搏黍聲中調律呂長檣影裡辨隂晴花縈裀席初無意草藉壺觴絶有情留取溪山無恙在郊扉晚計幾時成顒侯以春菜詩見示依韻奉答食經自昔有遺制淳熬炮漬稱八珍豪家異味廣搜索羅網直窮山海濵飣盤殽核亦有法攢梨饌栗棗用新豈知貧士有飢色二釜不具唯空囷灌畦鑿隧甚矣憊一銚一鎛皆躬親江南澤國富物産上蔬苐一為菰蓴于何得種最殊絶谷水南浦名春申季鷹緣此謝名爵苦憶此味思沾唇脫身入吳信高蹈不攖凶禍冏與倫我生平世蹤跡異躑躅仕路多艱辛去年索米客京輦素衣蹩躠成緇塵南還海曲届殘臘驅疫索室走萬侲迎新舍舊祓不潔苕茢戞戞桃蓁蓁日月其除老將至倐忽已及今兹春誓當釋巾遂終隱經營十畝河之漘蒔蔬種樹各區半綺葱赤薤羅青津小人但知近且小請為老圃𨽻土均龜腸日飽草木食飲水食茹全其真園丁報我新雨足苦荼甘薺青嶙峋雖然鼠壤厚積斂咄咄老子何不仁其中佳者首春芥含膏釀露蒼皮皴瓊苗荏染攢碧玊霜根柔韌剝白銀和之椒桂助辛烈能達陽氣迎㽔賔乃羮乃瀹薪以燀火力强壯風焚輪瓦盆盛出爛盈案晚菘早韭俱下陳飽餐終日懼過分曾聞蕰藻羞明神區區一意欲上薦九閽阻絶憂羣狺誰職膳宰實司味勿學衆女嗔蠐螓唐虞至聖啜土簋上能節儉下不貧知君用意極深逺目擊澆俗時蹙顰咀毫抽思賦春菜精光皎皎生靈㕙金閨當日好名譽隱然志略存斯民要令德澤浹萬物調燮元化同陶鈞何哉避地匿聲迹朅來東海投緡綸閉門種菜作淨饌低眉鄉里徒謹恂須知用大合有道肯將洴絖試不龜君才百二我十二敢相雄長東西秦善歌必使聲可繼引商刻羽有和人如陳國風諭民志我鄶以下君其豳發緘得此應大噱笑倒七尺頽然身贈施叔允前輩曾摛天藻直鑾陂遺老如今更有誰文獻依然留隔代典型從此憶當時談經夙擅施讐易好學仍歌衛武詩却笑彥回稱世胄不將名德保期頤病中喜木文見過不厭看花日百回偶因臥病罷􅋦杯林鶯一似求聲切海燕偏能趂社來見說閩禺戈乍寢更聞湘楚敵頻摧良時那不追歡賞况有殘梅爛漫開南宫斗閣下觀梅和曉嶽春霜夜坼玊骨鬆縞衣仙子騎蒼龍仙壇幽靚颯來下參斜月落時相逄紛紛桃李盈千百狼藉春容廣眉額世外相期只此君詩成俯仰成今昔人來人去看花頻可嘆今人非昔人但見落花還再發何曾宿草解重新君年與我皆非少白首心期坐相照唯應日日臥花前長須領受傾城笑夏日同天衣珂月行中三上人崔蘧非昭威姪泛舟西湖即事用秋嶽先生韻無恙湖山在臨流一放船雲生飛鳥外雨掛夕陽邊急槳回仙管長堤散錦韉依然行樂地回首太平年白葛當風敞清樽卜晝開微言皆粲可淨侶亦宗雷得嵗占吳㑹傳烽靜越臺栖遲端自好勝地得頻來夙有滄洲趣忘機久狎鷗白沙思桂柁北渚遲蘭舟老玷金門籍心慚石隱流諸公知我者何以為身謀荷風清不暑回艇日初斜小雨吹輕浪新凉著暮花熱從氷氏釋愁向索郎賖近覺浮名纍山翁合毁茶重過鹿苑山房與諸上人話舊仍用秋嶽先生韻七年重到舊招提麈尾談深日又西拈得枯禪惟玊版分來淨饌有香虀雲門雪竇身將老不借軍持手自擕相對忘言還一笑逺公今已過前溪湖心亭晚眺葛帔絺巾信手提虛亭送眺栁隂西蕩胸直欲吞雲海解渴還思搗雪虀白傅風流猶宛在𤣥暉詩句待重擕澄波向夕青蘋散一幅分明罨畫溪重遊南屏山寺山中清話一追提最愛南屏故苑西宗鏡漫參乾矢橛齊廚曾飽淡鹽虀林間月籟頻頻送石上風琴夜夜擕惆悵前遊今漸老紅衣落盡藕花溪湖心寺觀魚莊惠重將往事提濠梁只在小橋西試思朝客貪驕餌何似山僧厭淡虀素鬛宛從空際躍清暉長向䄂中擕石欄徙倚吟懷澀獺祭何當笑玊溪泛舟歸值大雷雨清言日夕已全提一舸初回麯院西雪乳茶香皆法味錦絲蓴滑亦仙虀風濤湖海生飄忽雷雨蛟龍入抱擕策杖歸來銜暝色棕鞋踏破緑莎溪夜熱甚不能就枕誰把南泉舊案提一龕燈火佛幢西病求藥物三年艾熱想氷霜六月虀河朔故人思縱飲汝陽遷客惜分擕晨鐘吟盡清無寐殘月熒熒下石溪答行中上人索詩十年踪跡漫重提濛汜光隂漸向西相索新詩堪噴飯共談往事欲吹虀湖光靜與蓀橈接山色遙將竹杖擕此地淹留應不惡何須逺覔若耶溪苦熱近已棲心學羼提一㕓老我漸江西功名熱客皆壞土事業書生只罋虀無恙山川成繾綣多情煙月解招擕澤車欵假真吾好笑殺衝炎向武溪答西冷友人索新詞入選一壺山鳥勸相提不向垞南即瀼西熟處根苗嫌綺語冷中將息愛黃虀雲林半偈同僧話花塢雙柑共客擕此樂千秋誰㑹得避秦人在捕魚溪部檄促行甚急意忽忽不樂有作漫說雲霄好挈提魯陽難挽崦嵫西十年游宦魚緣竹一日歸田菜作虀園令病旡仙掌賜酒家錢有杖頭擕醉遊溟涬忘身世一任愚溪與惡溪與行公夜坐鹿苑宗風小唱提翛然自恣竹林西十分厭浥黃梅雨一㸃酸寒碧玊虀檻外松筠心共冷懷中氷雪卷堪擕晚來一枕蘧蘧後清夢依稀入剡溪諸上人為豫勸駕戲答當年戈印解親提埀老栖遲谷水西少賤旡人分冷炙長貧有婦耐寒虀清川月好波堪摘碧里烟深屐可擕物外勳名端不減醉侯猶得署雲溪過際公房緑蕉翠竹總菩提淨域依然鷲嶺西世外多情惟老衲人間至味是酸虀圖書莫怪歸裝澀雲水應將坐具擕何日相依行腳去香泉一勺禮曹溪贈天衣上人曾把祗園拂子提親承面目化人西飯溲白雪寒舂米菜瀹黃芽苦口虀天際看雲心自定山中赴講客常擕筍蒲不厭貧家供肯為相尋福見溪飲湖上酒樓錢王三尺手曾提霸業消沉日墜西但覺興亡同泡露何須冷暖别羮虀遏雲聲作紅牙唱頽玊身將翠袖擕從此逃名何處老吳山霅水越來溪行公以詩贈行有答操觚授牘總休提世事侵尋暮景西朝士可憐多肉食野人空自美芹虀風泉月嶠須頻過雨笠霜笻試一擕為語已公移枕簟他年同臥浣花溪東歸贈别諸上人柔毫輕繭手慵提毒熱何時大火西清境欲尋天姥夢好辭難得外孫虀竹爐蕙帳堪留戀烟渚風帆共解擕别後故人能憶我頻將書札問秦溪寄秋嶽先生暑賦從今莫浪提妍顰難效苧蘿西濫叨名似羊公鶴急就篇如石尉虀擊劔我應捐故技登仙君或許同擕江湖隨地多清興花發林塘水滿溪才弱偏將一旅提焚舟也欲濟河西天才獨絶人如虎險韻難成字有虀北海樽罍容客醉東山絲竹待公擕只今國計頻繁甚肯許間身臥竹溪松桂堂全集卷十六
