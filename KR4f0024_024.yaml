body:
  text: 松桂堂全集巻二十四甲子吏部侍郎彭孫遹撰暮春病起得退菴兄信陽來札閒抽幽思託瑤琴辨指尋聲是越吟老覺故鄉真可戀病驚白髪陡相侵落花欲盡憐春事殘帙重開惜晩陰不是瑤華頻見摘清愁日夕杳難禁頌嘉齋中賞芍藥漫説𤣥暉絶代才輕將紅藥厠蒼苔豈知國色多嬌貴不與春工競剪裁瓶浸芳雲歕麝液衣沾仙霧減蘭煤明朝檢㸃餘香在知到荀家坐上來送廷表典試貴州竹王水色潑新醅髻子山光碧玊堆五尺道中亭徼逈七千里外傳車來口銜仙藻騰騰去手頓天紘殷殷開三十三人齊北面受經誰是尹珍才沅江西上是牂牁路入炎荒奈逺何稍喜關河無斥候已銷兵甲有絃歌人行箐閣秋陰靜雨灑盤江瘴氣和歸到楚南重弭節湘中風物未蹉跎秋夜聞鄰家琵琶聲清秋夜色落銀灣一曲哀彈月滿山㡳是當年查八十流傳法樂到人間與渭清季貞方寅雪崕公凱遊憫忠寺步屧城南路寒沙一徑微還尋黄葉寺同叩白雲扉斜日行將盡孤蓬坐自飛數行棲暝色林鳥亦知歸題東川讀書秋樹根圖讀書秋樹根聲出秋樹杪秋樹髙無枝森疎不知老秋山無行跡秋葉紅鱗鱗微吟散林樾此中知有人嗒焉坐日夕林氣何清微時時落空翠濕我芙蓉衣落落一邱壑悠悠與世疎此境有時有斯人天下無送錢越江典試江西日月麗乎天山川鬱以阻一氣無淳漓猶然此終古㪚而為人文精英之所聚前者既比肩於後或接武胡為嘆乏人晉材必用楚三代不㳂法求賢各自輔曠典亮難追里選而鄉舉今之進士科其來千年許勦説互牽綴市心類商賈雖然多雅辭聖道益榛莽利一害反百為效畧可覩何以救其失道在慎所取苟得良有司拔十猶得五兹焉嵗甲子興賢上天府勅㫖遣詞臣君當徃江右江右於前朝士之淵與藪名卿才大夫姓字照官簿節義與文章累詞不勝數兵戈比瀕轉流離去鄉土諸生頗輟業風氣頗呰寙君既才且賢時名播寰宇藻鑑洞精微氷雪澡肺腑此行勉自植素藴期一吐摭華食其實毋徒事含咀庶搜天下才持之報聖主我忝同官寮因之色飛舞為國賀得人不用相勞苦臨岐寄斯篇聊以代出祖懷李天生清渭日悠悠金天嶽色浮青雲懷舊好白首悵同遊盛世甘偕隠斯人實莫儔漫將詩筆較一疏自千秋送沈客子下第歸當湖聊揀秋來白袷衣柘湖重問舊漁磯江鄉此日饒風物只為鱸魚也合歸歸去東臯又一時翠漪紅纈影參差從今莫賦連蜷霓此字人間總未知初冬篇初冬届嚴律玉衡指北維切切霜氣肅曖曖白日低朔風無停號萬竅多悲噫坐見庭際樹黄落成枯枝伊昔妍華節四顧揚芳㽔盛衰本殊絶相去曽幾時盛亦勿自恃衰亦勿自悲物理有消息天地豈我私所恨無貞心靃靡不自持矯然松栢性嵗寒終不移寒夜聞柝聲風𦂳霜嚴夜鄉晨最難禁是苦寒人赭衣不遇張京兆辛苦長安聚柝人同年馮方寅徒步入閩迎其尊府君之喪險阻艱難嘗厯殆遍呉中好事者繪之為圖因系以詩仙霞關外路漫漫危棧連峰四百盤誰識孤兒心獨苦羊腸只作九逵㸔暮冬偕同郡諸朋好集大司空杜遇徐先生齋風檠夜靜燭花深清景迢迢漏水沉厭腹難消千品富酡顔不怕一寒侵人同鄉郡操呉語詩有南音抵㑹吟身是樊川舊賔客春來還擬數追尋嵗暮雜感落落存孤抱栖栖負夙心誰云樽五石自笑帚千金月俸慚尸素年資媿滯淫汗青何日事垂老待抽簮日上芸臺直悠悠嵗月遒氷霜雙繭足風雪一羊裘白首如新識青雲感舊遊忩前理殘易灑涙説施讐全家四十口茅屋兩三楹燈火寒相共忩扉曉暫明身如疣有贅官似指無名不及嚴夫子蕭然襆被行殘年心賞薄百感髩絲生豈戀三升醖猶依二尺檠執經須碩彦齒胄有儒英自合安衰劣非髙拙宦名作苦山妻健勝衣稚子長未嫌鮭菜惡祇覺麥魚香物理由來定人生底事忙家家燒爆竹竟夕祀黄羊十二月四日過李惺菴宅見庭菊未殘賦之客意不自憀搖落愴心目移屧過南鄰微吟憺相屬草堂幽以閒傍有數叢菊疎花耿餘香殘枝凈寒緑餐英感楚騷酌水想酈谷要子以嵗寒保此顔如玉十二月五日大雪用東坡星聚堂韻仍效歐陽公體三年刻楮成一葉五色玲瓏粲干雪豈知雪態更姣好天巧人工逈懸絶曉來忩紙􅉡􅉡鳴冷壓屋梁凍䲭折起行庭際没䨇踝屐齒稜稜半明滅閉門髙詠坡仙詩爽氣摩空霜影掣詩家體物好形似有類隋宫剪綵纈醉翁舊令禁不為未許眼中著金屑聚星堂上客星㪚六百餘年一轉瞥恨不同時厠賔從徒慕昔賢守遺説詩成擱筆起三嘆卧聽霜飈響簷鐡十二月廿五日又大雪再拈前韻瓦爐吹火爇枯葉仰視寒空又飛雪忽斜忽整疎又宻弄姿作態俱妍絶柴門無路人跡斷躑躅渾如阪九折摛毫徃徃憂手龜曵履時時悲趾滅穴鼠不容晝自嘯韝鷹無食飢欲掣故作凄寒壓酒盞時有餘妍㸃衣纈閉門僵卧一無事思向雲中擣雲屑十年羇旅興欲盡萬事空華眼一瞥易衣併日亦何憂湯餅牢丸儘堪説更從古人𨽻僻事大樹聞前笑殷鐡除夜寄寓庸南忩清話撥爐烟殘雪餘寒夜陡然酒怯愁濃為味減燈知春近作花妍宦情本淡甘人後詩格爭新怵我先報塞有時歸有日汗青端的是明年松桂堂全集巻二十四
