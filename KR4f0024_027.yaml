body:
  text: 松桂堂全集巻二十七丁卯吏部侍郎彭孫遹撰元夕三朝休沐上元辰瀟洒琴書共此身簾纈餘寒停素籟燭花孤影傲青春人譏周顗同衰鳯自笑檀珪作餓麟良夜厭厭憺無寐露華如水月如塵正月十九日院中齋宿即事玉堂宿戒集鳴珂夜色蒼蒼拂絳河翠藻月寒鈴索静青蘋風軟篆烟和沉浮詎敢稱朝隠拙劣真當玷制科抽思欲成徴士頌故人零落已無多送呉幼弨還石門梧鳯能調六管鳴雲鵬終赴九霄程人皆寢黙因金注天與摧藏是玊成焚草豈期收末議採蘭偏喜遂私情輕軒駢竹從容在早使孤臣戴聖明送徐電發還呉江蘭有春芳菊有秋鱸鄉亭子枕滄洲人間底事營三窟海外徒然覔九州短轂行田驅鼫鼠敝廬厠水結蝸牛書籖錯落吟毫健永日髙眠足唱酬山村楓葉冷呉霜口占新詩一兩行繡纈千波縈練影朱絲雙㲄韞瑤光江湖雁集真無事霄漢鴻冥詎有妨從此石渠應寂寞幾人經術似徐防再送呉幼弨語水緑波生縠皂林碧樹縈烟那不抽簮歸去江鄉春物増妍題潜籟軒次韻草堂塵外境斜厠碧谿隈居與三山近人惟二仲來行吟清籟發坐嘯緑樽開却笑牽絲客經年去不囘長山呉木欣輯其大父旋公先生手蹟為一冊將刻諸金石以垂不朽比來京師出示余余甚嘉其志賦此篇遺之隋珠荆玉絶塵埃鵠峙鸞翔妙剪裁孔氏壁中藏弆得韋家籯裏受持來若為珍重連城寳幸不銷沉浩刼灰知爾用心良獨厚一披縹帙一低徊送李厚菴先生省覲還安溪翰林厠禁近不與他曹俱士苟與兹選邈在天之衢託業必逺大近文砥廉隅風流逝不古稍與曩者殊臨軒數教勅徳意多勤劬思得方正士而為之楷模先生起閩海卓立為醇儒學必根孔孟誦法惟唐虞鴻筆扛九鼎髙文追三謨簡直學士院徃哉帝曰俞拜官甫三月畧見權與輿多士有矜式斯道相匡扶羣材受砥石頗覺改舊趨一朝請急去不憗留須臾自言臣有母年已七十餘相隔七千里被疢困未蘇嚙指心忽痛果得南來書本圖罄竭者以此方寸愚方寸今已亂安逭瘝曠誅冀一放臣還昏晨奉起居天髙聽則卑疾痛容可呼委曲見矜許不以令甲拘仍命虛左待毋輕議替除稽首拜恩命式遄不俟車草跋亦水涉山川何鬱紆入門拜阿母阿母心懽娯舊疢霍然已玊顔益敷愉百嵗方未央愛日藹以舒須念主恩厚還此承明廬亟去而亟來慎勿行趦趄來以答側席去以慰倚閭子臣一無負忠義兩不孤伊余綴後陳送别三歎吁豈無吾邱恨或有温生裾此事可以風名教非區區作詩展古義不用歌驪駒午日碧琅小殘泛紅鱗一寸菖蒲九節春莫道良辰須盡醉江潭曽有獨醒人冬夜院中齋宿即事成詠槐㕔寂寂致齋辰并榻蕭然㪚帙頻鉛槧生涯清似水紙綢氣味煖如春殘星在户初分夜寒月當忩欲就人一夢青雲三十載蓬山踪跡恍前塵又即事呈王龍洲朱即山孟繹來沈維菴王鶴汀髙素侯諸前輩半生踪跡類孤蓬偶傍青雲竊自雄清峭棋聲風定後參差麈尾月明中間披古碣摩挲遍重話前朝感慨同他日玉堂徴故事姓名還得附諸公疊前韻呈諸先生步屧空階攓雪蓬髙談不减滑稽雄蕭然興寄形骸外藉甚風流謦欬中官可忘貧如栗里交能耐乆似元同南郊大禮叨陪從傲殺周南太史公袁杜少千里貽書以丹榴青柿見餉口占二絶寄謝千里書來逺見貽榴名安石柿烏椑知君初續閒居賦正是輕軒奉母時素書一部轉愁予瑤草凋殘嵗月徂恨不與君鈴索畔共餐氷雪飽清腴松桂堂全集巻二十七
