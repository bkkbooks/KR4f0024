body:
  text: 松桂堂全集卷四十三吏部侍郎彭孫遹撰南􅐹集三赴惠州别崔大羈居不知嵗值此蕉萃時再渡榕溪水重違故人期我車方東邁我心已西悲寒禽驚夕瀨木葉感凉颸年芳暗銷落誰能長自持博羅道寄東莞諸故舊江梅海燕嵗將周沙際依然共此遊零雨不堪頻逺别孤舟何意又南浮扶留蔓冷寒塘夕諸蔗田荒野水秋笙鶴不來靈境杳石樓花首自悠悠白鶴峯曩昔好逺遊幸此為羈寓勝地撰良辰名山遂遐慕亭亭波影間杳杳峯陰暮仙宇已摧頽道人時一遇相向嗒無言林禽對梳羽昔賢曾買居遺蹟猶如故雪浪擁前除松根滴秋雨欲解塵中纓結茅峯頂住恨不起蘇公從之執巾屨嵗暮牆角緋桃盛開曉日烘桃蕚凌寒獨試花無人憐嵗晏空自惜朝華無題二首風簾愁對落花裀萬事疏慵過一春玉暖乍拋新刺襪香濃不散舊啼巾思深如向燈前出淚盡應緣夢裏頻凖擬相逢親說與綵帆何日渡江津桂寢秋深翠袖凉重簾委地靜焚香纎寒觸手嫌金剪逺别驚心怯鈿牀氷蕚欵冬櫺眼白晴花拆暖蜜脾黃炎方臘盡無風雪九月江南夜有霜惠州除夕立春寄蘧非蒼輅迎郊日辛盤餞臘辰暖生隄外樹晴揚陌頭塵花信山桃落風光澗草新林禽翻翠羽江吹起青蘋氣候殊吾土羈棲隔故人五羊遙憶汝萬里各孤身廨舍疏燈夕琴書旅况貧客愁銷貝葉鄉字斷文鱗歸訃滄洲近交情白首真相期紅藥畔婪尾送殘春丙午元旦客中驚早起嶺外又新年旅服辭纎纊江城閙曉煙星河猶暗藹雲日漸暄姸不道天南路陽春到獨先合江樓曉樹青如沐春波漫不流思君無近逺風雨合江樓閲除目知漢蜚得錦縣有寄畿邑當新建君年仕正强唯應酌遼水兼欲問南陽鳳舉丹霄逺花明墨綬香論才多不次努力莫回翔正月四日從惠州發舟至廣州途中用東坡新年五首韻示同舟諸子旅食三更嵗春王五紀元舟經羅帶水花暗木棉村烟渚波將暝風林葉自翻停橈須我友濁酒話晨昏羅浮好洞壑此去路何之瑶草一千嵗烟鬟十萬枝欲尋行藥客已過落梅時三歎懷勾漏斯人洵可兒飛雲峯下邑霧堞捲江清客路逢人日山光遍子城桂漿留燠在菜甲迸寒生一嚼誇風味何如糝玉羮挂席平湖外回帆鱷渚東侵尋時序改憑弔水雲空天畔青陽節峯頭白鶴翁持杯遙一酹心跡倘相同水鄉風氣早村墅緑陰繁遙想秦溪曲春光滿故園梅英堪泛酒蘭茁已當門舊里牆西地依依長竹孫斤斗水暮雨猶紛沓寒潮正渺漫斷腸斤斗水春色滿漁竿朝雲墓朝雲久已化遺墓復湮沈松竹湖陰外棲禪何處林端溪石硯歌端溪之石數十坑一一書家有標格屏風嶺背朝天峯質亦黝然少潤澤滑不拒墨堅不粗上者無如水岩石巧匠購之琢為硯價奪琉璃與琥珀百餘年來坑石枯溪水幽深難往索我遊南越無所須庶幾得此置几席搜剔山穴心力窮忽然快遇連城璧秀眼泓生鸜鵒青玉膚斜沁芭蕉白碧泥搓手軟欲圓蒼骨留烟膩無迹柔毫已自吐仙英烈麝還能發珠液山窗客去心手閒對爾真堪永朝夕毛生楮生試與俱一笑相將成吾癖元夕聞雷積雨作元夕輕雷動太虛微寒臨枕簟餘潤襲琴書竹徑人踪合松窗客夢疏朝來理春草新緑滿庭除春雨堂芍藥歌荔支不過嶺以北芍藥不過嶺以南由來物性有如此風土遷移豈所堪春雨堂前十數本來自揚州舊隋苑胡家纈子鮑家黃花蕊依然暗香逺困倚東風不自持偶乘氣暖一紛披託根嶺外非得意逞艷宫中自有時此花嬌貴世無比壓盡紛紛衆桃李可憐國色與天香憔悴蠻煙瘴雨裏禺山劉鋹當年霸業雄禺山相對起離宫藥洲花塢無蹤跡只在西風野燒中宿春雨堂西齊春夜西齊臥心期得自論白鷴間對客修竹靜當門書帙從風亂燈花欲雨繁清觴寒不御徒有酒盈樽正月小盡日留别退菴兄肅肅隨陽翼粲粲荆樹枝行斷聲自求花落根不移人生各有役所苦逺别離春鐙搖繁雨哀響激縈絲淹留豈不願取别終有時行矣戒舟楫揮手江之湄客行日以逺客心日以悲客心且莫悲努力勉自持良晤知不遙深秋以為期西堂坐清曉竹露青漫漫酒盡未成别微雨增春寒行者誡風波居者慎眠餐臨行千萬語雜亂初無端情至不厭煩憂來且自寬念為兄與弟結好逾金蘭各有四方志寧謀一室歡㑹當依青雲高飛生羽翰何為空歎息戚戚摧心肝曺圻宅觀山谷墨蹟涪翁墨蹟此第一試向堂中開錦帙伏波祠句擘窠書似在涪州得意筆精力夭矯透紙㾗凌蘇轢米寧須論蒼然筋骨徑于鐵須知成就顔平原曺圻雅士頗好竒家藏金石不可訾一遭兵燹頃刻盡此卷獨為神護持清秋置酒遍示客觀者爭誇好風格誰留當日黨人名千載猶生人愛惜再寄吳念克灕江緘逺思書到已春殘訊牒煩高致才人困始安瘴深嵐氣溼戍苦角聲寒不及衡陽雁因風振羽翰寄示屠四清海飄零十載餘刀環舊約總成虛閨中何似休相憶目送歸鴻不寄書秋蘭引答廖秀才南鄰廖生頗不俗贈我蘭苕碧于玉綺石青泥交錯裁臨行酬爾秋蘭曲採之為佩􅋵入琴芳澤還堪遺所欽莫怨靈修唯自惜不妨長此結同心南津口寄王默菴孤村臨渡口斜日下長林舊侣平原約相思單父琴垂楊將暮色芳草欲歸心愁對春江水花前悵别深泊胥江夜大雷雨新月川西影漸湮溼雲千里白鱗鱗雷聲欲起蛟龍蟄雨氣能回草木春戍角吹寒依積水林光入暝結愁燐孤舟搖曵空江夕更借漁簔作比鄰花朝好趂松醪熟鄉愁仗一澆客心驚日月怕說是花朝入湞陽峽三十里至釣絲灘下湞江不可泝湞峽多回洑雲木蔽復虧岡巒起還伏春雨沒沙尾江風飽帆腹輕舟上前灘杳然烟水緑夜靜疑有人月明理釣竹出峽後次始興江上寄陳元孝景物凄凉感昔逰孤吟况復軫離憂南梁山院春長在西漢樓船水自流沙石尚含陵谷態雲烟不斷古今愁始興江上千株樹嵗嵗花開送客舟清逺峽口寄陸孝山三年回首嶺雲孤計日江春到欲徂萬里人歸經暮雨二禺山盡接平蕪方音漸已諳啼鵙客路猶聞喚鷓鴣郡閣故人相見近不禁吟興滿江湖潖江水口江流寒峽外沙岸逺依微烟草春無際雲林路不違葉明殘月上川響夜漁歸何事愁凄泊蕭然客子衣觀音巖峩峩千仞壁杳杳百尺潭石勢忽中坼安此大士龕逺響激春瀨蒼烟騰逺嵐一燈長寂寂聞見了不參老僧久住此白髮紛䰐鬖時為乞食出乞已還歸菴微風送哀梵水石清相含抵英德縣郭就市買得小英石數枚嵓壑皆具粵山故竒特荒逺每難就誰知一拳石盡此五嶺秀貌古態愈妍峯多骨彌瘦朝來風雨鳴萬山勢若鬬此石亦陰冥黝然色非舊時有雨氣生如向雲根潄欲攜嵒壑姿一洗塵容陋涵暉與碧落爽氣在襟袖雨中過白芒村寄高山人儼春陰生驟寒溪上無人迹石筍清相羅翠烟紛可摘欲持三尺絹寫此春山碧却憶山中人逺在龍池宅惆悵不同逰白芒風雨夕韶陽道上寄融谷數從帆底眺晨星蕩漾孤舟類水萍夜雨獨行中宿峽春風重上曲江亭武溪渺渺寒流白韶石蒼蒼落照青得似洞庭張樂處仙音雖好不同聽逰丹霞山不果寄淡公沃洲不可到歎息久離羣逺水人空返東風草又薰茶林春雨足竹澗暗泉分日暮山中客多應詠碧雲魚梁灘下泊暗色起何處忽然雲水昏春燒如新月逺掛山一㾗寒禽呼木杪暗蟲沸草根遙見暝際火知有林外村孤舟欲棲泊溜如雲濤奔羈旅一無託菀結難自論矯首眺天末躑躅勞心魂聞雁千里鄉關落照邊花時憔悴獨成眠相江亭上聞歸雁嶺外飄零又幾年次曺溪水口遙禮南華山寺憮然有作逶迤白土村瀧水深且廣春風吹我舟搖蕩不能上其傍有漫流微波清漾漾云是昔曺溪覺路從茲往我聞能大師傳衣振遺響風幡發妙悟泉石契真賞說法化毒龍安心息狂象當時無上乘南宗為之長于今已千年一燈猶晃朗勝因夙企慕世味苦勞攘酌水未尋源入林徒託想翠微遙一禮顧已生悽愴逝將攝身心長往捐塵鞅洲田曲折窮岡勢齗齗露石根上瀧春水急將雨野陰繁寒蚓吟愁思輕舟搖夢魂回看晨發處明滅見孤村仁化渡口再寄淡公丹霞渺何許千嶂插晴空却望雲生處君應在此中客店寒食細雨平江溼晚烟客中寒食倍凄然津樓落日重回首腸斷東風燕子前上已日飲陸孝山池亭留别曲磴花間路疏簾竹裏亭林泉生逺想蘭杜發幽馨藉草春將夕流杯晚未停多情池畔柳終日向人青游楊歷巖澄旭滿空山來逰值春暮寒嵒不知春時見花生樹澤氣上為雲飛流濺如霧幽興晚未窮僕夫告歸路理䇿將來歸丘壑緬餘慕後夜憶兹逰悠然夢同趣南雄别友人風吹楊柳枝花落東城陌日暮對芳樽歸人轉為客經張文獻公祠下作岝崿臺侯嶺荒凉舊相祠衣冠留故里風度想當時西幸知機早南來遣祭遲難追天寶恨空撫曲江碑杳杳深山裏飀飀古樹枝棲鼯窺宿莽行客拜虛帷溪日回仙馭林烟捲翠旗九京如可作千載有餘思嶺上寄考功兄來雁亭前雁北飛梅花嶺下折芳菲相思比似凌江水日夕南流不肯歸過嶺二首春風又逐塞鴻飛橫浦人烟入望微却憶天南真似夢暫來嶺北已如歸松陰不改當時碧柳色曾攀去日衣猶有平生師友在寸心長自戀音徽日溯湞江問客程一朝過嶺覺身輕時平已罷三關戍興盡空為百粵行鳳鳥承旗遊碧落飛亷託乘入朱明他年倘續羅浮志流寓還堪占姓名挂角寺寄孝山一憩松關日半曛遙遙江嶺路中分回頭種玉亭前路萬叠春山入暮雲南還至橫浦驛前與程五别處憶向清秋採白蘋今來江上值殘春一從橫浦三年别南北俱為萬里人游南安東山寺觀周量壁間題句東林禪誦地寂寂對江濵倚檻流清矚當軒合翠筠凄凉花院蹟隔絶鳳池人蘭訊憑誰寄山中欲暮春新田别客舊邑頽城在新田落照微片帆將客去雙燕送春歸夜月留空局寒花攬别衣不堪江上路欲去更依依詠懷十七首亭亭玉葉梅皎皎如霜白朝為枝上花暮贈隴頭客寧知相賞辰即為零落夕山花不知名終嵗無人摘緣溪不見人日出東山巔照見秋禾根曉露猶涓涓空橰引激水自灌原上田雖免人力勞終苦機事牽不如漢陰叟抱甕以終年富貴多危機貧賤心不愈客逰常戚戚鄉里無逺圖人生安所適四顧無一娛東望有仙山山勢欎以孤三百七十峯黛色天下無銅乳穴內流螢芝石上敷排雲凌清海御氣馳蒼梧舉手招霍龍我欲與之俱猗猗山上桐欎欎河邊柳秋至葉自零榮華安得久古人若無死樂亦非我有矧無久視方百年一反手軒冕非我榮金石非我夀彈琴而歌風所期在不朽素律吹暮秋北風凄以怒百卉悴不芳木葉辭林樹蟋蟀在户鳴陽禽亦南度萬景不暫待涉迹皆成故昔我青雲交接軫馳皇路宿草忽已繁纍纍丘與墓蜉蝣美衣裳朝菌不及暮富貴不永年榮華亦何慕支公好畜馬阮生好蠟屐所好故不同各自成竒癖竝負曠逺名俱有高世迹終勝王安豐時時理籌䇲漢苑有佳人顔色麗明霞一旦先朝露委棄泥與沙至今冢上魂化為田中花開時如艷雪幽香世無加花香有時滅紅顔易消歇寧為哉生光勿作團圞月自昔遭放棄歸臥南山隈日月亦已屢明魄頻相催淑氣布雲物好鳥鳴池臺朝來里社罷元燕翩然回庭中雜花樹春風五度開而我猶偃蹇棲棲困蒿萊百嵗不可得逝陰難再來且對有數景共傾無算杯誰能慕臭腐鬱結使心哀少年學干祿振翮思高林上策雖見收世務非所任內顧宦情薄十載猶浮沈濁酒足斟酌枯桐有清音詩書耽夙好良朋多素襟褚小不懷巨綆短難汲深本自安吾拙詎有避世心客從山中來今晨款我扉手持一書札問君胡不歸山中春未老景物世所稀深翠照檻户新苗長蕨薇松酒既已熟林筍亦已肥塵情患鮮歡勞生思息機誓當從客去高蹈還初衣結廬在山曲採藥山之陽宿雲起半嶺滃然滿高岡川上微雨過靄靄桑榆光心靜理無忤緣順境自忘日暮旦復去荷鋤歸草堂髙士不恆有吾陋尚子平踉蹌了婚嫁始為五嶽行人壽能幾何苦俟黃河清徒令噉名客千載口實生北山有猿鶴笑爾未忘情弱齡慕高躅遐舉遺俗塵採芝商山曲種黍桃花津中道更迷惑轉與世味親羈紲相窘束此志久不伸識暗物多忤才高禍與鄰庶幾木雁間可以處我身君子戒尚口吉人貴寡辭流連三緘銘反復白圭詩國武好盡言龜鑑良在茲嗣宗名至慎此理誰能知春陽何遲遲元景每數數崦嵫日易盡丙夜漏方促立身在壯年我友敬相朂遲暮空有懷為時苦不足徒捨若木暉而來就螢燭晚出南安城還視東山塢紙錢白紛紛多于寒食雨松柏夾高原饑烏啼墓門肉食厚肌體徒為螻蟻恩金亦不可成河亦不可塞安得絳雪丹駐此好顔色南薰長萬物草木俱蘢蔥鳥雀樂茂林啁啾鳴好風動植各自得曠然天地中心空得喪一障盡物我通真契不在逺妙理良難窮登贑州城晚眺寒日下津樓天空夜色浮城收八境盡江帶十川流山翠濃生雨灘聲冷似秋無能將逺思山月迥含愁章貢臺二水城隂合髙臺北望頻交綏徴往事握節泣孤臣苦霧冥冥雨寒蕪寂寂春曾藏周史碧千載結幽燐西津橋下遲融谷不至春渚霞生雨乍收鬱孤臺畔遲行舟生憎章貢無情水相背東西各自流儲潭欲叩儲君祠回舟繫蘭槳凌亂涉清波知是春沙長大蓼灘阻風風雨昏林氣江流掩石鱗空山無主者不禁採樵人下十八灘石人羅立青磷磷大壺小壺勢漸馴長年最能莫謾語比來吾已粗知津張家渡口望青原山曾聞淨居寺說法雨花繁不識山中路獨尋沙際村巖光含羣象溪聲息衆喧欲持無上義一一問青原雨夜泊吉陽城外喜龍臚先帶雲見過平沙漠漠雨艇子繫江隈忽見瓊枝樹驚從何處來重闉當夜啓蠟炬背風開知向青原道山中聽講回樟樹風散林香落浦沙吹來何處野人家沿溪偶共山僧話知是江邊樟樹花度嶺後寄上筠菴夫子驪曲動城樓波光引棹謳三年南越客萬里北行舟久習文身俗真為建德遊窮經曾問業負笈近從游薄祿多傾倒深情少報酬别來春冉冉望斷水悠悠鄉夢邀桑落江舲怨石尤孤村傳杏粥四月下椒丘吳樹帆陰曉燕雲馬首秋後期知杪嵗計日釋離憂百粵通筐篚千秋奉冕旒日高金闕迥雪暖玉河流逺待朝天使星霜一畫輈洪州送人入楚垂老休官去離居送客情夕陽樊口渡秋草大堤平宋玉居猶在宜城酒正清莫嫌妻子纍負戴足逃名重登滕王閣晚眺兵餘存勝蹟江渚問前遊孤客重經地春風一倚樓殘星埋劍氣寒雨斷書郵極目長安逺悲來不可留南浦南浦吟愁夕凌風獨叩舷流雲連近郭畫棟俯寒烟春盡江湖上心飛雁鶩邊緑楊如有恨花白已成綿豫章城下送春有懷故園兄弟城下烟波暮可哀扁舟日夕更瀠洄一春又向他鄉盡千里曾無尺素來野鶩孤飛烟裏沒江帆相背雨中開故園風景今何似池草汀花夢幾回邱龍標納姬于外館巫巒稚有詩相調余亦和二絶霛谷嵯峨臨水清少年聲迹滿南城但教境內無枹鼓眉憮何妨幹理名畫閣名姝絶代無浦雲山雨對金鋪偷將內史臨川筆搨得滕王蛺蝶圖西江夜發寄陳伯璣豫章三載夢樽酒慰平生倚閣聞清詠臨流悵逺行雲低津步樹日薄潁侯城欲叩高人宅東湖春水平康郎湖彭蠡湖頭雨暫停康郎山下獨揚舲逺洲一線拖微緑春岫雙尖送晚青鏡裏波明生顧兔畫中舟小㸃蜻蜓夜凉忽有漁歌起坐對西風濁酒醒彭蠡夜泛清淺宫亭水濺濺百道流殘春風送客終夜月隨舟野火沈葭葦遙天挂斗牛相依有鷗鷺任意宿汀洲初夏孤舟人卧起初夏氣猶清已近餘千渡猶多逺道情捲簾看落絮欹枕聽殘鶯别意如春雨空江頃刻盈古意東風當户入花絮繞城飛芳草青埋履繁陰緑滿衣採桑驚戴勝入室感伊威眼見春光盡征人幾日歸湖中即事夕泛南湖渚歸程自此分山川餘越地風俗舊番君逺墅烟棲草空舟水接雲年來傷物役翻羡白鷗羣湖中寄涂萬年杳杳踐修途苕苕陟孤巘沙曠水蕪寒江深春日晚川路極威紆流芳增繾綣鄱水接盱江室邇人何逺饒州東湖湖光叢水竹晚憩有清陰不見詩人宅唯餘寶樹林竹深涼氣進水滿夕陽沈坐聽拏音杳蕭然出世心寄巫巒稚一别南州道里賖他時何處寄疏麻蛾眉亭下來相訪明月滄波是子家饒州僦一舟甚小夜與蘧非抵足卧鄱江不易涉去路轉逶迤只合摧眉坐猶堪擁膝歌行舟如落葉歸思極流波髙卧聽邪許徼天已過多初夏江行江郭人孤往墟烟水一涯新暄生夏霧初霽失朝霞弱燕捎花淺回波㸃絮斜扁舟曾不繫乘興下汀沙浴佛日佛日凌晨起林葵露未晞柘烟江店飯苧雪石城衣貧覺為農晚愁緣入道稀祗應釋形纍長採故山薇由浮梁抵祁門道中四月上浮梁溪清水活活潄流就帆陰晞髮迎蘋末閩蘭花已抽吳桑葉初捋覽物悟嵗時放懷信超越浩然箕潁心果哉亮難奪次鮎魚山下朝日被林邱桑麻蔭道周晨雞鳴桂楫新燕掠萍舟水市蠶初浴山田麥未秋漸知鄉郡近三載遂刀頭石鼓村亂石驚流徹夜聞緑波吹雨細成紋風禽和夢催清曉水碓無人搗白雲昌浦近從千澗落浙潮逺為一山分鄉園北望無消息煩思誰堪坐似焚舟曉臥覺四維靜杳然舟已行殘月時一照夜氣愴以清不聞人語響但聞流水聲途次祁山山勢臨孤邑江源出舊鄣花林霏夕秀茶臼搗餘香流水春陰逝浮雲世態凉青蘿岩屋在吾意欲褰裳水宿水宿七旬餘迢迢返故廬粵洲春漲碧秦望夏雲疏氣入清和後林鳴布穀初南山十畝地歸去正堪鋤山樓即事山閣遲清夕羣喧靜逺空疏燈峯影裏殘夢雨聲中失路同羈羽孤生感斷蓬愁吟寒更劇相答有哀蟲魚亭山下有懷詹無幾婺溪欲溯水潺湲逐客西逰久未還落日魚梁惆悵絶不知人在大鱅山屯溪雨後觀暴漲暴雨生暄後屯溪竟夕聲溪流三十尺髙與石堤平獨嶼移新麓層波失故清江航成徑路來往踏舟行發率川下新安江乘漲下新安香橈擊明鏡深秀樂山情至清表水性亭亭積翠成草木新暉淨雲林漏微日霞波弄餘映白沙蕩虛曠素魴恣游泳言踐謝公期逺託休文詠枕流諧夙諾纍心矢終屏竹節磯魚亭東下二百里碧沙錦石清相於漸江脈竭泉眼涸四十七瀨成溝渠春雨驟至連日夜萬川汨汨爭歸墟奔濤聒天漚擁樹潏湟漰渤增欷歔竹節磯頭水石怒白浪大如仙人車覆船山下船忽覆桃人土偶皆淪胥槖中幸無千金裝一琴一帙靡留餘神功冥力獲濟此微山陰侯吾其魚吳山陰侯賀齊為清溪水神廟祀江濵每禱輒應寄語後人慎舟楫悔不先戒存衣袽吾家老咸不解事東面招手從之居生逢聖世有至幸誰能沈抑同三閭重過嚴陵宿雨新波七里流回沙縵石下瀧舟挂帆客過情空切釣澤人亡跡自留野鶴江猿同旦暮緑蘅青荔幾春秋十年出處俱無著愧向山霛問舊逰東歸至錢塘江館珂月上人逺出見訪相訊間知家兄當世舍姪元景皆于去年物故驚慟賦此江樓相對轉依然不見支公已六年逺出深慚存舊好早衰知為味枯禪清霜夜判離鴻杳黃土秋埋玉樹妍何意衰宗頻遘禍鄉音一接淚如泉江上夕氣隱寒山長川晦蒼霧日暮暗潮平渺渺西陵渡五月五日江樓題五月五日江上宿碧水蒼烟逺相屬吳山淡淡越山青日倚危樓看不足從作東西南北人山中五泛蒲醪春主人不歸山寂寞萱草榴花開復落滄江此去託菰蘆削迹銷聲計不迂學道十年深自悔今朝重愧饋􅜅徒江干晚眺隔江帆隱處知是蕭山路林際青濛濛非烟復非霧富春村莊即事新夏江村水拍空枇杷雨間熟梅風魚投釣火夜船上犬吠行人曉月中謝村謝村五月楝風和為送歸人片帆過何事吳音偏入耳向晨欹枕聽新歌湖壩早行蔣葉風凌亂秧田水接連臥聽柔櫓響知是舊吳船石門三載淹南土孤蓬復斷萍誰知歸客路已到語兒亭初從嶺外歸家兄仲謀有喜駿孫歸自嶺南之作次韻十首故林芳草想夫君遁迹長同鹿豕羣採藥空山偕綺季逃禪小果謝聲聞獨醒不厭杯中物相憶時停嶺外雲今日重逢還一慰海榴花發夏初分去住三年總未知開顔重此話離思牀前夜雨悲同叔塘上春芳感客兒親舊幾人猶健在存亡一訊轉成疑南窗梧竹凄如晦灑淚看題見憶詩浪說三山近十洲擔簦千里漫成逰旅顔不醉蠻鄉酒征棹頻移蛋子舟有幸長鯨初授首無情滄海尚橫流敝車即次傷淹滯飛矢危城幾汰輈柳絮梅英感物華縈愁觸緒浩無涯空林緑遍文無草寒雨吹殘夜合花雲葉暗沈經嵗札烟蘿深鎖故人家連波歸計蹉跎久憔悴風情薄似紗夢繞山中桂樹堂行人何事久炎荒薄遊三見花成雪長物惟餘簟似霜海賈歸時天若畝椰漿熟後醉為鄉侵尋江嶺無消息松菊凋殘柳半黃太史空登辨物臺二東杼柚正堪哀西成已見書螟螣冬實何須詫李梅乍喜絲綸傳六郡微聞災沴譴三台關心桑梓多私計恩澤何時日下來城外邊聲咽暮笳西風颯颯暗飛沙中流結蜃雲為屋片席驚鳬浪作花逺水雙星分使楫寒濤八月斷浮槎傷心京觀何年築謫戍東南早及瓜海曲諸田正有人十年烽火劇黃巾受降别有王侯賞並育深知覆載仁客盡非龍謾沈尹地多真虎懾裴旻逐臣萬里情無賴躑躅江潭夢玉宸琴樽聊此共晨昏晝掩荆扉鳥雀喧覆雨交情宜廣絶奕棋世事莫深論西風短笛山陽里秋草寒烟上蔡門何似埋名躬抱耒一鋤春雨杏花村羈人心事近如何峽樹川雲寄慨多行轍似曾窮地軸客槎疑是溯天河江妃感夢乘烟至水府朝真曵珮過欲叩璇宫徴異蹟翠旗光裏擊霛鼉松桂堂全集卷四十三
