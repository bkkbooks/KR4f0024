body:
  text: 松桂堂全集卷二吏部侍郎彭孫遹撰御試省耕限二十韻青陽臨左個皇路慶由庚綺陌韶華遍丹霄麗旭晴九斿清蹕影萬乘屬車聲蘭圃吹塵盡芝田拂蓋輕春光三月好仙仗五雲迎輦道遙相峙鈎陳靜不驚林花飄鳳幰隄栁擁霓旌幽薄芳堪擷寒塘漲已平泠風勤問俗靈雨待銷兵為念民依切頻勞法駕行人皆忘帝力后自重農情畿甸恩膏沃郊原淑氣盈千村修黛軛一墢涖朱紘草暖深藏雉桑濃細囀鶯懿筐來獻繭良耜去催耕終畝登周頌蠲租陋漢京嘉禾同穎秀瑞麥兩岐呈地迥宸遊暢時和睿賞并負暄迎婦子擊壤應簫笙聖治先崇本長春玉燭明日長至二十韻四序屬元英三階燦玉衡綘杓方北指金翼正南行晃朗孤輪湧回環九道平乍臨牛斗度遙映鳳皇城祥靄開瑶甸澄輝散綺甍山河彌廣大霄漢轉髙明繡線絲初永葭灰氣已盈靈臺雲物麗銅掌露華清柔荔爭含秀芳藝競向榮厯元千嵗合化籥一陽萌是節乾苞啓中天曜景呈踐長迎寶策會極拱神京蒼璧修殷薦黃鍾辨雅聲百僚趨劍佩六變奏韶韺縹眇疏龍殿棽離析翠旌上觴皆碩輔獻履亦名卿珍貺凝軒鼎仙音律舜笙呼嵩知帝眷祝華見輿情瑞旭重光現皇衢萬象亨小臣欣就日葵藿願同傾中秋應制二十韻素律迎西皓丹霄逼上清虹橋舒夕霽虬箭報新晴薄暮祥光合當空麗景呈金波初皎皎銀漢已盈盈彌覺涼宵永還能徹夜明雲消鳷鵲觀秋滿鳳皇城庭鶴寒相警林烏暗自驚液池霜練淨黼帳獸煙輕樓閣堆琳碧軒楹縷水晶地疑蓬島接人在閬風行勝境芳時會宸襟爽氣生推遷觀節候流覽擷菁英紫蕚湘蘭秀丹葩嶺桂榮天香衣上落仙吹月中鳴倣佛聆三籟依稀奏五莖賦吟冰雪句曲按羽霓聲龍鼎調堯膳鵝簧叶舜笙九重留睿賞四美暢皇情遊豫知同樂謳歌見太平小臣摛短翰長願頌由庚南苑講武二十韻垂衣文教洽偃革武功成帝業雖無外王師尚有征岐陽傳茂烈淮浦著英聲並自髙千古誰能去五兵鸞旗清道啓鳳蓋屬車行宸蹕今南苑神畿舊北平丹山遙拱護碧澗競趨迎太閲乘冬令中權授夏卿魚麗環黼帳鶴列辨銀鉦蓮鍔流虹疾霜蹄逐電輕何煩歌甫草殊勝鑿昆明挾纊君恩渥同袍士氣盈騶虞歌並叶虎旅技同呈盡合三驅禮齊稱萬壽觥長楊朝弭節細栁暮歸營隱隱聞笳吹悠悠見斾旌指麾由睿略撻伐軫皇情𤏡道剸修兕衡湘剪巨鯨寰瀛調玉燭符瑞集銀罌更舉登封典芝泥勒令名西域獻獅子二十韻化浹寰瀛泰時和宇縣康勳華髙曩烈符瑞集今皇玉帛綏羣服梯航萃萬方珍毛來上苑竒獸出西洋白澤標名古金精稟質良爪牙堪服猛圖牒久呈祥重譯山川逺彌年歲月長端由文德洽坐使國威揚效順同軒帝稱兵異穆王章和徒紀漢貞觀漫推唐我后仁風被中天景命彰騶虞方在囿鸑鷟更鳴陽萋菶梧初引繽紛草競芳銜書騰赤雀抗陛立神羊並已登靈囿何須問越裳遠人修土貢聖主戒禽荒異物原非寶宸衷自有常義林時攬擷學圃日翺翔螭筆歌宛馬鸞車屏翠黃小臣瞻舜治拜舞共蹌蹌溫泉二十韻璇圖開永命寶厯卜遐昌河洛爭凝瑞山川競效祥乾符呈德水坤軸湧溫湯回帶神京北斜縈紫塞傍醴泉隨地出靈液溯流長噴薄還終古瀠洄此濫觴上疑星漢接下有燭龍藏媚澤珠為燧尋源谷是暘焦溪遙合泒鄒律逈回陽沍節無停雪嚴寒不受霜琉璃分皎潔珠貝瀉淋浪寶幄通馳道金隄擁繚牆薰風時拂拂旭日轉滄滄直訝炎洲近終嫌沸井涼涵濡皆聖澤吐納亦榮光濯垢神清霽蠲煩思發揚何須黃竹詠殊勝白雲鄉浩蕩恩波濶端能及萬方中秋經筵二十韻邃古苞符闢中天厯數昌山雲初啓瑞河洛更凝祥授簡神龍出銜書寶雀翔羲軒垂統逺洙泗濬源長道法貽昭代心傳屬聖王講筵勤學問祕閣盛文章辨色臨軒蚤諏辰撰日良桂宫秋薦爽蘭殿曉生涼繖扇迎鸞馭簪裾引鷺行執經皆碩輔列陛盡仙郎縹笈黃金軸瑶函白玉裝一元包象繫半部致平康奧義徐紬繹微言細闡揚詎能增海嶽已若見羔牆璿度存淵穆葵忱喜拜揚地如遊策府人似訪汾陽餘潤波瀾濶流徽翰墨香琳琅紛入抱月露漫盈箱偃羽呈堯舞揮絃繪舜裳寸蠡將弱管何以測汪洋賦得月宇臨丹地二十韻月宇鬱峥嶸迢迢逼太清青霄緣直上丹地此髙擎燕雀窺珠網星河接繡甍金樞懸自轉玉斧琢還成屏障吹雲母罘罳漾水晶元霜流皎潔皓氣挹鮮英宛向虛無出真從廣漠生花林春冉冉香霧曉盈盈絶漢離宫度因山閣道輕陂陀承畫棟縹眇架雕楹已似臨瓊島何須問赤城霞蒸光並絢虹亘色逾明徙倚舒遐眺留連愜勝情川原何曠邈樓觀更紛縈桂醑仙杯渥霓裳妙舞呈殿仍甘露號人作閬風行宴鎬揚周雅歌汾陋漢京浮橋斜過騎落照晚銜晴遊豫當年盛君臣一德賡開元遺詠在千載想升平春雪二十韻春滿九重天花飛六出妍彤雲迎曙色瑞雪入新年淅瀝交蘭沼繽紛拂蕙􅀈曉凝銅掌露暖逼玉爐煙蝶徑梅沾粉鶯林栁著綿瓊枝還旖旎瑶草正芊眠澄景開遙岫清暉散廣川因風疏更密罥樹斷仍連樓閣虛無裏河山眺望前嵐光深峭蒨波影靜㛹娟郢調雙聲合梁園一賦傳至今猶宛在懷古轉悠然皓氣宸襟集佳辰睿賞偏登臨元圃宴拱揖藐姑仙地接三神勝心存萬物先祁寒頻念切逺戍幾人還有嵗占禾麥無衣恤井㕓陽和回禹甸溫律動虞絃喜見皇仁被欣逢惠澤鮮不須黃竹詠歌頌遍垓埏賦得雨中春樹萬人家二十四韻春樹雨中妍人家萬井煙韶華明綺甸淑景媚芳年點綴皇州麗參差紫陌聨雪銷金掌外冰坼玉河前細纈鋪銅沼輕塵散錦韀泥融知燕喜谷暖見鶯遷卉物看如此河山思渺然逺心紛入抱逸興邈孤騫嵐翠濃堪摘林光淨可憐樓臺寒漠漠水木靜娟娟雞犬新豐市桑麻下杜田地仍三輔舊俗向五陵傳賜酪分槐火疏渠試石泉清暉遙映帶佳氣靄蔥芊相對宸襟暢來遊睿賞偏離宫通漢塞復道俯秦川稍出青門曲還過素滻邊溪莎迎羽葆隄栁拂旌旃一稅星言駕重修月令篇杏花紅旖旎菖葉碧連蜷籍有朱紘在居無黛耜懸峰陰搖晚色鳥語叶繁絃問俗泠風至乘時惠澤鮮不須郇伯詠霑灑自雲天賦得天地一家春二十韻春回天地泰淑氣滿寰瀛有道君王象無私覆載情一元資茂育萬彚達勾萌小暖融冰鑑微寒散玉霙蒼龍扶寶輦綵燕起雕楹藹藹陽初煦欣欣物向榮丹霄雙闕迥綺日九衢明宫栁銷煙潤林梅卷霧輕桑麻同暢遂鳥雀自生成禁籞皆靈沼嚶鳴盡友聲如薰風轉蕙似醴露承莖卉木祥光溢河山瑞靄呈皇仁深共被帝力蕩難名解澤將行惠甘霖為洗兵八荒歸户闥六合荷升平已見人和洽還看土脈盈懿筐來獻繭良耜去催耕聖壽陳堯酒仙韶奏舜笙律應吹太簇詩欲頌由庚治世餘音在今朝喜再賡賦得春雪映早梅二十韻春雪舞雕霙春梅照綺甍雪遲如有待梅早似相迎銀海千層合琳枝幾樹明乍飛猶弄態交映倍多情錯落開池籞繽紛拂户楹臨風爭婀娜得月並縈盈露篠遙分影霜禽暗辨聲夕霏綃袂濕曉夢蝶魂輕冉冉花兼絮冥冥雨更晴郢歌傳玉笛隴信報瓊英薄暝依微見餘輝瀲灩生色香空不染臭味淡相成東閣耽幽寂西州抱潔貞縱因時序轉未改歲寒盟皓質卑桃李靈區匹閬瀛人無黃竹怨仙是緑華名覽物心彌曠澄懷境至清芳流梁苑簡瑞貺傅巖羔御陌瑶光遍天葩淑景呈浩然窺太素淳化復何營太液晴波二十韻太液繞宫城春波入望平滄池傳舊迹瑞靄敞新晴翠縠籠煙淺青蘋卷霧輕斜從金闕度遙向玉泉生空水餘霞映寒暉竟日明百川來作􅚈千頃挹逾清縹眇飛銀蝀嵯峨跨石鯨鳬鷖紛唼喋蘭􅉅淡縈盈魚藻遊相樂鷗沙夢不驚靜含樓閣影細戛珮環聲仙境鄰三島靈臺接九成文漪何瀲灩薄暮更琤泓色淨澄江練光涵若水英虹梁花外轉鳳舸鏡中行徙倚舒幽眺留連愜勝情搜竒羅玳瑁弋逺下鵁鶄何事登濠濮真如上閬瀛宴觴周大雅風咏漢西京地迥宸居壯年芳睿賞并臨流思欲濟還擬濯塵纓賦得龍池栁色雨中深二十韻龍池春水生曲曲抱瑶京栁暗拖新雨花濃失舊晴緣溪枝婀娜疊浪色晶瑩點鏡青蛾濕窺人翠黛明一泓波自照二月草初萌裊裊吹魚藻萋萋傲野蘋林陰深欲暝嵐氣靜如迎影淨湘紋縠光流楚竹笙攬遊吟白傅感物賦蘭成泥潤頻巢燕簧寒未囀鶯拂堤千萬樹映水兩三莖濯月姿逾皎因風態倍清煙籠偏嫵媚霧鎖轉蔥菁濃緑低簾幕空蒼漾檻楹蓬萊仍帝里興慶即仙瀛蕙沼鋪澄練蓀橈擊素瓊上林眠乍起太液拂還輕天近偏多澤恩深獨向榮宸遊回鳳輦睿賞引霓旌留待朝來霽追歡會玉纓春雲二十韻淑氣報新年靈臺測候先瑞雲何縹眇仙靄並清妍乍浥金莖露長含寶鼎煙象呈丹極逈望入絳河連旗影雙龍度珠光九曲穿七襄成帝子五色補媧天屏翳驂湘渚豐隆駕洛川巫陽峯十二瑶島路三千擘絮垂楊外吹鱗綺浪前風恬澄碧海日暖護藍田不辨公超市頻低子野絃間因依野鶴低或拂鳴鳶曉逐銅池畔春留綵仗邊太虛仍廓爾出岫亦翛然山暝孤飛翼江晴十樣箋暮凝人不見夕斂月長圓玉葉紛堪擷瓊英靜可搴挹來霞作瀣灑去醴成泉華蓋隨雕輦霓裳照舞筵還思紀官日盛治接黃軒又二十韻玉琯動韶年春回萬象先星河多氣色雲物最鮮妍靉靆非關雨霏微乍似煙絳霄舒更卷翠纈斷仍連黛影雙尖瘦霞痕一縷穿寒銷七里霧潤挹九重天瑞靄開芳甸澄暉被廣川蜃隂吞八九鵬翼擊三千仙路蓬山外神光楚峽前琳枝披蕙圃瓊葉蔭芝田展處偏承蓋停時為撥絃低空依翥鳳望逺沒飛鳶去自棲巖際來應捧日邊虹明還綺合風靜轉娟然錦杼留裁翰金膏待染箋凝條花並豔觸石璧同圓擢秀堪分潔餐英好共搴宸章垂宇宙需澤灑林泉糾縵呈珍貺繽紛拂御筵行看歌復旦縕瑟有新篇擬春日應制紫禁清嚴復道通絪緼佳氣在宸楓五雲仙仗羅三殿九醞霞觴壽兩宫盡闢銅龍迎瑞日先懸綵燕待和風應知天上春光早玉樹菁蔥曙色中青瑣彤闈赤玉墀寒銷蘭路雪初披竹宫雲麗齋壇夕蕙沼風恬袚褉時芳草無根迎候早春暉有意為人遲太平天子勤民隱宣室何勞更祝釐五柞宫中淑氣回萬年枝上好風催消除寒色看垂栁斟酌春光到早梅垂露臨池龍躍起擁雲染翰鳳銜來懸知睿照三辰麗不數鄒枚侍從才鳳闕嵯峨倚碧雯瀛臺仙境氣氤氲重輪曉湧扶桑日五色晴含太液雲玉螮光寒凝絳幄紫猊穗暖爇芳藝牙籖錦軸分明在聖主當今正右文芳林幽薄帶長川南苑今當校獵年聚燕臺前沙似錦射熊館外草如煙風回自引清笳動雲起爭看綵仗懸莫以從禽窺廟略為乘春令習搜田惠澤頻年灑八紘陽和早已遍寰瀛釀花雨潤枝枝玉轉蕙風輕樹樹鶯幡上金雞仍渙號樽中白獸豈求名招賢更有猗蘭操不盡虞絃解慍情六合恩波自一家聖心猶欲念幽遐露盤拂處螭頭濕月扇回時雉尾斜灩灩爐煙飄蕙燼依依花氣浥蘭芽宫中玉漏休頻滴乙夜搜書遍五車奕葉承平起頌歌况逢海內正韜戈由來望澤寰區遍占得韶光帝里多珠綴花明香作霧玉溝風暖緑生波大酺不待君王賜處處春風飲太和春祭社稷二十韻春滿鳳皇城中天瑞靄呈鑾輿嚴夙駕吉禮慶初成首舉句龍秩兼崇后稷名方州尊土德原隰重農情辨色彤霞曉諏辰麗旭晴韶光二月早仙仗五雲迎蘭路銷塵盡松隂拂籟輕九斿飄羽蓋萬乘引霓旌栁外銅蠡靜花間玉佩鳴奉璋多俊士陪位有名卿遙見鑾旗轉回看雉闕平壇壝皆北向輦道更西行舞帗咸池節歌鐘太簇聲靈鼗清管合絺冕繡綖明報本三時薦祈年百室盈氣先通雨露物自潔粢盛祝號還陳信宸衷獨秉誠果然邀肹蠁遂此致豐亨嵗穰嘉祥集椒香淑景并重賡良耜詠擊壤在寰瀛上已二十韻曖曖曙光明泠泠曉籟聲花風春有信蘭節禊為名暖應雲門律寒銷露掌莖韶陽三月候遲日九衢晴麗景開瑶甸澄暉散繡甍紅簾深見燕緑樹暗聞鶯垂栁眠煙重濃桃靧雪輕樓臺何縹眇卉物益蔥菁靈沼遙通漢滄池曲抱城蜿蜒飄翠蝀飛動躡蒼鯨玉澗芳堪擷銀塘漲已平龍旗隄外轉鳳艒鏡中行羽爵隨波去金人捧劍迎祓河傳勝事宴鎬洽皇情疏圃詩偏好華林賦並成何如披睿藻還此上仙瀛地曠宸襟暢時和豫賞并堯樽初獻酒舜琯更調笙暮景催清漏歸橈擊素瓊不須留落照桂魄一鈎生松桂堂全集卷二
