body:
  text: 松桂堂全集卷七辛丑吏部侍郎彭孫遹撰正月九日小舟入村有作三日春猶淺餘寒陡未消澤蘭縈雪蔓河栁試風條偃樹微通棹回帆不礙橋村農晴卜嵗笑語互相邀曉發長水小舟阻風不得前同崔大子玉徐六琯朗夜投壽生禪院宿風急天昏下夕曛上方一宿未離羣窗虛逺受鸚湖月閣逈長含雁蕩雲暝際漁燈搖滉漾定中罏氣遍氤氲松陵明發應回首烟樹微茫杳不分院西有巨浸名雁蕩東去鸚脰湖不及三十里松陵阻雪借宿村舍題壁小艇迎風似葉飄山家聊得駐鳴橈孤篷一夜吳江雪白遍垂虹十里橋大風雪泊松陵城下江天千里白迢迢急雪迥風晚更驕地枕虹梁偏帶雨水通笠澤暗添潮孤城芳草空如積小塢繁花己自凋此日吳娃愁欲絶春波望斷木蘭橈孤舟漂泊五湖東客子行歌雨雪中春水年年浮逺棹南雲日日送歸鴻漁榔夜宿潭烟紫驛騎西來􅕤火紅吟罷吳趨還自和令人長憶陸龜蒙雪後登虎邱山雪後擕笻上翠微參差林木映清暉雲岩曉樹鴉初起鶴澗空波鳥自飛春草依然侵履跡寒山終日擁僧扉道人對客忘言久閒向松陰補衲衣山塘春水雙篙滑橫塘七里遙晴憐山色好暖覺鳥音調絲管縈朱舫烟波鎖畫橋旗亭松釀熟日暮更相邀吳門舟次送别侯筠庵夫子北行春風搖蕩春江曲櫂歌咿啞聲相續松陵渡口雪初消閶闔城邊草正緑此時送别欲銷魂况受當年國士恩暫得分襟南浦上何當負笈大梁門大梁門外官河栁到日青青拂人首慿弔重經廣武岡登臨一醉繁臺酒酒酣慷慨重相思應念江關祖帳時先生北發我南下征橈容與車逶遲夜半金觴寒不御白雲遙帶揚旌處歸帆不渡越來溪腸斷仙舟從此去花朝日送别達之兄歸譙城贈歌家兄不逺千里至過我海上之敝廬淹留未竟二十日趣裝早發還里閭擊鮮取酒勸君飲君其為我盡餘瀋酒行前席徐致辭四座勿喧君自審憶昔驅車逺相看小弟之年方弱冠彈棋六博樂未央深杯百酌歡無算是時君向八閩回曽上無諸萬仭臺為說戰場多白骨悲歌起舞聲如雷須臾酒盡燈花落相送仙舟浮逺郭一别離鴻遂渺然十㩦社肉猶如昨今年重泛下江船來值春風燕子前青帝芳菲花下騎鮫人樓閣雨餘天人生哀樂更相受安得為歡長聚首年亞潘郎見二毛身慚陶令甘升斗與君後㑹杳難期東西南北知何有君莫辭杯中酒不見灞橋車馬日紛紜折盡青青送人栁寄懷培元族叔褰帷露冕向南州建節鳴笳控上游人惜中山三嵗牘天容少伯五湖舟新開石室藏書穴别起神峰寶繪樓大阮風流應不減何時追侍竹林遊寄懷位中族叔吾叔天下士英譽馳金石蒿目當世艱栖栖無暖席淮南幕府開三上安時策壯志鬱未伸脫屣金閨籍言垂江上綸歸卜譙城宅縹笈富藏書黃金多結客嗟豫生不辰髫齔遭竒厄流離嬰白刃門户誰能惜大江千里外一姓吾宗祏生死不見聞豈若東西陌本是分形人反作參商隔今春得好音迢遙相慰藉停雲暢逺情尺素傳芳澤因思兵燹仍轉覺乾坤窄漲海滿風塵羽書紛絡繹朱方長荷戈南詔悲行役索居同羈旅世路安從適敦族貴具邇傳聞自夙昔願言長比居式好永晨夕寒食賁潮掃墓感賦兹辰方熟食理楫赴寒流魚菽春供祭松楸暮起愁丁年多折蕙丙舍半荒邱誓墓知何日江湖愧魏牟清明日病中作初除禁火入清明榆栁新烟次第生多病未能工服食避人應得罷將迎柔荑細蔓青堪襭艷蕊繁花錦作城彈指春風三月暮幽居何必羡朝榮上己日過漢蜚一徑園飲積雨園林禊事遲孟公投轄屬芳時舊傳觴政依金谷新起山堂似習池澗户泉聲寒戞玉藥欄花影細分枝尊前莫惜如泥醉勝㑹明年未可期春夜夢貽上王生不見久寂寞風塵裏再改白榆烟一剖江心鯉春城伏枕餘夜雨摧桃李夢中頻見君粲花啓玉齒折腰非素懷浮湛聊復爾相贈廣陵濤沉綿為君起春隂黯長夜雨葉無留響燈燭照空堂餘光揚素幌故人入我夢披對青雲上長安霜月夕氣色颯蕭爽高枕忘晨昏微吟互欣賞離憂結窈渺千里通來往胡為氷玉姿俯首羈塵鞅籌筆困斯人因風發遐想問鑑公疾春氣連陰滿緑蕪山鳩日日引鳴雛殷勤問取維摩疾丈室繩床好在無鑑公蘭若小池濱曲徑疏籬頗率真開遍櫻桃千萬樹竹爐榆火送殘春三月十五夜月自正月來無日不雨是夜始見月色賦十韻元夕張燈罷春朝盡日陰鳴禽猶格軋芳樹尚蕭森碧草長堪結濃花冷不禁鄰杯傾黯淡山屐廢登臨竟夜空階雨繁憂伏枕吟金波宵乍湧朱户影相侵暈氣浮輪滿寒光入照深風飄初濯練天挂欲橫參和旭晨難定多時陸向沉梯雲尋祕術挹取貯衫襟遣小僮問元景侄病汝病今何似春郊檢藥方休吟白團扇莫帶紫羅囊竹蟻芳林宴花枰小墅香慎㫋他日事垂老慰高堂苦雨歎入春常苦潦破塊亘千里中更兩月餘浸淫不知止稍稍浴咸池少焉旋復已女桑菀且枯人栁僵難起萬木徒向榮無論桃與李陽氣惡沈鬱積陰乖物理昨聞殷其雷乃在南山趾傾崖驟雨集江湖流瀰瀰田家為余占乘船行入市土膏己覛發東作今方始二穀苦不登三農飢欲死陵襄豈病堯天漏同憂杞安得鞭羲和一照生欣喜玊燭四時調泰階平若砥春日病起有懷金子旭曙曹子飛雍金生吾臭味託契八年餘入抱荆山玉懷人薊北書青雲行自致白首分非疏寂寞文園裏飛鳴一起豫石友時相念京華久未回秋槎揚子渡春酒杏花杯異骨千金駿雄文八斗才十年兄事汝風雨憶追陪立夏前一日與客晝飲得飛雍南宫揵音因念亡友綗暗殘鶯新絮暮春天忽憶京華客未旋草閣清酣傾碧釀蘂宫芳信見紅箋同心爾結王陽綬先路吾慚祖逖鞭若念竹林遊宴日君應揮涕仲容賢喜飛雍登第因追憶湄棫嶽一二徐子清和風氣近朱明晞髮松陰弄晚晴北極飛龍新射策東阿繡虎久知名遭逢應有彈冠慕思舊還多宿草情屈指同遊今更幾待君高視慰生平五日即事張具高堂試酒鎗新松新桂午隂清迹鄰海鳥應無忌身著荷衣亦自輕家計僅存三徑菊山肴不羡五侯鯖驚心吾土多烽火那得靈符與辟兵寄錢子青時客雷明府署中蕭寺論詩坐夜䦨故人南北寄書難暮雲春樹頻回首草暖鶯飛幾倚欄清蔭分忩虛幌閉暗塵生榻畫梁寒知君抱得豐城寶仙令還能拂拭看席間見歌者識其面乃亡友徐五湄棫舊時青衣也感賦二絶寂寞黃壚事已非梁雲裊裊月輝輝春風羡殺紅襟燕長傍烏衣巷口飛雕梁畫棟暗生塵誰向堂前問主人清夜西園懷舊侣斷腸聲裡月如銀夏日雜詩倣晚唐體澆花間庭清曉靜無譁鴟吻西南見月華汲得杜陵溪上水澆來彭澤徑中花方池欲涸逢山雨小幔偏深護日車留待重陽霜落後東籬岸幘醉流霞曬書南窗辟蠧爇芳藝錦軸牙籖卷細分自有青箱傳舊業不須金匱發遺文藏書柱下雲長護散帙松間日未曛少作雕蟲應已悔令人深愧郝參軍苦熱炎雲張蓋曠無端暑暍侵人氣欲乾河朔舊遊思縱飲山陰幽興憶清寒宫氷玉井知誰賜仙露金莖豈易餐此日折腰驅作吏未行已覺宦情䦨憂旱年來臯壤寄行踪生計關心在老農不見零陵翻石燕空傳闕里祀泥龍賁湖春漲環如帶赭嶺炎雲幻作峰為問漢廷賢長吏可曽省豁向提封夏日雜興禺午垂簾夏日長幽居雅稱芰荷裳濃陰倚幔侵人緑晚籟鳴松拂簟凉無奈休文成委頓亦知中散本疏狂避喧且作深山臥醉倒牀頭竹葉香紅塵何地著清凉閉户依然氷雪鄉新種菊苗盈尺翠舊栽松樹過頭長人間豈有安期侣枕內應無苑祕方大藥黃金君莫問且慿白墮送流光七夕一葉階除下井桐晚凉被酒倚微風明河清淺月輪上高樹扶疏雲影空家似茂陵常謝客年齊潘令早成翁佳辰屈指經多少不在他鄉即病中螺浮給諌以遼參見贈病中伏枕賦謝內經夙擅參苓品本草還傳服食功忽枉瑤函來石友頓令病骨起秋風閉門白日供高枕極目層霄送冥鴻深謝衰慵無以報一生長處藥籠中鍚山道中與陳泰和别風定夜寒增河流一夕氷晨星棲岸草曉月掛漁罾慧水沽新釀梁溪得舊朋客程應計日前路入蘭陵登梅花樓晚眺梅花不見小樓空樓外羣山窈窕通薄暮人烟浮竹翠隔溪僧唄逐松風清雕對擊寒原上白月高升落照中欲向楹間留姓字舊題埋沒草成叢丹陽道上高岸登躋苦流澌利涉艱寒霞環映水落日半銜山霜雁隨陽至風禽薄暮還誰能長作客漂泊損朱顔道經維揚晤王十一司理留贈之作長安雪後悵離羣此日開樽對夕曛篋裡齊紈經嵗字夢中春樹隔江雲蕪城日色寒逾淡隋苑鐘聲晚更聞與爾交情真不淺相逢寧復惜沉醺春來風雨夜窗虛臥病何人問索居薊北三年鴻雁影江天八月鯉魚書西亭葉落離筵晚東閣花殘宦興疏明日秦郵回首處寒波渺渺重愁豫京口由來京口地四㑹古今同方鎮南徐重營屯北府雄清江天塹設白骨戰場空幾灑河山淚西風落照中渡江不辨水雲色浩然天地空漁舟紛擊楫鳥道疾排風嵗月淹行李江湖任轉蓬南方今正苦矯首歎飛鴻雨中宿寶應城外白馬湖邊雪浪奔高崖古木欲平吞天臨澤國常多雨邑少人家只似村宿草幾迷公路塜慿軒一弔孔璋魂風塵滿目無知已羡爾當年國士恩過邵伯湖斜曛低驛路馬首悵何依晚渡潮爭上寒塘人獨歸溪魚時自擲水鳥慣卑飛願逐垂綸者長歌入釣磯高郵州葉路離亭樹殘碑古驛程寒聲風截雨暈氣水圍城閭左多懸磬江南未寢兵甓湖千百頃潮落種香粳淮角樓嵗暮辭家作逺遊長途霜雪敝征裘那堪密雨斜風裡獨傍淮南古戍樓貧婦歎姑蘇城外清濠上大者官船小客舫鱗集雲屯晚未休風鬟霧鬢來相傍向船長跽淚四垂手㩦弱女懷抱兒行人問婦何所苦斂衣起立徐致辭家住毗陵北山裡良人本是千金子自有田廬樂嵗時還餘僮僕供驅使一朝不幸值踐更縣符府檄何縱橫官家稅一吏稅五里胥溪壑猶難盈忽聞征南大兵至趣令軍需倉卒備催符如雨絡繹來此時漫說新安吏二月新絲三月穀賣田不給還賣屋僮僕逃亡家計無良人淚盡雙眼枯遮莫無顔棲故里朅來乞食走吳趨吳趨客店聊饘粥計食千錢過一宿兩兒三女年比肩饑來只解牽衣哭七口艱難仰一人他鄉况是婦人身已知旦夕填溝壑尚忍須臾訴苦辛語畢還聞嗚咽久逡巡似愧紅顔厚哭聲錯雜未分明說苦終時不去口可憐天地未休兵江南往往多橫征道傍觀者聽婦歎愴然終日皆心驚我聞王師渡閩海夏門舟山次第平安能刻日銷金甲處處春風鼓腹聲韓侯釣臺王孫垂釣楚江隈此地猶存百尺臺臺上不堪回首處秋風長樂土花開漂母祠一飯千金迹已陳祠堂猶與釣臺鄰滕公蕭相空知己物色還輸第一人逆旅野色慿軒晚河流入望空一星霞外爛孤雁日邊紅逆旅人爭席虛襟自御風嗣宗稱曠達何必泣途窮薄醉車馬頻南北川塗自古今悠然風日暮冉冉嵗華侵杯落驚弓影鄉遙喜足音客情聊薄醉倚膝起吳吟越溪行越來溪公莫渡行人隔水呼喚頻舟子掉頭不肻顧波平如掌帆不前碧湖澄靜生寒烟縣官封船供應急經今一月還復然公家用物有定數民間那得知其故日日官船進女城依然船數不加盈昨聞大師至已泊南濠隈太守親自出平明騎馬來官來猶自可兵來烈如火弓刀裝小舠人馬乘大舸越來溪公莫渡捉船未已還捉人勸君漫出城西路老翁歎曉發秦郵驛晚投界首村炊烟寒未起十室九閉門道傍老翁長歎息此地由來稱樂國大兵頃者一經過頓令閭里無顔色持刀投石碎門户百物縱橫恣所取擊豕刲羊事酒筵趨迎猶恐逢其怒此恨吞聲何足道妻子堪憐不自保今年猶有兩三家明年飄泊成荒草我聞此言悽惻久自發吳閶經界首但逢逆旅多致辭處處煩寃如一口老翁此語最酸辛可知艱苦皆身受誰言橫海建竒勳用兵不戢徒自焚江南巨麗佳氣色須臾蕭索生愁雲稻梁鳬雁一朝盡健兒躍馬猶紛紜當年空笑魚將軍青駝市烟火隔岡生青駝小市名氷髯吹自結沙眼射難明溷跡人爭賤衝寒命亦輕扶桑何處景驢背曝朝晴同子玉琯朗璧人家渭臣子服兩兄登可中亭望月山徑夜色深行久乃見月竹樹吐幽輝清寒沁肌骨寒射山下泉清數石上髮氣色浮孤高琳宮何突兀上方人語靜一燈影林樾取路登虛亭置身轉飄忽同遊五六人浩歌悄然發坐久月始中星盡長河沒苦節届秋冬羈魂滯吳越萬感中夕生頓令清興竭秋日重遊虎邱題壁曽㩦春酒上春山醉後題詩滿壁間回首山川千古恨側身天地幾人閒白楊樹老陰初合紅蓼花殘色漸殷向夕西風動林樾斜陽影裡一僧還憶著春衣買墅遊重來嵐氣肅高秋山川依舊分吳勝風景還能泣楚囚青女有時回素律白蘋何處訴離憂遂初賦在尋應好擬築茅堂傍虎邱重陽後一日登等慈閣眺望客裡登髙九日過諸天樓閣出藤蘿石林暝色浮秋爽浦溆風帆入望多搖落情懷枯栁賦羈遊踪跡五噫歌冥鴻向夕南飛盡無限寒雲鎖雉羅長至日登超果寺樓眺望上方樓閣逈百里見秋毫墜葉清霜重翻雲白雁髙寒灰吹欲動暖律問誰操早晚年華改安仁有二毛蒼蒼天際色山水鬱相盤久客衣裳薄橫空霜露寒人烟浮逺郭鳥路拂危欄不盡登樓興驚心節序䦨晚泊孤舟棲泊晚霜霰滿亭臯日暮水雲合天寒星月高浮名輕去里苦調怯揮毫賴有賢賓從開樽勸濁醪舟夜薄酒難禁夜輕舠僅著身荒雞鳴戒旦寒犬吠隨人鄉夢追思苦吳歈迭唱新故園儔侣在臥起見情親夜宿客樓口占雲嵓一片月猶近故鄉明丙夜清霜集丁年白髮生姜肱寒擁被伍舉戀班荆遠道應回首髙樓此夕情北行留别同寓親友驅車指薊北此去路漫漫愁欲凋雙鬢貧猶戀一官行侵晨月白坐對朔風寒珍重樽前意髙歌夜未䦨醉後題道院壁嵗宴猶為客朱顔鏡裡殘栖遲真欲老寥落孰為歡小徑松烟暝空壇竹露寒越吟良自苦何必戴南冠平原客店平原一片月寒影淨如霜驛路人千里家書雁幾行羈愁空白墮節候又青陽應有江南夢先春到故鄉渡沂水沂水清堪浴緇塵爾若何天低平楚盡野曠夕陽多世路空搔首乾坤尚荷戈故園春事近歸計莫蹉跎魚溝逢子吉南來因于馬上問訊時與其令兄嵋初同行忽覩雲端雁影過聯翩今日渡黃河蓴鱸江上秋風起兄弟天涯謫宦多滯跡南冠初報罷獻書北闕竟如何金魚一擲便歸去花滿春江緑始波蒙陰羣山爭一徑城郭枕平岡郭外少烟火城中多夕陽淮陰舟次春回江上嵗將終早發扁舟水浸空淮浦清翻濛汜日射陂低渡石尤風倦遊暫得辭羈旅泛宅猶然逐轉蓬北去南來無限事冥冥誰得似飛鴻月夜宿長清旅店感賦亦知冬夜永客裡更如年皓魄仍同照愁人祗獨眠峭寒加酒後歸夢及春先何日鉤簾坐相㩦看月圓維揚訪王十一司理留醉故人風雨憶周旋問訊江關日暮天且自相逢傾五斗須知不見已三年林中素豔披香雪亭畔輕隂泛碧鮮客裡如歸忘嵗月何妨一艤竹西船竹亭蓋竹成孤亭蕭疏見高寄泠泠風露深日夕生寒吹中有微吟人披襟落空翠鶴柴築柴養雙鶴蕭然物外味夜深清唳集颯沓高秋氣但有凌霄姿何必乘軒貴讀貽上詩王郎滿篋驚人句㩦向歸囊墨尚濃明日凌風渡江去髙吟江上最髙峰酬貽上見懷之作不見王司李清江空芷蘭寒潮三百里風雨上淮安虎豹天門閉龍蛇夜壑寒漂零人共惜情至似君難維揚贈李蠖庵司理濟寧名勝干年在百尺君家太白樓酒市金魚長寂寞杏林人物見風流甑山橫矗孤髙色河水慿陵萬頃秋今日龍門還御李竹西亭畔古揚州維揚舟次晤畢淄湄司理有贈旅食維揚嵗欲終遲君小艇夕陽中髙文一卷濯氷魄清夢多年繞雪宫吏部清狂真不減禁庭頗牧若為同蘭陵莫自傷淹滯長嘯五湖烟月空䢴溝除夕南浦維舟日欲沉䢴溝東下大江深烟波一望愁無極家在秦山谷水隂秦皇山下暮潮新髙士湖頭水氣春此夜孤舟千里客經年書札隔江人除夜䢴江舟次賦别貽上桁上寒流湧碧莎城頭冬日照嵯峨水鄉作暖如新夏雨氣徐生㸃素波訪戴興隨殘臘盡渡江春在故園多平山尺素如相寄他日秦溪問荷蓑松桂堂全集卷七
