body:
  text: 松桂堂全集巻十七吏部侍郎彭孫遹撰上杜相國黄閣樞機重彤庭歴數長鴻才推武庫上宿煥文昌挺嶽占凝瑞攀鱗際發祥六龍開曉馭一鶚掣秋霜文部澄流品蘭臺肅紀綱韋謙多謇諤毛玠最公方毗倚登三府綸扉近九閶頻煩資顧問密勿藉平章喜起乾坤泰昇平㝢縣康賡颺雲絢采藻翰錦成襄樹豈知温室詩還和柏梁比來煩廟算朅去啟戎行偃羽舒宸慮投戈覲帝光不須張撻伐已自鞏金湯聲教流羣服栽培納衆芳秉心誠㫁㫁挹氣更汪汪薄植誰陶鑄孤生此激昻江毫徒弱阮轍久迴翔握髮今公旦通門舊伯陽城南天尺五矯首思飛揚上益都馮相國自昔休明運多資輔相功苞河初啟聖鍾岱實生公絳闥周旋乆彤廷委寄隆綸扉今樹駿館閣舊流鴻胄教司成貴文銓少宰崇四科歸樂育九品見清通丹筆祥刑重烏臺法紀雄秋官仍掌禁亞相即司空卿月升黄屋台星翊紫宫三光和玉燭一徳洽璇穹偃羽時交泰調元嵗屢豐梯航來異域雨露及昆蟲魏闕松當户巻阿鳯在桐神凝温室秘思敏柏梁工海嶽髙深並氷霜峻潔同居無旋馬地家有拔葵風秉正心如水嘘枯律應桐冬曦披廣厦寒谷轉春叢蓬髩慚潘岳龍門羨孔融發生天地意翹首碧霄中送沈嘉善𤣥暢才髙乆擅名秋來重作綰符行吟懐不廢楓江冷宦况真如瑦水清官舍去家無百里居人接壤識平生懸知風土能諳悉何必朞年政始成魏塘西去接禾興方志曽將望縣稱風俗長年鳴杼軸人家終日採菰菱催租符下愁相向顧後錢多喚未應莫倚繭絲邀上考東南水旱正頻仍送朱别駕味道終年志不違薪傳千載有光輝獨尋遺緒宗濓洛重播清風向海沂秋晩河橋驪乍唱霜横沙磧雁分飛送君便擬䖍刀贈報最行㸔入紫微送東昌呉司馬十載曽知季重名隼旟新擁畫轓行訟庭人静秋陰合臥閣詩成午篆清早見安瀾歌瓠子從無飛矢到聊城只今不數髙唐守徑寸珠光照乘明送徐州汪廣文秋來曽此折蔬麻千里相思未有涯平子情深青玉案扶風帳擁絳雲紗鳴雞山逈征鴻過戲馬臺空夕照斜莫自登臨耽逸興彩毫留咏上林花送郭華野之任呉江剖得仙符亦壯遊枌榆偏喜借才優境分林屋千巖秀城對松陵萬壑流呉越山川當四㑹東南財賦甲諸州懸知父老深延企竹馬争迎郭細侯輓杜香武何來氷雪皎風􅐾玉是連城桂一枝却似浣花溪上老最憐驥子好男兒何事翩然賦玉京不將祖徳續𤣥成湘東銀管膠東紙洒淚㸔題處士名千古彭殤一壑同可憐愁絶阿家翁傷心十八年前事蕙幌蘭燈照夢熊春浮樹下恵禽啼無價香中寶篆低好禮空王重遣累盡捐何肉與周妻以鹿脯寄餉寓庸戲為口號吾已清齋謝五辛汝應肉食鄙時人祗須一擘麒麟脯飽㸔麻姑海上春題贈菊農散人閒來獨把菊花叢長日栖遲半𤱔宫為圃為農無不可總無機事到胷中霜葩偏自抱幽貞好與山人共結盟風格千秋誰得似天然嫵媚魏元成玉清步韻玉清右史本仙才曽侍元皇香案來書就鄒枚慚簡牘詩成屈宋作輿臺青陽黍谷先春動紫氣函關拂曙開頻枉鸞驂因度世人間何事不堪哀㡬見蓬萊弱水枯仙班長自領清都先天獨契真儒者浩氣長存是丈夫無諍端能空衆諦有情時復拔三途瑤臺一謫親傳語肯許重登玉格無題吕真人印月軒用展成韻凌虛時作御風行隨處人間有五城千載雲衣留想像一天霞氣浩縱横澄嵐曉度雙鸞影寒月秋空萬籟聲矯首層霄慿寄語可容仙籍𨽻瑤京神嵩氣色鬱扶輿中有真人擁節居十二樓臺開絳闕五千道徳授丹書蓬山蹤跡何曽逺槐鼎勲名總不如從此抽簪便長往半軒松月臥清虛題贈成侍御勇甘陵有黨禍炎祚乃終屯北轅方召釁紹述猶紛紛自昔運中否士氣頽不伸所以盛世事折檻旌直臣嶽嶽成侍御對仗批逆鱗一朝身去位國勢遂不振採芋嵬山顛家人忘其貧著書以自娯白首終隠淪清風與直節千載誰同塵回首甲午年遺事重可論古今一邱貉嗟哉肉食人和馬又輝曲江栁色垂垂綠染取湘毫五色斑何事謝安偏晩任素心應不負東山走筆柬訒菴詔書昨日下金鑾翰林學士初進秩學士由來恬仕進不營門户但孤立聖主知君君不孤十載孤忠主所悉朝來䇿馬過君門㕑辦蕭然扄幽寂長安衮衮諸公卿那能似此耐官職正人登用將太平我欲陳詩歌聖徳贈楊以齋副憲柱後嵳峩執法冠繡衣立仗五雲端性成薑桂非因老氣冽氷霜本耐寒朝野傾心酬望易聖明知已報恩難清卿㡬載心如水肯借他途轉一官曽作先皇獻納臣當年直節最嶙峋中丞今是臺官長鉅典初逢計吏辰定有清裁傳白筆可無聖徳誦丹宸南司風紀由來重連茹登朝盡正人文學端推達者先服官本不媿前賢已將廉讓興千古更借風稜障百川六察班尊三獨坐四知名徹九重天蘭臺况是藏書地暇日還堪問簡編代送江西學使握蘭仙秩舊司珍題柱名髙動紫宸畫省歸來還散帙素絲清絶不生塵龍光曜自依烏出雞舌香因起鳯新解道玉壺偏皎潔十年心是飲氷人建鄴當年擁傳辰桂林秋月浄無塵重將南國持衡手去作西山採玉人珠琲盡收彭蠡滙書郵不問石城津橫經况在傳烽後教澤還㸔雨露新匡山西挾楚江迴中有先賢舊講臺水鏡澄時寒月皎紗帷披處絳雲開斗間辨氣青萍合洞裡探經白鹿來漫説公門桃李好人間應有豫章材儒雅當今屬望深九霄卿月待重臨江城暫擁扶風帳薊北猶虚立雪心郭隗臺空摧暮色元嬰閣逈淡春陰懸知綵筆峥嶸甚肯掇瑤華寄好音送呉五崖視學中州天埀奎璧望中開地近三河枕斗魁詞賦本從梁苑出圖書况是洛川來澗瀍清絶千尋水嵩少髙臨百尺臺大雅文章㸔一變只今不數少微才當年退食憶追隨酒盞詩筒事事宜袁令曽為宣武戲江郎不讓茂𢎞棋使車一出占風采客舍頻來感别離若到汝南應寄語春心搖落索居時平湖南鐃歌四首露布初馳幕府牋雲麾早定楚南天投鞭湘浦波如掌秣馬巴邱草似烟戈瀨紛從千里動鐃歌遙向九霄傳偃兵喜見征苖後依舊堯階舞羽年岳陽南去楚山多盡採巴謳入凱歌湘客趨風迎畫鷁江童鼔浪擊靈鼉百城已見垂櫜臥三户争㸔釃酒過好待翠華南幸日六軍飲馬洞庭波廟算髙深九伐張舳艫千里駕虹梁軍威盡掃衡山霧兵氣仍飛桂嶺霜天子雲臺疏爵重將軍銅柱䇿勲長即看文軌圖王㑹白雉迢遙貢越裳横吹聲中鼓角鳴潭州郭外陣雲平江烽不動湘烟碧堠火空懸楚練明六詔河山金馬使三川版籍石犀城昇平㑹有云亭典玉檢芝泥勒令名送翁武原赴黄州同作秦溪物外遊十年蹤跡各沈浮白沙居處原相近淥水心期本自投逋客自憐扄岫幌故人新喜夢刀州楓香亭下驅車處目斷春江萬里流啼鶯芳草最佳辰喜見仙軺擁傳新空闊魚龍揚子水參差桃李秣陵春十年舊雨同遊宦此日停雲有故人君到江南相憶否新詩肯為寄香蘋題楓江漁父圖手結夫須上釣舟霜黄初落潦初收慿誰剪取呉江水併作楓林一泒秋斗母降辰恭紀一首三生名籍在仙壇鈎校分明御筆丹未得幽貞同雪幹可能潔白比霜翰北辰垂照三千界東岳朝真十八盤從此便成雲水計上書不擬似嚴安贈文洽玉塵風流冠講壇仙葩五色散鉛丹名從桂苑留仙籍才是蘭苕振彩翰狂客定慚蘇嶺嘯痴人那解蟻封盤只餘一事差堪負棋品還能過謝安和真人韻不厭塵凡境鸞旌為我留雲霄皆衮衮湖海本悠悠桂燄清宵永椒觴後夜浮共存天際想不作旅人愁偶逐雲心出聊同雪爪留年華長冉冉去住兩悠悠卉物春光近星河夜氣浮太虚無色相何處着離愁戊午除夕得除字柏酒辛盤歲又除焚香午夜待鸞車身慚貞白甘投幘心薄文長肯􅗓裾天上祥符初聘夢年來拙政是閒居移家擬入靈威洞手把琅函一巻書金閨名籍一朝除寥落生涯患難餘逋客移文齊博士貲郎獻賦漢相如誰能皓首耽微禄翻遣浮雲㸃太虚四十九年明日是知非可比大夫蘧征税頻仍乆未除㡬㸔水旱罄􅓵儲軍須數轉江南粟荒政曽無鄭白渠極目流離還載道故鄉消息重愁予陽和願作豐年兆歲歲春風樂佃漁客舍頻驚歲月除悠悠天地總蘧廬宫中擁篲思鄒衍市上悲歌弔望諸雲物春臺周太史星河夜色漢儲胥他鄉風物同鄉侣徙倚幽懐待一攄再用前韻四首慚愧名根未掃除長安從此曳柴車風寒易水催人髩桑落中山引客裾出處漫從司馬卜寂寥誰問子雲居已知窮達無非命悔不當年早讀書晩來散帙就前除一㸃冬曦趙子餘世態滄桑堪自笑吾生木雁又誰如數聲警夕殘鴻過千里懐人尺素虚薄醉未消殘灺泠竹窗清夢亦蘧蘧湖海滄茫氣未除銜杯莫問隔年儲地當黍谷長停霰水下桑乾别引渠縱有陽和誰乞汝祗憐歲晏孰華予永安湖上吾廬在一葉春流正可漁鄉愁旅思漸消除轉為佳辰憶故廬鮮黍晩供吳不托芳柑逺致越無諸團圞話乆邀歡伯邑里風淳近赫胥况是春來花信早南枝梅蕋已先舒除夕和悔庵韻虛幌寒燈遡晩風頽顔難借酒杯紅蹉跎出處浮雲外飄忽年華逆旅中身逐鴻飛常嚮北心隨斗柄又移東銷憂且作蟬聯話留待三更玉漏終同凝祉文洽守嵗叠前韻真率盤飱見素風談𤣥同坐蕙爐紅浮名一宿蘧廬内公案三生玉局中金埒行將空冀北銀毫先已贈湘東羈栖賴有吾宗在仙籍由來自陸終同蘧非守嵗三叠前韻故人千里逐晨風伴我東華踏軟紅㡬度悲歌燕市上當年頻轉瘴鄉中只今羈旅仍天北此去幽棲卜瀼東柏葉漫誇春酒釅昌陽還擬贈韓終松桂堂全集巻十七
