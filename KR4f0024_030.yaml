body:
  text: 松桂堂全集卷三十丁丑吏部侍郎彭孫遹撰九月四日出宿張家灣舟次憮然言懷寄都門諸朋好九月始蕭辰野色入綿邈遂與親故辭臨岐手重握歸舟猶滯凝征塵苦氛濁秋原氣悽愴寒流水瀺灂西風潞河上獨戍鳴哀角中宵感往事嵗月驚頻數僶仰二十年朝菌一晦朔栩栩不自知一夢蘧然覺田廬已蕪沒骨肉盡摧剝老至既衰罷器小難礱琢三銓况繁重而代大匠斫毫髮亦何禆充位徒齪齪冥行今未止車耳生重較言謝京輦遊請從稼圃學誓墓悔已遲所期在貞確野泊秋氣一何深原野日蕭索河水既縈紆衝飈復回薄輕舸遡急流十里九停泊坐使羇旅人慘慘心不樂何以寫我憂吳吟間相作舟子何招招帆影疾揮霍因聲寄同羣慎此風波惡晚眺空􅦬延晚色朔氣入秋天河轉輕帆卸林疏落照懸雄屯千壤錯逺漕萬艘連北顧多形勝神畿可卜年夜泊大稍子口月始望皎如白晝與士偉臣揚百齡兒曉孫坐玩久之喟然興感曉行小直沽暮宿大梢口秋深日易夕暝色在榆栁遲之月始上清光射忩牖微雲吹泬寥澄碧無纖垢惟見數寒星羅羅挂魚罶對此不成寐攬衣呼朋偶坐聽柝聲殘荒村絶雞狗孤旅多艱辛安從謀斗酒夜氣愴我神風霜龜我手嵗宴懷百憂誰能不皓首己酉夜宿靜海用臣揚韻岐路蒼茫客思盈西風愁聽逆河聲舟依古戍匆匆住月上荒城慘慘明寒雁離羣棲更起夜魚回洑擲還驚傷心最是今年甚深負妻孥愧此生臨清閘贈趙僉事山東七十泉挽之入西北合流達衛河九曲時一直上下千餘里轉輸百萬石此閘如咽喉能使倉廩實宣泄苟失宜毋乃病國脈國家設監司河渠有專責賢哉趙僉事獨能舉其職夙興庀官政日晏不遑息興築必及時疏濬在農隙坳堂水不膠千檣爭頃刻王程不愆素太倉富玉食商旅無費留逺人樂行役監司若碁峙為員殆盈百安得盡如斯精勤能自力作詩貽史氏他年志溝洫岸青以南池納凉圖索題為賦二截南池雨過晚凉新栁榭荷亭憺絶塵風月無常誰主是天教傲吏作閒人穨然岸幘納凉時人事蕭閒少諍辭他日流傳千載下重添佳話在南池泊頭橫參挂天寒月起人語喧豗鬬羣蟻鳴鉦㴬矢千炬然聲沸泊頭河下水鎡基不事事刀劒孰者弄兵非赤子此地居然畿輔間北去京師猶尺咫乾坤清泰日月近沐浴教化興廉耻蠲租未已又發廩仁聲在在盈人耳何為輕身扞法網誰使汝曹坐至此可憐水潦太頻仍三載阻饑痛入髓畢生空自力田疇終嵗那能厭糠粃常平倉粟十萬餘鼠雀無端飽欲死和臣揚南陽湖道中漠漠平田灔灔湖霜天了與暮秋殊微茫野色生寒燒明滅波光起宿鳬秦碣于今無片石泗亭千載想雄圖斜陽古渡重憑弔寥落西風對酒徒冬夜舟中寫懷寄王阮亭司農旅泊有孤心嚴節多慘顔重以昆弟好因之别離間結交四十載道義踰丘山同為京洛遊一日數往還連牆僦舍館均茵綴清班如何遽分手顧我殊衰殘此生幾相見為期當已慳懷中有書札所苦道路艱願君益安健玉體輕珊珊願君恢令德席譽流人寰藹藹君俊流霄漢相躋攀縞紵豈不貴無棄蒯與菅昨夕竟夜不寐五更末始略合眼忽夢南還已到家才入門即見朱夫人已坐重慶樓下西房中見余至起而相迎笑謂余曰君來何暮我灑掃庭宇待君久矣余因同坐相與絮語語多不可記但覺朱夫人笑言如平日而已覺後枕上忽忽不樂口占一絶舟中日日數歸程晨夕相偎恍若生何事到家偏先我芳魂應是御風行崔鎮新河三百有餘里千帆飛渡如輕鳬連年被水水泛濫深不可涉淺或淤荷畚舉鍤有徴集嵗晚猶未休役車瀕河之地廣且袤曩者厯厯多村墟荒烟衰草一何有平疇萬頃皆棲苴數間茅屋斜厠水絶少行踪惟鼪鼯戍旗一片自搖揚夕陽黯淡風蕭疏寒空入暝四野逈霜氣憯栗生肌膚俄然草際有偶語已斷還續聲糢糊何人篝火明忽滅觱栗髙下吹烏烏夜深稇載入林去明朝依舊充河夫和臣揚漂母祠二絶句千載猶聞漂母風戛羮偏在一門中家庭不識真天子邂逅能知命世雄澼絖終朝本食貧獨憐國士不謀身少年已自官中尉却把千金報故人一飯酬千金本不為薄但以跨下少年拜官都尉事兩相推較則未足云重報詩意全欲揚母非以抑韓依前韻題韓侯釣臺荒臺佇立想遺風百感茫茫夕照中彭仲自漁侯自釣可憐魚服困英雄彭越字仲少漁於大澤出漢書王孫當日苦長貧落拓生涯骯髒身莫謂釣徒還賤士早應羞伍鼓刀人清河口清河一口受黃河濁浪滔滔來灌注勸君從此入中河莫向黃河乘險去龍門水勢髙建瓴南來直到歸墟處嗟哉河伯何不仁驅遣風濤騁狂怒千金隄决萬斛傾五石誰能容大瓠過客逡巡孰敢前地不輟險人所惡河臣當此誠大難國計寧堪容一誤十年前此鑿中河縻耗金錢不知數河成一葦亦可杭巨艦輕軺走如騖行人安穩布帆健棹歌不唱公無渡朝集充庭貢篚陳轉輸百萬東南賦此時功有過不無噂沓紛紜多口語中河之役百世利藉藉流聲在行路功不可沒過可原巖廊論議須平恕桑園和臣揚散愁聊野眺信步不成遊漠漠千帆影荒荒九月秋宦情吹劒首客况淅矛頭落日長安逺前途是德州魚頭集朔隂薄暮霜風吼客子單舸繫枯栁寒村懬懬數人家何處青帘能貰酒漁軺千箇泝復沿載有魚蝦如積阜大魚撥剌甫上義小魚噞喁已盈笱細微水族不計錢狼藉寧論斤與斗以魚為食古所志吳客見之先哆口娶妻那敢必齊姜河鯉河魴靡不有祗今令甲重農桑處處耰鋤相比耦此非王土獨不然但多湖汊無田畝共喜腴鰭賤土苴却令粒米勝瓊玖天時或僣地利湮誰與長吏還知否請看河畔捕魚人盡是耕夫與耦婦雨中過揚州不踏平山路乘潮夜入吳故人無一在那忍問黃壚即事遣童奴往惠山買新酒酌奠朱淑人淑人生平不能多飲而酷愛錫酒以其甘美也今過此適山家春酒初熟追念死者不勝酸痛撫棺一酹不勝悲酒冽泉甘此一巵君定有知能憶否少年情事拔叉時望亭此去鄉園近重來二十年憑欄休送目腸斷望亭前己卯九日登秦駐山強把茱囊理宿疴筍輿重此問巖阿舊題漫沒荒祠在陳迹銷沉腐草多山徑霜清聞落葉海天秋逈見纖蘿一生幾量中郎屐更不登臨奈老何松桂堂全集卷三十
