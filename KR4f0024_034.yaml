body:
  text: 松桂堂全集巻三十四吏部侍郎彭孫遹撰蠟梅勁質幽姿未易誇暗香隠隠上忩紗誰教帶雪消金粉獨自臨風老嵗華好䕶蜂黄含蒂落巧憑粧額向人斜江南芳信知何限不數春前萬㸃花十月梅霜白風髙暗自催山城早見一株梅江春剛到南枝外隴信還隨北雁來清影暁生肌粟冷芳魂老向嵗寒開故人近有山中約共結相思照舉杯白海棠一枝淡冶照芳茵姿骨應知未染塵雨後倚䦨全欲睡風前撲絮不勝春坐深蝶粉疑無影妬學蛾眉似有人夢到玉樓還縹緲空庭月色已如銀亭亭孤韻擅風流淡色空香致更幽霧縠欲仙長掩袖玉壺有淚只低頭疎簾自織春前雨子夜偏宜月下遊院落誰人惜狼籍六朝金粉暗成愁遊絲殢影日遲遲倦倚䦨干有所思新月上花㸔不見殘鶯入夢怯先知送春小院長疑雨寒食空堂未有詩莫向夜深燒蠟燭畫眉人已妬臙脂海棠花織雨籠烟小院中游絲冉冉媚芳叢宿粧殢酒猶慵起新頰含愁有斷紅開靨臙脂秦地北窺人朱粉宋牆東昌州不少風流種香逐巫雲一旦空駘蕩層隂不自持韶光多在斷腸枝曉欄霞染微微暈午幕烟縈裊裊絲著雨輕盈初賜浴臨風旖旎欲通辭棃花未發薔薇遍惱亂春愁此一時花候海棠在薔薇後棃花前紫菊花一枝籬落倚微曛掩映茱萸色未分冒雨不辭開爛漫流霞偏為染氤氲栽來吳苑曽名玉移植華堂定作雲自冩胭脂添靨後幾囘青女傲幽芳白菊花冷蘂疎香各占新天然素艶淡無塵餐來楚澤氷為骨夢斷柴桑月似銀籬下霜濃花冉冉枝頭風細玉鱗鱗斜陽逕裏亭亭立疑見陶家載酒人水紅菊花艶色偏能傲朔風疎花宻葉占芳叢輕沾薛女壺中涙淺拂楊妃簟上紅心抱幽香寒自束枝迎曉日暈微烘東牆若近東籬下傅粉施朱總未工黄菊花三逕秋深景物賒凌霜仙卉吐黄芽疎枝巧映千林葉芳信長開九月花清露滴時金縷濕愁雲合處鶴翎斜姚家國色多竒麗未必風流壓衆葩蜜色菊花嘉卉栽來處士家重陽霜後幾枝斜春條曽見花成蜜秋艶誰知蜜是花蜂蕊初交黄未褪鵞肪細縷玉無瑕幽人欲采還相惜醖釀芳心咽露華大紅菊花朱柎綠萼近人栽五栁門前錦作堆芳信正逢重九節絳雲忽擁望鄉臺赤城霞氣氤氲動紅友樽空掩映開莫訝凌霜容色好丹砂應為駐顔來月季花紅兒生小本倡家香纈重重剪落霞朝槿若能知晦朔仙蓂應自吐妍華開時長對團圞月萎去曾非頃刻花二十四畨風信後一枝疎艶映忩紗輕薄姿容荏苒情小紅偏得可憐名柔枝倍覺風神姣芳信還隨月魄盈韓女懷春初病起程姬避夜太憨生從今仙的休頻注淡抹輕黄㸃絳英雞冠花層層雲纈鬬風流髣髴尸鄉是舊遊獨向金天披艶色故將絳幘岸清秋閒依水蓼枝相亞冷壓江楓葉未稠愛汝幽栖多野趣山家景物足淹留翠羽朱冠太陸離秋來到處播芳㽔竹籬茅舎蕭疎影野店山郵寂寞枝小逕立殘風雨夜頽垣倚遍夕陽時誰施五采成妖色物態紛紜盡可疑鳳仙花初似苔錢綴碧叢旋開花蕊扇炎風夤縁蹊徑蕃滋易輕薄鉛華㸃染工莫恨離披秋雨後頗宜採摘晩凉中小忩兒女嬌憐甚手爪爭誇一捻紅秋海棠一當風露一嫣然睡態如春别自妍忽忽聞名冣悽艶依依弄色太嬌憐寒叢欲坼檀心弱曉暈初開絳靨圓料得有人惆悵絶斷腸秋在小忩前韶光麗色逐飄塵小艶重披白露辰數㸃不禁遙夜雨一枝愁殺曉寒人朝華易隕還如夢秋氣多悲合愴神欲向花前譜新句蕭條非復舊時春蓼花冷艶偏宜寂寞濵開時早已入蕭辰不隨芳草同零落只與寒茶共苦辛斜倚秋林紅瑟瑟閒依野水碧粼粼露晞霜冽情何限長傍蘆碕伴隠淪戎戎芳草碧生隂曽與周顒共入林嫩紫春苗滿山舎纎紅寒影落江潯平攀椒桂多嚴性靜對蒹葭有逺心我似秋蟲最辛苦幾從花底發哀吟决明花行園曽此摘烟蘿藥草秋來種别多色艶黄金偏爛漫枝零白露漸滂沱靈苗乍可充山蓛嘉實應能起目疴一掬西河萬行涙強扶病眼奈花何華陽仙種競含芳别有靈苗字芵光幾葉金風飄素籟一叢清露濕緗房春缸獨占濃香美秋實徐搴藥味長徙倚臨風更三嗅從今不賦眼明囊决明可以釀酒名獨占缸見本草芵光見爾雅梁簡文有眼明囊賦丁香花春愁百結費禁當一樹叢叢祗自芳小艶縱非傾國色清姿也合斷人腸暗中沾惹渾疑雪空裏縈盈併是香好趂東風一沈醉來朝花底拾明璫諸葛菜春菜由來自蜀川成都桑月競萋妍託根先主闚門後得種南陽抱耒年小摘不煩流馬運大名長與卧龍傳王孫未必諳風味漫向岷山種芋田探春花玉樹偏宜雪後開一株早已壓江梅幽人曉起探芳信春自枝頭冉冉來水仙花冷艶幽香閲嵗華獨憑水石結根芽莫將國色輕相比碧玉從來是小家珠蘭含芳新雨後吐秀晩凉前向水波生媚當秋露並鮮夜光生楚畹明月浣湘烟欲奏幽蘭曲探驪若箇先别是崇蘭族叢生處士家物芳紛可掬人逺思無涯小艶撩清夢幽馨逗碧紗可憐空谷老徒自握靈蛇好是宜人處當風弄夕芳上鈿金粟冷薦枕碧髾凉漢女芳為佩綃人淚亦香秋來多别思玉露正瀼瀼九畹名相並三湘種自分纎黄流麝影墜露染湘紋吹逺芳彌烈香幽靜始聞洛靈如見採蘅薄有餘芬茉莉二絶天士遣人送茉莉一大盆至寓并以素箑索詩因題二絶句答謝之鬘華曾向嶺南開客舎縁何取次栽不是風流何水部夜深那有暗香來梧桐小院露華滋澹澹銀河拂地垂最是旅愁消不得月明風細夜凉時題秋海棠二絶嬌態難禁雨輕紅欲染霞誰知斷腸草即是斷腸花秋老深深院臨風人自嗟捲簾腸已斷怯見㫁腸花八仙花纂纂花房玉露浮黄庭一㸃絳宫秋淮王賔客教分種賀監朋儕許共遊冷蕊攢枝形𤨏細繁英團纈態綢繆誰將小草登仙品忝竊嘉名在十洲牽牛花憐他蘭月試花稠恰與黄姑小字侔綺節乍臨芳信早翠翹輕折黛光流斜縈野岸盈盈水倦倚疎籬脉脉秋風露滿天河似練晩來獨處不勝愁此花雖小草却鮮翠可愛憶壬申七月三日朱淑人遣小僮于斜街花市買得三數本戲謂予曰七夕近矣君可無縁情之什乎余遂成詩一章落句有風露滿天晩來獨處之句當時所作自謂一篇警策不謂今兹竟成詩䜟壬申至今已六年矣荏苒嵗華存亡逈别迴環三復摧悼可勝言耶丁丑舟中記題烏絨花和曉岳吹盡殘春廿四風隔牆又見數枝紅烏絨解作傷心色渲染黄梅細雨中色絲染得最輕勻一捻纎紅弄態新可是東家朱粉薄不教太赤汚天真吹盡花期廿四風綠隂深處見輕紅隔林乍歇黄梅雨幾縷朝霞逺近中誰劈香絨解繡絛千絲萬縷細于毛楝花風盡紅英歇昨夜隋宫試剪刀松桂堂全集巻三十四
