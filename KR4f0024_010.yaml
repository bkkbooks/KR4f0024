body:
  text: 松桂堂全集卷十吏部侍郎彭孫遹撰正月十七日振仲七兄招往東郊園中觀梅盡醉而返仲兄有詩因依韻成律曲曲軒楹面面湖春醪初熟未須沽親人海島紛容與入座花香乍有無世態徒然爭鄭璞時名空自逐韓盧不如醉臥芳林下月落前溪雪滿途維申招飲牡丹花下不得赴以二詩答謝春來日日困春酲髙枕虛堂午夢清正好開簾迎社燕不妨求友待林鶯微寒尚覺花風淺遲日初薰穀雨晴珍重故人良宴㑹飛箋空為欵柴荆同人選勝促飛觴芍藥花開正艷陽繞幕雲深初度曲隔簾風細乍聞香數盈金谷催詩急漏盡銅烏卜夜長如此髙懷真不惡春愁何意苦相妨春盡率然有作游絲飛絮弄輕盈乳燕流鶯自在鳴竹葉酒當婪尾􅍄清和天為釀花晴偶然客至相為醉但使身間亦自輕莫遣春愁殢今夕共君坐聽曉鐘聲適客有誦閬仙三月正當三十日一絶者故落句一及之寄王七禮吉時在十一司李署中薊北門下斜街宅天寒歲暮霜風坼對床清夜語不休往往東方曙烟白余既栖栖吳越間君亦歸耕長白山山川迢遞二千里極目天涯見雲水五載相思道路難故人何處訊眠餐時向揚州問歷下還因歷下憶長安今來一眺春江碧再得相逢話疇昔郡齊弔古定題詩一裂齊紈寄吳客答貽上詞人寥落老撡觚矯首中原孰並驅狎主齊盟君是長同遊燕市歲云徂客來競折紅蕖麗歌罷誰憂白雪孤到處山川留逸唱風流還似大蘇無作者千秋有代興使君髙寄逈崚嶒羣山海內尊東岱絶調人間在廣陵官閣但擕珠樹鶴宦情真似玊壺氷蕪城日暮邊風急明逺歌成思不勝徑和李侍郎憶洞庭之作縹眇山川憶洞庭嶽陽樓外水冥冥夢回楚瑟千峯碧望入湘帆九面青芳草舊遺公子珮清秋曾泛使臣星郢歌一奏堪腸斷莫使江南逐客聽作四絶句書箑致佛車山左風流王佛車烏衣門第最清華今朝癡叔筵頭見玊樹何曾屬謝家燕山霜月白紛紛蕭寺鐘寒竟夕聞曾與元方同把臂論交今日得陳羣日日沉酣老步兵醉中髙眺蜀岡晴竹林此日陪清宴又見當時阮始平清暑山堂日未曛新詩題罷重思君相尋官舍元無事寫得羊欣白練裙平山堂懷古春盡平山長薜蘿虛堂寂寞少經過歐公一往空陳迹羈客重來起浩歌京口晴雲江樹坼蜀岡春草墓田多低回千載情何限斜日蕪城奈晚何蜀岡眺望平岡徙倚起悲風回首鄉關思不窮芳草多情春後長碧雲無際暮天空蜀川地接江流外秦塞人來夕照中莫更披榛尋往事烟蕪一帶是隋宮弔迷樓故址復道千門清夜遊隋皇曾此幸揚州翠華不返當年夢碧蘚空生舊日樓欲認離宫垂桞盡似傷亡國芰荷秋至今江上傳遺恨一曲楊花起暮愁揚州逢玊行有贈王程春草碧參差粉署含香入直時共說山郎無長物懸知水部有新詩白門桞盡懷人逺朱雀桁開擁傳遲自笑披裘江上客賞音千載得鍾期作歌送孫無言歸黃山故居軒皇採藥處聞在黃山中左挾容成子右把浮丘公一朝丹成上天去千秋想像橋陵宫此山髙與蒼穹逼至今洞壑多幽特窈窕巃嵸三十峯峯峯皆作芙蓉色孫郎本是好竒者家在黃山西嶺下問津曽訪武陵春扶笻每到匡廬社觀濤江上偶乘槎忽憶山中桂樹花丹梯翠壁不歸去𤣥猿白鶴空咨嗟送君歸棹清溪水清溪千仞下見底臨風揮手一長往髙臥清泉白石裡蘇門先生薄世榮君今亦逃身後名抱琴他日來相訪聽爾鸞吟鳯吹聲贈龍師逺道思君日西風落葉初曾從吳市客一寄武林書小艇江潮急孤城夏雨踈相逢還問訊歸計定如何挽房儀凡樞部興公尊先生也甲申之變以憂憤而卒米脂亂天綱咸秦實禍始豈無清流人紛紜受驕餌房公抗竒節秉心終不二白璧絶衆汙黃冠非我意揮手謝所親從容遂其志生平軌聖賢成仁與取義攀髯既有時沒齒乃無愧龔勝不愛死范粲不苟生古來志節士歷久彌堅貞貂蟬座上客徒羡朝槿榮淹忽隨腐草一死鴻毛輕皎皎司馬節百世流芳聲祀公以爼豆易公以嘉名髙風激千古興彼頑懦情讀貞靖先生遺事感賦贈興公大澤狐鳴已自疑鼎湖龍去不勝悲氣為河嶽生偏壯力謝刀圭死不辭在昔專城無一士至今獨行有孤兒何人執簡徵遺事玊管銀毫好綴詞賊渡河入秦郡邑皆不守三川士大夫多受汙者惟房公潔身全節賊索公不得執興公於獄搒掠備極身無完膚故五六聫及之己亥之冬原人祀公以特祠私諡為貞靖先生維揚送興公之白下繁華猶說石頭城宫闕年年蔓草生江艇進時無暑氣山陵到處有秋聲湖干弄笛人何在橋畔吹簫月正明可惜揚州好風景芙蕖開日送君行興公來同出東郭訪豹人不遇見公子應門辭令敏給因有此作東郭招尋地髙人此鑿壞浮榮看木槿清嘯答庭槐凡鳥題詩去家禽對客來何妨同解帶長日得徘徊再占一律送興公秦川公子不思家進艇江天正暮霞相見又攀隋苑柳此行還看北門花伍胥江口潮初長黃歇山頭日未斜好向秋風登覽處一裁新句寄天涯題龔賢山人畫寄吳方漣侍御白下山人嗜竒癖濡毫寫就嵯峨碧萬壑千嵓尺幅中因風一寄西臺客十載曾聽長樂鐘故山夢想玊芙蓉功成他日拂衣去髙臥蓮花若箇峯題張翀畫花鳥册子耕塢先生為余言張翀山水花鳥妙絶天下僑居秦淮意致蕭逺居然晋人風味恨生不同時目中不見此等人適梅岑以此册索題因系以二絶後有覽者當不禁今昔之同情也畫苑人傳粉本清宛然花鳥弄春晴黃筌一往張翀死今古風流想像生往事追尋歲月賖淮波東去月西斜春蕪閣上人何在開遍秋來滿徑花送豹人遊吳門雨過清江採白蘋蘭橈目送入吳人為余遍訪棲遲者恐有當年梅子真飲吳爾世齊頭待月山堂清閴足徘徊不厭巾車數往來已覺新涼生岸幘更逢好月待銜杯懷人千里孤帆逺落葉三湘一雁哀白露金風無限思客中懷抱為君開送爾世遊廬山送子匡山去西風五兩輕買峯歸計早觀瀑世緣清後夜人千里髙天雁一聲空齊秋夢逺相逐過湓城棲靈寺第五泉指㸃名泉處招提迹未湮亭空碑記在草翳井幹新潄石明微尚臨風憶古人清泉如可薦更採澗中蘋紅橋草樹依微合烟波縹眇長紅橋一極目城郭半斜陽舟渡蘋花水風薰藕葉香旗亭何處曲春怨繞垂楊玊鈎斜髙桞平田噪暮鴉相傳此是玊鈎斜年年寒食多風雨落盡棠梨幾樹花瓜步夜泊送曹惟佐之濟南渺渺清江去路分驪歌偏向客中聞情親不惜頻為醉秋至那堪又别君殘夜寒生瓜步雨征帆目極濟南雲瑶華倘許殷勤折一寄西風塞雁羣揚州送唐祖命之汝南秋到蕪城暑漸微林中盡日對清暉青雲自信千秋在白首空傷萬事非汝水悠悠人獨往江天漠漠雁將飛因君更發羇孤恨相送河梁淚滿衣題蕭晨畫草堂枕林水來往多清興終日少人行幽鳥啼山徑欲訪山中人不辨山中路林氣日夕深吹作霏微霧贈梁木天髙城古寺靜不譁欲落未落白日斜使君乘暇一相訪車騎不驚城上鴉桐隂數畝緑覆地坐談向夕多髙寄十載空違箕潁心一行且作滄洲吏君今簿領困朱顔憔悴王郎亦此間才人屈曲復何意天路迢遙詎可攀瓜州阻風寄崔大一夜石尤起空洲繫艇頻定知同舍客逺憶渡江人渚靜無飛鳥沙喧有釣綸離離京口樹烟火隔城闉江行楚城方薄暮北望思悠悠何事天涯客頻移江上舟蒲帆風力駛蓮葉雨聲秋歸計滄洲晚間心愧白鷗大風渡江亦畏風波惡征帆不可留晴翻江岸雪暝入蔣山秋世事驚如浪人生轉若浮廣陵烟外路回首即并州舟晚逶迤一水長夜色滿踈樾時見逺林中殘霞翳新月雲陽别訏士别君無限意南北各經過風雨朝來集江城秋氣多驚流魚大上廢驛水空波聚散長如此愁心滿曲阿再寄崔大蘭若古城下思君正掩關圍碁不知罷相對一僧閒立秋日小市丹徒鎮停舟問去程到江還幾里冒雨又孤征久客吳音改多愁楚調生西風將木葉秋至若為聲江干早秋懷孫豹人客吳下已覺秋風至淮南葉漸飄心懸揚子渡人去伯通橋暝色邀歸翼寒江落暮潮盈盈違一水空自摘蘭苕江上寄訏士鳴橈不覺晚逺樹泛寒流吳楚一相望烟波始欲愁潮聲先報雨江氣早知秋憶子雲陽道歸帆夕未收江干風雨憶墨樵南下小艇隨風溯急湍忽驚驟雨薄林端遙生瓜步孤城暝頓覺荷衣六月寒越燕知秋辭客去江花日暮向人殘呂䝉城下蕭蕭壘念爾南行道路難雨泊潤州城下懷貽上之淮隂相思楚水濶相望正依依官舍終朝盡淮隂何日歸江雲開復合秋雨息還飛應有安仁賦空憐心思違再渡江老作淮南客經時去復回江禽相對浴水蓼背人開晚棹歌相激秋濤響易哀重來還有約吹笛妙髙臺懷祖命思君不可見落照廣陵城載酒何人過揮毫終日情竹風殘暑退桐雨晚凉生易有窮途感秋來一葉聲題閻修齡淮上草堂故居汾水曲門對栁溪深正有西歸夢空勞北望心臨淮三卜宅種樹幾成隂不及晨風翼翩翩返舊林移家淮水上生計問漁舟舊國松楸暗髙城木葉愁晋山千里夢楚雨一堂秋久客經搖落行吟易白頭贈孫象五懸瓠城邊獨往時蕭然杖屨見風期客惟叔度招尋數地近蘇門嘯傲宜勝日樽開還北海故鄉花發又南枝新安江水明如鏡遲爾歸來理釣絲雨後簡無言僧舍無行跡纎絺掛薜蘿風回天籟落棋罷暝中過雁影南來早秋聲雨後多清吟良不厭餘興屬羊何鑾江晚行薄暮山村繫客心村烟一㸃逺相尋林中日落留餘照樹裡人行帶夕隂楚塞同雲聞雁過江城連雨覺秋深歸時已是瑤芳歇坐對西風思不禁雄州道上口號江雨新添幾尺潮靈岩山下碧迢迢却憐秋月如春水栁緑波明冶浦橋流水垂楊夾岸生龍池風景倍淒清秣陵關外山無數翠髻青螺一帶明過北譙舊里賦呈羽皇家叔自離譙上宅南北各紛然吳楚一千里星霜三百年人情懷水木吾土隔風烟時有江邊信心知大阮賢吾叔曾持節朱轓出魏州賜金疏傅老賭墅謝公遊山接琅琊勝階生玉樹秋樽前羣從在誰得繼風流與天駟話舊舊遊燕市每同車江上重逢五載餘共歎風塵淹滯久年年花發子雲居班荆好為故人留風雨譙城欲暮秋同籍弟兄多宿草不堪重問薊門遊古意春絲織成絹製為素領巾皎若山上雪潔白無㸃塵是妾親手作以奉君子身君心尚垂念道逺何由親持此拂玉體如妾充下陳貽上索艷詞入倚聲之選戲答聽曲旗亭憶往年綵毫落處競鮮妍紅忩舊作空中語白社新尋物外緣畫閣漫裝雲母研清歌誤拂雪兒絃前身君是王摩詰試共參求綺語禪客居見桂有憶故園紛披岩桂襲人裾空館髙涼雨過餘忽憶故園秋色好正當良夜月生初花開定念淮南客雁去曾無江上書落盡天香君不見坐憐芳樹日蕭踈贈呂夢軒京洛同遊日分擕已十霜鳴琴看作吏畫省羡為郎勝跡從濠濮名山對鳯凰此方頻水旱待發汲公倉勝國興王地才郎擁傳時雲中帝子宅花外列仙祠秋色分荆嶺春流繞芍陂河山誰共賞莊惠有心期有憶荼䕷花下解征驂花落花開思不堪顧我蕭郎耽作客憶他秦女帶宜男紅衣空老芙蓉渚紫菊初勝玳瑁簮安得凌風生羽翰相隨飛雁過江南滁州道上作孤城遙入望心識是南滁地接寒烟外人行夕照餘豆花經雨落禾黍向風踈素食曾何補生涯愧荷鋤登豐樂亭空梁千載古苔生一讀殘碑想太平戰壘青山無處所居人白首不知兵亭中遺記風猶好石上流泉水尚清何事來遊今絶少茫茫秋草暗蟲鳴懷家兄渭臣早結佳兒百歲歡也應嬌女待乘鸞栁花作賦何時就桃葉宜人即次看老去漸知婚嫁纍貧來轉覺世途難從兹雲外堪長往黃葉空山禮戒壇寄家兄仲謀幽蘭六月吐芳滋小婦當窗理雁絲雨過西樓涼乍覺青青夏簟夢熊時悲翁仲金城兮湯湯昔之宫殿何鬱皇縱橫南北數十里鄧林之木森成行貂璫貴人供灑掃羽林三千周廬宿衛羅四旁榮華富貴那可恃雲烟過眼須臾耳田父驅牛上墓門猶說當年親見此此理由來君莫憂黃壚白壤皆王侯然人魚斫漆絮南山有隙終見求風號雨嘯夜不旦其中乃與狐狸遊寒烟蔓草復何有隧道悉已成田疇石馬可羈羊可乳咄咄翁仲行及汝暮雨亂峯相向碧秋氣一何深片雨空中落殘陽逺在林溪田餘白骨山驛近紅心客意方愁絶寒衣幾處砧臨濠道中馬首今何託龍橋此再過村烟依樹起野色捲簾多落日有歸鳥寒林無靜柯十年邱壑志心迹竟蹉跎遊醉翁亭詩有序由豐山之麓折入西北過龍泉寺經柏子潭行亂山蘢葱中渡小石橋而西遂得醉翁亭亭側有老梅歐公手植也前對釀泉水狹而清曲折行石子中有致山上有二賢祠祀公及王元之旁二楹祀東坡居士瞻仰其間流風斯在因低徊於亭下而作此詩山源不知處溪水清且深虛堂構其上醉翁時一尋政簡人自理不廢登與臨此事已千載清風猶至今苔石含秀色林巒生逺心留連日欲暮空翠沾人襟古梅幽崖氣清冷下有梅樹叢抱兹歲寒質獨秀萬木中孤芳信髙潔千歲猶青葱誰與植此者乃是歐陽公此樹有時盡斯人竟何窮龍泉寺寺東舊設南冏卿署西為龍潭髙林行欲盡古寺出斜曛秋草人無跡寒岩路不分樹含卿署月龍帶講堂雲向夕鳴清磬山空到處聞柏子潭石篆分前代波光合逺嵐至今風雨色白日繞寒潭清流關幽崖窈然逺猿鳥絶躋攀神力何時鑿清流天際關千盤凌絶頂百轉見寒山不少風塵客終年此往還竹枝詞一自蕭郎愛逺遊追思前事總生愁簟紋恐是湘妃竹才著儂身淚便流霜降日發南譙旅食無端歲月賖西風白露變蒹葭即看岩際叢生桂早發秋來兩度花落木聲多霜有信采蕭人逺思無涯愁中却憶䢴江使計日今朝已到家和祝京兆溪南八詠祖祠喬木祠外修林帶列岡靈柯已是百年强清隂但覺移來逺朱果還因薦後嘗閲世年深非社木濟川才大亦沙棠行人歎息豐尋樹指㸃溪南舊草堂梅溪草堂梅溪一曲碧江潯水白沙明好結林小築正當溪盡處幽花不改歲寒心琴樽晚潤分嵐氣洞壑風回引谷音此地棲遲堪自老披裘誰屑問遺金南山翠屏戶外千峯巧自遭捫蘿攀葛未知勞髙情自合耽邱壑爽氣真堪散鬱陶絶頂清秋橫晚翠寒崖古木捲蒼濤少文不少登臨趣臥看南山一枕髙東疇緑繞野色平疇入望多披襟却受午風和為農計早安田里避世心深畏網羅秋廩山中多晚食春畬雨後有微波相邀鄰父呼新釀薄暮柴門起醉歌清溪涵月誰向清溪泛羽觴髙林片月下山塘好天涼夜四垂碧白露蒼葭一水長勝地自然生逺興棹歌時復散波光幽人獨往更何處空際惟聞杜若香西隴藏雲西隴嵳峩枕碧岑烟霞終日鎖層隂飄颻自結真人想舒卷還同靜者心家在翠微長覺潤行經蒼靄不知深朝來欲訪山中客雲氣空濛何處尋竹塢鳯鳴空亭長晝足徘徊鮮碧猶從雨後栽寒玊數聲流水靜清隂千畝捲簾來林中客散山河逺吳下人過一徑開今日臨風聽鸞韻置身如在鳯凰臺山源春漲聞道山源接隱居石梁春漲萬山餘洞門不閉桃花水淵客曾傳薤葉書人過栁隂頻問渡舟移樹杪欲凌虛銀鬐玊鱠懸空出不數西川丙穴魚冒雨經六合早向江航渡風吹水驛樓數行棠葉雨幾處稻田秋暮色連山淨殘虹入樹流預知明日霽把酒蜀岡遊積雨不知暮搖搖去住心山花無限色澗水有餘音牧笛斜經隴炊烟半出林試看原上樹倦翮已相尋秋雨秋雨秋風著鬢絲十年一夢枉尋思美人名字多稱玊才子風流半屬詩江水難消三歲字巫山恐是再生期梅花嶺外重重路璧合珠還定幾時夢遊繁英委地倩誰收花月依稀夢裡遊私㑹幾曽窮五夜佳期强半屬三秋輕盈態好偏宜病柔軟情多只善愁莫道風流天賦與一生憔悴為風流贈房興公香吏曾同玊女居夜來邂逅定何如偷移暮雨重陽近低問芳齡十五餘麝月微分開靨後鴉黃輕㸃畫眉初粧成欲下朱樓去更照菱波過綺疏渡頭桃葉若為情觀裏璚花浪得名乍可便娟回舞態早從嬌小辨絃聲春雲入夢屏山逺秋帳生香小簟平曉起臨窗窺玊鏡雙蛾猶覺可憐生送孫象五之汝寧汝南何處是此去路倭遲草滿袁閎室烟迷叔度祠江雲愁北望鄉樹發南枝回首鴒原上天涯有夢思九日鑾江舟次得家報感作長安九日憶登臨王魏同為擊鉢吟貽上子存舉目山河頻聚散故人踪跡各升沉林霜初薄孤楓樹江雁難傳萬里心蘭菊凋零無限恨可憐歸計尚侵尋邱壑誰教置此中飛揚跋扈為誰雄十年已自輸髙密一日還堪長薛公方外且扶紅袖老花前休遣緑樽空明朝更向山頭看角抵魚龍舊土風松桂堂全集卷十
