body:
  text: 松桂堂全集卷二十吏部侍郎彭孫遹撰立春日和悔庵早見青陽入舊年玊堂仙籟已泠然天家故事金花勝月令新題錦帶篇苑樹籠葱迎雨露江春縹眇隔風烟待沽吳酎邀君醉一曲前溪舞袖顛上元日和思繩韻九陌風和軌道平華燈綺月照人行家家春暖爭浮蟻樹樹花明欲囀鶯浣沐新恩傳盛事徼循舊業弛嚴城君臣欲罷魚龍戲擊壤歌聲在樂棚時和嵗有屬休明火樹銀花滿畫檠三日賜酺懸令甲千家祭未及先庚金甌不缺中天月玉琯初調大蔟笙聽取陽春最髙曲握蘭香裏衆芳生題李晉陽栁林别業居士當年寄託深手栽楊栁已成隂數枝搖蕩仙飈裏風樹偏傷此日心盡日長條踠地垂緣堤拂水緑參差攀枝最有無涯戚春露秋霜各一時贈王貞元大參旌棨屏藩重山川景氣明氷壺清自映鈴閣靜無聲來獻千秋鏡歸當萬里城台司虛左在直接泰階平三月長安道蘭辰接勝遊清隂分樾下芳吹納風流鶴蓋辭雙闕熊幡引八騶聖朝勤袞職早晚待樊侯和秋嶽韻贈髙念祖休從泉客市珊瑚霧雨瀰漫海是圖游處不妨依白社羈栖無復夢清都風前芳草吹將歇天際浮雲淡欲無轉憶故山春事近一鋤烟雨餉田夫咫尺鈞天入夢遙春來客思轉飄蕭判將書卷娛幽獨賸有詩情破泬寥白苧村莊花外路翠屏山市栁邉橋解巾與爾同歸去塵外分明有玊霄寄壽柏鄉相國黃扉當日領崇銜調露賡歌一德咸黼黻天章施繢繡鹽梅鼎味别酸鹹匡扶詎數從繩木納約仍同取水監材大㑹應稱國器功髙曽不戀朝衫赤松事業遙相望緑野心期逈不凡掃軌可能忘魏闕著書長自卧雲巖談經逺欲探濂洛辨性精如剖瑌瑊汛涉諸家資采獲窮搜萬象恣鐫劖瀠洄詩思清於水倚待文心疾似帆盡屏淫哇刪鄭衛重新壁壘壯殽函松筠老去姿逾徑花木疏來手自芟絲竹東山偏寂寂笙竽南郭自渢渢樽前嶽色流襟袖檻外秋隂落檜杉歎息猶龍人獨逺蹉跎執雉意徒嗛江湖浩渺空凝睇縱有瑤華思莫緘送愚山典試中州三載客長安索居謝賔友惟君數往還君前我居後僦屋得比鄰相去無半畝登牆時一望離離見户牖步屧可相從詎須車馬否時或叩君門解衣醉君酒清談彌日夕每至橫參斗酣洽不知疲乖離未應有行色何匆匆僕夫駕四牡謂銜王命行意氣凌儕偶我聞河洛間圖書之淵藪梁園盛文翰荆山富瓊玖天網行一張採拾不容手持之報聖明誠哉義無負使畢還過家道里近可取弭節敬亭前桂帆宛溪口繡衣方晝行山川況稱首而我一送君離思日紛糾出門安所之雞栖馬如狗晤言無與酬蓄疑共誰剖屈指後㑹時春風入楊栁盛游豈不樂行役無淹久柬蔣莘田侍御階前一月雨積水深至骭佳卉俱已腓縱橫滿葵莧頗憶杜陵生多時阻青盼前月索我詩謂我苦吟慣庸知粗笨人安絃未操縵方同被凍蠅豈若能鳴雁朝來霽色佳睡起日未晏閉門鮮剝啄邈如在山澗題箋一以寓慰此久疏間念欲數相從心跡仍懶慢年志日就衰時復涉憂患飦粥恆不充秋衣行復綻循牆屢歎息陳力愧未辦栖栖者何為駑馬猶戀棧君才十倍我相視等鵬鷃十年處臺院赫然名敢諫努力慎自愛久當見真贋汲孺不見留千載稱拙宦咄哉司馬安至今餘謗訕徐賢媛貞義詩海水深可竭山石堅可移惟有一寸心耿耿長若斯以身託君子旦誓非一詞所重在恩義不在兒女私古人於死者沒齒以殉之貞疾況不死而忍相弃遺畢此妍華節要以同穴期人生天地間三綱相維持明信苟不存相鼠亦有皮疇為臣若子乃慚女子為作詩陳古則庶以示將來簡淡人與君共鄉曲衡宇近可即抗手事四方並作京華客蹉跎竹馬游忝竊金蘭籍同官乃為僚託分況疇昔如何咫尺間經年斷蹤跡古今重心知明誼存金石寸心苟相同形骸詎能隔所期在嵗寒豈必相晨夕奉柬張敦復學士涉海渺江湖登山小陵阜一升君子堂髙深亦何有負牆思請業寸心緘已久遲鈍良足矜有懷徒呐口豈期辱降階為容及枯朽猥以生平歡加之賤私某而我亟習儀局促失所守及門忘請退拾級昧趨走未解奉雉腒遑知澤劒首俯慚禮數疏仰愧交知厚所冀寬其誅包荒庶有取大匠將枉材納汙在川藪俾得竭區區終以事左右叢尤髮可擢省愆顔有忸立齊先生以閣學陟左都御史因有此贈立國在紀綱南臺舊所統檢齊霜憲清振挈風規重自古稱峻秩非賢不登用惟帝知其難久之持印弄明公早升華十年官侍從典兹機莞煩蔚然號時棟延英每罷對臨軒目為送簡注良在心詢謀詎由衆遂為臺大夫蒼佩還初控新樹喜集烏舊池非奪鳳當今國是淆羣言聚如訟未盡民隱除方虞吏道壅皇心猶􅍀然職憂誼當共公乎領臺察朝野咸色動前囊引青儀後乘陪金㚇一以答主知下令德邁種抗辭偹法巽平刑審操縱坐見大猷升介邱可登封伊豫託契深有懷執鞭鞚雖乏子淵才濡毫尚能頌松桂堂全集卷二十
