body:
  text: 松桂堂全集巻十一吏部侍郎彭孫遹撰七夕立秋次飛瓊姊韻露掌髙寒爽氣浮曝衣閣上待新秋池頭過雨涼初集風裏開襟暑未收拙甚河東誰畀巧情深楚客易生愁晩来罷酌成髙臥清籟無聲月滿樓秋夜送客客散髙堂醉似泥清宵欹枕月初西當窻病葉先秋墜隔樹寒禽未曙啼秋夜聞梵黃花翠竹隠禪扉仙梵泠泠静者機餘響互分清磬永曼音輕繞定香微心棲止水初光發聴入秋空萬籟稀已覺浮名真我累十年出處兩無依中秋風雨用七夕立秋韻風雨山堂恣拍浮樽前節物及中秋佳人似月邀難見綺思如雲鬰未收江燕巢空垂别恨井梧葉落滿庭愁胡床雅興今衰減懶上元規舊日樓重陽無菊漫題次仲兄韻涼雨迎佳序髙風下夕陽籬花遲吐菊林葉緩飛霜獨抱三閭怨孤眠五栁堂碧雲開晩岫秋水落空塘對此情何極懷人月滿梁清吟生楚澤藻思發文房得句慙諸從消愁有索郎擕琴待林壑明發一相將再叠前韻去日悲何速無因返魯陽登臨懷往昔人事隔星霜姸唱傳花蕚新聲出草堂風琴鳴澗壑天籟發林塘此曲難追和餘音正繞梁憐余棲草澤久病藉茱房才弱題糕客名卑執㦸郎祗應游汗漫雀躍傲雲將三叠前韻五言多秀出昔見孟襄陽絶調今無敵枯吟夜有霜泉明棲栗里康樂在西堂勝日時同眺平波綠到塘風髙迴雁影雲霽落虹梁惜别紅蘭路懷人白葯房夕英思楚客秋泛憶康郎欲賦離居恨江籬或可將秋日過博陸侯祠尋菊無前約荒祠晩眺生踈簾邀海色虚牖落松聲鄰犬迎門臥山僧乞食行淒涼窻下竹漫没舊題名東臯秋望美笻竹舊經過欵樹雙扉在題詩十載多同遊俱老大漲海尚風波晩計菰蘆穩滄洲一釣簔九日憶羅浮曾隨猿鶴上羅浮雲壑蕭條又暮秋落木風髙清籟發抱琴人逺碧雲收璇房一閉難尋約雁字無慿但寫愁且對黃花傾竹葉醉邀飛夢到神樓贈湯明府曲江當日出髙車院裏留題籠碧紗别去久無彭蠡雁今來新種洛陽花芳郊雪盡春行仗髙閣香清晩放衙解道文房詩思好鶯聲栁色報年華九日雨中遲客二首小樓九日怨離羣徙倚花前獨待君金粟香殘秋漸老玉山人醉夜初分空江旅雁何時到細雨清砧竟夕聞莫寄哀吟向山木此生摇落復何云蒼葭玊露亂紛紜秋水迢遥思正殷戲馬臺空傷霸跡登龍人往感遺文山河久罷黃壚興湖海偏遲白雁羣日暮所思愁不見萬重烟樹一川雲暮秋登虎邱山讀王六考功題壁詩偶擕笻竹上丹梯紅葉清霜氣未齊蕭日易生秋士感脩廊重見故人題嶺雲迢遞情無頼池草生踈夢欲迷聞在淮南愁病極行吟烟月冷淒淒秋日過無為從叔園亭小飲次仲兄韻何事窮登陟園亭盡日宜好山全入望紅葉半辭枝海氣生寒早林隂欲暝遲移床就秋色珍簟坐彈棋細雨壺觴節新霜稻蟹天但傾花下酒莫羨府中蓮弱水垂綸外神山隱几前東溟清可挹醉即枕流眠薄曲成吾室蕭然坐擁書新泥分幕燕真樂問溪魚地僻便農事家貧足野蔬牆頭過升斗不惜醉淳于秋潦空波逈寒塘野水平沙鷗眠几石山蝶舞簾旌二屨分成侶終年嬾入城兹因麋鹿性彌欲謝簪纓寄呉爾世煙花三月悵離羣每到蘭時轉憶君彭蠡秋風無過雁蕪城春樹有停雲寒砧獨客心如擣逺水雙魚手自分慚愧故人深慰藉瑤華千里挹清芬三秋客思繞天涯一掇瓊英感歲華慈母依然顔似玊佳兒應已筆生花重陽定載平山酒八月誰同曲水槎欲溯春波馳桂柁碧桃開日醉君家贈李將軍少年意氣總如雲儒將風流獨有君越石登樓堪坐嘯脩期下馬更能文清秋橫海戈鋋壯落日轅門組練分見說聖明思鉅鹿論功誰似李將軍寄懷孫無言山人三年嶺外未歸人每念黃山處士貧驛路梅花千里使江城柳色幾回春曽從南國通蘭訊近向西湖理釣緡千載逋仙風味在與君端合作比鄰故人淮海一漁簑家住平山枕薜蘿秋嶠孤笻凌灝氣春潮一葉剪迴波貧能結客知交滿老漸工詩好句多却訝劉邕過耽癖巴詞輕授雪兒歌秋日舟行集字微霜幾㸃醉楓林小泛寒流霽色深薄靄輕霞分隠几虚舟淺瀨趂鳴禽濃醅試酌情還勝巧句難裁思欲沉願結天隨栖菊徑可勝寥落怨梧琴雁陣停暉晩漸欹鋤茅插棗䕶疎籬萬家稻黍償田事永晝醺眠瀉羽巵漫逐朝華矜窈窕徒勞金屋致毛施竹齋蕙館多堪共掃榻仍容數後期洞門烟月掩清塵寂寂松蘿隔問津宿草成隂摇夜景殘香吹夢冷秋辰行吟正擬依僧社遊處差應傍酒人聞道雲扉近靈境扶笻不惜往來頻初地偏餘去日悲亭臯露滿摘江蘺重登梵閣歸鴉集愁對河橋野照移臥客三湘頻話别開襟孤嶼强題詩魚書淚盡雙文約積雨空階有鬢絲晴收若木挂峯巔短艇回波栁榭前且向巾裾消綺思更教花鳥寄瑤篇萍風擁砌飄亭樹蓮漏和氷滴澗泉倘許無生酧至理同君長禮静中禪呉下答仲兄來韻正有覊栖怨翻令别恨兼江風吹暮鷁壁月冷秋蟾南土初弛擔東方未解嚴在原千里隔去國幾時淹蕭候全呉館征衣暗露霑霸圖餘蔓草俠客老寒閻撫事留深嘅驅車訊吉占浮沉傷出處濶絶阻堂簾久抱孤生戚仍虚寸秩沾知交星落落仕路日炎炎諧俗無長䇿傳家有錦籖一官刀筆賤三世寢邱㢘鵠性非關浴烏形豈待黔余情諳寂寞天道判盈謙不假靈氛告寕煩衆論僉行辭朱戸跡坐擁白雲匳謡訳分金屋詩書讓玊鈐狂歌將擬楚垂釣合依詹世共探龍頷人猶捋虎髯攀援乘鼎呂呼噏耀旌幨聫歩多鵷鷺登朝盡杞柟劇秦徒尚白慕藺恥從閹纓紼形皆累山林夢亦甜吾兄耽大隠筮易得初潛守節甘辭粟憂時託病痁居能將菽水游或雜魚鹽孰可臣何㸃還能傲摯瞻滋蘭香入佩種竹粉垂檐柏葉澆新釀槐淘飽細餤榮名藏腊毒髙位見顛阽逺性霞爭舉枯吟筆退尖㝠鴻離繳弋文豹謝刀鉗尚友惟巢許誅茅只洞巗比來鄉思切朅去旅愁添柳陌鶯三弄花村雨一帘早尋歸隠計春酒話雙柑呉中送徐六琯朗同家兄子服歸海鹽松陵江水去悠悠何事東還不暫留驛路數行平望樹西風斜日繫歸舟訒庵久遊虞山不歸寄訊昔賢採藥處聞在最髙峰靈草年年長雲深不可從呉江寄顧茂倫十里松陵路烟波共𣺌然伊人秋水外詩思落楓前池鴨能呼字溪魚不問錢幽居憐歲晩瑤草日芊綿丙午除夕即事去年此夕南中客白鶴峰前獨賦詩鄉夢侵尋歸雁後春愁撩亂落花時故山無恙貧皆好晩計初成隠未遲共向東頭守殘嵗夜闌兄弟説相思松桂堂全集巻十一
