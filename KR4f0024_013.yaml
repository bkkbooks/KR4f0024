body:
  text: 松桂堂全集卷十三吏部侍郎彭孫遹撰題螺浮觀察扇頭小影用家仲兄韻公是人中英朝野競傾屬世道如波瀾淪胥及回洑匪藉五鳯手孰奠八鰲足揚厯亦云疲主恩賜休沐城南十畝地兹焉始營築因山起臺榭高並韋杜曲乘流放釣船抽簪謝朝服心逺物自親機息鷗相逐逍遙彌日夕愛此春波緑誰寫塵外姿盡洗綺與縠素紈時一披清風照川麓寄當湖趙天來陸我謀兼懷沈融谷客嶺外湖上煙波九曲長銜杯東望思茫茫青鞋興淺春多雨緑樹花飛水滿塘曲裏陽阿傳二妙尊前人物憶三康嶺南歸客侵尋久空向江臯怨緑芳病鸚鵡鸚鵡得人愛不與凡鳥並雕籠為爾居絛鉤爛然明見飾詎不貴因之患乃嬰非無故山思時作隴坻鳴言語或階厲巧慧亦損生置籠起三歎疇以達我情五日偶咏五日夏將至候氣動新籥朝來風自南薰然遍城郭晴旭暢積隂林花弄餘灼良辰忽已及俯仰遂今昨于焉答時事致祀將明恪既乏升斗資彌慚魚菽薄素風幸無墜長兹糝藜藿微雲媚清霽杲日生牆東地偏人迹踈轉覺庭宇空緑苖泫新露朱卉搖光風不知芳蘭葉夜來抽幾叢宵分雨初歇曙色生東林羣鳥樂新霽飛鳴多好音吾亦自此起負手成幽尋瓜架引新蔓桂叢生密隂簷間初日落蒼蒼照我襟柴門雖日設啓閉亦何心靜坐覽物情流光感飄迅乳燕羽已豐殘鶯語猶俊黍臛紛既陳蒲觴引初進一醉遺吾生怡然同委順贈惺石上人離俗何年事孤雲此共依淨巾花㲲布初具水田衣吟思秋蟬切禪心夕炷微空林人迹斷流水抱雙扉壽李將軍隴西推世族飛將見家風委寄専城重勳名建節同龍文開組練蜃氣避艨艟漲海孤烽靜陳山獨戍雄青陽當獻節紫氣叶生嵩坐嘯滄波外行春細栁中投醪千日酒懸帳六鈞弓上壽方稱兕需才正夢熊平陽多異數巨鹿在宸衷烟閣圖形像丹書誓始終功成歸隱日還得事黃公挽嚴母江太夫人二首寶婺星沈月墜潭鷲宫歸去罷珠函依然蕙質風猶在欲奏蘭陔思不堪烏哺情深悲祿養鳯池人少憶飴含他年若向茵帷啓巾箑還應灑淚探一閉珠襦不可窺白楊丹旐有餘悲教成婉娩多璿式名著文宣見玊儀長夜慈烏依子舍當秋孝竹發孫枝懸知世有絲綸筆彤管清華更屬誰送曹石苓赴上都明鐙空館照離愁零雨清江擁畫舟嵗晚不堪重送客春來誰忍獨登樓燕山木葉經霜脫玊水氷澌帶雪流碣石初開知見待不應重傍酒人遊落日寒林去路違此行書劔有光輝四科人物多君俊八斗才名起禁闈驛路春遲殘雪擁江關戍古夕陽微風塵莫自傷留滯㑹看相如駟馬歸寄二兄次韻河隄見說築宣房客子歸舟正渺茫鴻雁一來傳逺信平安千里報高堂新知白社圖應好舊友青霄誼不忘猶喜交遊堪慰藉鄉心無奈白雲翔䖍州行送曾堯昶歸萬安䖍州城外二水㑹迢遙閩越相襟帶此地當年苦用兵金戈鐵馬紛塵壒太僕官兼嶺北名虎符千里壯軍聲幕中坐嘯秋風靜樓上吹箎夜月明身經百戰擐弓矢五百健兒爭致死逐北三周玊石峰追奔直下螺亭水笳鼓城東夜合圍䖍南草木極兵威析骸豈屑乘堙告汲水惟看負戶歸偃魚壓城士氣死天寒鼓咽聲不起衝車一激山谷摧百萬齊填鋒鏑裏章貢臺前百尺樓從容談笑九京遊宋卭握節心猶壯陽瓚沉城志未酬兵燹頻仍經嵗月帳前列校收遺骨擕至荒村不敢言幽芳空自留碑碣孤兒飲血赴䖍臺九死餘生萬里回重繭不辭嬰白刃寒燐何處沒蒼苔五雲俠客曾堯昶受託楊生情慨慷但說桐鄉有義風誰知溫序多英爽意氣干雲直向前秋前獨泛入吳船忠魂歸自三千里碧血藏來二十年萬安吳令真君子勸駕殷勤來致此狥節捐軀古所難仁人義士今同美作歌送爾去南州落日孤帆不可留義聲從此無終極長與西江萬古流禊日送許靜庵之官昌邑殘春送别惜芳菲觴詠蹉跎禊事違仙令東來鳬並舉流人北道雁初歸幸臺蹕冷滄波合濰水沙寒戰壘稀此去定知先撫字三齊灾後嵗頻飢寄張蓼匪夫子十年聲迹重除書豈合髙懸使者車已有清風傳隴朔何妨𤣥髮侶樵漁新拋組綬腰長適逺寄林泉思有餘若使季鷹當盛日肯因秋興戀蓴魚五湖歸去謝時賢江左風流正宛然南郡授經名益重東山託志老彌堅庭前芳草珠為樹帳裡新聲雪作絃掛頰銜杯清興發九峯春色碧嬋姢贈張茂才富平七葉張公子意氣還能傲蒯緱腹笥定知三篋富詞源堪挾百川流已看劔氣逢神解豈必珠光惜暗投見說太真居第二時名原不讓王劉立秋日踈雨成秋意山堂生晚涼吟兹耽夕憩煩暑淡相忘池葉多清響庭花有靜香燈殘棊局罷微月正昏黃贈大津上人結宇離人境蕭然出世因觀空惟止水根寂見前塵階樹寒逾翠山花暖自春安禪忘日夕徑草已成茵早秋即事雨滴空林暑乍回殘陽過雨又西頽此身已共齊紈棄陳迹惟看越燕來青桂叢深孤吹發幽蘭花晚後時開芙蓉零落衣裳冷楚客悲秋萬古哀索氷修新句寫屏風上屏間秋色似瀟湘折得瑶華座有香一自平臺賦成後至今重得見輝光又團扇詩清只等閒練裙書好未應慳恨無庫紙三千幅盡乞珠璣滿座間九日雨中無菊庭桂始放次二兄韻欲採秋英幾日開重陽空泛雨中杯清霜節近花猶晚白露天寒雁未來彭澤久應同寂寞小山還得暫徘徊明須更續登髙興靈鷲峰頭待月回寄董閬石即次見懷來韻秋林落木㸃風埃寒雨空江日夜衰難後弟兄多病老霜前鴻雁尺書來壯年俱抱懷沙痛盛世仍虛入洛才好賦東巡獻行在聖朝早晚祀之萊寄董蒼水清霜十月下秋旻獨立寒塘下夕曛搖落即看同墜葉相思空自感停雲騷人漫有湘纍怨世路方悲海賈文遲爾華陽栖隱處竹冠松麈禮茅君贈張明府仙鳬初向日邊迎百里謳吟政已成行馬風傳三㦸貴懸魚節比五絲清山光近郭生朝爽海色踈簾映晚晴花落訟庭秋似水弦風亭上有琴聲寄冒辟疆徵君長採北山薇皓首循陔志不違千里登堂多石友十年偕隱有萊衣清秋日暖霜英發白墮樽濃海鶴飛應是林泉多樂事花間時見板輿歸歲晚書懷山堂風雨晝瀰漫亭午猶驚短褐單雁陳初來霜有信潮聲漸緊暮增寒未荒先業農桑在幸際熙時出處寬無事菟裘營晚計名山隨處一蒲團空林曉起露猶漙十月新霜試薄寒坐惜流芳長隱約生憐香草故摧殘雨檠自照枯枰冷風牖時聞墮葉乾曾向南能參密諦此心何處不相安厯落氷霜共此君長從霄漢謝同羣向平有纍何時盡龎蘊無生若個聞潑墨時時研曉露翻書往往負殘曛亦知心賞初非逺澗底流泉石上雲一室蕭然欲傍僧燔枯酌水亦相應碧雲詩思清如水黃葉山床冷欲氷傲雪松筠長偃蹇得霜鵰鶚自飛騰只愁老作匏瓜繫函丈恩深少報稱危欄憑處見新晴簷雪初消作雨聲落木聲中殘雁過斜陽影裏暮雲生閒無一字空垂老身本孤生敢較名待入匡山依惠逺石梁秋瀑夜經行小至日小至天猶暖雙禽鳴樹間藜床人晏起蓽戶晝長關學道何妨懶調心只是間今秋幸豐熟藿食未應慳枕上雪詩次郊叟韻忽驚霜氣逼房櫳已覺飛霙亂灑空夜色似明旁死魄寒威初凜不周風夢為蝴蝶宜同舞燈作饞魚故不紅百感二毛應盡白吾衰無復黑頭公看雪次郊叟韻紛薄山河極望中相看氷雪世情空霜林數㸃寒鴉色雲木孤吟落葉風綺思欲銷湖草碧頽顔難借酒杯紅杖笻歸去成堅臥未許騶徒惱邵公胥溪泉眼一曲寒溪帶逺坰春波長潄玊泠泠山川噴薄留泉脈雲雨回環見地靈月練自含珠影媚霜潭不減縠文青扁舟試就危橋汲𫾣石沙頭驗水經福業寺接梁殿妙搆凌雲自昔時飾將文杏本連枝花宮縹眇雙龍抱藻井空明片月垂哀梵繞來聲斷續長虹舞罷影參差諸天㑹有神工助般爾無煩鬬巧思題張逺畫十八尊者圖壽張明府清隂白日澄秋院梧竹寒光淡葱蒨素紈入手皎于雪畫圖宛轉開生靣細若游絲揚碧空密如弱縷排文練筆端運處疑有神目力窮時轉生眩龍華㑹後多髙賢鴦崛雞山記莂年嗔耶喜耶皆佛法偶然示現人天前錫飛杯度其迹耳就中真諦誰能傳張生妙手壓周昉繪事風流世無兩當其得意寫紈質慧筆幽情眇相賞年來一洗粉與脂居士龍眠懴悔時白毫拂拂出十指說法身應現畫師我亦楞伽時繫肘鬢絲禪榻消磨久乞法從無長者金逃禪但飽聲聞酒欲向天台賦應真因風一寄玊堂人懸知今日神仙宰定是前生金粟身松桂堂全集卷十三
