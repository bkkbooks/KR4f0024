body:
  text: 松桂堂全集卷十五吏部侍郎彭孫遹撰渡河雲濤滉􅐯與天回水曠沙寒望不開九曲源流天上落萬方筐篚日邊來安瀾藉有歸墟力待嘯慚無作楫材楗竹搴茭時未息東南民力不勝哀和葉訒菴大雪口號三絶句南雲迢遞尺書無凍合遙天雁鶩呼此夜崑崙千尺雪莫將樽酒失良圖折絮風狂不可支茅堂土銼午煙遲輸他物外逃名客落葉空山擁絮時浮沉金馬十年餘祕思妍詞總不如高臥不嫌將息冷紙窗燈火夜闌時簡姚岱麓封事朝來獻紫宸至尊親自品題新睿謨豈必資羣策聖主偏能奬直臣入對西清言若劵坐收南詔略如神與君夙昔相期朂肯作人間第二人送劉介庵北徐方鎮控諸鄰妙簡仙郎建節新瓠子河流千頃澤枌榆社鼓萬家春十年舊雨同遊宦此日停雲有故人君到江南相憶否題詩好為寄香蘋送陸鶴田之任安徽糧儲少參絳節朱轓擁傳辰東南千里借才新持籌能不憂民力行部還當播主仁萬斛仙霖隨畫軾九霄卿月待清塵中朝望實由來重舊是先皇獻納臣寄徐琯朗六兄并家姊二口號城南城北舊相尋親串相思最汝深有子盡如豐嵗玊向人休羡滿籝金終嵗蓍簪與練裳耐貧端有好兒郎西風寄語多珍重飽看黃花晚節香寄張皓亭曉起朝參懶相思在朴巢紅塵無雜客白雪有詞曹三伏不知暑萬山相向高悠然北窗下散帙落松濤不厭東山臥棲遲未解蘭儘多間嵗月長對好林巒露篠晴猶濕風荷夏亦寒何時同緩帶彌日坐盤桓寄劉敷文長安局趣不自適數憶故園相往還君家軒子最踈快時從物外來追攀劉家伯雅復仲雅何氏大山兼小山酒酣揮手弄白日松濤萬斛寒潺湲人琴既逝不可作豫亦俯首逐世緣舊遊一往如夢寐此樂難再幾嵗年松寒桂燠定無恙林慙澗愧端可憐知君時復一相念悠悠兩地誰能傳挽吳銘卣追憶𨝍關别於今又幾年何期成永訣遂此隔重泉雪軫虛絃絶風檠暗網懸秋來原上樹蕭瑟起寒煙當年披宿草灑酒酹秋墳曾此悲吾友今兹又哭君襟期兩世篤生死一朝分楚些遙相寓三泉杳不聞幽絶平山路頻年有夢思一聞蒿里唱無復竹林期石籟清隂合山窗碧蘚滋空堂人迹斷猶是下帷時索句清吟苦攤書白日移子雲長寂寞叔寶本清羸杳杳即長夜悠悠無見期人生亮同盡天道竟難知蕙折一何早芝焚極可哀故人餘有幾老景覺相催眼淚有時盡情懷何日開無由展交誼南望幾徘徊送丁筠雪之順德郡丞任仙軺南去路倭遲五馬從容佐郡時漳水渠邊行問俗鵲山影裏靜褰帷凝香盡日聞清嘯臥閣終朝少諍詞才地清華名迹美丁潭公望盡人知題王海若遺像琅琊本是清華族五馬秦郵事可論六十年來遺澤盡老成雖謝典型存壽繹堂先生桂林秋月一枝鮮錦水明霞五色妍虎觀談經頻授簡雲臺論事每回天清卿兼領春官秩端尹仍司胄子筵自是人臣中第一不徒書法比僧虔送蘭臯之滇中征軺方萬里霜氣正凌兢宦逺人情減秋悲别緒增風前寒雁斷天外暮雲凝徒有盈觴酒徘徊思不勝即今同軌日六詔已銷兵底是人豪忲依然土沃瀛精廬聞雅吹清甽見深耕莫使文成義長留徼外名壽徐健菴先生承華仙掖最清嚴青瑣彤階翠羽亷千尺玊山人獨秀九鋝叶鏘犀鍔筆猶銛主持文運歸師匠奬納風流絶世嫌李揆聲名三絶擅孔愈才望一身兼翰林舊與台階接壽域今從德宿占迓暖芳藝香乍發履長繡線日初添離離秋實誰能採藹藹冬曦衆所忺禁裏銷寒留蜀纈林中燮味出戎鹽翺翔鳯闕君恩重登陟龍門士論僉願托光儀陪劒笏清塵長得奉車幨送鄒㽔公二十年來乍起家重將壯志吐青霞備經患難才逾老飽歷炎涼鬢未華綵筆荷囊皆後輩紅雲香案正前衙出君百里非淹抑循吏當今屬望賖濩落心情爾我知一朝湔洗未嫌遲遭逢雖幸升平世塗抹全非少壯時乍見新除真自喜重談往事尚餘悲臨岐相贈無他語苐一休教急繭絲送宋牧仲之虔州嚴節屆玄冬長風吹廣陌故人别我去千里愼行役四牡何駸駸王程亦心迫霜雪多沍寒况此飲氷夕虔州在天末渺與京華隔頗聞風土佳其中富山澤十川滙雙流八景有遺迹頻年苦戰伐此地遂疆埸邑里既凋殘算緡猶絡繹君當播皇仁愼無言溢額南方春氣早大庾梅花白何以慰相思瑤華行可摘古艷詩二十首月鈎無分好月是春秋夜夜清光破暝愁底事人心顛倒劇如弦不愛愛如鈎虹梁宿雨初收玊蝀新長鬐蜿蜒跨秋旻多應天上河難塞别起飛梁絶漢津燭淚拚將寒熖委飄煙不道膏明祇自煎一寸丹心灰滅盡空教灑淚向風前遊絲輕煙遲日淡相和陌上風光艷綺羅漫説是絲繅未得一春只是冶遊多蝶夢藉草迷花得自由錯將輕薄號風流當途只自翩翩態齊物終輸栩栩遊梅魂南枝零落北枝新瘴雨蠻煙慘淡春欲賦大招招不得氷肌玊骨總成塵栁絮薄似吳綿一縷微輕如春雪點人衣因風便作漫天勢入幕穿簾到處飛松濤長松清籟發中林一瀉風前萬壑深翻覆波濤生眼底誰能不改嵗寒心水紋千頃澄江匹練寒回波如縠漾清湍風前一片淪漪影中有幽人笑素餐石筍曾説平泉有異觀玲瓏琢出碧琅玕草間不少啼飢者煮簀何如煮石難氷花無色何曾更有香偶乘隂氣薄氷霜夤緣根蒂知何處莫遣開時近太陽麯塵玊屑清霏絶點埃麯生曾此數追陪從今風味須料揀恐有乘軺酒士來麥浪繡隴間來策杖過麥秋天氣最清和遠風吹作鱗鱗碧平地原來浪更多秧針一渠春水插秧深遠近齊抽碧玊針五月江鄉賣新榖針針刺却老農心荷珠芙蓉秋水溢銀塘採得瓊瑰浥露香空有珠名難照乘須知荷暗本無光花影庭花裊裊媚芳春淡月清宵送影頻分得餘光能幾許縱橫枝葉也撩人鶯梭三月江南麗景多流鶯相向擲金梭可能織得春如錦風物蕭條奈爾何荇帶水荇牽風百尺懸參差波面纈紋圓叢叢翠帶真堪擷此物猶能薦八籩竹粉誰把明玕種碧城膩香春粉正縈盈弄姿飾貌沾沾在貞幹淇園浪有名榆錢緑樹初隂紫紺鮮佳辰早換白榆煙何曾買得春光住青帝原來不愛錢寄內小疊紅箋寄語頻橫雲初破逺山顰玊宸昨夜親傳詔夫壻承恩苐一人松桂堂全集卷十五
