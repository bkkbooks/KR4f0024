body:
  text: 松桂堂全集巻三十六吏部侍郎彭孫遹撰平蜀頌臣聞仁聲淪洽徳以覆物為𢎞義問宣昭功以安民為大所以舞干羽於兩階尚有徂征之命執玉帛者萬國猶行後至之誅由來神武之朝不廢驅除之畧况乎八荒在宥六合為家尉置東南廣斥朱鳶之境候通西北逺包𤣥菟之亭皇帝握寳筴而拜圖履泰符而凝命紫微帝坐獨運機衡赤縣神州咸歸户闥靡不躋之仁夀煦以陽和山棲谷飲之民喁于而向化嵗貢終王之后拱揖以從風而乃且蘭被發距命興戎上負國恩下滋民害脅驅我吏士搖蕩我疆陲於是張九伐之威鼔同仇之氣先平闗隴旋定甌閩清海來歸蒼梧内附金戈西指則洋鳯風靡鐡騎南馳則衡湘草偃制勝廟堂之上收功俄頃之間若乃蕞爾蠺叢狡焉兔窟園名橘柚未修貢於職方舞號巴渝莫覲容於樂府懸巢之燕自矜堂奥之安蹈井之蛙妄詫江湖之大豈不以雙流漭沆五屼㠝岏逋我刑誅寛其嵗月者乎然而幅員萬里何論黑子之偏隅天下一家忍見蒼生之塗炭爰申天討用播皇仁將軍臣王進寳躬自先登志無後顧度金牛之峽力不假於五丁據石燕之峰坂無虞其九折長驅劔閣進克閬中偽將既殱渠魁就縳提督臣趙良棟氣吞狂冦身啓戎行裹犀革以攀崖遂開棧道浮木罌而絶渡竟涉嘉陵截白水之上流百濮襟喉盡扼克錦官之要郡三川版籍全收遂乃卧矢櫜弓擊牛釃酒芋區不擾花市無驚右粥左飱玉壘之秋毫靡犯前歌後舞錦江之春色依然從此破竹先聲建瓴直下揚旌洱海弭節牂牁二十八宿張天維於井鬼之躔一十二州包地絡於筰卭之域在昔臨衝之舉因壘而崇降常武之勲陳兵而徐服以今方古曽何讓焉夫庸蜀之區夙稱險逺公孫因而躍馬劉牧於以閉闗峻阻自防剪除不易今則壺漿迎道枕席行師衝飈擊雊鵲之巢齊斧抉蛛蝥之網三巴殄定曽不淹旬雖曰師武之功實則聖天子之威靈所致也臣侍從闕廷獲覩斯盛謹稽首頓首而獻頌曰於昭有赫祚我皇清天人協賛河嶽呈貞柔逺能邇修文偃兵攝綱九有振維八紘蠢爾西陲蔑常亂紀乃奸王畧以煩疆吏矯矯虎臣授兹雄劔鞠旅陳師有征無敵一收閬郡再舉蜀都渠帥受剹逆臣就俘波激山摧飈馳電駛㡳定三川揚威萬里至仁𢎞貸舊染咸新民歸如水聖澤如春彼溺斯援彼饑斯哺王師之至式歌且舞䕫巫東畧卭雅南來人皆樂土田不汙萊釋甲投戈義風逺扇絶徼輸心好音革靣昔在殷武用伐鬼方四方式辟亦美宣王矧兹梁益非云荒服清問下民其何不速出師獻馘役不淹時國無刑刓人不知罷書同軌一垂拱以治千秋萬禩式鞏皇基聖徳頌臣彭孫遹稽首頓首上言竊今七月二十一日皇帝賜羣臣宴于瀛臺有侑幣焉終宴授爵無筭咸具醉飽復賜太液池所産蓮芰属羣臣毋入謝既禮成而退筐篚之頒填咽道路歡呀踊躍恩淪肌髓臣遹備員翰林實與末席伏自思念翰林之官以記述詠歌為業而臣以講官日侍皇帝於𢎞徳殿聖神文武之徳皆親所覩記叨承恩澤於諸臣特厚今又與於禮食飲仁而飫和雖才質駑下敢曠墜所守使盛美缺焉而不記謹上聖徳頌一篇仰塵睿覽兾以宣示中外傳信史冊臣遹不勝屏營激切之至皇帝踐極徳浹四維受天景貺昭融赩曦五律叶行雨暘以時同文并軌天下一家黄髪稚齒鼓舞謳歌推功歸徳皇帝曰咨太平之效匪予敢私疇輔予善疇拂予違卿大夫士俾予以治是年七月幸于瀛臺乃設禮食以饗官師膳夫飭具大僕相儀罍水在東洗篚在西酒正告備沈泛醴酏肆之上尊圜方别宜有蒲有莞几席鱗比門者引納升階攝齊翔翔濟濟立於殿墀帝曰來汝式燕于斯爰有侑幣五組棽離羣臣稽首上衡奉持退就位著各有等衰鉶羮脯醢糗餌粉餈酒無筭爵籩豆有加醉飽歡喜其容委蛇咸進媵爵再拜致詞疇人失職厯象愆差皇帝敬天與神合謀履端舉正先天不違煌煌宗祖顯承是詒皇帝纉緒夙夜紹衣有徽其音聖母燕喜皇帝大孝百福攸綏有洊其雷邦家之基皇帝式榖止於至慈惟滇閩越為盗之魁皇帝敷徳束手自歸守吏來告民阽于危皇帝旰食􅍀然念之散幣振廩民以不饑稽古典學淫衺屏除黜矯䖍吏刑措不施選賢睦親禮惇樂諧凡兹功徳願銘鼎彛皇帝曰吁樂不可滋毋狃治安怠於永乆臣遹陪列實聆訓詞俯循職業簡牘是知敢不有述而曠所司矢音作頌傳示來兹皇帝釋奠于闕里頌臣聞三才懋建作極者惟皇六位時乗亶聰者惟后故有禮樂刑政以為宰世之權有中正仁義以為綏猷之準自河洛苞符以後暨帝皇禪繼之年莫不兼作君師總司治教龍章觀象即開道法之宗鳯扆當陽迭啓見聞之緒皇皇乎郁郁乎斯無得而踰也周徳既衰典章攸斁夏正歸藏之學溯二代而無徴緝熙執競之心歴數傳而寖晦於是玉麟授簡洩天瑞於素王珠緯儲精吐靈徴於元聖秉覺民之木鐸握定世之珍符繫易象而作春秋刪詩書而正禮樂王事備天徳明軌則咸昭彛倫式叙葢九皇之軌躅獨萃平鄉七聖之源流同歸泗水矣兩楹告夢諸子雜興正學衰微羣言淆亂非無英君誼辟恢大業于方新學士大夫探微言于將墜而道風猶鬱治化未醇然則代閲千年緒分百氏而欲六五帝四三王闡虬圖攬鳯徳使景星慶靄暉麗于中天玉節金聲鏗鍧于中古自非聖人而在天子之位其道無由也皇帝纂述丕基撫定方域聰明睿智質亶於生知文武聖神徳全乎廣運天策内攄而八紘風動威弧外指而六合雲行黼幄澄懷則宸鏡徹圖書之藴彤泥發檢則奎章摛日月之華緼瑟而協氣同流垂裳而兆人自理大猷升矣皇風穆焉然後憑軾南巡結旌東邁躬臨闕里謁祀尼山詘萬乗之尊修嚴師之敬威儀既秩典禮有加睿藻鋪宣大文炳煜襃衣博帶之士踊躍而趨風瞻雲就日之民咨嗟而觀化臣以謭陋備職禁林遘㑹休明宜有宣述兹又欽承諭㫖校對幸魯盛典一書竊以為皇帝徳化嫓於唐虞道統承於洙泗以聖合聖以心契心鴻章鉅典洵簡冊所曠聞而古今之希覯也敬拜手稽首而獻頌曰璇樞啟泰瓊筴迎長三階有謐七曜重光丹蓂集陛紫菌生房道洽政治於惟聖皇上繪下絺左干右羽薈萃禮園翺翔書府衢室採風明堂稽古萬彚順成百昌蕃廡至仁普濩淳化龎風受球冀北鳴鑾兖東泛瀛絜廣踐嶽侔崇謁祠先聖展禮滋共乃戒乃儐乃洗乃盥廣樂在懸黄流在瓉薦號几筵登歌絃管爼豆之容愉愉衎衎越若䆳古儀象昭垂以治以教作君作師羲軒首出勲華代推禹湯文武羣聖同規嶽嶽尼山洋洋泗水祖述先型憲章徃軌斯理未冺百世以俟道統攸歸在今天子河珍剖韞洛寳開鍵道貺靜契徳符動宣光闡經術寵賁儒先聲漸教訖民陶物甄貞觀者天貞明者日炳炳皇猷巍巍聖徳臣厠禁廬丹鉛是職稽首頌颺式示無極幸闕里頌臣聞道綜百王者天下莫之與京也澤周百世者天下莫之與較也是故羲農以降列聖相承業炳一時事傳千載而折衷其上下斟酌其源流則生民以來未有盛於孔子也孔子生於周末上承堯舜禹湯文武之統道大莫容窮居以老繫易象而作春秋刪詩書而定禮樂以明天人之故以鏡治忽之源以䆒極夫萬事萬物之理由是彛紀修明教術詳備聖人之道粲然大著于天下後之人奉其遺規循習而訓行之上之可以平治天下下之亦可以自治其身心以馴至於寡過是人倫之至道法之宗也葢堯舜禹湯文武以帝王之權納民于軌物其為事也易孔子以韋布之賤立言垂憲其為事也難難易之間功徳之所隆殺也至其體備中和行無轍迹仕止乆速一因乎時動静語黙無之非教則孔子之道又與天地合其徳日月合其明四時合其序者也絜能比量其不可與凡聖同年而語也明矣孔子既歿正學衰微百家並興羣言淆亂間有純篤之儒闡明墜緒卒無以大行其道而一二英君誼辟亦無能舉天下以純王之治然則生乎千載之後而欲逺承千載以前之統以措斯世於唐虞三代之隆自非聖人而在天子之位其道無由也皇帝丕承基緒撫有萬方有聰明睿智天亶之資有齊聖廣淵日新之徳垂裳致理武偃文修貞觀法乎乾坤緝熙光於日月臣叨居禁近日侍經帷竊從敷對之餘仰測髙深之藴而知上聖之興乃天啟之以寄君師之任貞元契合非偶然也嵗之十月問俗東巡親詣曲阜謁祠於孔子展敬致拜述徳成賛一切典禮視古加隆于時大夫卿士典司耆耉之属攝齊以觀咨嗟興嘆咸謂皇帝詘萬乗之尊而修匹夫之敬向道之勤如此昔宋邵雍嘗有言曰三皇之化民也以道五帝以徳三王以功夫以道為化民易俗之本者是醇悶之治也豈僅僅帝王功徳云爾哉臣以儒官珥筆陪從紀述司存敢曠所守敬書其事於石而綴之以辭曰貞元之運五徳相因越五百嵗乃生聖人勲華肇起忠質迭用孔子繼之實承道統上律下襲祖述憲章奠立人極綜貫百王道大不行身隠不見刪述六經垂此彛憲其憲維何是經是程王事以備天道以明惟天與地三才既判不有孔子孰參而賛惟帝與王一中代傳不有孔子孰為後先三代以降異端蠭起仁義充塞綱常日圮賴有孔子教思無窮人心不冺大道昭融紹徃開来百世以俟作君作師惟聖天子皇帝之徳敦敏徇通典學終始一道同風時巡東兖紆駕於斯展儀備物修敬致祠弦歌於堂下有鼗管爼豆之容愉愉衎衎如奏金聲如聆玉磬廣樂九成宫牆數仭莫髙尼山岱宗為小莫深洙泗河海行潦髙之斯仰深之斯挹仰之挹之睿文有述濟濟多士来逰于門襃衣觀禮載欣載言謂孔子聖體臻道妙謂皇帝聖洽我文教綏猷敷典育徳振民纂承列聖扶掖羣倫顯烈鴻謨昭兹来許敬刻斯文式示終古東巡頌大清受天顯命誕畀丕基肇造區夏為生民主太祖太宗襲之以武功洽之以文徳既乂既安大統以集世祖繼之殖有禮幹不庭一戎衣而永清四海六合之内西被流沙東漸于海爰暨朔南廣輪萬有餘里靡不懾然賔服就我疆索皇帝纂承大寳膺下武之運世徳作求不懈於治敬天勤民明禮勅法用賢絀不肖以匡釐庻政含生之類霑溉徳澤熙熙然各得其所外户不閉天下大同皇帝乃端居深念欲銷㷭罷候偃革修文葢務與海内休息而一二桀驁之帥負其險逺阻兵自強首鼠不前以抗我命吏皇帝赫斯一怒龔行天誅數年之間舉八閩收兩粤定秦隴平滇南皆沈幾黙運指授神謨以折箠笞之曽無亡矢遺鏃之費而元兇巨憝莫不望風欵附自縛闕廷皇靈遐布薄海震慴方域之外負山阻海之㓂自累代所不臣職方所未𨽻者亦皆稽顙請吏願為編氓窮陬荒裔鳥言卉服之國靈龜珎獸殊琛瓌寳之貢後先麋至郡縣之吏以瑞麥嘉禾神鳥甘露之祥來告者嵗無虚月於是文學掌故搢紳先生之徒咸謂皇帝功徳崇閎登三王邁五帝不升介邱無以告成功颺顯號萬人一意不謀同辭皇帝曰吁繄予聖祖神宗所以付予者光烈顯融是馮是藉予一人仰成之不逮其敢有越志無亦惟是四海之大九州之廣匹夫匹婦者有一阽於危亡而莫之省憂余則憫然念之廼旁搜典章博稽耆耉類於郊壇告於宗社渙發徳音推恩海内于二十有三年十月東巡狩至於齊魯之邦引見髙年採聽謠俗興賢奨善修禮正刑簡别吏治咨求民瘼躬自親歴罔不周悉于時車駕所至行道不迾宫館不除屏去縟儀事從簡約二東之民望属車之塵者皆歡喜動色相告巡狩之事既畢遂升於岱宗燔柴祀天旅望以秩祝號牲幣一準乎古蕭香始薦神光淑熹天人協和休風四塞百辟卿士駿奔在列目擊心維踊躍蹈舞僉曰於休哉皇帝之徳昭灼於上下充被於四方淵契貞符川臻山委以紹明三后之光命其曷以加諸昔在有虞氏五載一巡狩有柴望之禮姬武受命時巡以祀海嶽亦有陟其髙山之文並垂訓於典謨流美於三頌炳炳麟麟于今為盛葢一嵗四巡以承宗廟至孝也行慶施惠以達幽隠至仁也展義觀風以飭官守盛治也一道同風以恢洪緒大業也若乃望祀射牛之儀泥金檢玉之説則雜出䜟緯之書為聖人所不道自三代以上未之有行也皇帝執謙履約辭尊號而不居却封禪而勿舉省方觀民一遵古典大禮既成遐邇訢豫茂實鴻名古今無兩是宜銘諸金石以昭示於萬萬世臣遹謹拜手稽首而系以辭曰若稽古后勛猷炳煥省方設教葢取諸觀皇帝親問時乗六龍言巡所狩於山之東是山之東神畿肱股襟帶幽燕灌輸呉楚其風肆好美哉泱泱我皇之來威儀有常結旌於車不舒不疾止不宿供行者不䟆我皇之來匪豫匪遊亦有咨度亦有咨諏孰雨而暘孰墳而埴筐篋錐刀孰吏失職皇帝曰咨咨汝東人蠲苛滌煩巽命以申惟此東人昔猶菜色今飽而嬉有椒有飶惟此東人昔無袴襦今安且燠子曵我婁東人大和歡喜嘔喻皇帝至仁使我安富非惟富之又訓諭之同律合軌納價陳詩乃進守臣方嶽之下爾藩爾屏爾民爾社展義宣譽納言試功大明黜陟罔不恪共遂升泰山周覽四極柴望之禮如古品式天施地貺景象著明神人交暢百福來成羣公卿士咸拜稽首進而致詞皇帝萬夀皇帝之徳聖神文武宣昭義問洋溢聽聞彼盗之魁如苞三蘖攘之剔之我斨無缺有逋者寇累世不王昔也鱗介今也衣裳芒芒大荒是不一國萬里來庭稽顙匍匐外内輯睦人民樂康皇帝欿然視之如傷屢降徳音蕩滌更始復役賜租宥過赦罪僵者立起道暍以蘇膏澤布濩淪髓浹膚匪直也東濟河海岱九垠之際六合之内兵革不試刑厝不施太和盎溢萬物熙熙豈無天行祈寒暑雨民則不恐託命聖主乃知帝力溥博鴻厖雖有水旱不病堯湯以永昌圖萬年景爍羣臣頌功刻銘東嶽聖武頌臣聞上天之生萬物也春和必繼以秋嚴聖人之治萬物也仁育必兼夫義正是以文武異宜互為經緯賔師殊政相與後先軒轅治涿鹿之兵夏后振有苗之旅頌稱殷武克彼鬼方雅美周宣截兹淮浦皆以萬乗之尊統元戎之重聲明九伐張皇六師樹駿一時流鴻千載夐乎尚矣斯可得而言也皇帝體神聖以開天建中和而立極深仁厚澤容保無疆泰運貞符升平有象朝宗萬國天下一家凡兹受氣含靈皆在並育並生之内即至窮荒大漠悉為不侵不叛之臣而厄魯得噶爾丹者假息迤西遊魂塞北負其狡猾之性恃其荒逺之形滔天反覆逆命戕民不有剪除其何休養皇帝乃宻運睿謨誕敷英略龔行天討親統中權吉祀精䖍軍旅嚴翼千官景附萬騎雲從帳殿九重旌門八陣羽林迹射之士為虎為貔犀渠鶴膝之軍如荼如火長驅廣漠之鄉直搗空桐之外於是發縱將帥指授機宜一掃狂氛膚功立奏受降執馘逐北追奔收獲既多俘斬甚衆戈甲之積如山馬牛之量似谷然後獻凱鳴鐃囘鑾結旆告成飲至疏爵策勲中外罔不清寜神人胥為説豫臣叨在班行覩兹盛美尋其端委伏自思維從來負固者雖逺必誅干命者常刑罔赦噶爾丹素稱凶黠乆合鉏夷皇帝未忍加兵累申勅諭調人出竟為平蠻觸之爭貢使叩闗還予牲牢之數及其稔惡怙終罔有悛革六飛逺駕率土同仇聖徳動天三靈恊應所以春氷未判而豐草芊綿甘井方疏而清泉盎溢士氣自倍醜類咸殱極我兵威遂無遺種而弛弓矜甲不行後至之誅掩絡張絃寜有前禽之逸此以見皇上智勇自天神武不殺如天地之含𢎞如日月之照臨如風霆之奮迅如雷雨之昭蘇巍巍乎赫赫乎徳莫盛焉功莫隆焉故比地則逺於涿鹿計功則速於有苗絜勢則難於鬼方成功則大於淮浦自五帝三王詩書所載推校功徳誠莫有尚於我皇上者也不揣固陋敬上聖武頌一篇庻以鋪宣景烈傳示無窮頌曰皇帝上聖秉籙乗乾金樞奠極玉鏡澄天珠囊學貫丹扆道全禮修刑厝教訖聲漸昌期隆鑠景運升平雨暘時若品彚咸亨民歌樂只物詠由庚飲和食徳以阜以成混合車書并包區宇九譯咸賔八荒即叙有截來同無逺不舉蠢兹醜類敢亂天常婪婪豺豕侵彼鄰疆彼則奔命入呌九閶皇帝好生未加威殛訝士受成匡人觀慝至再至三申之教􅎁許之朝貢寛之出入執訊獲諜不膏鈇鑕乾覆坤函蠕動喙息曽是凶頑而猶容釋臣拜稽首惟皇帝聖武昭兹大徳怙惡干誅戕我人民聳我邊隅狡焉思逞妄有窺覦帝心赫怒是剪是鋤六龍于邁萬騎齊驅精嚴師律淵邃神謨乃啟戎行先聲逺鬯分甘均苦隃沙越嶂潏潏流泉欣欣挾纊虎旅䝉恩靈穹篤貺桓桓武臣惟羆惟熊左掎右角霆擊雷衝如掃秋籜如焫飛蓬靡鋭不破靡堅不攻草薙禽獮塵清幕空鹵獲無筭追奔絶蹤降之執之萬口喁喁馬牛在牧軍實盈充若稽古烈疇克比隆臣拜稽首惟皇帝聖武成兹大功大功既成玉鑾旋駕昔往陽春今來維夏役無淹乆人不疲勞前歌後舞釋甲垂櫜偃伯靈臺優游策府耀徳敷文光天率土協氣翔流淳風揚詡式燕式詒永昌基緒臣拜稽首惟皇帝聖武億萬斯年受天之祜松桂堂全集巻三十六
