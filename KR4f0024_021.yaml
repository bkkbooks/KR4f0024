body:
  text: 松桂堂全集卷二十一吏部侍郎彭孫遹撰奉和院長陳說巖先生禮闈司考十四韻幸際升平暇追陪翰墨林掄才需哲匠抽思發清音幼眇移情甚留連託興深瑤華呈國寶玉筍豔朝簮鎖院春隂靜垂簾暮色侵風鈴聲斷續月樹影蕭森乍暖爐烟潤餘寒漏箭沉簷虛初候鳥時春分前一日天逈欲橫參荏苒青雲夢蹉跎白首心所期同緩帶敢使獨慚衾永夜仍無寐遺編得自尋百年同野馬三食亦仙蟫文起齊梁弱詩刪鄭衛淫時豫分校葩經濡毫一言志重此繼髙吟奉和少司農李容齊先生禮闈司考偶此蓬山逐隊行十重仙署列嚴更曽分天上紅綾餤再聽人間白雪聲卿月乍看垂照逈臣心不待飲氷清當年得御真多幸肯向青雲一借名早將彩筆鬬𢎞農萬象雕劖間氣鍾手植桃溪迎化日口噓黍谷轉嚴冬浮沉只似湖中雁忝竊還隨柱下龍為染吟箋一相和院門深掩夕陽封送藝初南還二雷山色接氤氲南北迢遙地脈分若到山中回首望長安天際總浮雲後漢書郡國志注吳郡包山下有洞庭穴號為地脈又有大雷山小雷山上苑風和草自薰當階紅藥正繽紛春來最是招尋好惆悵花前又送君奉和院長陳先生將出闈别同事諸公勝㑹應難再人生亦暫逢幸非傾蓋好相對飲醇濃倚席書籤細分檠燭影重劇憐春夜永清唱寄孤悰送蔣莘田特簡臺中妙參藩向穗城為紓南顧切不是左宫行晝繡還家便星軺過嶺輕石門千尺水重識使君清送董默庵視學畿中丹地嵯峨枕斗魁九重仙詔一行開不離講幄深嚴地得展天紘整頓才自署氷銜如異數人稱水鏡是清裁琅玕碧樹搜羅盡重向鑾坡儤直來寒食四度逢寒食羈栖只異鄉新烟榆火冷舊井石泉凉白髮憐簮短清愁訝帶長鸕鷀湖畔路千里渺相望立夏日風簾飛絮入雨徑落花深感此妍華節蹉跎遂至今墟烟寒過水鄰樹晚生隂目送卑居翼翩翩返故林送汪舟次出使琉球暫輟鑾坡草還乘博望槎文章傳海外名字滿天涯人地堪華國王程得過家繡衣趨省日晝錦未應誇見說髙華峙南行只片帆土風宜稻黍方物有楓杉候吏回仙棹詞臣領畫函好將柔逺意灑灑及嵁巖立秋日牆東一棗樹坐對相晨夕始見棗葉生俄看棗花白朱實垂庭中離離紛可摘仰視天宇清秋風動簷隙日月不暫留逝者誠可惜惜哉生有涯還為物所役人壽無百年榮名亦何益和悔庵君家亭子真疏快門對滄浪濯足時四靣清風來竹篠一天凉月採菱絲髙眠絶愛氷紋簟淺酌還憐瓠子巵相憶秋來知更切小山婉孌桂花枝豫家亦在吳山畔回首當年荷鍤時不厭行歌長拾穗可堪垂老更牽絲心驚白髮羞明鏡身㸃清班笑汙巵安得乘風一歸去翩然碧落折瓊枝秋感客夢不竟夕秋心入煩憯薄寒中人肌襌衾不堪攬披衣起徘徊坐聽鼓聲紞衆星一何微晨光清黯黯浮雲西北來一色白如菼飄風忽翻幕迅雨遂盈坎中庭雜花樹枝葉頗繁狼籍風雨中當階落紅糝天澤未云慳無乃土脉㯺物理不可常時節異舒慘衰盛迭為之氣至則相感亮無松柏心零落夫奚憾送林石來使琉球鯨波千頃外洞塹一行開俗與鯷人近時當卉服來畫函將玊節丹紙出雲臺專對今誰屬羣知使者才祖帳滿秋色清飈動綵旃功名萬里外意氣八騶前風帆無淹晷星軺不計年從容將母在真覺主恩偏奉和馮益都夫子秋日宴集萬栁堂即席留别之作清渠一曲䕃修楊秋氣髙寒曉欲霜塵外心期在邱壑樽前風物似江鄉數枝相向垂隂密五字初成託興長休話永豐當日事重翻法樂入含章秋來風月有餘閒花木平泉手自刪小住頻移清樾影從遊長對白雲顔如澠味好偏憐酒丐石情深只愛山惆悵離歌青綺側邈然東路即銀灣論史偶成甘陵有南北坐令炎精漓紹述實禍宋趙氏無火炊傾輈逝不逺覆轍還踵之明事近可迹粲然如列眉理平良有自試問亂者誰瑣瑣公輔器潝潝耳目司黨禍一朝起國是終參差同好假毛羽異已吹瘢疵蜩螳沸白日蒼黃變素絲詎少忠正士朝拜夕已遺衆口寖以鑠一木安能支東林誠矯矯名教善檢持抗墜或太過時亦阿所私顧其當末葉閹人竊天維執言有義色被掠無撓詞隕首而不悔豈曰非英竒其餘亦自有特立性遷移牛驥既同皂蘭蕕亦並蒔尚難别涇渭安能辨澠淄內外交相訌大寶因淪夷真人應運出適為驅除資編摩一至此握筆相嗟咨所以古聖人耿耿垂訓辭任賢勿之二去邪勿之疑卓哉有虞氏萬古欽芳規送顧師於赴慶陽郡丞任羽扇風流舊所知桂林早折郤詵枝即看逺馭憑熊軾莫道新除奪鳯池五馬並輸通守貴十年休恨得官遲只今北地非邊郡正好從容卧理時邱籲之先生守漢陽有善政去今三十年漢人稱之不容口遹於先生通家子也知其事獨詳為賦漢水清以紀之漢水清徹無纖埃漢陽城中太守來漢水清深不可渡漢陽城外太守去天明打鼓聲紞如漢人挽住太守車公來何暮去何速嬴者三户疇安居自公來作漢南牧秋不凄嚴春燠沐荒村無警犬生氂小吏不欺鳥攫肉五載公堂無諍詞政平訟理恬且熙官衙蕭寂何所有飯有葵藿羮有魚羮有魚飯有藿鳴者琴和者鶴太守至清漢水濁懷李天生清渭日悠悠金天嶽色浮因之懷舊好彌此軫離憂盛世甘偕隱斯人實寡儔漫將詩筆較一疏自千秋龍鬚蟲之品族以萬數跂行蠕動皆有知語其智者莫龍若飛潜變化無端倪由來此物不生得於何拔其口上髭毋乃角麟而喙鳯徒逞荒忽充談資李侯審非躗言者宏覽博物頗好竒以兹數莖來乞我要我為賦龍鬚詩試問得之自何所一一詳說非無稽諸城環山地瀕海蛟蜃出沒無常時白龍山小在其北嶄然獨立形崔嵬甲申年秋日正午雷雨交作聲喧豗有龍鬭於篁竹上鞭策狂電驅風霾一龍鬭死頭墮地血殷入土吹沙灰鬚髯磔磔藴餘怒鋭如脫頴囊中錐捋之可以搜齒疾垂老不患齦齶危此事至今四十載居人猶及親見之明之亡也在是嵗君死國破禍莫支明年金陵建位號旋見拘執歸京師龍蛇之孽不虛作有如發匱流龍漦豈同齊諧但志怪可偹紀載上有司又知龍者本神物失勢不保頰與頤沒淵得珠必遭睡魚服或受漁人欺重器深防有假竊出入詎可輕威儀我為此詩告來者藏弆勿令今人訾松桂堂全集卷二十一
