body:
  text: 松桂堂全集巻二十九壬申以後吏部侍即彭孫遹撰古藤我來古藤下欲賦藤花詩藤花自妍人老醜詩之醜也又過之含毫欲下不敢下邈然終日拈其髭南曹故事既㪚軼衆口傳説紛參差不知此物自何代但見老幹盤虯螭當春花葉訝何麗恨無祕思爭新竒忽披榛翳得碑記蘚文明滅微可窺云在𢎞治嵗癸丑長洲吳公官於斯右廂數楹公所憩紫藤二株手自蒔因之俯仰感今昔一官先後同班資風流不墜起遐慕以理揆測還然疑此藤雖然黝而古連蜷偃蹇殊凡姿問年或可舉盈數安得許乆如碑辭碑之嵗月况遼逺百有四十今其期要知舊本在碑後宛其死矣為枯枝後來好事訪遺蹟逺晞前哲踵所為惜哉怳惚難具論至今莫識種者誰世人徃徃貴耳食觀物不復窮研推雷同附㑹類若此使我反覆生嗟咨又思當日種此者東銓華重非賤私一朝姓氏遂湮没遑問治迹官崇卑人生患與草木腐草木未腐名先澌可憐身世太局趣真若野馬空中馳所以古人志不朽區區名爵劍一吹我今幸際聖明世妄期竪立來牽絲浮沉或厠大賢後寄以臭味無差池祇嗟齒髮日穨暮不才竊禄仍虛縻署紙不省實憒憒詩成獨後才衰遲萬端銷廢逝將老藤乎得地方乗時願言封殖俾勿壞我詩藉爾傳來兹髙梁橋曉望小雨朝來歇晨光曖曖微林坰紛霽色水木遞清暉深樾逗人影翠漣浮客衣因兹滌煩暑彌欲息塵機沙路依山盡浮流逐徑斜翠微縈百雉緑樹隠千家早稻初含穗秋蔬遍着花樂郊來徃數風物最清嘉暑雨小院愔愔清晝長槐隂未暝曖餘光疎簾宻雨饒秋意祇欠鮮飈一㸃凉送宋右宜之平陽早駕軺車入澤宫賦聲殷殷欲摩空舊操白雪無人和此日青雲有路通蹔逐征鴻辭薊北偶思芳醖過河東瑤華倘許頻相摘為斵秋林玉一筒夀合肥相公太夫人母徳應將鏤管書公才公望更誰如爭㸔設帨當朱户正值宣麻下玊除經幔早知傳業盛養堂今見拜恩初緑槐十二沙隄穏委佩歸來奉起居春酒當筵象服明國恩家慶一時并萊衣入補樊侯袞梅鼎歸調潁谷羮上殿給扶多異數傾朝致拜極殊榮試歌燕喜流絃管夀母千秋有頌聲題半舫大理寺少卿錢葭湄齋名奉和原韻小忩低户不安横半舫中堪眺大瀛心似虚舟初不繫人如秋水恰同清夷猶自愜滄洲趣蕭逺真為建徳行便欲相從抛組去五湖烟月一帆輕雪次楊次也韻誰摘仙葩㪚九闉輕于氷凌重于塵盛姬臺館層層玊郢客歌詞灔灔春境現空花飛有相室生虗白似無人莫將機思爭天巧刻葉三年總未真殘雪用楊次也韻殘霙掩亂似催詩霜纈氷凌態愈竒忍凍苦無洴絖藥怯寒甘作處囊錐占年幸不封條在避俗偏於墐户宜為報敬容賓客道衝泥那復鞚青絲賦得明月照積雪清暉浥浥泛明玕倍覺中天夜色寒玊杵研霜凝未㪚金波濯練揾初乾神遊大素何冲漠氣冽空蒼自鬱盤徒把妍辭懷二謝此時惆悵不同㸔壬申除夕纚纚春燈影燭妍親朋喜共話鐙前食鮭風味偏真率羅雀門庭頗静便幸荷恩私寛一眚終慚衰劣玷三銓宦情縱使濃如酒合把屠蘇讓少年除夜以一罌酒餉次也辱貽新句輙依韻答偶攜竹葉燒春罋為致椒花守嵗筵酒客形骸雖放浪麯生風度却清妍已㸔態美穨山玊更羨詩成下水船欲和不能甘退舎始知造物賦才偏次邱季貞洗馬癸酉元旦韻班春早已肅蒼祇喜見柔颸曉入帷􅃩􅃩嵗華垂老日穰穰風物太平時榮枯有分休占易歌詠無方強賦詩羨殺桂坊題句好落花依草是邱遲次鄭葭湄夜忩旅興空庭寥闃夜無譁氷雪凄寒落月斜底是羈禽偏繞樹叵教遊子不思家朱絃寂寞琴雙鎻素鯉浮沉海一涯客有呉吟正愁絶白雲千里寄情賖十三夜集徐華隠學士寓齋觀試燈次袁杜少韻北扉學士退朝初掃地焚香此結廬心逺山林在城市官清僮僕解詩書客來為試春鐙早坐乆還驚夜漏疎忽聽樽前發妍唱感時攬物一躊蹰送周瑞厯之任大田今皇念人瘼吏治最所先百里寄民社一一皆精甄周侯本呉士秀出凌雲烟俛就選人格剖符之大田大田蕞爾邑嶺外仍孤懸壤地雖褊小風土殊静便耕桑有本業甿俗無輕儇延顱望新政行矣當勉旃慎無鄙夷此而不加勤拳視民當如子敬上親仁賢君心操氷雪君才利龍淵利器不自衒清節乆益堅強力赴公事徳心周井㕓計嵗必有餘嘉名自流傳不見鳴臯鶴聲聞徹九天鸞棲肯終屈萬仭㸔騰鶱髙渭師夫人林宜人挽詩栁絮詩篇好荆苕禮教新采芳南澗日偕老北扉人烏鳥心偏切鳴鳩徳自均千秋馨烈在珍重冩湘筠鶴葢同車日芸廬儆夜時清心同黽勉白首怯差池春月姍姍影寒花寂寂枝空彈元相涙重賦蕙叢詩送鍾華峰還韓城二月長安送客行河橋殘雪尚縈盈栁寒已作銷魂色鶯小難求出谷聲汲孺從來名拙宦袁修終不媿清卿追懽知有前期在無柰春風愴别情華堂乆矣閉松筠此日西歸已十春家有薄田仍苦旱囊無長物易憂貧琴書自愜林間趣風月能娯物外身君自蕭然淡名利中朝那不借才頻題畫冊愛此塵外蹤心蹟共蕭迥驢背聳吟肩踏遍寒山影送李漁村還諸城次留别韻白雁風前遡夕陽蘭疎菊秀為誰芳雖然乆宦無羈思那不清秋憶故鄉坐對寒山開岫幌卧聽幽瀑下漁梁知君新綴名山志五嶽心期似向長料絲燈依史胄司學士韻一檠春燈五色絲十分工巧百般竒移將㶑灔金缸影寫出青葱玊樹枝弄影稍嫌雲母薄流光偏與儛人宜塵寰未必能勝此合向蓬山頂上窺七襄巧思乞河東鏤水雕塵迥若空瑤彩澄鮮非泛月翠漪搖颺不因風春隂自結千重綺夜氣俄成百尺虹噴薄清暉紛可掬飲氷人在玉壺中上元燈火咽芳塵錯落明玕照錦茵魚纈吹寒紅閃閃驪珠有暈碧鱗鱗難酬令節惟婪尾欲買春宵是等身蘭燼銷殘清漏永夢遊何處隔雲津文珠玳瑁擅時稱風物今來幾度興龍女機絲無襞積鮫人宫闕有觚稜玉山穨影方千日銀海生花已萬層何似秋堂扃深寂一簾風露讀書燈豆腐藿食終年意自忺朝來凈饌况清嚴絺巾未藉先磨玉雪乳初融更㸃鹽味異雞豚偏不俗氣含蔬筍亦何嫌素餐似我真堪笑此物惟應乆属厭采菽中原未厭貧好將要術補齊民雅宜蔬水稱同調叵與羔豚厠下陳軟滑爾偏諧世味清虚我欲謝時珍不愁飽食令人重何肉終慚累此身題朱北山水墨花鳥冊水墨淺深分向背天然生趣在毫端可憐絶藝無人識祗作當年院體㸔題殷彦來嵗寒吟客裏偏驚嵗月頻羈心疇不感凄辰新詩字字凌氷雪輸與東呉秀出人含毫一徃寄情深不是尋常擁鼻吟到處流傳詩句好何人解識嵗寒心寄氷衲上人少日曽尋物外縁落花風裏颺茶烟竹忩水檻應無恙不到東林二十年聞雁千里鄉闗首重囘南忩愁聽雁聲哀秋來心事無憀甚一任黄花早晩開題梅桐崖小像十年朝隠意蕭閒長在清泉白石間他日抽簮乞歸去還應乞取敬亭山合沓雲山上挿天𤣥暉詩句至今傳卧遊已足令人羨身陟丹梯益邈然題盧時偕小照罨畫溪深六月凉松蘿隠映讀書堂綠隂如羃天如水紅藕花前白晝長此中風物與人殊世味蕭然道味腴他日人間作佳話雲鴻留得草堂圖松桂堂全集巻二十九
