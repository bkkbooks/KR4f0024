body:
  text: 松桂堂全集巻十八吏部侍郎彭孫遹撰己未元旦限韻四首八風吹律正調元瑞色蘢葱散曉暾紀歴草生金鳯闕迎春花發玉津園星雲萬象開芳甸雨露千家待紺轅試向靈臺占物候絪緼淑氣在郊原矯首丹宸又紀元火城初散九衢喧曉鐘仙仗開長樂春水靈池擬定昆鷺羽銷兵同赤縣蘿圖賜䇿受黄軒祈年更上甘泉頌朱草繽紛詎有根喜見貞符再起元氣迴陽律稍生暄授時已覺三微屆講徳還看四子存山色雲光當晝爽花林栁市入春繁素心不與韶華競大拙何須乞帝孫九天劒佩集含元有客髙歌獨掩門丹笈終朝依净侣清齋永日罷芳樽故人幸接芝蘭室舊隠還思薜荔村歸及江南春社後擷蔬薦黍亦君恩再用前韻寶歴初成未改元九天曙色麗朝暾摻音乍入陽春調遣興聊栖竹素園竽竊當年羞北郭雞栖此日欲南轅人間不少龍頭在那得交章問邴原當今聖徳美乾元祝華呼嵩萬口喧側少刑餘如藉孺朝多長者似劉昆短轅只合棲牛皁凡鳥寧堪寵鶴軒試看堯天稱夀日㡬行鵷鷺侍金根昇平寰海度開元野客還思獻負暄洱海長鯨終自剪湖湘餘孽爾猶存三江鵝鸛戈船集萬騎貔貅羽檄繁須向澠池争奮翼雲臺早晩待公孫少日孤生似偉元祗慚名籍玷金門一枝本自非㝠翮五石何曽是大樽雨笠烟簔隣海市漁莊蟹舍在江邨栖栖自笑何為者曽受蘭陽國士恩人日限韻夢破大槐安身如陸静觀吟詩唯自和懐刺欲誰干宦興同魚竹生涯問鶡冠今朝風日美瓊笈􅔤相看七日是芳春幽居四五人情還同蕙􅉅居不論參辰蒿目憂王室葵心向紫宸致身誠未易曳組漫拖紳春朝即事呈諸同好昨宵旌節下星壇字字皆成絳雪丹賜出瓊漿猶臈味傳來青鳥是仙翰幽期誤我梅花帳霽色迎人露掌盤莫訝今年春氣早五雲瑞日是長安玉宸親降羽人壇綠簡新傳紫府丹為語瑤臺留舊籍好從珠樹刷凡翰清言遣日松枝麈净饌行春薺菜盤氷雪心期長自許不教塵夢到槐安玉皇降辰恭紀一律五色鑾車七寶壇紫薇遙貢寸心丹分明天上琉璃界來往雲中翡翠翰玉檢金繩朝拜疏緗黄紺實晩行盤天恩深重真難報不向滄波弔子安元夕即事限韻一㕓借得􅅟堂東良友追歡此夜同砌竹寒生栖葉露爐香輕浥落梅風酒人擊筑仍燕市貴客傳柑自漢宫何似清言遲玉漏茶烟影裏䗶燈紅誰撡春雪郢中歌天際停雲拂絳河最喜清才同庾鮑可能屬興比羊何風從蕙轉泠泠影月似珠明灧灧波漫向滄溟掇鱗爪夜來綃客探驪過何處寒林夕籟鳴金波偏似故鄉明鴻歸北地書初到鵲繞南枝夜自驚含凍花因吹笛發閣陰天為試燈晴他年良㑹重追憶鷗鷺心期是夙盟曽笑深源有誤函朝衣不擬換春衫竹宫舊重三元節蘭籍新披五色緘夢去欲隨仙蝶舞書來還倩彩鸞銜長安亦有幽棲地卜築何須傍石岩正月十六夜蕙幌風輕扄不開清宵猶得共徘徊一分乍減銀蟾影半粟將殘碧麝煤玉局仙人欣下降桂宫侍史喜頻來人間不少文園渴為乞金莖露一杯碧漢寒凝玉瀣杯神光頻下集靈臺氣占關尹青牛過波静琴髙赤鯉來一葉吹蓂初欲墮片雲籠月未全開凍蠅詩思今偏澁隔院休教擊鉢催早春飲曉岳寓中詩囊棋局總荒蕪欲問荆髙舊酒壚恰喜故人頻折簡不須野鳥更提壺平林雪盡餘寒淺近郭山晴落照孤信美何妨同一醉風光端自故鄉無再次前韻竹林舊墅乆榛蕪重問河間姹女壚虎子宦情清似水䲭夷飲量大如壺鄉關縱逺春無恙親串頻來興不孤薄俸已知營酒債春衣還肯貰錢無三次前韻青帘翠幕映平蕪欲喚三騶共此壚令莭蹉跎成栁市舊遊彷彿憶蓬壺芳蘭味重交偏厚淥水聲髙調轉孤我自呉吟撡土思不知堪作和人無四次前韻春色江南滿綠蕪犢車歸去傍黄壚也知五字凌三謝未必千金扺一壺君自名流青瑣重我應夢逐白雲孤憑教寄訊山中客夜鶴晨猿好在無五次前韻朝騎款段踏春蕪興盡猶沽栁外壚小鳯銜杯池是酒清蠡轉滴玉為壺歌殘幸舍魚飱薄夢泠空江雁字孤試看疎狂如我輩可堪重作掾曹無咏乩沙雁磧春寒雪捲蓬上林消息若為通金仙法喻恒河數黄石緘留博浪中囊去暗藏魚浦陣書來頻落楚江鴻坐飛欲向青雲附好築新堤待相公寄懐溧陽裴令大坏山色碧嶙峋千里湖中錦帶􅐜林木舊傳金瀨景風流今見玉山人停車栁外吹靈雨行仗花間屬暮春遙想絃歌多暇日懸魚不厭俸錢貧送人頒詔粤西博望仙槎萬里途南來清海接蒼梧蘭臺乍遣中天詔桂嶺仍通使者符寶劒新裝看諭越錦衣故事待還呉此行好為宣恩澤亂後瘡痍久未蘇長安旅夜聞春雁聲歸計偏輸旅雁先南來猶及早春天數行向夕流清響㡬㸃横空帶暝烟書札侵尋寒嶺外鄉心搖曳暮雲邉上林何處傳消息坐聴殘更思渺然憶江南早梅次展成韻鄧尉峯頭萬樹梅南枝應為早春催當年臥雪人何在此日臨風獨自開姑射神仙氷作骨玉山亭子璧為臺長安今夜遙相憶月落參横有夢迴千里停雲暮色催春光應已到林梅數聲横笛臨風弄㡬樹深山冒雪開夜擁香篝魂自泠月明翠羽夢初迴隴頭空有花如霰不見江南驛使來望西山雪景春陰逺抱玉泉西雪映層巒水繞隄詩思欲隨黄竹泠岩扉空憶白雲栖寒凝山黛青初斂暝入林暉綠未齊好待朝來看爽氣灞橋何事更留題寄上侯筠菴夫子三首扶風帳裏執經人􅂸向滄江老釣緡潦倒重為遊宦侣亂離留得報恩身鷗波㡬繞天涯夢雲海頻移别後春寸草心長雙髩短此中耿耿未成塵汴樹嵩雲縹緲懸春來雨滴緑蘿烟山中宰相陶𢎞景洛下耆英白樂天把盞吟詩人健在聴松看竹思悠然奮身便欲隨巾屨轉憶西樵立雪年一掇瑤華眼倍明寸心已向大梁城西崑片玉多清潤丹穴三雛盡長成静侣松喬顔未老閒餐氷雪體還輕南雲千里情無限目送歸鴻好寄聲已未花朝諸名士讌集曹玉淵宅分韻賦詩予方卧疴不至詩亦後成即此簡曹併諸子長安亦是可憐春二月垂楊糝麯塵㡬葉鶯聲晴乍囀一川蘭色暖初勻看花客到非前度藉草情深有故人不對杯鎗心欲醉寂寥祗是負佳辰酒釅花濃月滿林刻殘華燭費春陰同心如結芳蘭佩撡曲彌髙緑水音信美無妨耽賞洽倦遊直自嬾招尋詩成最後君休訝不是呉吟亦越吟夀制臺李鄴園千里雄藩控吳越緹幢羽葆森戈鋋一身能造萬家命隻手獨擎半壁天南樓月色夜皎好西山霜氣秋澄鮮無以公歸庶留此年年朋酒公堂前題龔節孫種橘園寒林葉葉㸃霜氛小結茅亭卧白雲不羨江陵千户貴新來賜爵洞庭君嘉樹新分玉一叢滿林霜色􅐦吳楓秋來最有江東思白露青菰客夢中和其年清明日遊萬栁堂憶故園風景雨織烟搓緑滿條似回青眼向人邀蘭辰藉草春相命竹溜穿花晩自澆地有平泉疏草木心同南郭聴竽簫荆溪不少佳風物桂樹山幽未可招蘋波一曲栁千條寒食風光坐可邀槐火輕烟吹夢泠梨花春雨帶愁澆孤栖幸舍仍長鋏諸道鐃歌又短簫平世定容初服遂故山松桂早相招沂州寄王宜兄北風棲以怨辛苦獨南征逺樹如人立寒沙似水明嵗闌催短景山盡得孤城憶爾不能見因之百感生答朱西野見懐之作清霜撲面雪䝉頭一錯那能鑄六州寒谷何曽回暖律秋心最易着羇愁臨風忽憶山中客抱耒居然隠者儔短轂輕便黄犢健歸來相逐鄠田遊初夏言懐名字曽經㸃蕋宫十年蹤跡任飄蓬平臺授簡初無意北郭吹竽總未工歸思祗憐芳草碧宦情虛擲軟塵紅櫻桃開後酴醿落一枕江南曉夢中一葉漁舟二頃田生涯合在水雲邉馬肝不食寧知味猿臂難封莫問天大漠雲寒陽鳥逝上林春暖早鶯遷沙鷗只是閑情性長占溪沙自在眠初夏山堂夕景清竹梢藤蔓翠縈盈酒醒孤館燈初灺雨歇空階月轉明好夢如塵吹易㪚閒情似草剗還生無端歸計蹉跎甚辛苦機中錦字成羇愁兀兀類沈㝠坐對西山眼暫青朝露㡬看棲弱草夕陽頻見下疎櫺名同鄭璞空相賞病有吳吟詎可聴飛絮殘鶯惆悵絶故人南去又揚舲讀羅揚庭先生遺事十則各系一絶句誰擅編摩石室中只今獨有一羅公一生不作吾􅉌恨千古長留布被風藜火曽從五夜燃一時撰屨盡名賢遺編窻下依然在想見河汾教授年卜居只合傍濓溪索食惟應謝鎮西何事草堂貲不到生嗔杜老太癡迷雨花臺下舊登臨風土清淳逈自今見説幼安遺蹟在揮鋤當日却遺金誰道先生素業貧偏從涸轍起枯鱗五侯湯沐知多少不見當年市義人列鼎重裀未足多畢生風木恨如何清涼山館尋遺事曽此門人廢蓼莪春浮有樹非凡種優鉢無根是異葩解道文人多慧業不妨長者號蓮花乞得麻姑藥一丸朝來玉節下仙壇何須逺覔三青鳥紫府分明是大丹綵筆由來思入神流傳千載尚如新休誇黙識張安世不擬紛綸井大春身似壺丘見濕灰倐然一去離塵埃海山兜率無分别風馬雲衣自往來夏夜暝色􅂷林際棲烏下夕陽流光催髩短遲日較年長向夕呉吟起當風楚製涼薄醪堪慰藉一醉即吾鄉送蘧非南歸來是朱炎候歸仍溽暑時也知心匪石那不髩成絲去路歧南北羇栖感别離故山應自好莫負再來期斜日猶林際征驂已路隅未能長繾綣且為立斯須惜别翻成恨論交轉自孤車輪心其轉一併向前塗索居千里外親串㡬人存最是他鄉别能消獨客魂暮雲歸逺岫暝翼渡孤村徙倚斜陽裏無聊獨掩門本是孤生社今為斷梗蓬謀身真草草分手太匆匆往事淒堪絶清歡孰與同愍思有遺賦併入别離中贈孫惟一學士禁院清嚴曉直時罘罳花影晝遲遲九重春色深如海不是詞臣摠不知紫殿重來鬂未蒼春暉端與聖恩長朝來縹碧親宣賜好為先生進一觴紅藥春妍碧樹秋玉堂長得擅風流誰從淮海矜豪氣别有人間百尺樓六月十五日作嚼得蓬山一片氷此心終不染炎蒸寓形逆旅端如客斷酒長年畧似僧徙倚閒吟蘿逕月跏趺静對竹窻燈早年計失由婚宦布襪青鞋悔未能隔院蒲桃引夕陰幽棲終日有吳吟索居只是違朋好薄宦何曽損道心蕉鹿功名悲老大隙駒嵗月苦侵尋玉堂未是歸根處蹤跡從君笑陸沈操牘金門亦偶然蹉跎心跡總堪憐一經未究平陳學五字曽無庾鮑篇舊墅松蘿牽逺夢小山梧竹鎖寒烟自從輕作秦谿别澗愧林慙又一年寄寓庸憔悴中年别蹉跎大隠身閒曹堪寄傲薄禄足忘貧雲出仍歸岫花飛偶拂茵較然氷雪在終不愧松筠寄陸話山虞魏當年浪有聲即今物望屬先生千秋風雅推師匠四海交遊借姓名栗里早成松菊隠東山不負薜蘿情白沙居處原相近欲鼔蘭橈問夙盟懸輿此日髪猶𤣥誰道岩居已十年通徳名髙冠蓋里少微星照女牛􅄤解蘭昔見花成市藝玉今知璧是田選勝秋來情不淺東湖烟月正清妍立秋雨中分韻疎􅎉急雨一聲秋迸作階前百道流瞥爾尋聲還有相邈然顧影􅄣無儔行稀蘭徑清陰合夢遶松窻小篆幽即此便為安穏法未容頭上更安頭一編聊復遣春秋朝是三墳暮九丘師匠定從言外得筌蹄偶向世間留妙心自合捐糟粕真諦何曽有獻酬此意憑君須領取空中轉轂陸行舟熱是炎天涼是秋浮漚一㸃是齊州强名仙佛人皆幻任運行藏我自休暮雨連陰蟲切切寒林送響鳥啾啾静觀物理俱無礙逐色徴聲盡妄求雨叢風蔓一庭秋懶慢心情物外遊但覺吟情清似水不知生計拙如鳩海枯只為填精衛石爛多因觸不周别有成􅃜多不到此中何處著閑愁涼雨連朝又及秋踆烏南轉火西流巾瓶自證無生話朝市何煩大隠儔白鳥數聲人悄悄清都一别思悠悠須知不見還相見風月分明現指頭人間㡬度説陽秋今古依然貉一丘黄葉啼聲驚未止白駒鞭影悵難留竹爐石鼎堪晨夕酒盞詩籖足勸酬蹤跡浮沈君莫笑蓬池亦自有虛舟送襄雷之蓋平次曉岳韻深桞清槐䕃廣溝只今遼左是神州去時已見鳬為舄到日還知劍作牛元覺真空邀月泠紅螺山逺磧雲秋豪吟意氣偏悲壯不羨人間萬里侯秋霽喜凝祉以新詩見示松風半榻夢迴初乍喜君來問索居詩有變聲多慷壯人兼秋意儘蕭疎典衣也應沽村醪僦舍何由擷野蔬冷淡心情頻不厭跫然蓬藋一逃虛三日秋霖一日晴纎絺偏趂午風清松坪暮靄吟青案石瀑秋深夢赤城梧館乍涼殘葉下竹爐初爇暗泉鳴坐深日夕忘歸去相送柴門片月生七夕分韻蕭齋能逺俗長日客來稀向夕秋如水開軒月在衣荷香清入觀人意憺忘歸坐乆同天籟翏翏静者機送李欲仙之蘄水南楚山川麗君行愜勝情簟秋歌竹冷山曉視泉清問俗今三户論詩舊百城蘇公遺蹟在得句好相賡秋至難為别西山正夕曛交情憐舊雨客思悵停雲鄂被中流擁荀香入座聞懸知聲迹好髙第獨推君祝聸淇白首移家託隠淪長從綺甪作比鄰詩情逸似劉公幹經術紛如井大春杖㡳青山朝拄頰門前秋水晩垂綸梅花溪上書連屋誰道先生素業貧送葉慕蘆歸黄州即用夏日閒居元韻三載京華客相依作比鄰交情方自昔别緒又從新賜爵徒輸粟憂時欲徙薪艱難思共濟望爾直廬頻題既庭松風圖兼送南還此去江東託隠淪不堪送别又蕭辰他年相訪寒山路笑指青松是故人寄襄五兄時宰虹邑一為濠上客三載政初成民已如魚樂官應似水清早騰花縣蹟新起鳯池名何日來京輦相依慰旅情寄静含南郭分擕後相思日九迴一年秋又盡十月雁初來宦薄知吾拙詩成媿爾才何由移玉樹更向上林栽題茂倫雪灘釣叟圖故人蹤跡近何如擬向江干問隠居真樂宛從濠上得子應知我我知魚送陳子闕之黎城故人西上悵分擕楊栁津亭緑未齊一路春山相向碧銅鞮宫外草萋萋送錢五表丈南歸江南今二月正是冶遊時東崦梅初雪新波栁欲絲我留頻見夢君去已嫌遲到及清和後鶯殘緑滿枝送古燈上人還檇李吾衰才日退薄宦興蕭然似鷁還飛宋為函亦在燕人間無樂地教外有真傳便欲同公去雙峯蘭若邉閒雲亦何意去住摠翛然意盡便歸越興來還到燕𤣥機千里秘秀句萬人傳若向天台路留題八桂邉題畫竹誰斫清光染竹枝春來最易攪鄉思江南社日鶯花候正是家家筍蕨時冬日寄懐退兄汝南名士盡賢豪聲價平輿本自高月旦評來今更好使君原是舊銓曹我歌昔日吳趨曲君話當時蜀道難憶得蟬聯清夜話兩心爾我不相謾小草何心轉自哀灌園終老楚江隈曽聞固始鵞兒美留待於陵仲子來重到長安悄自悲故人不見悵何之薄寒淺醉禁秋夜記得西窻聴雨時嘹嚦殘鴻十月天舊遊蹤跡尚依然斜街宅裏銷魂别零雨飄風又一年烽火西川逈未銷秋風羇宦髩蕭蕭不知放仗門扄後誰與衙齋話寂寥緘情也欲折瓊枝惆悵南鴻去較遲料我題紈相寄日是君把盞見懐時汝南觀察太疎顛隱几焚香卧閣前終日齋㕑清似水無心屑受一文錢阿兄薄宦俸錢貧小弟長饑索米頻千里開緘俱絶倒一家那有兩般人紛紛博學與鴻詞班馬文章李杜詩縱使阿婆塗抹遍也非三五少年時寒月疎簾夢未成重思往事最分明去年此日西窻下樺燭光中葉子聲閉門種菜是英雄拙宦何當老圃同解道四時身已備晩菘早韭滿胸中和臣颺除夕見懐四首殘歴侵尋是小除臨風搔首一踟蹰空江極目魚書冷永夜懐人蕙幌虛薄宦三年慙素食同心千里感離居也應貪食神仙字辛苦生涯老蠧魚金臺賓客盡時名鄒衍狂言傲大瀛老去自憐成小草書來還喜掇朝英我如楚橘踰淮化爾似隋珠照乘明何日偕遊京輦上大官法酒細同傾海外徒聞更九州黄泉碧落恨悠悠鳯鸞巢坼孤鶵死兒女情多老淚流枯眼當春三月夢斷腸宿草五經秋汝才自好應須達不及朱軒翠幰遊暮年姊弟隔辰星千里吳天眼乍停孟曜晨炊椎髻白徐吾夜績壁燈青匏𤓰似我偏長繫蒲栁如今又早零不及南州髙士好紅顔白髮頌黄庭松桂堂全集巻十八
