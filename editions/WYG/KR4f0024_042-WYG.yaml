body:
  text: 松桂堂全集巻四十二吏部侍郎彭孫遹撰南􅐹集二水亭歩月雨餘林氣浮散步水亭前山月遲方吐幽人晩未眠疎燈映竹户清露濕茶煙羣籟一時息秋河正悄然與番禺兄乞米落盡青菰野飯香行人猶自滯江鄉飛牋問取神仙宰乞與當年煑石方濫食久應慙北郭長饑耐可學東方不須逺就謝仁祖分取桃花十斛香贈胡豹生先輩天涯蹤跡乆飄蓬十載青雲客夢中風節人間窮益見文章嶺外老彌工客吟已自深莊舄蠻語何妨傲郝隆歸計明年須及早不教辛苦望征鴻題張山人畫冊數聲相向最髙枝凉雨新秋欲暝時吸露餐風君莫訝由来清亦畏人知樹色雲容縹緲間寒潭秋水碧潺湲江亭高枕清無事飽看㐮陽雨後山黄金新埒玉為鞭一騁霜蹄旋旋圓持比前朝諸畫客風流何讓李龍眠初入粤食蠔㡬至委頓柬林秀才偃鼠何須設大烹巨蠔㡬欲困吾生應縁誤讀鍾岏議遮莫空耽爾雅名冬夜過退菴兄春雨堂中飲官燭生烟夜欲殘四垂黼帳畫堂寛移樽堕珥人如玉入座同心臭似蘭砌竹琤泓將雨至瓶梅清冷著花難醉来數問今何夕不道鄉愁逼嵗䦨清樽官閣有前期選勝追歡屬此時千里闗河鴻雁侣百年風雨脊令詩錦茵垂手呈能巧紅袖分枰布算竒康樂西堂應不減徃還幽興亦相宜粤中除夕南中逢此夕酒罷轉凄其不寐憎衾枕多愁厯嵗時帷燈摇夜色隣樹引朝曦已覺郷心切春風莫漫吹人日山城春事近何如髙枕南窻但索居莫訝知交相問少從来深巷有廻車寄尹孝亷考功兄弟秋日東官道名園作寓公山堂經月住清興數人同落子楸枰冷開樽荔酒紅夜闌猶刻燭髙詠答松風秋色江村逺終朝載酒過疏簾當晝捲好句入秋多葉子清宵戲珠娘静夜歌佇看林際月寒影落纎蘿郊扉耽野趣水郭帯斜陽愛試青絲鞚貪眠白玉牀雪秔蒸藕葉銀粉進㯽榔風物今能憶兹逰極不忘江清曾共涉樓迥每同登待月中秋宴彈棊半夜燈時時過北曲數數問南能是處多同調離情可自勝青桂山牕下紅蘭水檻前藏鈎三五夜沽酒十千錢比玉身多愧兼金意已堅别来方㡬日約畧似經年此别知非久相看亦黯然銀燈摇綺席清醑汎離筵鴻雁天涯侣秋風渡口船拏舟一相送江月静娟娟元夕遣家問魚書千里趂回潮一幅烏絲寫寂寥紙尾分明題月日可憐今夕是元宵春日逰海幢寺呈無公春江亂野渡一舸如杯輕閒身曉投寺逺見雙幢旌寺門對江水水靜綠始生風吹木棉樹紛紛墜紅英無公知客至莞爾相將迎豈無酬對煩彌覺心境清烟竹深自留雲松長與平坐久不能去乗潮聊復行送謝副使之瓊州託訊舊感恩令金劍耿消息瓊海先秋汎珠崖問俗時黎人瞻鹵簿漢郡見威儀故舊閑居久清貧大吏知拂衣今十載何事緩歸期素聲花雨餘氣息帯清酣雪滿花田蘂半含一種幽香矜秘甚不教移植到江南細蘂繁枝徧作花濃香隱隱浸秋紗月明夜靜㣲聞得風味依然似鬘華越臺髙越臺髙髙磊磊挟江閩馳嶺海石闕雙聳雲棟孤擎利在威逺安用虚名寳劒出匣虹飛電落庾桂為鐔儋珠為鍔陸撃鳬雁水割溪毛敵愾未奏不如鉛刀犀渠臥雨弧矢在房壯士徒摶千夫莫當何不揮斥乎上下為天子兮守四方海颶風海颶風振山谷蕩我田禾摧我屋黄茅白葦百萬家夜雨啾啾聞鬼哭風伯莫怨嗔海若何不仁安得精衞填此津五山相屬皆揚塵長鯨北徙白浪開復爾邦族爾莫哀牽緇拾月削蜃灰漉波煑水霜皚皚颶風之後春風来豎奴陳德隨予之嶺外客死念其二十年勤舊因有此作迢遥南越行䟦涉高凉使我僕亦已痡奄然即長寐昔我未第時一心相随侍辛勤二十年樸誠終無貳客死亮可哀追思有餘喟匪直帷葢㤙豈曰泥塗棄招此南方魂遂爾首邱志荔支行南中嘉樹好顔色物産時時凌上國丹華紫纈何陸離踏遍村南與村北中有仙人十八娘紅雲覆體紅綃裳水晶膚骨玉脂凝天然風味誰相當尚書園中名第一黑葉金鐘亦逈出佳種由来最晩熟六月衝炎始摘實緗枝入手暍氣通春泉忽潄元膺宫芳甘柔滑不留齒氷雪立化香融融黄柑霜柚甘一唾盧橘楊梅俱下風越人日噉過三百欲以清腴傲呉客標題不肯讓閩川圖譜猶能争品格此物寧堪走傳車天南民力未全舒只今萬里却貢使何必唐𦍑更上書寄沈嘉令十里羅湖攬勝逰蘇公遺蹟見風流秋来逺憶狂司馬明月題詩滿郡樓送記汝上人之廬山棲賢寺金井橋頭竹樹春玉淵潭上水清潾潯陽舊隱多棲託此去山中見㡬人入光孝寺小憇菩提樹下寺即六祖為印宗演法處客久轉多暇古院聊招尋院中無一士日落珠殿陰千年石塔迥百步迴廊深山鳥不避客翩然下髙林小憇西方樹時開北風襟長松發逺籟泠泠有餘音送趙少叅歸養軒車辭越嶠舟楫下膠河此去親闈近年来吏隱多青山歸舊業朱蕚長新柯却視千鍾祿真同鸛雀過答澹公見留逰丹霞山之作荷香荔熟正佳辰鷹爪花前坐晩春邊海潮生清磬答隔江雨過夕陽新名山久擬追禽慶上行何時託庾詵便欲從公方外老螺墩錦石一閒人簡王説作春江十日雨門舘晝不開爾居城西地最下病中枕席生青苔天寒鶴骨應更痩猶有清吟日㡬廻陳白沙草書歌白沙先生名早聞手擲青山歸白雲陳情上擬李令伯講學欲方呉聘君晩年信手作大字茅筆縱横有竒致何必規規王右軍淋漓時復成髙寄世人好古如好龍可憐識見多雷同豈知草聖固餘技相賞不在翰墨中觀射嚴城呉絶塞廣野漢遺宫亂燒驅秋草新寒燥角弓釋弸平似水穿札􅌺如風巧寓垂楊外心棲畫鵠中弦虚能下鳥塵靜不驚蓬迂濶羞儒效經營重武功陽元才不逮真自鄙雕蟲送李漁入盧尚書幕一醉芳筵月亭亭送客過新詞留價重白首好游多去傍蓮花幕歸聽桃葉歌自今清讌日誰與樂婆娑與客圍棊賭荔子戲有此作清簟抛書午夢短二屨初来叩空館相將移席就蕉陰蕉影頻移子聲緩須臾歛局罷相持紺房仙實紛離離君看此手欲何作太守不如噉荔樂寄白門余處士懷移家初駐木蘭橈桃葉江邊第㡬橋知在青溪芳草外殘陽細雨弔南朝珠江秋汎出郭窮秋望擕壺溯晩晴但隨潮水去何必問期程西洋琥珀酒船歌海外良工擅竒思酒船制作窮珍異滑稽足傲鴟夷形淋漓可使淳于醉宛轉玲瓏二尺長鏤金錯采巧莫當文珠作牕玳瑁屋白銀為席珊瑚檣酌酒五升㠶半起峡船始發春江裏引壺注滿飽欲張蓬蓬已可行千里長年三老毛髮動鬚眉颯颯笑相視綺疏啓處中有人皎若芙蓉照秋水須臾酒竭㠶亦收回看堂上唯虚舟機緘動止那可測見者疑同神鬼逰此器徒聞出西域估客新從舶中得由来竒巧蕩人心不脛還能走中國對之三歎謝賈胡匏樽一酌足自娱居竒漫值十家産適用豈若千金壺投珠抵璧當代事雕鎪無益何為乎題海珠寺水中樓閣出虚無兩岸烟波入畫圗来往㠶檣歸客少興亡亭榭夕陽孤鮫人聽法秋揮淚龍女棲禪夜施珠物外莫論塵世事越王臺上有啼烏送陸谷逰羅浮山西風吹江流送子上渡頭干謁不得意且為林澤逰十載無家長蔬食蕭然逺絶形骸累此行好住羅浮山慎勿回惑思人間葛仙亭下訪遺履應有真人夜往還題程氏水樓舊館重来倍寂寥隔溪惟見柳千條黄花水榭無人到獨對西風看落潮瀧水吟送人至海康朔吹摇征衣寒日痩平楚君無渡瀧水瀧水深且阻瀧頭西望更無極岩嶂叅􅏔行不得林箐幽密虎豹啼過客相看少人色謫宦天南㡬箇囘薄逰何意此中来莱公閣下倚孤劒海水天風日夜哀與無公約逰雷峰寺雷峰塵外境高舉謝人羣山色随時好溪聲盡日聞天花秋自落嵐翠晝平分野鶴能相待將予共白雲送蕭星源歸龍江送子龍江道殘冬欲盡時竊金終自白投杼亦何私俗薄交知少家寒仕宦遲藜羮歸莫厭朂爾九霄期嶺南竹枝詞木棉花上鷓鴣啼木棉花下牽郎衣欲行未行不忍别落紅沒盡郎馬蹄春草青青秋草黄桂花開後菊花香郎行莫過新州去獨鶴西頭是瘴郷嶺南有青草黄茅桂花菊花諸瘴見高凉郡志獨鶴地名妾家溪口小廻塘茆屋藤扉蠣粉墻記取榕陰最深處閒時来過喫㯽榔蒟葉䦨干石粉新砑光盒子色如銀何須貰酒能留客一口㯽榔醉殺人林中莫種芭蕉樹空自青葱滿舊叢蕉子鮮甜難得飽蕉衣紕縵不禁風半年水宿半山居冬採香根夏採珠珠好須從蚌中覓香燒還仗博山爐高髻編金耳飾璫生来嬌小號珠娘朝朝出汲春江口不著鵶頭足似霜二十年来水戲張蒼龍百尺舞牙檣阿家笑指雙鬟語記得前逰爾許長越江五日龍舟競渡相傳有神司之每二十年請于神乃克一舉偹極觀聽之樂詳見今釋大洲龍舟記茉莉攅燈射玉除素馨簇帯影扶疎持燈照見好顔色顔色雖如香不如月明歌女摸魚聲風靜蠻童鴃舌鳴鬼子驛中乗傳過蜑人江上弄潮行嶺外早秋送友人先歸檇李秋風引郷思一夕腸九廻相送意轉深怫欎何由開懷中延露曲音節有餘哀願因商飇發吹上古琴臺立秋前一日曉發龍川道中望霍山山以秦人霍龍得名有石甕泉珠乳巖諸仙蹟江村雨後早凉生小騎輕輿次第行殘月初分千樹曉宿雲不斷衆峯平山空已杳秦人跡城逺猶留趙尉名欲向林中浣餘暑甕泉珠乳汲深清長樂官舎立秋細雨平林晩未收東来路盡古循州山城車馬初投館嶺徼風烟又入秋地濕似懷湘客恨氣暄仍有瘴郷憂憑高一送登臨目何必蕭辰始欲愁張都尉畫馬歌汗血不世出但聞西極来披圖忽見渥洼産籋雲逐電相縈廻立者驤首欲一鳴障泥未觧猶徘徊走者勢如風雨至馳驟萬里無纎埃其餘數匹飲或齕一一神駿非凡材問誰擅此化工技逸足天閑妙無比只今都尉最得名不讓當年韓與李都尉生平本將家前朝曽領上輕車身親百戰竟何益白頭歸種東陵𤓰早嵗壯懷時吐露伏櫪䧺心見豪素平沙漠漠落日黄馬首猶然蓄餘怒嗚呼黄金之臺高突兀冀北之良恣超忽龍媒當世豈合無昭王已往九方沒唯看阪上服鹽車誰向圖中求駿骨送姜山上人歸東莞山中方外棲遲乆山中獨往深孤雲同此意来去亦無心梅州寄洪暉吉梅州郭外驛程孤八月江行暑未蘇地接蠻雲頻溽濕天連瘴水更縈紆土風已自徵瀧吏物産唯堪薦荔奴知爾闗山多失意秋来能不憶蓴鱸潮州食新龍眼炎風吹人遍林谷荔枝摘罷摘龍目一摘再摘味漸好三摘四摘果全熟南山北山千萬樹纍纍枝頭㡬百斛剖房忽見驪珠明脱手疑同金彈逐少焉一齧甘如飴玉液瓊膏盈口腹仙漿沁齒流絳宫頓覺泠泠息煩燠閩潮之間種最佳大如雀卵厚肌肉日盡數升飽欲死已可忘饑辟五穀何妨久食駐紅顔猶勝長鑱采黄獨食江瑶柱偶題平生耳熱江瑶傳十載空尋江海逰朝来忽動子公指添丁馬頬紛見投充庖已覺南烹異入口俄驚玉柱柔風味僅能同蚌蛤鮮腴還似讓猶蛑大蘇好事乃不惡錫爾嘉名真善謔龎然曽説黔之驢氃氋爭笑羊公鶴此物由来天下多江瑶江瑶爾何怍七夕與賀伯醇盛周萬對酌蕉子花邊夜結星江聲月色滿中庭樽前幸有三人在客裏休教一日醒潮陽人七夕陳𤓰果名為結星寓潮日值先子忌辰揮淚有述獨客闗河阻孤兒涕淚懸含悲過此日銜恤在終天萬里違邱壠三秋隔几筵眼枯桑浦上心死鳯山前縱得邀三釡誰能起九泉徒留弓冶澤空廢蓼峩篇已抱臯魚恨遥遥二十年韓山謁文公祠山因文公得名有古木參天土人呼為韓木韓山欎以特韓木何蒼蒼乃有韓公祠氣色參相望我来拜祠下拜罷重登堂披帷覿公像儼若在我傍身黜名愈顯事久澤不忘風流千百世被此蠻蜑郷烈士殉節義達人重文章寄託苟有在貶竄其何傷七哀詩有小序寓居嶺表離索無徒唯故人尹二右民相得甚歡屨跡書筒往還㡬無虚日不圖今夏遂為異物因念海内朋舊比年以来日就淪䘮感南皮之㑹者殆不止抱痛于元瑜也爰追述生平作詩七首亦猶士衡歎逝之情哀可知矣華侍讀亦祥侍讀負異才金門譽早振時名馳禁闈物望齊君俊風儀挺朗秀玉德含清潤黙擬河東書性同温室慎薊邱昔投契夙好逾齠齓石交多素心蘭言結芳信中更六七載朝露驚何􅌺逺慚白馬約永絶青雲訊揮涕滿梁谿滂沱霑素紖許給事瑋給事恭靖孫淵源富家學夙悟有神啓十行目俱落探理見四本讀書窮八索傲性謝交逰孤蹤恥依託惟予與夫子交情久彌恪凄凉蕭寺居寂寞寒江泊聨床話永夕高詠酬孤酌深言戒美疢虚中納良藥遊處跡畧同往還義非薄一旦分鑣去心期宛如昨朝鳯慘不鳴童烏杳難作靈輀返葛山歸骨填哀壑長歎叩蒼穹天心一何虐徐孝亷鑛次璆饒逸藻弱冠攀仙桂家貧好逺遊恥為生産計襟情披秀豁神宇散開霽季路無宿言柳惲有餘藝曩者定交時少長年相繼皎皎青松心泠泠白水誓聞自七閩歸手劒賈餘鋭既有北門嗟復落南宫第百憂能傷人征途遽長逝高堂尚白頭稚子始總髻誰分郈成宅一雪西華涕金編修國用編修富春秋英英金玉器秉質既温縝吐詞亦清利桃谿得䕃佳藜閣窺書祕民儁爾何慚弟畜吾多媿猶憶呉門逰雞黍見交誼屬有茂陵憂兼之遷謫意杳杳鳯凰池漠漠山邱閟一朝骨肉親秦越紛相視􅃋風生沍寒孟門多顛躓指顧變暄凉須臾分險易世路誠可嗟褰裳孰能避鄭侍御為光侍御人中豪意氣凌八極身名兩俱泰才地迥難即服官僅朞月慷慨思盡職蒿目上封事矢志除蟊賊寛爾桑梓憂紓此東南力夙昔廣陵江送子逰京國攬轡志澄清立朝戒容黙虚懷受盡言不病狂與直大節鬱未伸沉疴亦已亟歎息此人徃西臺黯無色蔣庶常繪庶常性通敏風神皎氷雪才情紛若雲譚諧粲如屑彩筆春葩鮮清文秋露潔長安謝病歸杜門掃車軼玉樹忽沈埋榮華同一覕繐帷曽入臨慘慘清明節軒庭翳網絲苔蘚侵行轍賈傅年不永羊生𦙍終絶佇立笛聲中臨風轉嗚咽尹孝廉治進右民孝友士至性非由學内行本淳深竒材恥覊絡結客盡黄金觀書厭糟粕名髙走江嶺交盛馳京洛斯人曾閔儔誰云布絲諾傾盖廣川臺除館東宫郭久敬人所難古道洵無怍張毅鞭不前中行癉初作悠悠參里山千載長幽壑驢鳴意莫酬蕙歎情奚託拊歌桑户琴庶以平哀樂閲潮州郡志見潮陽女子謝五娘詩小軒睡起日將午黄葉滿庭山雨来歎其絶佳因有此賦散帙南軒午夢餘劇憐詩思艶芙蕖江雲暝合斜陽外秋樹凉生欲雨初詠雪才清人宛在然脂事徃獨愁予擬持好句題團扇木葉亭臯總不如韓山亭嵐氣凌高秋岡勢日􅍶崒欲問山中亭蹟與寒烟沒藤稍罥客衣屐齒粘苔髮下山不見人海水摇明月潮州西郭潮州西郭水茫茫林氣瀰漫海氣黄沙尾依人憐越鳥波心撃汰憶呉航寺樓漁艇全經眼斜日疎烟合斷膓陳堯佐潮州西湖詩疎烟漁艇逺斜日寺樓閑欲去更留餘戀在韓山片石𣺌相望蔡家圍土城裁廣里所據特爽塏完保夙藉茲百室猶然在壤薄禾黍稀氣肅川原改巒勢走掲饒潮聲逼江海此地方在郊惜哉尚多壘民牧今為誰遺言冀可採程江寄宋尚木一折三江柳離憂五載多登臨懷舊賦襦袴聽新歌漲海烽初息深秋瘴已和空廻千里駕怊悵隔山河産溪夜月懷程五周量晩渡初潮滿西風一榜輕烟波隨地好燈火隔林生客有將歸思秋多欲暮聲薊門今夜月應似産溪明含笑花春叢初挹露曉色欲升霞借問忘憂草何如含笑花潘田驛中見木芙蓉一本高丈餘一枝獨自染秋容拂瓦窺檐曉露濃惆悵佳期不可即空教木末採芙蓉渡畬坑羣山浮爽氣夕吹漸清和夜雨溪行逺秋畬火種多去帆沿水急歸騎亂流過逆旅知何託新蟾已挂河由潘田而西涉畬坑至通判府行萬山中綿亘百餘里今晨幸清霽俶駕將言還舎舟一遵陸藍輿輕且便掲水見凌亂陟峯絶夤縁相逐互高下登歴窮山川秋杪崖氣肅山空人語傳寒花冐幽澗當風扇芳鮮朅来百餘里所遇無人烟流亡久不返道傍惟石田舊府留重鎮落日森戈鋋揚越此南徼設險非徒然旅行誰不戒獲此託高賢蓬辣灘蓬辣灘前一水長驚濤如雪斷人腸越臺西望猶千里何處雲山是故郷還至雷郷館中雨憩昔往始徂暑今来已暮秋驅車逝將返零雨濕我輈舊館再一宿登此亭上樓娑羅子初落黄菊花已稠時物一以謝河山邈且修悵然發長歎四顧增離愁渡赤甲水登尹家圍眺賞沿溪入村落數里石橋流水竹樹可憇佳遊不厭近乗興即長往翳翳竹樹陰悠然發遐想涉江踐夙約登圍挹秋爽下尋村徑幽逺逐溪流響榕梢隱人碧蘭苗隨地長樵牧趂墟烟禾稼被田壤樂此閭井淳風物况豐穰及今秋正妍盤礴窮心賞與蘧非爾任叔吾􅍨思諸子同遊金繩菴觀舎利宿雨過林坰秋光染苔竹精廬同一遊良因忻寓目香積有餘施逌然飽蟬腹楊枝潄寒齒花㲲承新沐坐愛松風鳴茶鐺亦已熟夜宿邡上人山寮寒甚乞卧具已阻山中雨還就山中眠風凄感凛秋鑪寒無宿烟堂中高行士趺坐方晏然暫乞蓮花服終依鳥道禪聞訒菴終養得請遥有此寄金馬門中久陸沈蓬莱闕下暫抽簪重裀不少吾邱恨陟屺應懸季子心釣水烟生湖外艇采蘭春上玉山岑自傷風樹情難逮欲寄新詩淚滿襟石龍夜泊寄尹振民空江鄰畫舫相望未離岑欲結幽蘭佩其如秋水深身猶棲嶺海爾已痛人琴若過梅山路滂沱可自禁擬同昰禪師入羅浮縱觀金沙玉鵞之勝㑹以事留省下未果斯約作此奉訊羅浮古洞天萬仞青巃嵸欲從白社侣逺叩神仙宫左挟軒轅叟右呼葛仙翁如何混塵􅅽坐令此願空試問飛錫人何時去山中金沙水碧流丹竈春泥融石竹翠無恙芳蘭抽㡬叢霞舉洵可樂幽陟孰與同悵焉不成往惝怳心何窮九日寄故園兄弟呉天漠漠雁来稀故國登高意已違兄弟相思孤棹外烟波無際一人歸江花欲暮紅芳歇林月初生翠羽飛獨凭危樓凝望久不知秋露暗沾衣杪秋坐澹公池上寮同陳元孝梁芝五晨興理道服清心屏俗緣擬把琅圅書逺叩曺溪禪崇蘭有佳憇列坐西池邊三秋不一雨池水清涓涓石蕉凌寒碧海榴終嵗燃日夕各歸去杖拏争引船同逰不同約邂逅還復然夾竹桃灼灼花初吐青青葉自隂誰知穠艶質獨抱嵗寒心絳樹清含吹朱顔秀出林繁霜知不及羡爾托根深喜旭曙病起予有憂生戚中年劇不勝殊方疎藥物旅病暱親朋白髮悲姸節清時老茂陵樽前秋色逈鵰鶚見飛騰美人蕉幽居只合在墻陰不與甘蕉共入林蘸碧最宜雙袖淡施朱不厭十分深洗粧似欲彈纎指緘恨誰憐巻寸心試向花前喚名字春情憔悴恐難禁越臺懷古荒臺下見海雲低歌舞岡前日向西一自越王通使後㡬回烽火照湟谿初冬見廨中紅梅盛開有憶絳雪紛飛已滿枝折来空自攪郷思只今嶺外花開日正是江南葉落時日本佩刀歌倭奴佩下兩匕首削血吹毛刃無厚摩娑喜似雪色明揮掣驚同練光走黄金作室玉作環十步一人如等閒淬刀唯用瀚海水採鐵逺在嵎夷山的歴閃爍難具狀侠客臨之氣增壯撫刀瞠目一再觀想見荆高千載上錦瑟錦瑟無絃冷繡茵玉壺有淚浥香巾逺書貪展頻彈燭私語愁聞數避人秋露暗沈綦履跡月波空汎畫梁塵臨窻忽見寒梅白可惜端憂已到春題林範漢宫春色畫巻九重春色在昭陽穠李夭桃出衆芳底事劉郎太辛苦翻然逺覓白雲郷臙脂狼籍寫朱顔石黛縱横畫逺山心力年来空費盡不知周昉在人間頭風初愈腹疾繼作戲題四十字僕病非今始㣲疴詎足云頭方責子羽腹久負將軍風幔驚餘影霜觥惜薄醺寄辭門外轍殘客莫紛紛寄逺嶺上折殘梅繁花十月開懷人青桂柁對酒碧江隈寒至無霜落秋深有雁来不知林下友雲錦㡬時裁奉和筠菴夫子登閲江樓眺望之作山光水色動飛甍雲海烟巒面面生高峡星河垂斗極大江潮汐入秋聲魏牟北闕心長在庾亮南樓月自明嘯詠劇知情不淺玉壺氷魄正淒清羅浮山中産竹葉有文如符篆無公見貽數莖云貯衣笥中可以辟蛀窈窈㑹真峯亭亭孤竹節葉上神仙字文如斷碑碣聞自稚川留至今耿不滅感公逺致此云可藏衣纈已媿素為緇徒慚麻似雪蟲篆自千年鶉衣從百結羅生貽龍川石酒杯行李淹吾久將遺見子情已成真一酒為致景山鎗刻鏤輸琳碧空明讓水精猶然存太樸還得解新酲琵琶洲月明露下白如霜菰葉蕭蕭橘柚黄絶似江南好風景一灣流水稻花香採香曲採香上西阬日落歸前砦天寒嵗云晩北風吹衣衩衣薄猶僊僊嵗晩惜盛年不辭攀摘苦但願根株堅提筐下南浦仰見山桃吐華曜無人知衰紅落如雨舉手擷柔枝低頭欲去遲芳氣空盈掬何由遺所思軒軒行馬第軒軒行馬第藹藹凌雲彦旦陪兎苑游夕侍平臺宴黼帳錦氍毹琱弓金僕姑初筵陳醴酒前席躡明珠春氷不久堅朝槿無長姸一朝失勢去四散如飄烟沈淵得夜光䑛痔叨車乗誰知金紫門不及蓬蒿徑謝番禺兄送裘朔氣集林端山城旅服單南雲愁漫切舊雨重相看遂有綈袍戀非徒短褐完恩華今日賜脱贈古人難飾豈三英貴身逾萬石寒絺衣風習習葛屨露溥溥輕煖非吾好凄其值嵗闌堪陪卭竹杖雅稱鹿皮冠歸學嚴陵隱春江把釣竿廣州蒲澗寺廣州城北日初晩菖蒲澗前人獨返蒲葉叢叢野逕香澗水淙淙化城逺幢節凄凉紺碧零刼灰世代㡬回經巋然氷雪閲千載老松獨抱支離形曉入海幢寺尋阿字首座不遇臥覺江風吹鐘聲滌煩慮忽憶東林遊悠然自来去滄滄日初上㝠𡨕花始曙堂空户不掩乞食知何處嵗暮酬沈融谷見懷之作徙倚江樓憶别時瓊枝何自慰相思天涯嵗晏猶為客嶺上花開定有詩斜日孤帆迷逺渡西風一雁下秋池蠻郷旅食多憔悴媿爾青雲物外期江天一望暮烟平蔓草凄迷抱子城炎樹霜稀無墜葉南鴻目斷有懸旌山花背客年年發寒月随潮夜夜明斷雨殘雲零落久故人何事獨多情送覞公入匡廬迢迢嶺樹隔風烟已有寒梅發嵗前欲折南枝贈行客此中真意更誰傳過崔氏故居駟馬當時地清濠對柳隄留賔朱户啟卜夜玉繩低亭館皆新主門楣尚舊題一從歌薤後風物日淒淒荀令椒烈呈餘馥蘭幽斂夕芳曾陪荀令坐非直偼伃香紈扇春酒憐香蟻秋屏夢彩虹好從紈扇底重與賦秦宫松桂堂全集巻四十二
