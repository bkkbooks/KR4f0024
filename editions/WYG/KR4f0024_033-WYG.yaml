body:
  text: 松桂堂全集巻三十三吏部侍郎彭孫遹撰牡丹天葩原自有根芽寒食春寒却試花百藴烟濃流夕吹九成帳暖䕶朝霞邢娥色足當人主韓掾香應出帝家肯向東風鬭凡艶紛紛桃李太夭斜豐肌柔骨若為情詞客憑闌細自評品貴合邀花九錫價髙寧數璧連城披香宫殿春隂膩結綺樓臺曉夢輕底事魂銷禁不得頩顔如送笑如迎夢入瑤池罥舞巾風光恍不隔前塵五紋簾幕遲遲日四照軒楹靣靣春花發定依興慶輦香殘猶拂竟陵茵長卿未識天彭種空撫幽蘭賦美人謝客何煩問永嘉洛中姚魏舊名家隂陽風雨含真宰景慶星雲孕物華豔質似窺朱鳥牖穠香不㪚碧油車何當乞取徐熙筆冩作春來第一花黄牡丹絶代穠姿照綺寮風前婀娜顫金翹甘泉寳鼎凝雲氣芳苑銅盤浥露標蜂抱春叢香未褪鶯含仙蕾色偏饒東皇若署花中正上品端宜數孟姚白牡丹瑤臺舊種是仙葩壓倒河陽十萬家草木精英含太素帝天色相現空華隋侯未必珠無纇趙氏終嫌璧有瑕最好撩人春月夜玉盤承露一枝斜重璧臺空事已非風前猶自吐芳菲劇憐暝色通瑤幌乍怯春寒覆玉衣絶代何人呈皓質倚闌終日弄清暉沉香宴罷歡無極更舞霓裳月下歸緑牡丹緑色與青碧不同他詠毎多混雜二詩幸無此病粲粲穠姿領艶陽新紆綟綬侍東皇倚欄祇覺苔無色拂檻翻疑葉有香欲把綠沈描黛嫵似歌黄裏怨春芳綺琴莫向花前弄辨影聞聲總斷腸采芳空自惜韶年一匊盈盈思渺然春宴欲將袍鬬色曉粧還與鬂爭妍琉璃屛影枝枝脆鸚鵡衣痕縷縷鮮寄語天家花鳥使斛珠好為致嬋娟深紅牡丹休向凉州更借緋潛溪春色在仙闈花王自合開朱邸青帝翻教載赤旂香霧重重籠絳艶明霞片片漾晴暉羅虬何事輕相比應向雕欄得見稀凉州緋色天下之最見魏書尉聿傳淺紅牡丹嫩雨鮮雲㸃染勻枝頭一種退紅新流霞淺拂胭脂暈滴露輕研琥珀塵自漬小朱成國色不教太赤汙天真守宫減盡餘香在花信蹉跎入暮春紫牡丹魏相園亭迹已湮繁花密葉尚如新荷囊曉引含香客茸帳宵偎舞掌人不道蘭宫無祕種若移薇省有芳鄰洛中豪貴爭相賞絲障髙籠十里春陳左花枝絶可憐檀槽相對撥鵾絃微移巧笑香生粉錯認前身玉似烟艾綬自矜馮尉寵綈裘偏覺慶郎妍何人為置三雲殿狼籍山箆一憮然陳州紫左家紫皆花名魏文帝宫人莫巧笑以紫粉為靣飾箆漢成帝甘泉宫有三雲紫殿歐公牡丹記洛人於山中接牡丹種者名山箆子並蒂牡丹瑤階侍女號雙成繾綣春風别有情臭比蘭心偏郁烈枝如棣萼更縈盈玊奴暖宿連翩影絳樹清含宛轉聲見説漢宫多國色未應獨立是傾城漫裁鴛錦䕶花神琬琰仙姿不浣塵雨後難禁同夢態風前如見比肩人香流紫錜雙鬟動露浥紅綿兩靨春好是夜來清讌罷合歡枝上月重輪芍藥花期初過秉蘭辰何處韶光不愴神淺碧園林婪尾酒輕紅簾幙斷腸春曾無冶態才傾國賸有穠香合贈人一種風情誰領得祇將心事託王筠鳯池仙種憶前身千纈吹香次第勻浥露有時如巧笑翻風無力似横陳萋萋芳草牽離思嫋嫋穠華送晩春不是𤣥暉抽祕藻何人為洗洧川塵紫芍藥賭取羅囊細細焚膩香終日麝蘭薰輕綃擁袖思妃子文綺裁襦待使君賜紫終成花嬖倖奪朱猶自色繽紛疎狂小杜無端見錯認西臺一朶雲邱璩牡丹榮辱志以芍藥為花嬖倖白芍藥一枝素艶殿春風小院暄萋雪未融香霧彌天瑤島上清文滿篋玉臺中能無騷客憐芳㓗轉使情人悟色空徃事揚州重惆悵瓊花零落舊時叢紅芍藥枝上殘英色漸蔫誰留絳雪駐芳年庾郎華采紛相映蕭令輕朱轉自妍玉骨乍餐霞爛爛瓊枝初濯露涓涓春來觸目多離緒不見紅蘭亦黯然小青花苔痕草色静相依摘向秋忩露未晞展盡檀心纔一掬拾將翠羽恰雙飛螺文㸃染纖纖影蝶態輕翾剪剪衣榮落須臾應自笑風前遮莫逞芳菲並蒂蘭花次孝若韻欲折芳馨遺所親湘蘭兩兩秀無倫祗應屈宋矜同調堪與英皇媚下陳雙璅品髙琴入操連枝樹秀玉為鄰人間草木多竒絶獨許終童對白麟幽姿婉孌最情親雙萼承柎更軼倫竟體何人憐覽舉同心似爾憶雷陳寒匏獨處終無匹芳杜孤生孰與鄰記得當年酬綺節花間並坐擘麒麟坐挹清芬意自親靈葩不與衆芳倫由來物態多新詭㑹見天心有發陳洒藻霏霏流館閣懷香襲襲㪚宫鄰偶然動植尋常事三瑞今猶却鳯麟琳枝相亞合相親解去真當笑彦倫湘蘂羅生閟靈𤨏漢姝雙吹艶鈎陳乍憐清潤香為國始信幽貞徳有鄰肯與荃蕪同臭味重重薌澤浸文麟金絲桃誰擣流黄小院前落英猶似問津年色絲輕剪曹娥絹金粟新攢魏女鈿乍得迎風供把玩叵教靧雪作芳妍𤣥都漫有花千樹梔貌紛紛盡可憐西施夢嬌小風姿冶態賒前身彷彿是西家香魂猶自棲芳草春夢依然怨落花黛色纖纖顰影淺綺叢蹙蹙睡痕斜大陵若使移栽得不數苕榮有孟娃桐花小纈叢叢拂曙光一枝原合在昭陽琴書亂灑風無力簾箔低垂月有香墮去分明雙玉珥落來惆悵半銀床遊蜂莫更相凌藉秋實留教待鳯凰元微之詩明月滿庭池水緑桐花垂在翠簾前玉簮花嫩凉鮮碧小山隂瑤草還能寄逺心風逗幽香秋𣺌渺月迷清影夜森森未開已愛肌氷㓗欲戴仍憐髩雪侵莫遣花枝笑頭白年來吾已缷朝簮紫玊簮花蘭宫昨夜㑹羣真狼籍遺簮下玉宸幻去不知為物化飛來重現此花身晴忩小摘香盈握雲髻輕攏影照人自是紫泥温又潤甘泉分得一叢春晴忩一作芝冠小扣香盈把老少年一名雁來紅靈砂九轉若為功解使朱顔嵗嵗同葉似花妍三徑裏老催人至百年中西洲日暮風吹桕北渚霜清夜落楓却憶昔人詩句好南來孤雁已先紅長春菊偶竊天家雨露微寸莖那得駐春暉試將物産徵元亮更把花名問處機九命未應登品格四時長欲逞芳菲人問萬事都如此草服居然薦鞠衣翠菊霜英未綻悵佳期先有幽芳漾碧颸山黛輕痕餐夕秀雲翹新樣弄仙姿筆床共展清吟後鈿影初流小摘時閒倚東籬眺秋色一雙生翠在花枝百合花膩玉千層裹雪兒炎天六出好花枝占風别綴無聲鐸㵼月俄傾有當巵紫纈生香心嫋嫋清暉入抱影垂垂維摩丈室方消渴更斸靈根啜露滋紫藤花芳藤吐秀未春殘簇簇繁英曉露漙紫葢棽離張羽葆翠虬夭矯壓闌干南曹老樹風流在小院清隂暝色寒曽與故人同賦此忍將涙眼對花㸔余待罪三銓廨中有吳文定公手植紫藤一本乃二百餘年物毎花開時爛如錦繡余與同官合肥相公河陽少宰竟日徘徊花下賦詩相答今余歸田三載兩公皆已下世矣萬夀菊階前卉物吐幽芬底是黄花一派分人與佳名當瑞草天留正色敵炎氛幾家猶飲南陽水三載空瞻北闕雲擬向千秋持獻夀不知堪比野人芹番菊小草無名不用栽栽時先合問根荄鮮明似剪金鸚卵氣息全輪紫麝煤花自霜前籬下發種從海外舶中來盛朝乆已圖王㑹七月江南處處開石菊千重仙纈絳雲平四月何當把夕英濃緑滿庭花的的小紅當夕露盈盈萋妍合傍泉明里幽艶能兼石隠名三徑歸來蕪没盡山忩賴爾寄閒情蜀葵萱草徒然見藥經合歡誰與折芳馨十行彩仗搖銀海五色鮮雲擁畫屏不挫炎威同靡草能司夏正即仙蓂延年有意相雕繢井絡鶉維得地靈秋葵松下清齋折未曾湘文檀暈碧稜稜全無艶色輕相􅃷饒有秋心瘦不勝月映黄昏花自落露含金掌暑初澄蒲姿病後甘衰蹇衛足還應媿爾能向日葵烹菽曽聞七月吟此花豈合在山林金莖乍滴秋如水緗帙頻移晝有隂翠葆垂天三籟寂紫房捧日五雲深亦知容悦輸桃李祗抱傾陽一片心錦葵疎葉繁花次第開盧家雲磴草堂隈綺錢墮地輕于莢紫紺縁階小似苔秋杼初從天漢出春波曾浣蜀江來公儀自是通明相莫棄當年製錦才墨葵北園卉物正萋妍閒眺芳林色黝然朝露初晞花氣暝商飈未至墨痕鮮人因盛飾知孫黒客有幽棲草太𤣥何不將心屏塵黷一傾葵藿向堯天鳯毛畫欄纖影漾迴文朱鳥忩前恍見君翠羽垂簾雙艶發紅螺㸃黛一行分絳房夜染鵑枝月丹穴秋粘鶴頂雲花下幽扃坐愁寂不辭惱殺衛將軍龍膽化碧何年自醢龍一莖瘦玉琢寒笻魚鱗蘸恨波光艶鵲腦縈愁篆縷濃視草索聲清悄悄䕶花鈴影翠重重膽缾秋色堪酬對卧聽蒲牢送暁鐘十樣錦蜀綈小樣剪仙襦五采繽紛薄五銖索粉新歡呈步障連波舊恨上眉圖麟洲花草枝枝别鵲渚雲霞色色殊欲擘蠻牋題好句江郎殘錦乞人無剪春羅小徑依然仲蔚蒿鳯文偏此吐金膏乍驚漢殿鋪香薦不道隋宫試剪刀中婦流黄愁正劇美人渥赭思徒勞上春羅綺銷魂甚憔悴花時感髩毛剪秋羅媧石支磯五色浮天孫昨夜剪并州碧疏有月光相亂綺縠無風影自流花為裂繒應解笑人因搗練轉生愁分明刀尺餘痕在露冷霜凄不奈秋栁穿魚朱碧交加錦不如濠梁樂事在階除春心荏染眠人栁花信逡廵貫妾魚紅擲纖鱗朝雨過翠翻輕浪午風疎罾何木上真堪訝騷客行吟恨有餘又作迢遞佳期重慨予雞嗉牡丹春來早有和風扇開日還當榖雨晴金縷囊香方一寸朱絲繫玉恰雙擎祇縁鳥嗉能觴客便作雞尸敢竊名怪爾紛紛逞顔色試將花譜問天彭翠梅曉色離離露蕊繁鬟低黛接影翩翻子蛾競染枝頭暈么鳯新留葉上痕碧玊小時原共蒂緑華生處不同根翠幬好倩蘭臺筆招得梅花為返魂紫鈴金鈴不動候鳴雞碎剪明霞挂碧題憔悴春衫初坼鳯縈盈午篆忽飄猊暁風撼索偏惆悵夜雨淋花易愴悽青紫當前渾似夢重鐶吠影㦸門西萱花梅雨枝頭蘸緑波炎風更坼蜜香窩草因思婦流傳乆花為宜男服媚多菖節不生將老矣葵心欲吐奈愁何徐陵寄託非無意縹帙徒開病未瘥纒枝牡丹十二湘屏曲徑幽緑隂為障綺為幬不勝繾綣情初定無奈夤縁體太柔丹暈微烘偏惹恨紅衣輕委暗驚秋竹間水際誰栽得至竟難陪謝客遊漢宫秋井梧飄盡雨廉纖冷艶依依拂畫檐黄鵠衣輕朝露冷銅烏枝細午風恬秋心淡蕩人千里夜色微茫月半匳腸斷哀蟬并落葉長門宫怨一時添錦纒頭刻楮三年只等閒御溝容易到人間彩雲垂地秋如綺紅葉當階色未殷有客寄愁酬繡段為誰轉曲皎朱顔西風莫碎重重錦愁絶江南庾子山茉莉碧檻朱闌曲曲排瓊瑰一摘已盈懷芝蘭氣别應難慁兒女情多亦自佳凉雨初停天似水秋宵漸永月當階艮山宫裏花如雪曾與安妃綰玊釵素馨烟冡秋來摘露翹素心初不染炎囂故將華鬘爭標格甘與芳魂伴寂寥玊蕊當風流暗麝氷肌無暑暈輕綃舊遊記得花田路十里香塍雪未消僧鞋菊秋花折得伴軍持秋露承跗瘦不支乍可青鞵同凈侣何縁白足有文綦春浮行處留遺跡香至歸來發故枝聞説逺公善陶令新攜巾屨就東籬鐡線蓮卵色垂天夏景融疏籬曲折引芳叢扶持不棄孤生質勁直還由大冶功慘緑山忩簷鐡影蔚藍禪榻髩絲風愛他名狀青蓮似一綫春愁萬障空山丹紅藍欲采隔天涯春去朱顔感物華大赤獨能修火令渥丹何事隠山家珊瑚易碎難成縷靺鞨無根却有芽傅白塗黄太狼籍祗應喚作侍兒花杜鵑花萬㸃猩紅躑躅枝鶴林風景憶當時霄光擁樹日將暮霞氣滿山人未知偶逐神仙為狡獪還同天女播芳蕤春來花下俱牽恨殘月三更喚子規佛見笑優曇不現但知名凡卉猶能傍化城鷲嶺初拈真賞出虎溪未過曠懷生凈根空色還呈色聖界無情却有情好與人天作禪悦缾香花㲲共經行十姊妹别有紅芳倍可人薔薇枝下弄餘春繁花未必齊韓虢藻艶猶能比憲倫十隊宫衣香簇簇九疑仙袂媵鱗鱗便應嫁與東風去月姊花姑併一身玫瑰火齊千枚暈萬重蚌胎一坼麝泥封仙肌已腐猶然艶芳氣雖枯分外濃饒有色香堪結佩豈無膏沐為修容司花好囑春旛在風雨殷勤䕶紫茸薔薇欲折柔條思不禁濃香杳杳暗相尋似疎更宻態妍好已落猶開色淺深曉幙生寒吹絳雪小屏終日弄春隂何當把取枝頭露玉瀣芳鮮灑客襟黄薔薇薔薇一朶正暄萋栁上輕黄也拂隄蜂畏刺多來又去鶯憐花宻徃還啼屏山入畫描鴉額簾幙生香歕麝臍愁聽風前金縷曲春光縹緲夕陽西朱槿華林曽與託芳標蓽户今能貯阿嬌細雨斜陽成野趣短籬曲徑傍山寮能紅能白色殊好旋落旋開魂暗消莫為靈椿生懊惱八千嵗月一終朝又夏木千章水一涯炎威不到野人家閒來倚仗疏籬下㸔遍朝榮暮落花瑞香羯鼔春前次第催噴人香似撥新醅乍聞只欲瞢騰醉相對方知爛漫開清夢依稀入廬阜舊遊彷彿在蓬萊詩家品格爭新賞花信終須讓早梅迎春青旂此日出東郊臘盡江南草漸苞玊蕊定須參後乘朱櫻未許占前茅已裁金勝排湘萼誰伴銀旛妥碧髾笑向春風問消息嫩黄數㸃上花梢凌霄花苕華曾託詩人興蔓草終牽蕩子心㸃染風光情不厭縈纒木石意何深飄飄自負凌雲氣藹藹能鋪匝地隂樵斧山中行見及可能直上到千尋紫薇亭亭花發子雲居風物暄妍入夏初慘紫可憐情蹙蹙驚紅未定態疎疎孤芳盡日依香案清夢頻年繞禁廬不及雞棲池上樹乆沾雨露得吹嘘紫荆紫綃片片織雲梭碎剪春心奈爾何花似寄生隨處著樹同灌木託根多班荆人徃聞鄰笛束楚風傳聽戍歌坐對殘英三歎息一天暮色入庭柯木筆一名望春何處望春春可憐花開正及早春天筍尖森立頴初脱蘭燼吹來燄未然内史筆床清管麗舎人樂府紫毫鮮還思鄠杜張公子荷槖披香侍從年郁李春光二月未蹉跎唐棣偏翻發舊柯白雪盈條開更合紅綿冩靨淡相和國風只賦容顔好爾雅能疏種族訛好待落花成子後吹豳重聽老農歌櫻桃花燕脂顆顆露華團㸃綴韶光入倚闌崖蜜未香知早熟山礬有伴慰春寒朱顔嵗暮徒愁絶紅粉風流似此難寄語蕭郎休見伐明年留取試花㸔玉蘭仙苞早已濯氷壺桃李山城葉未敷昨夜東風作寒食一庭春雪咀芳腴鮮華比玉堅牢否臭味如蘭耐乆無涙灑西堂舊花樹吟魂渺渺夕陽徂繡毬捖雪摶雲吐夕霏禁烟時節試芳菲繡行當晝誰輕薄白打餘風今是非玉樹新聲催入滾素蜺妙舞娖成圍蹋歌花下何人最賭取西川節度歸佛桑偶將名字附金仙嘉樹還從嶺外傳天逺豈曾慳雨露地偏終不汙風烟緑疇十畆花如葚紅浪千層海作田果否是桑成底用此鄉方貢八蠶綿梔子花玊巵貴女七香車來自曾城阿母家不向人間鬬金粉却從天上擲瑤華凉珠蕊小蜂鬚顫暖雪窩深蝶翅斜莫怪紛紛呼薝蔔未應塵世有仙葩栁花半糝征衣半拂輪章臺約畧舊腰身誰將栁市為花市不管愁人與恨人絮白定然憐落粉葉黄爭自惜餘春東風無賴吹如雪杳杳長安陌上塵菜花山杏初胎栁未芽綠雲中舞柘枝斜乆為農圃知田意敢謂英雄老嵗華風物三春供蠟屐色香一例上蜂衙公門只解栽桃李不道人間有此花麥花江南澤國便農桑蠶事初登麥有芒入夜試花知物性將秋得雨見年芳繡塍逺近萋萋碧綺浪髙低淰淰黄拾穗行吟無限思風流千載一漁陽豆花斸得南山一頃雲荷鋤歸去又斜曛玲瓏露莢將成實搖漾風花競吐芬欲辨土宜滋品類漫勞人事省耕耘祗憐半菽渾難飽藿食終年賴此君稻花露白千村水一鎌靈苗初吐玉纎纎飄香清晝秋隂薄歛秀黄昏夜氣嚴黍稷稻粱無異嗜雨雲風日有同占山居最識耕田苦荷揷花間意已忺荼䕷榖雨園林似錦幪姿清肯與衆芳同姍姍玉骨屏風上艶艶珠胎落月中滿眼春愁渾未了消魂香氣暗相通釀花天亦知人意不遣飛英酒盞空木香殘紅滿架泥春酣春雨春風劇不堪紫玉芳心愁自結素娥清怨曉猶含月流綃帳濃于麝雪簇花房小似蠶對此還當憶荀令餘香三日在巾簮蝴蝶花幽薄寒叢也自繁宛然舞態乍飛翻鳳車棲處渾無影烏足生來别有根春雨洗粧初褪粉東風吹夢欲招魂為花為蝶知誰是此理終須問漆園松桂堂全集巻三十三
