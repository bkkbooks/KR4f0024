body:
  text: 松桂堂全集巻四十吏部侍郎彭孫遹撰延露詞三長調滿江紅和悔菴生日自題小影韻解組歸来便黄綺欣然相許休重問屈生詹尹賈生季主酒後擘箋霏艷雪花間量屐粘香雨待縠巾葛帔老溪山招尋處綘灌在堪誰與羲皇逺還空佇向歌樓乞食講筵髙踞右北平中埋羽箭吳東門下沉簫鼔但短衣匹馬盡餘年無他語悔菴曽官永平古右北平地卜居葑溪即吳東門也誰傳先生須記取門前五栁問何人素心晨夕村童隣叟世上滄桑纔轉瞬夢中金紫難迴首看當時花月滿姑胥今存否也不羨柔荑手也不慕櫻桃口只蕭然偕隐鴻妻莱婦松節且揮髙士麈竹林試醉賢人酒任黄金斗印綰通侯功人狗華遜来與予同甲以端午前一日生因有此贈不飲何為把一切窮愁盡掃看門外花眀草煖天中時到繡虎銀符都插遍那堪令節成吾老唤紅巾翠䄂為君歌聲繚繞人世事堪成笑餘子輩寧須道儘東塗西抹誇他年少擬作山中同甲㑹天涯知已樽前少向南隣呼取洛陽生同傾倒洛陽生謂河内賈子雲谷亦辛未生也時同客吳下五日觀競渡且往觀乎閶門外今朝水戲見兩兩靈絲艾虎釵頭紛綴舊俗吳中猶未改習流人鬬魚龍技看綵雲一派鎖清濠波如沸流覽罷心猶悸憑弔處情難已向風前釃酒何妨沉醉千古三閭同一哭江潭不少人憔悴待為書重續賈長沙投湘水綵雲港在閭門外見姑蘇志惜秋華秋怨纔入新秋早麝㡠慵開鶯簧倦炙孤影誰憐銀釭幾度羞剔烏絲小字看看淡好似賺人魚墨愁寂水晶簾捲見舊時月色枉自尋消息恨餘香斷素偏有無窮憶誰把病容扶起紛紜朱碧便将萬斛滄波移来比似鮫珠滴終夕也只得兩番潮汐烏賊魚吐汁如淡墨南人取以作書逾年但存空紙鳳凰臺上憶吹簫和潄玉詞同阮亭作寳鴨抛煙寒螿泣露蘭橈催發湖頭正銀河清淺殘月如鈎多少情悰欲説知無奈則索行休紗窗静幾株疎栁一片清秋堪憂箇人何處那衣香手粉髣髴還留憶舊年此夜花壓層樓静對金波似水桃笙上隠隠回眸傷心處依然花月添却離愁閏七夕咏牛女曉露招涼秋梧益葉雙星低映清宵想天潢再駕綺節重邀翠鵲仙翎未滿又河邊催唤填橋迎車罷虹川波委月幕香飄迢迢靈辰相望早一年雨度邂逅雲霄笑孤明寳婺獨處珠匏休問故人機素怕龍梭一月長抛願從此金章玉蔀只閏今朝婺女星在織女南匏𤓰星在河鼔東離珠北俱見天官書水調歌頭次韻答家兄仲謀去年分手處蕭寺古鐘樓縹緲霜天孤雁驚破一行秋二十四橋烟月一百五朝風雨憔悴少年遊故鄉渺無際目斷不勝愁呉天角楚江尾越山頭不如從此歸去揮手弄魚鈎縱有長安同學誰問行吟澤畔五月有披裘湖山春未老去去莫淹留滿庭芳晩景和少游韻飲水虹明蒸山霞爛亂帆爭渡津門離人向夕無緒對芳樽㡬上層樓極目疎林外落照繽紛空凝望天邊白苧烟雨鎖空村覊魂飛欲去清江千里南北中分悵瑶琴徒在錦瑟空存膓斷蕭娘一紙羅巾賸萬㸃檀㾗憑傳語玉兒憔悴終不負東昏檇李有白苧村烟雨樓是吾鄉也倦尋芳感舊追思往日月皎燈寒梅魂清凍客散金堂花漏一聲頻送絳雪沾衣香夢熟綠雲堆枕春愁重廻身處似珠鮮玉脆盈盈入捧更消受呉綾弄墨越簟迎凉時時相共自去江干信斷魚牋誰貢聞洗鉛芳新學道禹餘琳札都成誦待重尋早招取上清鸞鳳三清一名禹餘八聲甘州秋怨和柳七韻㸃清霜一夜渡河来木葉竦高秋最傷心時候西風旅夢殘月江樓何事南来北徃行役不知休回首當年事飈散雲流可惜舞茵歌管任蛛絲馬跡狼藉誰收便呉姬楚艶值得㡬回留憶分襟木蘭花下悵佳期怯上此花舟料伊也懨懨終日長為儂愁珍珠簾密約湘紋㡬摺䦨干疊十二碧城宫闕一縷紫猊煙片影紅窗月小語相期全不覺怕姓氏飛瓊輕洩周折待粘雲染雨臨行還怯猛把心兒􅂸却今宵休孤負良辰佳節蘭液泠香犀草露沾金蝶無賴杜鵑枝上鳥向窗外聲聲啼血饒舌纔勸得人歸又催離别杜鵑初鳴時聞之主使人離别見酉陽雜爼三姝媚旅夢花宫清磬杳聽城頭一派角聲悲繞晩来清味只秋窗無火暗螢相照解帯將眠剛月色瞳矓来到千里江闗十年心事相思多少恍在舊家庭館見朱幌㣲垂綠窗初曉驚伊消瘦把别時蹤跡向儂都告旅泊頻年和夢也分明知道莫是相逢無㡬依然去了高陽臺為阮亭題余氏女子綉高唐神女圖帝女歸来一天秋色楚峰十二蒼蒼聽説當年曾經薦枕先王細腰宫裡顔如玉更相尋霧縠霓裳問此時翠蓋鸞旌誰見悠揚巫山枉斷人腸縱陽臺遺跡未盡虛茫回首宸游沉淪幽佩堪傷一自侍臣書好夢千載下雲雨生香又何人剪雨裁雲幻出高唐沉淪幽佩侍臣書夢俱見杜詩念奴嬌和潄玉詞同阮亭作深閨岑寂見朱扉曲曲銅龍䨇閉坐覺春陰寒尚峭不斷氤氲鑪氣逺岫低雲濃花着雨可是伊風味紅箋小疊此情何處相寄朝暮鎮是無聊湘娥淚濕空向花枝倚病裡腰肢慵似柳盡日三眠三起芍藥欄前清和時候約訴纒綿意眼看春盡那人應是歸未杜詩湘娥倚暮花上林人柳三眠三起見西京雜記長歌雨窗獨坐百感茫茫因信筆成百字令自歌且自和之白太傅謂長歌之哀過于慟哭此語誠然以今觀之不誠然耶長歌當哭把琅玕撃折珊瑚敲碎悔不當初多弄㦸領取中郎都尉鵲印纍纍蟬冠岌岌忍見人皆醉雕龍何益算功名偶然遂等閒付與兒曹三旌已矣返我屠羊肆呉下秋風歸去好飽啖菰羮鱸鱠病藉神君巧資天女無計袪窮鬼夜珠休探怕驪龍未成睡織女一名天女見天官書注又疊前韻知音寥落任壁間弦絶市中琴碎萬巻詩書何所用不抵一錢程尉入手杯濃擡頭月艶人好千塲醉長卿倦矣問宦遊㡬時遂此去四壁猶存當壚滌器賣酒臨卭肆春雨綠簔三尺艇釣取霜鱗雪鱠假貸為生送人作郡怕殺揶揄鬼不如秉燭夜深長伴花睡三疊前韻壯心難抑將亂絲斬斷連環搥碎七貴五侯今已矣説甚粉郎香尉公醒而狂臣饑欲死待覓墦間醉平原何在自媒終笑毛遂曉来網得霜螯横行屈强吾力猶能肆脆白肥黄堪一飽絶勝呉王殘鱠露氣高浮羽聲慷慨痛飲歌山鬼元龍臥榻肯容餘子鼾睡四疊前韻丈夫立意寧蘭摧蕙折璧沉珠碎寳劍摩娑如好女請試玉門軍尉虎帳論兵龍泉知已巵酒安辭醉沙場百戰看竒勲一朝遂笑談指顧封侯宛珠隨寳入室紛成肆行馬歌鐘新賜第狼藉金虀玉鱠貴客稱觴美人當夕室瞰高明鬼拂衣歸隱學希夷五龍睡解語花題美人巻子湘裾漏月楚練堆雲别是天然韻石牀小几凉如水一束桃枝清潤玉冠輕卸乍睡覺心情未穩香枕上隱隱屏山冷浸芙蓉印記得那時厮認在桂堂東側蘭臺西近紫薇花下相逢處約略眼重眉褪三秋過也空留下生綃粉本畫圖中驀自尋思可有和伊分玲瓏四犯却夢調元景病次家兄仲謀韻美睡初成便有箇人人年華猶少暱枕低幃不怕細君知道可是陽臺行雨把宋玉魂兒勾到􅂸長作玉清仙隷夜夜掃除庭廟千金艶質分明是轉腰身向郎廻抱漸春汗融融綺褥逗破風流竅㡬畨着意温存生不管儂心不要須央他無賴汝南雞未曙將人喚覺玉清仙隷用夏侯語後段第七句多一字再疊前韻寄語東君莫寵柳驕花誘他年少漏泄春光多在這華胥道何事孤眠帳底夜夜有彩雲飛到似神君為儂却病引入上林祠廟睡鄊即是温柔境有紫玉如烟相抱剛則是靈犀一㸃通却心中竅害得文園憔悴那夢兒偏生還要願生生不作有情癡長得安然睡覺後段第七句多一字招夢用前韻好夢誰同有皓齒丹唇人兒絶少媚寢思香逺勝却邯鄲道一聲砌竹驚廻正月影空牀初到擬欲賦夜来神遇薦枕在朝雲廟纒綿一似春蠶死向雪繭窩中縈抱乍可是雲輕雨薄未透相思竅囑付惜春御史領風月讓伊清要把鶯聲燕語安排莫使幽懽驚覺再疊前韻禊節纔過冷落了風流蘭亭逸少單枕無聊心事向誰行道打疊鴛鴦繡被好招取夢兒来到問何如九疑黛色帝子下黄陵廟願將身化為胡蝶粉㾗死向花心抱浪説遊仙留玉枕枕内藏機竅望斷美人何處慚愧殺靈修練要看落花飛絮殢人春睡如眠似覺練要之要去聲今人作平聲讀者非也憶舊游病酒病酲扶不起似箜篌小令促行觴鄉愁供伏枕暮鐘曉角忒煞凄凉當時幾經被酒錦瑟美人傍記縹色杯輕密雲香重親手擎將年来漂泊去但醉月迷花是處堪傷縱文園渇甚甚金仙掌露玉女壺漿欲問盈盈翠袖風雨暗巫陽誰念我天涯蕭條寂寞年少塲姚嵓傑酒令憑䦨一吐已覺空喉密雲龍茶名花犯梅花和清真韻傍疎籬横斜㡬樹饒林下風味嫣然一笑早掩却三千宫中佳麗盈盈仙袂誰同倚自憐翻自喜正雪滿山中無路素娥寒擁被㡬日小窗試東風為思君長是粉憔脂悴春愁凝時時有暗香飄墜可惜一枝零落也空自賦招魂芳徑裡記當日夢中相遇月明天似水凝音佞宴清都螢火四壁秋聲靜疎簾外數㸃飛来破暝輕沾葉露暗棲花蕊亂翻銀井有時團扇驚迴又巧坐人衣相映空自抱熠燿㣲光願增照金樞景㡬番去傍深林来穿小幔高低不定随風欲堕帯雨猶明流輝耿耿隋家宫苑何在腐草于今無片影向山堂且伴幽人琴書清泠金樞月入處李義山隋苑詩于今腐草無螢火杜詩忽驚屋裡琴書冷水龍吟呉寧周席上作畫堂春靜鶯花麗珍重為開嘉宴金盤薦處楚酪瓊羞呉羮雪片曲按檀槽詞翻玉茗歌喉清囀歎經年作客銷魂此際不覺奈何頻喚簾幙高張庭院又火樹銀花開遍促坐藏鈎分曹戲彩杯行無算小器易盈一時沉頓玉山將斷記醉中上馬明河欲堕横參初轉拜星月慢本意蓉炷初煎花冠重整小院四垂空碧徙倚風前聽銅蠡清滴凝眸處試問渡河人去竊藥人歸何日霄路迢遥抱幽輝終夕正中庭夜永無行跡更難禁私禱偏羞澁早是聲喘頻呼吹麝蘭氣息墜金蟲手自梳蟬翼恁時光莫道窺顔色只影兒裊裊亭亭儘銷魂也得瑞鶴仙題袁氏園亭攜来一片石直壓倒江上三山無色名園堪永日有翠幹蕭森明玕鮮碧桐陰竹實看聨翩鵷雛接翼問何人領袖烟霞身是東呉倦客猶憶梁鴻廡下梅福門前舊曾相識重逢此地同訪瓊花消息待粗酬婚嫁逺尋禽向五岳安排遊屐記他年行藥歸来龍鱗千尺瑶花癸卯七夕夜波凉薦曉杼聲停正鵲軿催駕經年相見料此時一刻千金無價明朝何處向雲雨峯頭銷假怕有人天上含愁碧海青霄今夜西風又報新秋見珠露低垂紅蘭初謝舊懽如夢多少事記取金釵羅帕離情别思任填滿銀河難瀉倘佳期果似靈辰􅂸受星孤月寡綺羅香春盡日有寄翠逺如空黛濃欲滴簾捲青山無數舊事難尋春色總歸塵土撲蝶㑹如夢光陰砑花箋相思圖譜怪東風不為吹愁凝眸又見碧雲暮年来淪落已慣任一身長是飄零呉楚紅淚緘題恨字分明寄與想南樓柳絮飛時是玉人夜来凭處應望斷逺水歸帆濛濛江上雨喜遷鶯偶憶佳人難得更名士風流傾城顔色候日衣輕辟寒鈿細打疊受他憐惜為雨為雲時候非霧非花蹤跡分明似似琪樹交枝瑶禽聨翼當日定情處纒綿珍重此意千金值世世生生朝朝暮暮長似為懽今夕回首人間天上往事依稀堪憶前身是是蓬山伴侶玉清儔匹候日蟲名集宫人衣輒䝉愛幸魏宫人相語曰不服辟寒鈿那得帝王憐春從天上来孫介夫索句題炤贈此篇年少孫郎算才地風流合讓伊行思清零雨筆挟秋霜佳句題徧呉閶似方平當日擘麒麟高宴仙鄉奏新詞有停雲芝葢隔水松簧更饒大喬國色儼麻姑玉女矑盻清揚鈿翠輕飛裙波小皺人前㣲曵霓裳捧流霞一酌擎来味盡作沙糖儘疎狂任紅塵人世彈指滄桑歸朝歡秋夜畫閣重簾深不捲銅史黄昏催緩箭那堪離别在蘭時梧桐落盡迴心院夜長君不見漏㾗猶比檀㾗淺麝煤殘銀筝寳瑟信手拈来倦側側寒生霜瓦濺眼底屏山千里逺南来孤雁已先紅一聲天際堪腸斷飄零秋萬㸃風條雨葉如相餞最無憀坐愁不寐絳蠟和花剪陸倕刻漏銘銅史司刻金徙抱箭花心動早秋客思㡬陣西風凉氣滿林下乍收殘暑極目江天蹴雪驚沙千里迢遥呉楚殷勤謝茱茰灣水為儂好向秦溪去還恐怕闗山重疊雙魚無據冉冉年光欲暮正思歸未得含情誰語待折疏華寄取一枝又逺隔層城路倚樓人聽斷腸聲驚秋客到傷心處江南夢一曲瀟瀟暮雨二郎神憶富春舊遊富春七里水拖藍游鱗堪數看来往雲帆淺深沙石渺渺青谿漁浦南北峯頭登臨逺望不盡斜陽疎樹悵星子臺空桐君佩冷舊游何處覇旅又經㡬度他鄉寒暑自芍藥花殘櫻桃夢醒腸斷錦鞋一賦謝客滄洲潘郎綠鬢心跡猶然朝暮算只有山中明月江上清風如故前段第二句多一字青往在富春作錦鞋賦頗為彼中傳誦新安江一名谿漁浦去富春渚三十里桐君山在桐廬境一蕚紅咏睡鞋試緗鈎正薰籠初暖百和惹氤氲同夢相偎合歡不解天然無跡無塵巧占盡春宵樂事問伊家何處最撩人銷帳低垂蘭燈斜照兜上些跟好是輕盈嬌小只一彎香浸半捻紅分新月勾雲纎荷舒夜阿誰消受清芬莫便道魂消此際向玉樓合處更銷魂底事東陽憔悴化却腰身向字襯漢宫有夜舒荷一寸金蓮花水面新粧小著紅綃弄烟霧似艶分霞暈倚欄㣲笑嬌含檀粉向人低語獨立愁無侣覓舊日張郎何處乍臨風一種輕盈玉奴初學凌波步此夜瑤臺月明香細翠袖沾清露問玲瓏秋藕㡬時絲盡鮮妍蓮子為誰心苦正隔江欲採盻佳期美人遲暮訴相思有恨無情夢斷西洲路西洲用古樂府語陸龜䝉蓮花詩無情有恨何人見女冠子第二體咏美人坐禪香寮靜也片縷沉檀烟透五雲幢下五絲褥上小結跏趺玉弓清瘦見展春衫袖袖底分明紅露鞋尖一綹顫巍巍緗鈎雙疊㡬幅湘波壓皺似承密印靈山後問天然姝麗可是人間有妙容誰偶恰意蕋心燈孤明時候巾瓶淨無垢正好衣紋不動花陰當晝倩罔明弹指聲中唤取那人知否罔明用内典女子出定事丹鳯吟南窗睡覺月色滿床可是行雲有意故把纖阿一輪推落飛入南窗次第穿簾度幙霓裳弄影金波堪挹綃帳生寒氷壺初濯遍處笙竽俱靜香霧空濛冷浸半牀絃索正值夢廻酒醒旅中單枕眠乍覺便欲乗風去向瓊樓玉宇細聽仙樂嫦娥應是笑人長恁寂寞十年前事心兒上憶分明如昨此時此夜怎許人睡着纖阿月御沁園春酒後作歌與擎庵何必規摹五柳之高孤竹之清念久與周旋我寧作我任教禮法卿自從卿儁乗陪游辛杯侍讌僕病須知非所能問何者是魚文驥子綸組彫纓狂来白眼休驚算若箇堪當一瞬青但紫篝玉炷香消仙蠧朱䋲金錯筆掃讒蝇清酒三杯黄粱半枕不換他年身後名誰驚覺有墜梧片葉索賦秋聲又放眼乾坤曠觀宇宙與爾相期憶登第早年曾同座主為農今日俱老明時遂我初衣屈卿此幘鄉里安能向小兒從茲去便濯纓碧漢晞髪清池尚平婚嫁休遲早覓取三山紺雪姿待尋真嵩華采芝千頃浮家苕霅載酒千瓻人盡憂生我當樂死笑拍洪厓知未知囘頭處看眩人世界變化參􅏔眩音幻見張騫傳又自賦歸来為問先生何計忘貧想行吟竹裏烹殘蟹眼著書林下倚遍龍鱗長着荷裳閑拖芒屨野老柴門正比隣難孤負是賞心樂事月夕花晨陶然自得天真渾忘却春明舊日身有石牀小几新凉可襲玉池秋水芳草堪紉時對西風徐揮方麯何物元規塵汚人因傳語倘扁舟来訪許問迷津方麯竹扇也又對影銜盃影且前来吾方思之算乗時只合兔園傳冊成名何用狐穴搜詩世上舉肥宫中磨蝎大藥難將造物醫安予拙且聽竽南郭植杖東籬小園清映漣漪有密竹疎花事事宜更多情綠綺琴心解渇撩人翠嫵黛色忘飢飽看文君風吹髩影此樂誠然不可支誰相問道茂陵閑散謝客多時喬子曠作詩喜用僻事號狐穴詩人園冊見五代史偶興和阮亭歸去来兮或采金芝或酌清流待乗鳯天邊長風作御釣鰲海上明月為鈎冠盖焦螟河山野馬蟻垤縱横十二州儘游戲是撃毬建節澼絖封侯誰能齷齪相酬任沉者還沉浮者浮笑空洞容卿是中無物温柔老我此外何求一紙彈文三章約法不禁同盟鷺與鷗相親近且春花秋月夏葛冬裘又我所思兮白石清泉複嶂層岡看象外烟霞能令公喜眼前人物誰得卿狂中聖頻呼索郎屢顧廣大人間出世方君莫問有增城閬阪漢武秦皇醉来潑墨淋浪邀星渚文機作報章歎鐵馬金戈㡬畨逐鹿博遊挟䇲一樣亡羊經巻藥罏舞衫歌扇天女維摩總道塲相期在便海山兜率誰是吾鄉海山用白傅故事因阮亭有麗農方丈早認渠鄉句也題影贈呉中友人其狀若何珠玉為容氷雪為腸問對朕者誰心知漚露如卿有㡬手淬風霜讀損羲爻搜竒禹簡探得靈威字數行低回處歎無情山水閲盡興亡悲歌慷慨蒼凉正散髮行吟白日長儘家徒四壁貧如司馬目空一世狂甚袁羊竒服靈均高冠子夏襍佩繽紛􅉅若香身名事付杯中醽醁枕畔滄浪和韻答金嶠庵徃古来今如許英雄鐘鼎旂常盡飄風冷雨餘聲銷滅寒烟蔓草陳迹蒼茫南顧昆明東瞻閩越二十年来一戰塲到今日喜豐年多黍兵氣銷光溪山老我何傷且買醉時探肘後囊須我歌若舞烏烏撃缶倡予和汝款款飛觴僕射不如尚書不顧羯鼔頻催不記行纔傾倒早一輪紅日湧上扶桑賀新郎酌酒與孫黙用稼軒韻笑謂君休矣算人生重茵列鼎為時能㡬趁取新凉今夜好一醉破除萬事儘酒後沾沾自喜賦筆凌雲誰見賞只子虚烏有公無是更誰薦雄文似休官且臥烟霞裡又何須虎頭食肉馬肝知味速築糟丘吾將老得喪由来一理縱狂歌東方月起駒隙光陰河射角歎羊腸仕路車生耳且引盡黄山子白苧春暮雨乍晴又洗出滿庭葱蒨金鈴風急驚起啄花乳燕裊柔條斷送了落紅如霰遲日正暄妍颺游絲釵頭輕罥撲蝶歸来不覺玉弓酸軟早安排送春小㑹櫻桃宴深院密坐相逢低聲問取可是多情荀倩却無語囘眸眼波一線月明人靜待尋歡良夜䦨干敲遍金斗放聲頻多應細熨裙花茜五絲幢下明日酬私願畫屏秋色蕪城秋感野炤蕪城夕送逺目雲水蒼茫不極瓊蘂音遥青樓夢杳玉鈎人寂何處認隋宫見衰草寒烟堆積攢一片傷心碧聽柳外哀蟬風髙響滯如訴興亡舊恨聲聲無力今昔可勝悽惻莫重問錦帆消息竹西歌吹淮南笙鶴盡成陳迹轉眼又西風辭巢越燕還如客落葉千重蕭摵萬事總銷沉唯有清江皓月曾照昔人顔色淮南笙鶴用髙駢事小諾臯維揚旅舎聞蟬碧蘚庭除綠陰城郭雨過空蒼如洗正疎林兩兩鳴蟬髙低聲遞何待移宫換羽嶰竹天然相比戞餘音還共南薰揺曵客去茶清棋殘香細故攪人北窗好夢一覺揚州驚起欹枕處偏清厲託體高枝翳形密葉直是如羮如沸總不管西候覇情南冠客意似水流光暗逝漸入深秋天氣轉眼向孤雁寒蛩更替𤣥髩凋殘白頭憔悴試臨風獨凭欄干側耳哀吟此際容易使秋心碎稍遍春情和東坡韻拾翠年時踏青節候芳草紛鋪地弄陰晴景色遍園林屈指到清明天氣小池邊紫燕欲尋新壘紅襟對掠桃花水正山杏籠烟海棠經雨穠艶天然無比映高樓何處綠楊枝又搓得鵝黄千尺絲總釀就迷花病酒懷人㡬般滋味素手好同携鬱金屏外朱欄裡欲訴綢繆鸚鵡生憎忒伶俐看弱不勝衣柔如無骨仙裾怕逐東風起墨染烏闌袖沾紅唾脉脉春愁無際漸畫燭燒殘繁英飛墜似綺叢蛱蝶向花低忙不了竊香私意任取粉銷春老一夢消身世蓬莱水淺滄海塵揚畢竟此情難已九天鸞鶴倘相招為報人生行樂耳鶯啼序夏景半枕新凉破好夢一聲白鳥逺鐘歇曙色霏㣲殘鶯啼上林杪簾幙重重次第捲雲屏曲曲瀟湘曉看露濃香細茉莉又開多少淺暈纔施薄鈆不御衫子裁纖縞更青青非霧非烟眉山兩㸃慵掃倚紗窗梧竹澄鮮弄薫風悠揚未了正深閨晝永如年問津誰到南園此日滿地綠陰虧蔽有芳蕖曲沼乍㣲雨收㾗翠盖孤擎紅衣雙笑氷井敲殘紋楸彈罷倦聽高柳𤣥蟬噪覺小院無人愈清悄簟紋似水琅玕㡬度欹眠釵鳯墜盤雲攪歸来庭户嬌困難禁綉帯羅裙裊最是温泉新浴玉軟花慵侍兒扶起風姿偏好晩凉初薦輕容重換碧欄干外梳頭處恰團圓明月来相照坐看夜色天階戲撲流螢輕羅小扇松桂堂全集巻四十
