body:
  text: 松桂堂全集巻三十九吏部侍郎彭孫遹撰延露詞二小令少年逰席上有贈花底新聲尊前舊侣一醉盡生平司馬無家文鴦未嫁嬴得是虚名當時顧曲朱樓上烟月十年更老我青􅂁誤人紅粉相對不勝情思越人題余氏女子繡西子浣紗圖同程村阮亭作擘仙絲寫美矉依然南國娉婷石畔浣紗今在否溪流猶為人清興亡吳越眉顰上鴟夷枉鑄遺像日暮百花洲下路珊珊歩􅓏餘響醉花隂和潄玉詞同阮亭作花影枝枝摇午晝桂炷銷獅獸愁病怯登髙幾陣西風吹得羅裳透闌干星月三更後玉露沾香䄂心事寄誰行約畧腰身轉覺秋来痩怨王孫春暮和李易安同阮亭春隂晼晩薔薇庭院謝女樓空秦娥夢斷倩栁色把情傳結纒綿當初小喜将人惹還抛捨煞是無賴也别来又過寒食幾樹横斜斷腸花古詩小喜多唐突相憐能幾時又銀箭聲悄金屏思惱香夢和雲流鶯弄曉一樹樹海棠紅不禁風風狂雨驟傷心處花落去穠豔空辜負登樓一望天際目盡南雲鎮思君雙調望江南初見初見處記得在東臯曽與酒人司白墮便從仙籍識青腰顔色為誰嬌行酒罷滅燭更相邀並體花間剛恰好凌波一捻已魂銷何况是今宵浪淘沙戲贈閨人生計漫匆匆賣賦臨卭黄金先為貰新豐伊唱吳趨儂起舞激楚迴風此處不留儂甚處留儂小朱慵粉若為容一事與卿權領取酒誥花封代答曉起弄籹慵笑指吳儂白衣夫壻白頭儂今日海棠花下飲端與誰同雲雨楚天重誰繫郎蹤任伊夢遍十三峯解識近来勤入道懶向花叢懐歸漏永夜如年撥盡罏煙乍晴又雨晩秋天切切暗蟲牕外語欲斷還連寒色透重綿若個周旋自家将息自家憐何日歸来相訴也月下星前客牕夜雨寒雨太連綿一抹江天廣陵鐘斷夜無眠何事秋聲吹不了長打窗前酒後轉凄然著處堪憐故鄉只在睡鄉邊好囑夢兒歸去也片刻團圞杏花天美人題紅葉安排秀句描秋思正沉吟湘毫欲試風前紅葉輕於紙薄命生憎似此堪惆悵美人獨自碧雲杳佳期未至有情盡觧相思死消得銀鈎幾字摘紅英客中聞賣花聲東風𦂳吹芳信賣花聲隔墻頭粉耽人恨教人困賒得春光為誰􅆪髩青兒嫩紅兒褪夢迴蝴蝶難重認情兒悶心兒忖别来幾日玫瑰開盡紅窗睡舟泊廬山下寄吳爾世薄暮江濵暁竹尋烟見水面漁燈三兩香罏五老青㝠上正峯峯相向猶記此中君獨徃料此後雲巖松瀑依依夢想因風傳語道廬山無恙河傳和温飛卿愁緒如許對清宵砌竹風敲蕭蕭一聲兩聲魂欲銷無聊冬缸凝玉膏却抱雲和傳素怨芳信晩腸併危絃斷夜烏啼竹葉飛凄其小窗月又西鷓鴣天戲題閨人團扇蘭吹和煙細不聞紅㽔夢冷浸香雲大垂手處千金意小比肩時兩玉人珠有暈璧無痕怎生消得許多春願將巫女峯頭水形影團来併一身偶贈上社橋頭鬬綵韆黄鸝巷口按歌年當筵錄酒從無誤隔坐抛鈎絶可憐良宴㑹好因緣玉兒顔色雪兒絃别来多少傷心句寫付吳中水碧箋咏美人眉麝月纔分一寸彎長顰短暈淺深間療飢自有飡来色消渴因看逺際山螺子細栁絲寒兩峯天外碧相攢翠蛾一滴能傳語窨住春愁不放還咏美人指甲知向窗中弄彩毫墨痕隠隐沁紅么手揮玉柱頻教剪指撥沉煙旋欲焦風力折嫩蘭苕夜来輕蘸碧雲醪芳心要使檀奴覺一掐春肌暈未消玉樓春五日飲虎邱山下題壁越衣當暑清風至芒鞋偶過雲嵓寺虎邱山下故人家能倒金樽留我醉醉後難平多少事仰天欲問天何意偏使鷄鳴狗盜生却令賦客騷人死贈河内賈雲谷三河自昔繁華地君最風流堪自喜莫向天涯作旅愁人生大約如萍寄曲江當日曽連轡盛年畧與荀郎似今朝試向鏡中看不覺已年三十四白樂天詩不覺明鏡中忽年三十四三月晦日歸舟淡烟斜日長亭暮難得韶光容易度江南無限斷腸花枝上東風枝下雨萋萋芳草傷心路一片雲帆天外渡人從春色去邊来舟向夢魂来處去步蟾宫書姬人素領巾一泓香雪團金釧卸仙銖輕盈如剪分明只是洛川人送微波靈綃乍捲人間天上誰曽見生受了玉柔花軟情知薄福為伊消􅂸不做黒頭王掾雨中花解嘲麯生已拜尚書尹毛生又攝中書品橘叟千頭竹君千户盡領通侯印羽客乘軒花錫衮先生豈合長棲遁官栁排衙官蛙疊鼔官補南柯郡羅虬有花九錫夜行船花底私語半軃鴛綃輕蘸碧軟春纎湘紈無力圎靨初分横波欲瀉心事有誰知得解意芳姿偏作劇故意兒弄人羞澀笑指蓮花向儂偷問可似粉郎顔色虞美人詠虞美人花香魂帳底隨煙冷判與春風領柔枝留得可憐名一捻紅衣猶似儛人輕嬌歌小按傷心拍楚楚綃裳濕玉環飛燕已成塵不道虞兮原是此花身偶賦小樓昨夜霜華凝膏薄蘭心冷紅烟幾縷暗香濃可惜一塲歡㑹太匆匆今朝行到紗牕下剛值梳頭罷回眸一笑轉嫣然恰似三生石畔舊因緣閨情連枝蘭燭熒熒影簾外秋風冷神絲繡褥鬱金香不覺犀梳低墮枕函傍纎纖玉指如萌削數遍陽臺約脂殷粉弱最傷情偏是行雲夢好易為醒燈下繞廊試覔芳蹤去數㸃蘋花雨九微燈下見渠儂恰是巫山神女夢中逢月稜隐約唇朱小簇蝶湘裙裊玉簫吹徹獸烟温記得横波不轉暗窺人登太白酒樓和董蒼水韻青蒼齊魯垂垂小十二山河遶銜盃笑殺世人忙不道次公當日醒而狂騎鯨客去烟波暝碧落無音信振衣一上謫仙樓遥望長安不見使人愁南鄉子第三體採蘭微雨過池塘玉骨纔勝翠莞涼乍起猶然閒徙倚紗牕一葉紅蕖墜筆牀楚畹媚幽芳小摘蘭叢助曉粧半晌沉吟緣底事思量有箇人兒竟體香鵲橋仙清眀煙蕪瀉浪晴川鋪練一陣風来吹皺韶光百五禁烟時又過了幾番花候夭桃染暈垂楊拖線萬㸃春光泄漏口噙紅豆寄多情為誰把相思嘗透紅豆名相思子踏莎行悼兄女四韻拈成六書摹遍小窗夜夜温文選繡牀竟日不聞聲間来學弄湘妃管白璧難堅彩雲易斷此生何處重相見鑾江一紙斷腸書淚痕遥洒登髙宴春暮鶯擲金梭栁抛翠縷盈盈嬌眼慵難舉落花一夜嫁東風無情蜂蝶輕相許尺五樓臺秋千笑語青鞵濕透胭脂雨流波千里送春歸棠梨開盡愁無主題美人畫扇㸃㸃凌波些些眉嫵玉蓮花下私行去花光臉色不分眀紅酥欲凝嬌無語醉玉如煙汗粧如雨風流體態還如許羅衣恰好半身長依稀已到銷魂處將逰嶺南却寄荔子香寒珠官色冷綠溪雨暗桄榔影枉將淚眼望南雲夢魂不渡梅花嶺翠羽雙飛素馨千頃此方仍是繁華境仙梅開日是来時一枝歸把相思贈虞美人第二體錫山舟中獨酌玉巵如雪溶溶白巵酒還同色水雲影裏叩船舷無情月也解相憐為人圎壚頭肯典鸘裘否歸取文君酒碧桃花下醉摩娑秦筝趙瑟倚聲歌樂誰多小重山扶病遲日園亭禊事收那時扶病送上蘭舟千絲萬緒在心頭方寸地着得許多愁風雨幾曽休怪来人意冷似新秋晩天莫倚最髙樓樓下水一曲斷腸流中調臨江仙遣信青瑣餘烟猶在握幾年香冷巾㡚此生為客幾時休殷勤江上鯉清淚濕書郵欲向鏡中扶栁髩髩絲知為誰秋春隂漠漠鎖層樓斜陽如弱水只管向西流聽雨倚枕清宵愁不寐紙忩亂撲春蟲尖寒偏易掠輕容空堂羣響寂人在雨聲中五夜蓮籌頻下盡料應花睡方濃可憐零落綺香叢蜀魂悽欲斷相對泣殘紅姑蘇懷古千載霸圖銷歇也西風廢苑長洲吳東門外一江秋賸將亡國恨不盡古今流臺上鷓鴣臺下鹿興亡轉盼都休烟波空羡五湖逰青山和綠水遷換幾漁舟聞聲嚲䄂無言檀注小窓前曽見微行隔牕聞唤侍兒名風飄鶯語脆故是向人聲兩字輕綃和小玉千嬌百媚横生吹来氣作楚蘭馨今生有分麽消受一聲卿唐多令人日雪中立春玉砌爛仙葩朱栱渲紫霞小梅幾㸃逗簷牙綵勝銀旛齊插鬢沒多個一些些繡帖熨牕紗窗中金縷花東風力軟半夭斜吹起一庭香雪舞春先到謝娘家蝶戀花寒夜閨情珠漏頻催冬夜永寒月窺人人在清虛境十二屏山湘水浄香㽔枕畔紅氷凝􅝹􅟞紫茸風約定半晌無聲似睡依然醒壁上餘燈金燼冷帳紋細裊沉烟影紫茸帳名雲間别蒼水黄鳥間關啼不住斷送殘春陣陣桐花雨幾日西牕深夜語微吟每到銷魂處圓泖潮生西日暮三老長年抵死催人去執手髙樓輕别取錦牋空贈相思句又疊前韻世事關心難得住北渚停橈一夜孤蓬雨不見美人誰與語空江月落潮平處黯黯碧雲天薄暮酒冷香殘無計驅愁去他日重来還看取玉鳬新製驚人句玉鳬蒼水詩集名一剪梅答貽上餉酒路近槐安且薄逰朱邸封侯綵仗鳴騶南柯五馬最風流莫問隋樓只問秦樓三十無官欲白頭天上消愁地下埋憂半生知已兩人休從事青州司理揚州和潄玉詞同阮亭作萬疊青山一抹秋天半歸雲天外歸舟何時玉席手重攜同拂香巾同上朱樓南浦寒潮帶雨流只送人行不管人愁吳天極目路逶迤海湧峰頭薛澱湖頭古詩香巾拂玉席共郎登樓寢虎邱山一名海湧峯攤破醜奴兒閨怨秦樓誰管三生約花下行春月下行雲鸞鏡從生蛛􅃠塵也囉難道是一心人為伊禁得多煩惱收拾羅裙打疊羅巾一捻香酥滿淚痕也囉難道是不思君定風波晩坐風墮涼螢夜色微玉池蓮葉碧痕齊行到曲廊将盡際難避意錢人在小窗西似水天階閑坐遍試看三星猶自為人低一種御香通氣處何許暗中不道换羅衣意錢即攤錢也見梁冀傳漁家傲梁谿道中逺樹生煙漠漠起九龍峯色青于髻素字誰傳江上鯉歸也未山川一片悲秋氣三尺蒲帆風力細儂家逺在吳江尾一種相思千様味心兒裏秋荼只覺甘如薺春夜窈窕紅雲明畫閣綉簾不動金鈴索欲雨春檠花自落東風惡峭寒今夕誰先覺忽憶前歡還似昨無言倚遍眀霞幄新燕輕盈垂栁弱人如削𤣥霜夜搗長生藥寫恨春雨春風褰翠箔楊花也似人輕薄魚子花牋山海約當初錯當初錯畫鴛鴦諾十幅紅裙金縷雀近緣修道渾閑却手把琅函書一握從今莫從今莫更思量著蘇幕遮婁江寄家信作栁花風榆莢雨檢㸃春光去也何匆遽紅淚飄零千萬樹亂鶯啼到無聲處旅顔殘歸計誤日日尋思臨别叮嚀語欲倩文鱗傳尺素婁水無情不肯西流去第六句少二字醉春風私調半妥偏荷髻小立朱扉裏妙齡取次問伊行幾幾幾綠似珠鮮碧同玉豔一般年紀香臂紅粧膩秀黛青烟細不知曽否破𤓰無未未未今夜羅幃月明人静怕難迴避私㑹驀地相逢乍三五團圓夜幾回觧帶又沉吟怕怕怕衣上香濃口邊朱損有人驚詫好把紅茵藉更取青鬟缷為伊相䛏不能休罷罷罷索性迴身恣他憐惜栁嬌花姹風中栁立春日平原道上作芳甸青旗山縣迎春時候無端獨向風塵走去年今日酒重沾衣䄂簾幙捲花封如繡迢逓家園景色還應依舊髙樓不展横雲皺重門深掩鵲腦歕金獸怕春来更添消痩十眉圖有横雲眉離别槐樹隂濃小院晩涼時節别離可奈腸如結歌喉輕囀聽唱陽關徹情脉脉幾回嗚咽細語叮嚀道且自消停這歇燈火髙城更未絶殘粧重整送向門前别􅂸今宵為伊啼血道字襯行香子賦恨取次相親打疊消魂再休避小媵魚鱗箇時心事費盡温存有幾分憐幾分愛幾分嗔參横斗轉匆匆歸去木蒼琅隔斷重津分眀眼底欲見何因似鏡中花水中月夢中雲小院殘春小院殘春金鎖重門花隂裏隔子迴紋彈琴清夜待月黄昏想那時情那時事那時人三年一瞬兩情千里似蓬科飄泊江村凄涼玉柱慘淡金樽看燈如雨雨如夢夢如塵青玉案九日寒烟衰栁西陵路是一幅悲秋賦凝望衡臯天欲暮蕭風吟葉濕雲粘樹不見登髙處東籬把酒黄花吐應插遍茱萸無數美景良辰誰與度露蛩聲咽霜砧響斷枕上瀟瀟雨感皇恩題北隐山房深户映花關紙牕茅屋栽就瀟湘萬竿竹捎雲拂日染出一庭濃綠石牀欹枕處茶初熟中有髙人棲遲空谷氷雪瀠洄絶塵俗欲遺襍佩采采露蘭霜菊相思何處也人如玉小桃紅題悔菴桃花源樂府好把荷衣製歸隐從兹始煙外迷津雲中問渡桃花春水想武陵當日避秦人五栁前身是一曲紅牙試千載還神似玉骨蟬輕仙踪羽化碧霄髙逝想世間不屑折腰人今古皆如此千秋歲題袁重其侍母圖金盤玉匕斟酌西池醴傳妙舞流仙吹斑衣娛此日霜哺思前事北堂上粲然一笑慈顔喜見説麒麟瑞巧向懐中墜應解識之無字添枝桐月閏入夢蘭雲細願歲歲青春白髮看兒戲傳言玉女題余氏女子繡栁毅傳書圖同程村阮亭文友分賦霧髩風鬟憔悴洞庭秋葉湘雲淚滿㸃㸃鮫人血緘愁欲寄去雁逺衝江雪兒家何處綃宫璇闕涇水歸来依舊珠輝玉潔此情難負更把紅絲結昔人已往如聽當年嗚咽素書一紙銀針千疊祝英臺近重陽後一日揚州别程村阮亭逺峰青寒渚碧零落紅衣暮流雪迴風陣陣蘆花舞秋光欲斷人腸重陽過也猶做作滿城風雨太匆遽乍可一曲驪歌便上蘭舟去水雲無際何處尋前渡依稀認得歸程黄葉清江是昨夜夢中来路蕙蘭芳引答悔菴餉酒茗不斷鄉愁烟水外風帆如簇恨芳草斜陽迢逓偏傷逺目扶笻歸去正東隣酒香茶熟乍飛箋来到空館敲殘寒玉綠蟻頻浮翠旗纔展頓消煩燠有紫鱠千頭更汲取碧琳千斛石爐徐沸葛巾新漉倚南牕一枕清眠初足更字襯驀山溪舟中殘月芙蓉湖畔㸃㸃喧津鼔何處是歸程輕鷗外一聲柔櫓香銷酒薄早是不成眠怪好月故相撩枕畔時来去方暉圎景揺曳紛無數風勒水聲寒又激起吳歈凄楚夜長夢短此意有誰知算只有廣寒人知我傷心處洞仙歌元夕千門萬户聽踏歌聲遍一𣲖笙簫暗塵逺有麝蘭通氣羅綺如雲香過處隐隠紅簾盡捲閑行南北曲玉醉花嫣争簇天街閨娥轉更誰家豔質燈火䦨干驀地裏夜深重見向皓月光中費疑猜不道是今宵廣寒人現法曲獻仙音九日揚州寓舎得錢大幼日秋試捷音作此却寄黄入宫槐香分月桂仙宴鹿鳴初舉江上峯青曲中人逺傳遍湘靈佳句錦箋遥芳信速早到竹西路登髙處憶當日篝燈深語西牕下樽酒論文幾度綵筆掣青霜不加㸃賦成鸚鵡共説錢郎好添修龍樓鳳宇問少年同學若個才情如許松桂堂全集卷三十九
