body:
  text: 松桂堂全集巻二十五乙丑吏部侍郎彭孫遹撰夏日集一峰草堂送邱季貞還淮安斜日薄林巒離亭暝色䦨寂寥河朔飲清切雍門彈白首成今别青雲尠昔懽川途人共逺驛路暑初殘轉軾經修坂揚舲下濁湍晩山淮甸碧秋水射陂寒舊隠淹叢桂新吟續採蘭差池憐小草能不憶長安送顧孝竒還呉孝竒以乙榜候補内閣中書舍人盛世寜須歎積薪髙才未合乆沉淪漫題芍藥階前句待作櫻桃宴裏人此去吟將呉岫月重來占得曲江春蓬山舊境依然是弱水何曾隔一塵露白風凄木葉號離情秋色共蕭騷從知别後縈清夢暫與尊前泥濁醪積雨成隂迷去騎空江㠶影落寒濤銷魂兩字誰能賦枉費江郎五色毫晩出成賢街作璧池春水縠紋寒坐挹淪漪媿素餐豈敢浮湛孤聖主祇將衰劣玷儒官桐花雨過清厭浥槐樹風疎翠鬱盤却向成賢街上望宫牆縹緲五雲端量移後作藩雀何須振羽翰林蟬本自耐清寒十年身是孤生士三月恩䝉再徙官巾笥漸疎青管澁衣書欲綻白魚乾強思報塞曽何補終向滄洲老釣竿送王㢘一觀察江右龍節熊旂擁上游星軺此日下椒邱平反西寺三千屬觀察南方十四州山驛秋陰無舊壘江城春雨有新謳政成好踐巖廊上早信扶陽世徳優得友人沈寅工凶問詩以哭之素車不赴涙空零旅櫬蕭蕭下井陘他日重尋班草地春蕪一片審山青西山率爾有作興盡本韻俊烏不受籠良馬不戀棧可憐干禄子千里事羈宦戚戚常尠懽悠悠嵗云晏儤直赴東華王事懼稽慢於時蒞嚴辰酸風入衣襻日瘦雲連蜷白如菼與薍硯池戛清氷墨糝落瓜瓣投筆一憮然職業苦難辦自笑踈野人仕學曩未慣豈意河東豕來叨大官豢低頭增吾恧敢辭同位訕却憶五年前英賢此追扳出入有行列舂容若舒雁崑山既即世宣城亦觀幻大招招不得廣栁送枯輚歸塟山之阿墓木今可鏟風流不可作思之涙為澘晩出繚垣西好山生顧盼遙想蒼寒中巖壑相側間有石蘿可捫有泉魚可汕貞松老更嫵晩菊寒猶綻念欲徃從之苦遭名位綰徒使一寸心慚林復媿澗因兹感人事徃徃更憂患鄭璞每喪真魯鼎或多贋美服人所指髙門鬼來瞷才儁鄷生誅法敝商君轘乃知大海鵬未若藩籬鷃逝當還初服荷衣手自擐山妻善操作布裙不施襇捃拾以自資有兒甫童丱力田課桑麻灌園蒔葵莧春社羅雞豚臘酒索貓虥遑恤亭尉訶一任薄俗嫚行矣方自今徃者不可諫古槐槐㕔有木木有枝百餘年物無人知苦遭霜雪日摧挫不肯荏苒同凡姿老龍蜕爪龜裂璺水中有火心未燼寄聲為語殷東陽莫道婆娑生意盡雙鵞篇新河人宋登春以詩名嘉隆間流寓江陵之天鵞池自號鵞池生死百餘年矣康熈辛酉柘城王培宰新河讀其詩而慕之刻碑表其故里夜有雙鵞止碑上里人廹之不去籠以獻培培為鑿池廨中馴畜之鵞時時鳴舞向培若感恩􅀈吾友周屺公親見其事為予道之如此燕趙之間多竒士曩者乃有鵞池生狂吟徃徃吐秀句五言藉甚稱長城挾書之楚作僑客忍餓時出金石聲荆州太守造廬下堅卧不肯開柴荆籜冠皁衫徃報謁直踞上坐人皆驚晩遊呉越蹈浙水一死埓於鴻毛輕吟魂逝後百餘載誰歌楚些陳呉羮柘城王即新河宰讀其遺句心為傾可憐宅里乆蕪没刻以片石青瑤英雙鵞瞥然下池沼迫之不去飛且鳴口不能言告以臆願娯耳目酧深情我聞此事疑又駴還復以理相推評古來冥感儻類此不在用物多取精衛姬化雉出隧道潼亭鳥涙霑杜塋悠悠物變費推測耿耿節義留精誠生雖匹士是或有欵啓未可窮幽明百年同盡骨速朽人生飄忽如飛蝱神耶怪耶姑勿語慎勿磨滅身後名題雷田濯足萬里流圖有履不受尚方賜有襪不教廷尉結黄埃野馬易汙人濯去滄浪千頃雪迷陽卻曲無不可肯向風塵乆蹩躠市朝自窄宇宙寛髙卧山中踏明月送張毅文歸郁洲山安能躡屐遍五岳尚平志願終難諧㑹心何處不在逺一邱一壑亦復佳郁洲山水况佳絶是中靈境天安排銀房玉柱架幽壑瓊枝瑤草被蒼厓一從主人出山去雲泥隔絶如天涯可憐世路舊刺促右蠻左觸同一蝸陸沉潦到真可笑夀王格五枚生徘豈如税駕返初服掉臂擲却青絲緺山中髙卧謝人事邈然霄漢誰能階我亦有意不自得烟姿霞骨徒塵霾明年决計脱羈鞅青鞋布襪與子偕嵗除即事四首一杯雪酒淡相於小飣辛盤有菜菹始信貧家輕節物因知乆宦减田廬䦨干星斗三啇後偃仰風塵十載餘余自乙夘䝉有㤙湔洗留京師者十一年矣寄語山靈休見誚從來盛世薄樵漁檢罷殘編起欠伸屋梁饑鼠嘯承塵囊無絳雪真憂老罋有黄虀豈患貧蠅翼乍凋悲郢匠范冠空戴感成人此心已是同灰槁憑仗春風與發陳頃十一月張武承宫贊物故予執友也十二月初鄉人南來又得從兄子服凶問余未及製功衰但為位曲偯而已䀜䀜流年百感盈熒熒殘雪半忩明風前寒玉凄涼語霜外晨鐘斷續聲薄禄有加慚素食閒官無補媿蒼生可憐燈火闌珊夜一作寒燈熖小如螢碧猶為愁人理藥鐺一枝曾此寄鷦鷯南郭連牆慰寂寥茂苑音書徒契濶宣城館舎乆蕭條殘缸易燼和灰冷寒漏難憑上水遙病婦猶然催視夜明星有爛好趨朝除夕次説巖先生韻玉珂初向直廬還櫪馬聲中獨掩闗錦帶新篇江令筆白雲舊隠謝公山頻煩禁闥才俱健把玩年華意自間幾欲相從肄宵雅祗憐垂老益衰頑紫宸仙仗集端門玉律陽囘紀嵗元鵠立千官班舜瑞山呼萬嵗薦堯樽儒臣重席叨深眷膳宰加籩見特恩莫道東郊迎氣晩九天笑語藹春温松桂堂全集巻二十五
