body:
  text: 松桂堂全集卷四十一吏部侍郎彭孫遹撰南􅐹集一癸卯嵗除感事青鬢空嗟去日頻年來萬事總傷神庭前人去虛題絮天上書沈老負薪柏葉暫娛分嵗客梅花猶隔渡江春南枝已是垂垂發偏覺東皇雨露新送尹司理罷官歸樂安遷客東還不可留一官清苦志難酬十年勞吏雙蓬鬢千里歸人一葉舟津柳若為攀去袂檣雲已自亂春流亦知齊瑟非時好淥水朱絃黯自愁立春日十年猶著薜蘿衣矯首風塵與願違海外戈船孤戍絶望中湘楚一烽微經春弱柳堪頻折度磧征鴻更獨飛人事飄蓬今已極祗應沈醉答芳菲將赴長安留别上官僉事芳草江南路辭家屬暮春頻年多作客八口欲依人去棹經長水離心寄白蘋凄其違故里行矣戀清塵河鳯聲名舊原鴒意氣真觀風人自理問俗化如神北望君門逺南瞻使節新恩波殊浩蕩待起轍中鱗南園二首三月南園雨復晴輕衣初試踏青行碧桃水暖通人境緑柳陰濃覆女城春草欲將幽佩結夕陽多傍畫橈明閒中易有芳時恨花落空林已暗驚聞唱吳歈早倦聽南園猶作片時停集賢舊苑春將暮相國東門草自青南園廣陵王錢元璙池館宋集賢校理蘇舜欽買居之作滄浪亭其上在吳東門芳樹斜陽成晼晚孤帆細雨極飄零朝來觸目多惆悵榆莢花殘已滿庭春暮遊虞山春山百叠倚晴空應接峯巒路不窮僧舍半開紅雨外女墻長在翠微中全吳地盡雲依水平楚天低草颭風暫得登臨當暇日勝游知復幾時同送孫介夫歸越州蘇臺朝極目芳草遍郊原猶作吳宫色能銷越客魂鶯聲移雜樹花氣滿離樽去逐春江水隨潮到里門雨中春興風墮薔薇入畫檐一時吹作雨纖纖菜花水淺才通棹燕子泥香正捲簾陌上有人尋翠羽愁中何處問青帘離居轉覺春陰促晝漏頻移又幾籖暮春同蘧非孔卓勤止登文星閣逺眺時與勤止共習參同之學憑欄忽與白雲齊吳楚青蒼望不迷春去空洲花隱隱人來故苑草萋萋風濤獨墅聲皆應雷雨諸天勢盡低早晚遊仙成大藥若為霄路共攀躋獨墅湖名吳下寄百旃金亭薄暮暫維舟春草茫茫識舊遊廢苑啼烏終古恨寒春落日滿城愁疏華不見書南至桃梗還隨水北流却憶故人猶寂寞琅玕何處一相酬送陳陶菴民部歸蘭陽白首東吳客經年始北歸門生開館舍公子戀庭幃雨急河聲轉川長草色微汴宫春已盡到日亂鶯飛姑蘇竹枝詞榆花開盡柳綿飛紅雨初收碧浪肥伍相山前連袂去二郎祠下弄舟歸弓腰帖地曲彎彎水鬢拖雲雀色斑翻盡從前巾舞曲新來齊唱娜如山畫眉顔色染鮮新畫眉衫子糝麯塵吳兒絶愛畫眉鳥吳娃偏喜畫眉人紅鴨橋邊鬬鴨城黃鶯坊裏早鶯聲寧馨兒是誰家子薄相由來過一生千人石上紫雲簫一曲清歌魂欲銷勝㑹中秋才罷却便須串月小長橋空傳崖蜜滑如飴浪說宫中進荔枝光福楊梅洞庭橘吳王當日餉西施天平翠色列如屏元墓丹梯萬叠青兩處山情無限好遊人只是愛支硎紅橋書巷至今存四合紅塵晝欲昏試聽吳歈君莫訝此聲元自起閶門一斗霜鱗一尺形釣車窄似小蜻蜓櫓聲一歇鼓聲起滿市齊聞水氣腥洞庭山下太湖平郎住湖中妾住城不畏石尤髙萬丈郎船日日借風行贈袁重其爾名推獨行今日喜相過委巷留車轍間庭長薜蘿白華親膳潔黃鳥友聲多坐覺春陰暮論交奈晚何三泉亭山塘花柳試春遲吳客停驂正此時多向三泉亭上飲無人重理壁間詩寄題毛華伯西爽齊空翠結庭户秋陰生女蘿自饒遺俗韻不愧伐檀歌緑樹當軒合青山隱几多寄聲三徑客羊仲許相過題悔菴弔琵琶樂府一去紅顔帝子家至今哀怨寫琵琶龍沙二月多風雪吹作明妃塜上花清詞一奏和人稀冉冉春雲凝不飛紅粉青娥齊掩泣情知不獨為明妃和吳梅村詠物詩八首蓮蓬人西嶽真人太乙翁靈綃十丈傲秋風敬容荷鏡持堪照正則蓉裳製未工翠袖寒生黃裏怨緑衣人老碧房空等閒憐子成拋捨露冷香銷八月中桃核船度索春秋記未明至今山下一舟橫問津舊覔秦人種採實新疑漢使行內殿貯來杯競渡御筵懷得葉同輕東園桃梗猶漂泊並載中流有棹聲橘燈社橘江邊不可尋湘人膏火自煎心仙枰照去紋為玉寢帳吹來色似金珠裹香殘光隱隱瓊苞霜冷夜沈沈蓬萊九日新傳賜蓮炬分明出禁林蘆筆筆塜猶堪手自耕文通五色浪知名芟松漸覺身將隱畫荻空慙學未成錦字裁來葭露冷玉關銜去雁書橫蘆中人已江潭老封邑寧須羡管城繭虎佳辰又見海榴開剪艾懸符出異材疑有山君乘候變巧從園客化身來蛾眉已老三眠月虎氣還騰萬仞臺聞說繭絲今日盡使君遮莫是牛哀茄牛園中爛漫雨初收刻畫居然繭角牛渤海風清堪作佩吳山月滿漫成愁當前定啓巴人路為後應遺霸主羞柯古徒能搜僻事不知橫笛夕陽秋鮝鶴羽客曽留相鶴書元裳縞袂未全如素翎似待凌霄日清唳疑聞滳露餘自是神仙原有骨安知莊惠定非魚文軒好託琴高乘王母筵頭飽玉蔬蟬猴山林不記住何方衣剪蟬綃綴幾行齊女緌垂供奉服楚人冠插侍中粧如從三峽愁巴客似舞雙丸向越王度嶺身輕同委蛻野賔應識舊王郎别貽上漁洋山人王十一高卧攤書弄白日朝來送我粵東行衍波麗句新翻出孤舟此去觸炎蒸天北天南思不勝長干萬里雪千尺日日風濤下廣陵題孫豹人小影落日蕭蕭松樹林寒崖幽瀑百重深抱琴獨向此中老不復人間覔賞心夏至日小山堂聽歌細雨連朝散麯塵小車閒訪宋家鄰日初北至花陰暖風自南來竹吹新曲句輕清牙作字玉山窈窕璧為人客中怕聽傷心調莫更低徊蹙錦茵廣陵曉發别孫無言吳爾世六淨上人煙波七十里江靜畫帆間野岸生秋水風吹泊樹灣故人一以别遊子幾時還向夕勞回首蕪城落照間林外烟生處人家望欲迷青蘋縈棹轉白鳥傍舟低獨樹風鳴葉空江水拍堤孤帆前路去秋草正萋萋逺道勞相送清樽暫得同孤帆秋嶺外片雨夕陽中細蕊寒花艷繁枝晚荔紅天南猶萬里何處託征鴻維揚客舍送雲客兄北上豫時亦有南越之行湖水平堤炎雨歇風吹楊柳櫂歌發居人情重逺相送君向長安我遊越鼓枻中流自此行方舟並渡江浪平驛燈夜泊雲陽郭戍火朝明鐵甕城廣陵到日停舟處南北迢遙各異路代馬還嘶塞北烟越禽自託天南樹只今已見鯨鯢戮薄海銷兵佩黃犢時清豈合樂邱園親老還須營斗祿日下翺翔多故人紛紛先據要路津致身遲速各有㑹莫以外吏傷沉淪酌君巵酒君努力前路悠悠漫成憶庾勝山頭少雁飛燕昭臺上空秋色驪駒催發不可留後㑹須經春復秋兄弟相思五千里江湖此去一孤舟鑾江舟中再别孫無言吳爾世真州城南八槳船船中酌酒更擊鮮夜闌酒盡慘不樂江水無聲江月圓故交念我逺逰苦執手蟬聨語無數五更月落星漸稀舟人四起撾津鼓嶺南嶺北天一涯鳴橈欲發猶遲遲川塗萬里别經嵗縱有相思那得知送翟靜生之任汝南看君此去佐名藩法吏于今世所尊路轉雲林飛翠幰山連秋樹引朱轓訟庭人靜閒花落官閣詩成小篆溫見說汝南名士在不知曾滿翟公門登燕子磯危磯獨立思蒼茫紅蓼洲前草自芳雲臥岩扉初月上烟生江浦一川長新亭髙晏風流盡舊內清秋水調凉莫問南朝惆悵事江潮東下石城荒發真州星盡夜色蒼清波浩無底北風生早凉孤帆向南指川明戍火微舟觸漁罾起前路及清秋離情滿江渚葉落猶在林萍生不離水胡為逺逰人戚戚去鄉里公子洲萬里依人嶺外逰布帆今日發真州江南江北相思處公子洲前碧杜秋金陵懷古舊苑無人草樹秋六朝遺蹟已荒邱地連東楚山無際城對清淮水自流幾見急裝邀隊主時開霸府領揚州彥回少日仍名士千載猶然怨石頭繁華空說帝王家輦路今來急暮笳淚盡金城前度柳歌殘玉樹後庭花新林浦口秋移艇石子岡頭晚噪鴉風景依然堪記憶承平猶數舊元嘉日下何人肯息機輕塵曉露事全非苑墻雪暗鐘初斷山館秋凉葉盡飛江上青龍千騎擁桁邊朱雀八騶歸可憐年少青雲器不及丹徒老布衣當時五馬渡江逰妙選良家入帝州夜月幾經芳樂苑曉鐘長罷景陽樓新宫已見營諸鬼內殿惟聞賽蔣侯咫尺維揚方鎮重使人千載惜袁劉杜宇聲殘百感生西風建業舊神京詩成狎客遺簪㑹酒泛諸郎按曲聲江外羽書空絡繹禁中刀㩽正縱橫大官别有長生藥不假天台刺史行萬里山陵萬古愁南司北部正悠悠屠沽自立宫中市竈飬爭除關內侯肯向人間求故劍誰從闕下問全鳩姑溪幕府空貔虎一夕龍車不可留針魚村􅙈渚前途近魚村早市空南來經幾日愁絶石尤風送吳爾世奉母歸新安次孫山人韻溪南幽絶地君奉板輿行已自甘偕隱能無念友生江芳清可採山翠近如迎想到稱觴候千花照酒明烏江渡艤舟近沙岸西風吹野戍傳是舊烏江項王曾此駐夜驚垓下歌曉失陰陵路氣盡耻見憐臨江不肯渡誠哉烈丈夫天亡乃非誤荒祠降神鴉濁浪吞津樹至今二千年江流有餘怒夜泊采石滄洲夜色碧泠泠楚火依微落逺汀江艇秋生名士詠寒山月滿謫仙亭長留勝跡來憑弔忽有幽思動杳冥吟望翠屏空不見渚蘋何處酹芳馨梁山理楫方西上秋風奈爾何江鄰牛渚近山入故鄣多村徑依沙轉漁榔絶水過行持三尺艇歸去狎滄波板子磯荒磯相對出盡日有風波緑水流年促青山舊壘多故侯誰復問行客幾經過何事臨江戍東南久荷戈蕪湖曉發清江新霽後一棹去夷猶雲木蕪湖曉風帆荻港秋舟輕爭過鳥山狹束懸流間對同行客相依說舊遊江月川上浩烟波風前起棹歌暮潮初落處江靜月明多凉氣生秋露殘星墮曉河故園當此夕相憶復如何池口别友人暝色垂垂合殘霞水上明帆低秋浦口人别暮江情半夜潮初上千峯雨欲生客愁緣更極百感迥難平潯陽江口作鱘魚村對潯江下伐荻為門竹為瓦清江無主終古流處處江魚隨意打賣魚歸去日未中呼兒作黍餉阿翁江鄉六月薦新穀破釜炊出桃花紅陶涇日暮帆初落孤村且自依歸人乘月渡夜火隔江微獨鳥暝投樹寒漁水滿磯經秋猶幾日槲葉已紛飛小孤山孤峯立水中迢迢四無際樹色碧如簮山形小于髻上有靈祠鎖緑蘿美人獨坐掩修蛾不知為雨定何處烟滿空江水始波早秋即事蒹葭初滿岸逺水沒空洲白日頻西下滄江自北流炎雲不作雨楚樹易為秋時見行人影青青古渡頭登湖口縣城一望烟波萬頃明女垣髙與石根平湖光盡日依樓堞山色終朝滿縣城寒嶺無人孤鳥下秋林欲雨數蟬鳴何當便作移家計終臥滄洲寄此生江上寄友凉氣生蘋芷夕陽波上遲水中漁結屋樹杪葉辭枝失路驚搖落當秋怨别離歸程君莫問迢遞隔年期石鐘山日落湖陰三百里天低秋色萬千峯輕舟好下宫亭口夜臥深潭聽石鐘湖口倚棹愁看日又曛罏峯天外落氤氲江連九𣲖潮爭上地接三湘路始分水色平侵岩際樹石龕高對嶺頭雲孤舟莫近楓根泊木葉聲多不可聞南康夜泊塔影掛星渚寥寥烟外鐘驟凉知夜雨繁響入秋蛩霜露行將及關河悵所從謝公精舍近相隔幾雲峯進彭蠡口見鄰舟挂帆入楚淪落天涯可奈何又看清露滿林柯書裁繡段愁難寄地險橫池喜乍過皖口西來江路盡湓城南上楚程多因風想到懷沙處秋水瀟湘已自波彭蠡湖中望匡廬山秋色晚澄鮮湖中水初漲流波夕吹生落日孤帆漾面面見匡廬亭亭霄漢上風泉暗崖谷紫翠羅屏障雲雨生其中吞吐勢俱壯聞有神仙宅靈閟世無兩水簾秋自捲花梵寒逾放瑶草閲千春琪枝非一狀往往逃名人于茲謝塵鞅谷飲含清腴林琴發幽暢夙耽世外期泉石存微尚烟蘿不可攀相望增惆悵秋日登滕王閣客路逢秋思易傷江天烟景正蒼凉依然極浦生秋水終古寒潮送夕陽高士幾回亭草緑梅仙一去水雲荒臨風不見南來雁書札何由達豫章南昌晤熊雪堂侍郎詢及先叔父太僕公遺事感賦蓼花洲畔解征輪班草相看意倍真隔水秋陰遙入座連江暮雨欲沾巾故人猶抱西州痛舊業誰憐北叟貧海內幾人邀顧盼餘波應為及枯鱗峽江道上七夕十年蹤跡總茫茫每到佳辰憶故鄉玉峽晴帆低驛路白沙秋水漫寒塘清川已自迷歸棹錦杼何由得報章此夜閨中多罷織定陳瓜果祝蕭郎估客曲何處千金賈方舟共水津傍橈莫相問俱是未歸人花石潭孤月在林杪哀蟬猶亂鳴暮雲淡無色依約一川平尋烟逺自泊汲石秋逾清徙倚江潭上行吟空復情雨泊章江門外與蘧非對飲何事相看各黯然故鄉一别動經年章江門外聽殘漏寒雨孤舟客未眠吉州秋感短棹沿洄上水遲螺川亭下草離離灘聲傍枕寒逾急漁火依沙逺更移秋雨凉生將盡夜暝鐘愁聽欲殘時居人歎息徴遺事淚滿當年峴首碑建牙吹角贑江濵二十年來迹未湮父老猶然思往事聲名已自愧先人孤篷寒雨鳴林葉極浦秋陰散渚蘋此日經過無限恨臨風空有淚盈巾中元日日夕雲洲上溪聲入聽遙異鄊頻過節秋雨每連朝江轉楓杉暗山寒草樹凋愁心南望切嶺路尚迢迢藍村遲尹孝亷船不至秋水何清駛潮生八月中江檣全臥雨石浪不因風之子空相待心期孰與同暮天遙極目杳杳沒南鴻西江道中雜詠凉雨過天末蘋風嫋嫋生行人乘月色相向浴江清石古猶含態山多不記名空濛雲水外時有棹歌聲山驛荒無次清鉦響易終聲殘人更起寒雨夜推篷暗燭孤花冷新凉一幌通羈心已搖落况是急秋蟲倚楫中流望千山擁一溪幾家茅屋在同住石橋西子夜江潮長孤峯樹影低昨來行徑沒何處辨樵蹊何事南安路﨑嶇不可從披榛迷故道伐木失前峯谷暗聞猿嘯林幽避虎蹤東風一相借目斷嶺雲封野泊萬山裏荒荒不記程片雲當夜捲孤月映沙明早稻初堪飯秋瓜已可羮他時深記取辛苦越中行逍遙章水上極望楚山頭落葉孤楓樹西風一釣舟還思富春渚島嶼正清秋枉棹何時過重尋謝客逰沓嶂生回溜驚湍瀉白波水如三峽出灘入五雲多急浪緣崖轉危檣戴石過臨深曾有誡寧必涉江河野色寒彌曠林光逺自微潭烟回合處江菼住人稀返景連波翠秋帆帶雨飛沙禽知客意相對亦忘機艤舟吉安城下聽父老說金王之亂感賦此詩寄胡三山司理鷓鴣峯下暫停船父老凄凉話昔年征稅多時空澤國亂離幾處有人煙江城日暮吹燐火贑水秋來沒渚田休息于今猶未起深知公府借才賢潭口萬里䖍州路南來又幾重夜寒殘夢覺隔水聽晨鐘䖍州僧院逢姚江故人邵貞木旅泊江城信所如禪扉虛掩夕陽餘故人幾日䖍州住漫爾相逢靜者居合院松陰秋磬歇隔林樟葉午風疏君歸定取由拳道為致天南一紙書泊小溪驛前桂楫此江濵千山暮色新飛泉臨澗道行徑入荆榛沙月虛生白溪魚清畏人煩襟聊一濯已覺淡無塵夜宿上猶江口洲渚增波夕吹生寒光上水漾虛明夢中秦徑家何處枕底章江夜有聲流火將殘秋在樹曉河欲墮月當城最憐客鬢如蒲栁清露枝頭已自盈次芙蓉渡東風不為送灘舟百里川塗信宿留臨水早驚千葉下隔河時見數星流清江渺渺芙蓉渡白露泠泠桂子秋夜擁吳綿聽寒溜不知身已近炎州見涉江者秋匏映微明川光逺相接林靜不聞聲歸人踏落葉渡口立踟蹰水寒不可涉入䖍南界次瓦角潭當暑辭家萬里征扁舟兩見月華生客程已去吳中逺秋氣多從雨後清曉露欲沈星歷歷明河相望水盈盈家人豈謂猶飄泊只說南行到粵城南安送程五舍人入都兼寄王十一司理詞客趨朝萬里途夕陽行色亂平蕪近南已覺猿聲苦向北初看雁影孤落葉秋燈明驛舍片帆寒雨下江湖竹西傲吏猶高臥君到應知病欲蘇飛來寺秋雲川上暝峽樹雨中微莫聽清猿呌行人淚滿衣大庾嶺上寄周量秋嶺岧嶤天一隅南來鳥道極荒蕪稻花再熟香初遍竹箭叢生翠不枯自有關門通越徼依然風土入吳都憑髙北望扁舟客此日輕帆下鬱孤游篁村入芥菴謁是禪師欲買深山計未能虛名十載總無憑入林且訪經行室浪跡真如自恣僧花院風微生夕磬雲峯葉落見秋燈此身但得辭塵纍洗鉢焚香亦自應九日寶安江上同尹考功兄弟泛舟賞菊即席留别九日移舟傍水涯烏衣白帢向風斜江雲一碧波同色籬樹初黃菊有花彭硐晴陰邀夕照石橋秋漲泛明霞歸橈正值寒潮落新月依稀印晚沙席上花枝壓帽簷林中霜氣正清嚴一行緑樹催移棹四座青山入捲簾盡瀉金樽狂畢卓平霑玉柱惱江淹追遊縱有他時約未必風流此㑹兼泛舟歸與諸子亭中玩月再叠前韻逸興清秋未有涯倚䦨相對月初斜樽前競秀三珠樹筆底紛飛五色花滿篋高文翻白雪千山爽氣合青霞明朝可惜江亭别細雨平帆下淺沙空庭燈火逗虛簷鈴柝聲寒入夜嚴星轉明河低照户月移秋樹暗窺簾朱華泣露芳初歇緑蕙披池水半淹欲託清歌思無極應劉才調好誰兼再遊芥菴蘭若蕭條絶四鄰乘閒且復往還頻林光盡日能娛客山徑重來不問人翠竹黃花含妙偈間雲流水悟前塵宿緣倣佛堪追憶三十年前未了因宿芥菴呈是禪師雲山偶作南中客杖笠初尋物外逰滿院寒香仙桂發一林疏雨玉梧秋已知世味同芻狗便息機心近海鷗願乞巾瓶為弟子他年追侍碧峯頭雲水襟情久自同繩牀玉麈見宗風秋生夕籟高林外人在山堂細雨中心境自憐空未得思惟已覺路將窮重來證取無生意相約明年荔子紅奉酬是禪師見貽之作竹院無人諸境寂翛然已自出塵逰瘴雲近海孤村暮寒雨生潮片葉秋信宿微言還得象行吟心事欲盟鷗春前趂取芒鞋健直向羅浮最上頭何肉周妻纍不同幾時林下暢元風諸天說法花時現片語當機日可中白社但能傳慧業青衫誰復怨文窮塵緣未了空歸去惆悵篁溪夕照紅送王震生之惠州江亭微雨過木葉淨高枝秋入重陽後人當欲别時波光天外動峯影棹中移歎息南飛雁冥冥不可期張穆水墨翎毛歌小鳥天生好毛羽翩翾長傍庭中樹只應終日搶榆枋何得翻然上豪素畫家名手不易逢著筆用意各不同寫生貴有生動趣比似山水尤難工張穆晚年最入妙㸃染翎毛皆逼肖風吹倦翼矯欲鳴日射高枝猶振掉春陽遲遲花氣新黃鸝翠鵲飛向人清秋堂上圖一展霜眸下瞰低晴旻昔有林良與吕紀擅此巧藝稱絶神墨描彩繪俱有態後來居上更軼倫山人家在東山下六十無兒一茅舍片石當庭香草繁白頭意思亦瀟灑貧難得食且莫憂孤高自合相知寡此藝足成身後名傲殺悠悠肉食者酬周蕡九日登梅山見貽重陽無雨試登山把酒論詩盡日閒一水直通清淺外三山長在有無間疏林霜蕊當秋發逺浦風帆趂月還興至便携笻竹去夜深猶得欵松關九月桃花穠艷惟應占早春一枝偏發授衣辰誰傾籬下忘憂物恰遇源中避世人繁塢秋深吹絳雪寒林霜冷坼紅鱗欲攀芳樹愁搖落憔悴劉郎舊日身題周蕡墨竹故園新種千竿竹秋雨應添緑萬叢昨夜山樓寒夢覺依稀身在碧鮮中尹孝廉席上贈伎月落參斜酒半醺夜來何處賦行雲東鄰才子前身玉北里姬人小字文翡翠鬟低無片語麝蘭烟盡有餘熏閒情近已銷如水深愧花前簇蝶裙贈夏繼先五載相思意渺然嶺雲江樹隔山川鸘裘憶醉燕臺酒鵲印看清瘴海烟萬里同時依絳帳一官幾日領樓船五仙城下秋風裏再得班荆說往年别尹二孝廉園林清絶敞高秋樽酒時時話昔遊楚澤花殘留雜佩越江波暖有歸舟故人東道情何厚逺客南金意未酬日暮不堪津渡急碧雲紅樹迥生愁鄉人王謝從粵西過羊城述彼中風土甚悉因作此寄吳念克吳時在桂林有客逺自粵西來形容枯槁面深黑入門問客何所苦客言粵西居不得回溪復嶺千萬重瘴癘時時見侵逼五日一作墟與市十日一得酒與食硐人蛋子錯雜逰欲說中懷少知識桂林司理近何似手板事人仰鼻息一從蠻府賦娵隅終嵗南方飽蜜唧食蛙休復問官私服薏猶能美顔色二始困頓顔延之三年勞苦吳念克文情遼落棊思枯為爾相思更相憶安能白首久遐荒早向青冥排羽翼秋夜醉尹考功宅戲贈歌童燕郎九月芳柑血色紅臨筵一擲意先通蓬萊殿裏依稀是玉碗親傳女侍中銀粉金柈清絶塵手分朱實色鮮新儂心已自懵騰久何必檳榔始醉人半幅紅箋裹束新合歡仙果嶺頭春木桃不是尋常物那得瓊瑶報美人小史風流獨擅場珠兒真覺勝珠娘甕頭吏部疏狂甚不管人間有斷腸浴日亭翠壁黃灣曙色浮若華已自涌驚流誰能不憶錢塘路萬頃銀濤一派秋東坡詩坐看暘谷浮金暈遙想錢塘涌雪山移寓新街宅簡東鄰胡先輩吾愛東鄰老家貧好著書望衡知比舍卜宅更移居賭墅春澆酒論丈夜剪蔬襟期殊不俗來往莫教疏送馬秀才逰梧州桂水深深渡客遲蒼梧西去欲何之不知懷刺依人日得似垂簾讀易時松桂堂全集卷四十一
